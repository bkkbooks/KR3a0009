body:
  text: 淵騫卷第十一或問淵騫之徒惡乎在曰寢或曰淵騫曷不寢曰攀龍鱗附鳳翼巽以揚之勃勃乎其不可及也如其寢如其寢七十子之於仲尼也日聞所不聞見所不見文章亦不足為矣君子絶德小人絶力或問絶德曰舜以孝禹以功皋陶以謨非絶德邪力秦悼武烏獲任鄙扛鼎抃牛非絶力邪或問勇曰軻也曰何軻也曰軻也者謂孟軻也若荊軻君子盜諸請問孟軻之勇曰勇於義而果於德不以貧富貴賤死生動其心於勇也其庶乎魯仲連蕩而不制藺相如制而不蕩或問鄒陽曰未信而分疑慷辭免罿幾矣哉或問信陵平原孟嘗春申益乎曰上失其政姦臣竊國命何其益乎樗里子之知也使知國如葬則吾以疾為蓍龜周之順赧以成周而西傾秦之惠文昭襄以西山而東并孰愈曰周也羊秦也狼然則狼愈與曰羊狼一也或問蒙恬忠而被誅忠奚可為也曰塹山堙谷起臨洮擊遼水力不足而死有餘忠不足相也或問呂不韋其智矣乎以人易貨曰誰謂不韋智者與以國易宗不韋之盜穿窬之雄乎穿窬也者吾見擔石矣未見雒陽也秦將白起不仁奚用為也長平之戰四十萬人死蚩尤之亂不過於此矣原野猒人之肉川谷流人之血將不仁奚用為翦曰始皇方獵六國而翦牙欸或問要離非義者與不以家辭國曰離也火妻灰子以求反於慶忌實蛛蝥之靡也焉可謂之義也政為嚴氏犯韓刺相俠纍曼面為姊實壯士之靡也焉可謂之義也軻為丹奉於期之首燕督亢之圖入不測之秦實刺客之靡也焉可謂之義也或問儀秦學乎鬼谷術而習乎縱橫言安中國者各十餘年是夫曰詐人也聖人惡諸曰孔子讀而儀秦行何如也曰甚矣鳳鳴而鷙翰也然則子貢不為與曰亂而不解子貢恥諸說而不富貴儀秦恥諸或曰儀秦其才矣乎跡不蹈已曰昔在任人帝曰難之亦才矣才乎才非吾徒之才也美行園公綺里季夏黃公甪里先生言辭婁敬陸賈執正王陵申屠嘉折節周昌汲黯守儒轅固申公菑異董相夏侯勝京房或問蕭曹曰蕭也規曹也隨滕酈曰灌樊俠介叔孫通曰槧人也爰盎曰忠不足而談有餘朝錯曰愚酷吏曰虎哉虎哉角而翼者也貨殖曰蚊曰血國三千使捋踈飲水褐博沒齒無愁也或問循吏曰吏也游俠曰竊國靈也佞幸曰不料而已或問近世社稷之臣曰若張子房之智陳平之無悟絳侯勃之果霍將軍之勇終之以禮樂則可謂社稷之臣矣或問公孫弘董仲舒孰邇曰仲舒欲為而不可得者也弘容而已矣或問近世名卿曰若張廷尉之平雋京兆之見尹扶風之潔王子貢之介斯近世名卿矣將曰若條侯之守長平冠軍之征伐博陸之持重可謂近世名將矣請問曰古鼓之以道德征之以仁義輿尸血刃皆所不為也張騫蘇武之奉使也執節沒身不屈王命雖古之膚使其猶劣諸世稱東方生之盛也言不純師行不純表其流風遺書蔑如也或曰隱者也曰昔之隱者吾聞其語矣又聞其行矣或曰隱道多端曰固也聖言聖行不逢其時聖人隱也賢言賢行不逢其時賢者隱也談言談行而不逢其時談者隱也昔者箕子之漆其身也狂接輿之被其髮也欲去而恐罹害者也箕子之洪範接輿之歌鳳也哉或問東方生名過實者何也曰應諧不窮正諫穢德應諧似優不窮似哲正諫似直穢德似隱請問名曰詼達惡比曰非夷齊而是柳下惠戒其子以尚容首陽為拙柱下為工飽食安坐以仕易農依隱玩世詭時不逢其滑稽之雄乎或問柳下惠非朝隱者與曰君子謂之不恭古者高餓顯下祿隱妄譽仁之賊也妄毀義之賊也賊仁近鄉原賊義近鄉訕或問子蜀人也請人曰有李仲元者人也其為人也奈何曰不屈其意不纍其身曰是夷惠之徒與曰不夷不惠可否之間也如是則奚名之不彰也曰無仲尼則西山之餓夫與東國之絀臣惡乎聞曰王陽貢禹遇仲尼乎曰明星皓皓華藻之力也與曰若是則奚為不自高曰皓皓者己也引而高之者天也子欲自高邪仲元世之師也見其貌者肅如也聞其言者愀如也觀其行者穆如也鄲聞以德詘人矣未聞以德詘於人也仲元畏人也或曰育賁曰育賁也人畏其力而侮其德請條曰非正不視非正不聽非正不言非正不行夫能正其視聽言行者昔吾先師之所畏也如視不視聽不聽言不言行不行雖有育賁其猶侮諸
