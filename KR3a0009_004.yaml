body:
  text: 問道卷第四或問道曰道也者通也無不通也或曰可以適它與曰適堯舜文王者為正道非堯舜文王者為它道君子正而不它或問道曰道若塗若川車航混混不捨晝夜或曰焉得直道而由諸曰塗雖曲而通諸夏則由諸川雖曲而通諸海則由諸或曰事雖曲而通諸聖則由諸乎道德仁義禮譬諸身乎夫道以導之德以得之仁以人之義以宜之禮以體之天也合則渾離則散一人而兼統四體者其身全乎或問德表曰莫知作上作下請問莫知曰行禮於彼而民得於此奚其知或曰孰若無禮而德曰禮體也人而無禮焉以為德或問天曰吾於天與見無為之為矣或問雕刻衆形者匪天與曰以其不雕刻也如物物刻而雕之焉得力而給諸老子之言道德吾有取焉耳及捶提仁義絶滅禮學吾無取焉耳吾焉開明哉惟聖人為可以開明他則苓大哉聖人言之至也開之廓然見四海閉之閛然不覩牆之裏聖人之言似於水火或問水火曰水測之而益深窮之而益遠火用之而彌明宿之而彌壯允治天下不待禮文與五教則吾以黃帝堯舜為疣贅或曰太上無法而治法非所以為治也曰鴻荒之世聖人惡之是以法始乎伏犧而成乎堯匪伏匪堯禮義哨哨聖人不取也或問八荒之禮禮也樂也孰是曰殷之以中國或曰孰為中國曰五政之所加七賦之所養中於天地者為中國過此而往者人也哉聖人之治天下也礙諸以禮樂無則禽異則貉吾見諸子之小禮樂也不見聖人之小禮樂也孰有書不由筆言不由舌吾見天常為帝王之筆舌也智也者知也夫智用不用益不益則不贅虧矣深知器械舟車宮室之為則禮由已或問大聲曰非雷非霆隱隱耾耾久而愈盈尸諸聖或問道有因無因乎曰可則因否則革或問無為曰奚為哉在昔虞夏襲堯之爵行堯之道法度彰禮樂著垂拱而視天下民之阜也無為矣紹桀之後纂紂之餘法度廢禮樂虧安坐而視天下民之死無為乎或問太古塗民耳目惟其見也聞也見則難蔽聞則難塞曰天之肇降生民使其目見耳聞是以視之禮聽之樂如視不禮聽不樂雖有民焉得而塗諸或問新敝曰新則襲之敝則益損之或問太古德懷不禮懷嬰兒慕駒犢從焉以禮曰嬰犢乎嬰犢母懷不父懷母懷愛也父懷敬也獨母而不父未若父母之懿也狙詐之家曰狙詐之計不戰而屈人兵堯舜也曰不戰而屈人兵堯舜也沾項漸襟堯舜乎衒玉而賈石者其狙詐乎或問狙詐與亡孰愈曰亡愈或曰子將六師則誰使曰御得其道則天下狙詐咸作使御失其道則天下狙詐咸作敵故有天下者審其御而已矣或問威震諸侯須於征與狙詐之力也如其亡曰威震諸侯須於狙詐可也未若威震諸侯而不須狙詐也或曰無狙詐將何以征乎曰縱不得不征不有司馬法乎何必狙詐乎申韓之術不仁之至矣若何牛羊之用人也若牛羊用人則狐狸螻蚓不膢臘也與或曰刀不利筆不銛而獨加諸砥不亦可乎曰人砥則秦尚矣或曰刑名非道邪何自然也曰何必刑名圍棊擊劍反目眩形亦皆自然也由其大者作正道由其小者作姦道或曰申韓之法非法與曰法者謂唐虞成周之法也如申韓如申韓莊周申韓不乖寡聖人而漸諸篇則顏氏之子閔氏之孫其如台或曰莊周有取乎曰少欲鄒衍有取乎曰自持至周罔君臣之義衍無知於天地之閒雖鄰不覿也
