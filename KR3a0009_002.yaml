body:
  text: 吾子卷第二或問吾子少而好賦曰然童子彫蟲篆刻俄而曰壯夫不為也或曰賦可以諷乎曰諷乎諷則已不已吾恐不免於勸也或曰霧縠之組麗曰女工之蠹矣劍客論曰劍可以愛身曰狴犴使人多禮乎或問景差唐勒宋玉枚乘之賦也益乎曰必也淫淫則柰何曰詩人之賦麗以則辭人之賦麗以淫如孔氏之門用賦也則賈誼升堂相如入室矣如其不用何或問蒼蠅紅紫曰明視問鄭衛之似曰聰聽或曰朱曠不世如之何曰亦精之而已矣或問交五聲十二律也或雅或鄭何也曰中正則雅多哇則鄭請問本曰黃鍾以生之中正以平之確乎鄭衛不能入也或曰女有色書亦有色乎曰有女惡華丹之亂窈窕也書惡淫辭之淈法度也或問屈原智乎曰如玉如瑩爰變丹青如其智如其智或問君子尚辭乎曰君子事之為尚事勝辭則伉辭勝事則賦事辭稱則經足言足容德之藻矣或問公孫龍詭辭數萬以為法法與曰斷木為棊梡革為鞠亦皆有法焉不合乎先王之法者君子不法也觀書者譬諸觀山及水升東岳而知眾山之峛崺也況介丘乎浮滄海而知江河之惡沱也況枯澤乎舍舟航而濟乎瀆者末矣舍五經而濟乎道者末矣棄常珍而嗜乎異饌者惡覩其識味也委大聖而好乎諸子者惡覩其識道也山𡷨之蹊不可勝由矣向牆之戶不可勝入矣曰惡由入曰孔氏孔氏者戶也曰子戶乎曰戶哉戶哉吾獨有不戶者矣或欲學蒼頡史篇曰史乎史乎愈於妄闕也或曰有人焉自云姓孔而字仲尼入其門升其堂伏其几襲其裳則可謂仲尼乎曰其文是也其質非也敢問質曰羊質而虎皮見草而說見豺而戰忘其皮之虎矣聖人虎別其文炳也君子豹別其文蔚也辯人貍別其文萃也貍變則豹豹變則虎好書而不要諸仲尼書肆也好說而不要諸仲尼說鈴也君子言也無擇聽也無淫擇則亂淫則辟述正道而稍邪哆者有矣未有述邪哆而稍正也孔子之道其較且易也或曰童而習之白紛如也何其較且易曰謂其不姦姦不詐詐也如姦姦而詐詐雖有耳目焉得而正諸多聞則守之以約多見則守之以卓寡聞則無約也寡見則無卓也綠衣三百色如之何矣紵絮三千寒如之何矣君子之道有四易簡而易用也要而易守也炳而易見也法而易言也震風陵雨然後知夏屋之為帡幪也虐政虐世然後知聖人之為郛郭也古者揚墨塞路孟子辭而闢之廓如也後之塞路者有矣竊自比於孟子或曰人各是其所是而非其所非將誰使正之曰萬物紛錯則懸諸天眾言淆亂則折諸聖或曰惡覩乎聖而折諸曰在則人亡則書其統一也
