body:
  text: 修身卷第三修身以為弓矯思以為矢立義以為的奠而後發發必中矣人之性也善惡混修其善則為善人修其惡則為惡人氣也者所以適善惡之馬也與或曰孔子之事多矣不用則亦勤且憂乎曰聖人樂天知命樂天則不勤知命則不憂或問銘曰銘哉銘哉有意於慎也聖人之辭可為也使人信之所不可為也是以君子強學而力行珍其貨而後市修其身而後交善其謀而後動成道也君子之所慎言禮書上交不諂下交不驕則可以有為矣或曰君子自守奚其交曰天地交萬物生人道交功勳成奚其守好大而不為大不大矣好高而不為高不高矣仰天庭而知天下之居卑也哉公儀子董仲舒之才之邵也使見善不明用心不剛儔克爾或問仁義禮智信之用曰仁宅也義路也禮服也智燭也信符也處宅由路正服明燭執符君子不動動斯得矣有意哉孟子曰夫有意而不至者有矣未有無意而至者也或問治己曰治己以仲尼或曰治己以仲尼仲尼奚寡也曰率馬以驥不亦可乎或曰田圃田者莠喬喬思遠人者心忉忉曰日有光月有明三年不目日視必盲三年不目月精必矇熒魂曠枯精莩曠沈擲埴索塗冥行而已矣或問何如斯謂之人曰取四重去四輕則可謂之人曰何謂四重曰重言重行重貌重好言重則有法行重則有德貌重則有威好重則有觀敢問四輕曰言輕則招憂行輕則招辜貌輕則招辱好輕則招淫禮多儀或曰日昃不食肉肉必乾日昃不飲酒酒必酸賓主百拜而酒三行不已華乎曰實無華則野華無實則賈華實副則禮山雌之肥其意得乎或曰回之簞瓢臞如之何曰明明在上百官牛羊亦山雌也暗暗在上簞瓢捽茹亦山雌也何其臞千鈞之輕烏獲力也簞瓢之樂顏氏德也或問犁牛之鞹與玄騂之鞹有以異乎曰同然則何以不犁也曰將致孝乎鬼神不敢以其犁也如刲羊刺豕罷賓犒師惡在犁不犁也有德者好問聖人或曰魯人鮮德奚其好問仲尼也曰魯未能好問仲尼故也如好問仲尼則魯作東周矣或問人有倚孔子之牆弦鄭衛之聲誦韓莊之書則引諸門乎曰在夷貉則引之倚門牆則麾之惜乎衣未成而轉為裳也聖人耳不順乎非口不肄乎善賢者耳擇口擇衆人無擇焉或問衆人曰富貴生賢者曰義聖人曰神觀乎賢人則見衆人觀乎聖人則見賢人觀乎天地則見聖人天下有三好衆人好己從賢人好己正聖人好己師天下有三檢衆人用家檢賢人用國檢聖人用天下檢天下有三門由於情欲入自禽門由於禮義入自人門由於獨智入自聖門或問士何如斯可以禔身曰其為中也弘深其為外也肅括則可以禔身矣君子微慎厥德悔吝不至何元憞之有上士之耳訓乎德下士之耳順乎己言不慚行不恥者孔子憚焉
