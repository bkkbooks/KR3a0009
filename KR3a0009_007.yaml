body:
  text: 寡見卷第七吾寡見人之好假者也邇文之視邇言之聽假則偭焉或曰曷若茲之甚也先王之道滿門曰不得已也得已則已矣得已而不已者寡哉好盡其心於聖人之道者君子也人亦有好盡其心矣未必聖人之道也多聞見而識乎正道者至識也多聞見而識乎邪道者迷識也如賢人謀之美也詘人而從道如小人謀之不美也詘道而從人或問五經有辨乎曰惟五經為辨説天者莫辨乎易説事者莫辨乎書説體者莫辨乎禮説志者莫辨乎詩説理者莫辨乎春秋捨斯辨亦小矣春木之芚兮援我手之鶉兮去之五百歲其人若存兮或曰譊譊者天下皆説也奚其存曰曼是為也天下之亡聖也久矣呱呱之子各識其親譊譊之學各習其師精而精之是在其中矣或曰良玉不雕美言不文何謂也曰玉不雕璵璠不作器言不文典謨不作經或問司馬子長有言曰五經不如老子之約也當年不能極其變終身不能究其業曰若是則周公惑孔子賊古者之學耕且養三年通一經今之學也非獨為之華藻也又從而繡其鞶帨惡在老不老也或曰學者之説可約邪曰可約解科或曰君子聽聲乎曰君子惟正之聽荒乎淫拂乎正沈而樂者君子不聽也或問侍君子以博乎曰侍坐則聽言有酒則觀禮焉事博乎或曰不有博奕者乎曰為之猶賢於已耳侍君子者賢於已乎君子不可得而侍也侍君子晦斯光窒斯通亡斯有辱斯榮敗斯成如之何賢於已也鷦明沖天不在六翮乎拔而傅尸鳩其纍矣夫雷震乎天風薄乎山雲徂乎方雨流乎淵其事矣乎魏武侯與吳起浮於西河寶河山之固起曰在德不在固曰美哉言乎使起之固兵每如斯則太公何以加諸或問周寶九鼎寶乎曰器寶也器寶待人而後寶齊桓晉文以下至於秦兼其無觀已或曰秦無觀奚其兼曰所謂觀觀德也如觀兵開闢以來未有秦也或問魯用儒而削何也曰魯不用儒也昔在姬公用於周而四海皇皇奠枕于京孔子用於魯齊人章章歸其侵疆魯不用真儒故也如用真儒無敵於天下安得削灝灝之海濟樓航之力也航人無楫如航何或曰奔壘之車沈流之航可乎曰否或曰焉用智曰用智於未奔沈大寒而後索衣裘不亦晚乎乘國者其如乘航乎航安則人斯安矣惠以厚下民忘其死忠以衛上君念其賞自後者人先之自下者人高之誠哉是言也或曰弘羊榷利而國用足盍榷諸曰譬諸父子為其父而榷其子縱利如子何卜式之云不亦匡乎或曰因秦之法清而行之亦可以致平乎曰譬諸琴瑟鄭衛調俾夔因之亦不可以致簫韶矣或問處秦之世抱周之書益乎曰舉世寒貂狐不亦燠乎或曰炎之以火沃之以湯燠亦燠矣曰燠哉燠哉時亦有寒者矣非其時而望之非其道而行之亦不可以至矣秦之有司負秦之法度秦之法度負聖人之法度秦弘違天地之道而天地違秦亦弘矣
