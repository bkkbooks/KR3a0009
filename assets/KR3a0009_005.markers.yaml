  - {type: variant, offset: 277, length: 1, content: 故, WYG: 成湯丕承也文王淵懿也或問丕承曰由小致大不亦丕乎咸曰由七十里王天下祕曰由小國而成王業孟子曰湯以七十里丕大也革夏以天不亦承乎咸曰順天應人祕曰革夏命以順乎天書曰天命殛之承奉也淵懿祕曰問文王曰重易六爻不亦淵乎咸曰淵深也}
