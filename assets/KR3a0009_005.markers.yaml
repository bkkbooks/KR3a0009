  - {type: variant, offset: 306, length: 0, content: '', WYG: 也光曰楚莊王以無災為懼曰天豈棄忘寡人乎是得吉猶以為凶也凶人吉其凶祕曰凶人以凶為吉故至大凶不懲不勸之至也光曰紂淫虐將亡災異並臻而曰我生不有命在天是廢人事而任天命得凶而以為吉也辰乎辰歎時逝也咸曰日月所會謂之辰曷來之遲去之速也祕曰言時之難會也郭璞云辰亦時也君子競諸進德修業欲及時也祕曰君子無所競必也為道亟於時也謣言敗俗光曰李宋吳本謣皆作􅘱女耕切字}
