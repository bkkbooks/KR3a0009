  - {type: variant, offset: 979, length: 0, content: '', krp: 也祕曰好大言者為此無其實顧由無求於世而已矣祕曰由隠者也無所求於世其行止此耳允哲堯儃舜之重則}
  - {type: variant, offset: 980, length: 2, content: 我知, WYG: 輕於由矣咸曰孟子曰天子不能以天下與人然則舜有天下者天與也堯崩三年之䘮畢舜避堯之子於南河之南天下諸侯朝覲者不之堯之子而之舜訟獄者不之堯之子而之舜謳歌者不謳歌堯之子而謳歌舜由此言之堯豈先讓由而後舜哉故揚子謂堯以允哲之道禪舜豈輕之於許由也祕曰詢事考言三載乃命陟位是堯禪舜之重也光曰儃與禪同蟬戰切光謂信以堯禪舜之重為智則必不輕授天下於由矣好大累克巢父灑耳不}
