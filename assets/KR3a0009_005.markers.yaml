  - {type: variant, offset: 24, length: 2, content: 神明, WYG: 人之大道小知之師亦賤矣致逺恐泥是以君子不為故不貴也光曰相雞狗奕棊蹋鞠雖妙何足師乎孟子疾過我門}
  - {type: variant, offset: 24, length: 2, content: 神明, krp: 人之大道小知之師亦賤矣致逺恐泥是以君子不為故不貴也光曰相雞狗奕棊蹋鞠雖妙何足師乎孟子疾過我門}
  - {type: variant, offset: 28, length: 1, content: 測, SBCK: 入我室或曰亦有疾乎曰摭我華而不食我實華}
  - {type: variant, offset: 28, length: 1, content: 測, WYG: 入我室光曰過古禾切或曰亦有疾乎光曰問揚子亦有所惡乎曰摭我華而不食我實華者美麗之賦實者法言太𤣥咸曰門與華謂法言室與實謂太𤣥言孟子七篇與法言為教一也但無太𤣥爾註以華為賦實亦為法言恐非其意祕曰孟子與子雲俱遊於聖人之門而不與同入室孟子不言易而子雲准易是以謂之夫易者禮法之所宗仁義之所本孟子言其教故曰摭我華不言其易故曰不食我實孟之時力言仁義時君猶謂迂闊何暇言易乎今揚譏之示人之宗本耳光曰摭音隻拾也皆謂小知浮淺之人不能窮微探木或謂仲尼事彌其年盖天勞諸病矣夫祕曰仲尼彌年行教盖天勞之其病夫光曰彌終也言仲尼終身栖栖汲汲未嘗無事盖天勞苦之亦困病矣莊列之論如此曰天非獨勞仲尼亦自勞也天病乎哉咸曰易云天行健君子以自彊不息法夫天}
  - {type: page-break, offset: 28, content: '', id: KR3a0009_WYG_005-3a, image: WYG0696/WYG0696-0304a.png}
  - {type: variant, offset: 28, length: 1, content: 測, krp: 入我室光曰過古禾切或曰亦有疾乎光曰問揚子亦有所惡乎曰摭我華而不食我實華者美麗之賦實者法言太𤣥咸曰門與華謂法言室與實謂太𤣥言孟子七篇與法言為教一也但無太𤣥爾註以華為賦實亦為法言恐非其意祕曰孟子與子雲俱遊於聖人之門而不與同入室孟子不言易而子雲准易是以謂之夫易者禮法之所宗仁義之所本孟子言其教故曰摭我華不言其易故曰不食我實孟之時力言仁義時君猶謂迂闊何暇言易乎今揚譏之示人之宗本耳光曰摭音隻拾也皆謂小知浮淺之人不能窮微探木或謂仲尼事彌其年盖天勞諸病矣夫祕曰仲尼彌年行教盖天勞之其病夫光曰彌終也言仲尼終身栖栖汲汲未嘗無事盖天勞苦之亦困病矣莊列之論如此曰天非獨勞仲尼亦自勞也天病乎哉咸曰易云天行健君子以自彊不息法夫天}
  - {type: variant, offset: 30, length: 0, content: '', SBCK: 美麗之賦實者法言太􅀇或謂仲尼事彌其年蓋天勞諸病矣夫曰天非獨勞仲尼亦自勞}
  - {type: punctuation, offset: 31, content: 。, id: KR3a0009_tls_005-bkkpn16}
