  - {type: variant, offset: 1066, length: 1, content: 卿, WYG: 如航何猶富大國者衆民也如無禮樂之其以治之其如國何光曰海以喻艱難航以喻國航人以喻儒楫以喻勢位或曰奔壘之車沉流之航可乎言治國及修身者如車奔舟覆故欲救之祕曰車之奔敗航之沉溺光曰奔壘謂馬驚逸抵敵壘者可謂可救乎曰否咸曰言用奔沉之車航則不可祕曰不可也或曰焉用智夫智者貴能解患救難也今有患難不能解救故曰焉用智曰用智於未奔沉言奔沉吾猶人也必也使無奔沉祕曰智者用於未然之前光曰制治於未亂保邦於未危大寒而後索衣裘不亦晚乎御災在於未發思患在乎預防光曰言不足以為智乘國者其如乘航乎航安則人斯安矣航傾則人危法亂則國亡祕曰航安則其流安矣國安則其人安矣惠以厚下民忘其死咸曰言君以恩惠厚養其下則民忘其死以報之忠以衞上君念其賞咸曰言臣以忠勞衞翼其上則君思行其賞以及之祕曰言速報之効也自後者人先之自下者人髙之欲上必以其言下之欲先必以其身後之處上而民不重在前而民不害誠哉是言也祕曰謙之尊也光曰言志不在於取而自得之乃可貴也或曰𢎞羊㩁利而國用足盍㩁諸祕曰漢武以桑𢎞羊領大農盡管天下鹽鐵盡籠天下貨物而均輸平准之一嵗之中帛五百萬匹人不益賦而天下用饒故曰國用足曰譬諸父子為人父而㩁其子縱利如子何有若譏十二之税揚子貶㩁利之例祕曰子足父孰與不足卜式之云不亦匡乎祕曰匡正也時大旱卜式曰獨請烹𢎞羊天乃大雨式之所云不亦大正之乎或曰因秦之法清而行之亦可以致平乎曰譬諸琴瑟鄭衞調俾䕫因之亦不可以致簫韶矣祕曰秦毁滅禮義專任刑法譬如琴瑟作鄭衞之調而使䕫因以鼔之不能致正聲矣言慘酷之法不可以致和平也韶舜樂也晁錯曰秦法令煩慘刑罰暴酷䕫曰簫韶九成鳳皇來儀光曰調徒弔切言必應更張}
