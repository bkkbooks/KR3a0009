  - {type: 'tls:seg', offset: 8, content: '', id: KR3a0009_tls_005-1a.4}
  - {type: variant, offset: 8, length: 0, content: '', WYG: 知命才之至美莫尚於此不聰實無耳也不明實無目也咸}
  - {type: variant, offset: 8, length: 0, content: '', krp: 知命才之至美莫尚於此不聰實無耳也不明實無目也咸}
  - {type: punctuation, offset: 9, content: ：, id: KR3a0009_tls_005-bkkpn4}
  - {type: punctuation, offset: 9, content: 「, id: KR3a0009_tls_005-bkkpn5}
  - {type: variant, offset: 9, length: 2, content: 心請, SBCK: 微或曰微何如其明也曰微而見之明其誖乎聦明其至矣乎在於至妙之人不聦實無耳也不明實無目也敢}
  - {type: variant, offset: 9, length: 0, content: '', WYG: 言不聰不明雖有耳目與無同也光曰愚者顛倒是非反易忠邪雖有耳目何異聾瞽敢問大聰明咸曰既知微義復問大者曰眩眩乎惟天為聰惟天為明夫能髙其目而下其耳者匪天也夫目髙則無所不照耳下則無所不聞言人髙其目則覩德義之經聖人之道下其耳則聽芻蕘之言負薪之説咸曰眩眩猶杳而冥也書曰天聰明自我民聰明夫天聽之卑而及於民則耳可謂下矣故明王之所以不棄市井商賈之言者盖此也闇主則不然光曰音義曰眩胡涓切眩眩幽逺貌光謂物之視聽局於形聲天則聽於無聲視於無形發於}
  - {type: page-break, offset: 9, content: '', id: KR3a0009_WYG_005-2a, image: WYG0696/WYG0696-0303c.png}
  - {type: variant, offset: 9, length: 0, content: '', krp: 言不聰不明雖有耳目與無同也光曰愚者顛倒是非反易忠邪雖有耳目何異聾瞽敢問大聰明咸曰既知微義復問大者曰眩眩乎惟天為聰惟天為明夫能髙其目而下其耳者匪天也夫目髙則無所不照耳下則無所不聞言人髙其目則覩德義之經聖人之道下其耳則聽芻蕘之言負薪之説咸曰眩眩猶杳而冥也書曰天聰明自我民聰明夫天聽之卑而及於民則耳可謂下矣故明王之所以不棄市井商賈之言者盖此也闇主則不然光曰音義曰眩胡涓切眩眩幽逺貌光謂物之視聽局於形聲天則聽於無聲視於無形發於}
