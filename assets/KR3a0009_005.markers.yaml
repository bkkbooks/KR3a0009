  - {type: variant, offset: 300, length: 2, content: 雖憃, WYG: 咸曰言顔淵冉牛皆早亡者非其為之盖降年不永所謂天命不可以避也若立巖牆之下動而徵病行而招死命乎命乎自詒伊慼咸曰言若立夫巖牆之下以徵病招死此自為之豈所謂命乎故禮不登髙不臨深者也祕曰處乎危嶮動為病之徵行為死之招豈曰命乎孟子曰}
