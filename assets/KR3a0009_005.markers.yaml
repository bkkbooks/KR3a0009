  - {type: variant, offset: 14, length: 1, content: 潛, SBCK: 是何師與是何師與}
  - {type: variant, offset: 14, length: 1, content: 潛, WYG: 小每知之可謂師乎曰是何師歟是何師歟}
  - {type: variant, offset: 14, length: 1, content: 潛, krp: 小每知之可謂師乎曰是何師歟是何師歟}
  - {type: variant, offset: 16, length: 10, content: 而天潛地而地天地神明, SBCK: 下小事爲不少矣巧厯所不能筭每知之是謂師乎師之貴也知大知也大知者聖道小知之師亦賤矣致逺恐泥是以君子不爲故不貴也孟子疾過我門}
  - {type: page-break, offset: 16, content: '', id: KR3a0009_SBCK_006-1b}
  - {type: variant, offset: 16, length: 6, content: 而天潛地而地, WYG: 下小事為不少矣巧厯所不能算每知之是謂師乎祕曰小事甚多每人知之豈皆師乎師之貴也知大知也祕曰賢者志其大者大知聖人之教光曰知}
  - {type: page-break, offset: 16, content: '', id: KR3a0009_WYG_005-2b, image: WYG0696/WYG0696-0303d.png}
  - {type: variant, offset: 16, length: 6, content: 而天潛地而地, krp: 下小事為不少矣巧厯所不能算每知之是謂師乎祕曰小事甚多每人知之豈皆師乎師之貴也知大知也祕曰賢者志其大者大知聖人之教光曰知}
