  - {type: variant, offset: 1026, length: 1, content: 趙, WYG: 桓晉文已下至於秦兼其無觀已咸曰孟子云仲尼之徒無道桓文之事者故此言其與秦皆無所可觀也祕曰二霸而後至于秦兼六國而有天下無所觀焉已辭也光曰言皆尚詐力不以其道而得之雖强大無足觀也或曰秦無觀奚其兼咸曰言秦無以可觀則何以能兼有天下曰所謂觀觀德也咸曰言所謂可觀者觀其德爾秦何德之有如觀兵開闢以來未有秦也秦以兵兼而不以德莽以詐篡而不以道言秦兵之無可觀則莽之篡不言可知咸曰此正文之意似止論秦兵之由而注兼王莽亦猶蛇足矣且云莽以詐篡不以道夫豈有以道篡人哉甚非謂焉祕曰賈誼曰秦有餘力而制其弊追亡逐北伏尸百萬流血漂櫓兵之盛也光曰自古未有能以兵力獨兼天下如秦者或問魯用儒而削何也揚子貴儒學而賤兵强魯國常為齊}
