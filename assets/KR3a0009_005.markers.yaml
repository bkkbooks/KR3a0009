  - {type: variant, offset: 31, length: 1, content: 心, SBCK: 天病乎哉天樂天聖樂聖或問鳥有鳯獸有麟鳥獸皆可鳯麟乎言凡鳥獸}
  - {type: variant, offset: 31, length: 1, content: 心, WYG: 如是則天亦勞何病}
  - {type: variant, offset: 31, length: 1, content: 心, krp: 如是則天亦勞何病}
  - {type: variant, offset: 33, length: 1, content: 潛, SBCK: 不可得及鳯麟亦猶凡人不可彊通聖人之道曰羣鳥之於鳯}
  - {type: variant, offset: 33, length: 5, content: 潛也猶將測, WYG: 有光曰天日行一周踰一度未嘗休息何病乎天樂天咸曰所以運行無窮聖樂聖咸曰所以歴聘不暇祕曰天聖非所病則自然樂其道矣光曰言天聖各得其道行}
  - {type: variant, offset: 33, length: 5, content: 潛也猶將測, krp: 有光曰天日行一周踰一度未嘗休息何病乎天樂天咸曰所以運行無窮聖樂聖咸曰所以歴聘不暇祕曰天聖非所病則自然樂其道矣光曰言天聖各得其道行}
  - {type: punctuation, offset: 35, content: ，, id: KR3a0009_tls_005-bkkpn17}
  - {type: variant, offset: 35, length: 0, content: '', SBCK: 羣獸之於麟也形性豈羣人之於聖乎鳥獸大小形性各異人之於聖腑藏正同或曰甚矣聖道無益於庸也聖讀而庸行盍去諸曰甚矣子之不達也聖讀而庸行}
  - {type: variant, offset: 36, length: 2, content: 將測, SBCK: 有聞焉去}
