  - {type: variant, offset: 277, length: 1, content: 故, krp: 成湯丕承也文王淵懿也或問丕承曰由小致大不亦丕乎咸曰由七十里王天下祕曰由小國而成王業孟子曰湯以七十里丕大也革夏以天不亦承乎咸曰順天應人祕曰革夏命以順乎天書曰天命殛之承奉也淵懿祕曰問文王曰重易六爻不亦淵乎咸曰淵深也}
  - {type: variant, offset: 279, length: 1, content: 道, WYG: 易極深研幾寖以光大不亦懿乎咸曰浸漸也懿美也言三分天下有其二漸也决虞芮訟至武王卒成大勲光大也或問命祕曰世稱修短之命曰命者天之命也非人為也祕曰天命壽天非人所為人為不為命咸曰夫可為者非謂之命請問人為咸曰問何以謂之人為曰可以存亡可以死生非命也是人為也咸曰因善而生存因惡而死亡暴虎慿河之類非命也人為之祕曰育之則存棄之則亡殘之則死釋之則生豈命也哉命不可避也祕曰天之降年有永有不永不可避也世以祈禳之術修煉之要徼望延永盖溺於貪生者為之也光曰人事可以生存而自取死亡}
