  - {type: 'tls:seg', offset: 39, content: '', id: KR3a0009_tls_005-1a.10}
  - {type: variant, offset: 39, length: 2, content: 況於, SBCK: 抏也抏秦者非斯乎投諸火斯李斯或問}
  - {type: variant, offset: 39, length: 3, content: 況於人, WYG: 自樂或問鳥有鳳獸有麟鳥獸皆可鳳麟}
  - {type: variant, offset: 39, length: 3, content: 況於人, krp: 自樂或問鳥有鳳獸有麟鳥獸皆可鳳麟}
  - {type: variant, offset: 42, length: 12, content: 乎況於事倫乎敢問潛心于聖, SBCK: 何尚曰尚智曰多以智殺身者何其尚}
