  - {type: variant, offset: 987, length: 1, content: 大, WYG: 曰翾許縁切音義曰朱鳥往來以時不累其身放肆自遂或曰奚取於朱鳥哉曰時來則來時往則往取其春來秋往隨時宜也祕曰時之治可來則來時之亂可往則往能來能往者朱鳥之謂歟不愆寒暑之宜能審去就之分咸曰夫人知進而不知退知存而不知亡豈朱鳥之若哉祕曰君子在治在亂若鳳或問韓非作説難之書而卒死乎説難敢問何反也韓非作書説難是也而西入闗干秦王伏劒死雲陽故曰何反咸曰韓非時作孤憤五蠹説難之書十餘萬言人或傳其書於秦秦王見之曰寡人得見此人與之遊死不恨}
