  - {type: variant, offset: 975, length: 1, content: 我, WYG: 言愚者乃所以全生若莊周論櫟社支離䟽曰君子所貴亦越用明保慎其身也祕曰君子所以貴而異於童䝉者亦曰用明哲保慎其身也越曰也如庸行翳路衝衝而活君子不貴也咸曰庸愚也翳塞也衝衝多也言庸愚塞路多多而活者此所謂罔之生也幸而免君子不貴之祕曰翳路言多也楚兩龔之絜其清矣乎楚人龔君賔龔長倩祕曰龔勝龔舍皆楚人也並著名節世謂之楚兩龔漢哀市時俱為諫議大夫老焉不復仕莽以太子師友祭酒迎勝不食而卒言其絜中清矣蜀莊沉冥祕曰莊遵字君平蜀人也晦迹不仕故曰沉冥光曰三輔决録曰君平名遵光謂沉冥言道德深厚人不能測蜀莊之才之珍也不作苟見不治苟得所謂沉冥也光曰見賢遍切養諸内而晦諸外不苟徇名而求利乆幽而不改其操雖隋和何以加諸祕曰隱肆成都乆幽也雖隋侯之珠和氏之璧豈加於才珍哉舉兹以旃不亦寶乎咸曰旃之也言舉此諸德以議之莊亦寶也何隋和之有吾珍莊也居難為也人所不能非難如何咸曰言居莊之道為難也祕曰莊通厯數以才自居他人之所難光曰吾所以重莊以其居身之道人難能也不慕由即夷矣何毚欲之有許由伯夷無欲之至既不可害亦不可利咸曰言莊君平非慕許由即慕伯夷爾何利欲之能動光曰宋吳本毚作利今從李本毚士衘切貪也或問堯將讓天下於許由由恥有諸祕曰莊周列禦冦之徒皆有是言未}
