  - {type: variant, offset: 1020, length: 0, content: '', WYG: 惟正之聽亦聽爾但不邪荒乎淫佛乎正沉而樂者君子弗聽也佛違也沉溺也學記曰其求之也佛子夏曰今君之所好者其溺音乎光曰樂音洛或問侍君子以博乎祕曰博弈曰侍坐則聽言有酒則觀禮焉事博乎咸曰言君子坐則有正言飲則有正禮侍之者得聽而觀焉何事於博弈光曰焉於䖍切或曰不有博弈者乎咸曰謂君子言禮之外豈無博弈之事乎祕曰據論語有之曰為之猶賢於已爾今之所論自謂侍君子也咸曰此文本連下句意未終不當於此註之兼註語大與正文不類頗失揚㫖弗敢削去解之於下侍君子者賢於已乎咸曰賢猶勝也言為博弈者但勝於無所用心而已爾夫侍君子亦止勝於無所用心而已乎言不然也祕曰孔子曰飽食終日無所用心難矣哉不有博弈者乎為之猶賢乎已盖為庸常不學之人以小道諭之耳今侍君子豈賢乎已於博弈者哉光曰已者止而不為君子不可得而侍也人師難逢也侍君子晦斯光窒斯通祕曰窒塞亡斯有辱斯榮敗斯成如之何賢於已也咸曰言但患君子不可得而侍如得侍之有此諸益豈特勝於無所用心而已哉光曰宋吳本有作存今從李本鷦明冲天不在六翮乎咸曰鷦明解見問明篇祕曰翮翼之勁羽光曰明亦當作朋拔而傅尸鳩其累矣夫拔鷦明之翼以傅尸鳩不能冲天適足以累耳諭授小人以大位而不能成大功也又言學小説不能成大儒祕曰尸鳩鴶鵴也言以聖人之道使小人行之適足増其累耳光曰累鄰墜切小人儒竊聖人之道以自售適足以為其身之累耳雷震乎天風薄乎山雲徂乎方雨流乎淵其事矣乎言此皆天之事矣人不得無事也天事雷風雲雨人事詩書禮樂也祕曰此皆天之行事者乎自然之理也道家流以無為無事為自然不知有為有事亦自然也徂往也方四方也光曰天猶不能無事况在於人安得飽食終日無所用心魏武侯與吳起浮於西河寶河山之固起曰在}
