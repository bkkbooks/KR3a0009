  - {type: variant, offset: 1021, length: 1, content: 名, WYG: 不在固曰美哉言乎使起之兵每如斯則太公何以加諸祕曰史記魏武侯曰美哉山河之固此乃魏之寶也吳起曰在德不在險昔三苗氏左洞庭右彭蠡德義不修禹滅之夏桀之居左河濟右太華伊闕在其南羊腸在其北修政不仁湯放之殷紂之國左孟門右太行常山在其北大河經其南修政不德武王殺之由此觀之在德不在險武侯曰善固險固也美哉是言使起兵法常以德}
