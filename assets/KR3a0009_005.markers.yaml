  - {type: punctuation, offset: 10, content: 「, id: KR3a0009_tls_005-bkkpn8}
  - {type: variant, offset: 10, length: 2, content: 請問, WYG: 者天必知}
  - {type: variant, offset: 10, length: 2, content: 請問, krp: 者天必知}
  - {type: variant, offset: 12, length: 0, content: '', SBCK: 大聦明曰􅅭􅅭乎惟天爲聦惟天爲明夫能髙其目而下其耳者匪天也夫目髙則無所不照耳下則無所不聞言人髙其目則覩德義}
  - {type: punctuation, offset: 13, content: 。, id: KR3a0009_tls_005-bkkpn9}
  - {type: punctuation, offset: 13, content: 」, id: KR3a0009_tls_005-bkkpn10}
  - {type: 'tls:seg', offset: 13, content: '', id: KR3a0009_tls_005-1a.6}
  - {type: variant, offset: 13, length: 0, content: '', SBCK: 經聖人之道下其耳則聞芻蕘之言負薪之語或問小每知之可謂師乎}
  - {type: variant, offset: 13, length: 0, content: '', WYG: 故無若天之聰明也目髙所以見逺耳下所以聽卑或}
  - {type: variant, offset: 13, length: 0, content: '', krp: 故無若天之聰明也目髙所以見逺耳下所以聽卑或}
