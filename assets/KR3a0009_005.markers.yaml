  - {type: variant, offset: 235, length: 0, content: '', WYG: 之道者去之則雖無所行復無所聞矣阬猶陷也言聖人之道陷矣光曰李本阬作抏五官切今從宋吳本言俗儒雖不能行聖人之道猶得聞其道而傳諸人愈於亡也若惡其無實而遂去之則與秦之阬儒何異哉阬秦者非斯乎投諸火斯李斯咸曰陷聖人之道於秦者李斯也非惟陷之復投於火以滅之也此猶仲尼不去其羊以存告朔之禮祕曰阬秦使不有王道者非李斯乎以書籍投諸火光曰斯此也言諸儒之所以見阬於秦者亦以聖讀庸行好横議以非世故秦人深疾之并其書焚之若使秦之法遂行於世則聖人之道絶矣}
