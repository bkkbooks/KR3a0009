  - {type: variant, offset: 59, length: 2, content: 潛心, SBCK: 聖人也或者劣諸子貢子貢辭而精之然後廓如也精明}
  - {type: variant, offset: 62, length: 0, content: '', SBCK: 戲觀書者違子貢雖多亦何以爲盛哉成湯丕承也}
  - {type: variant, offset: 64, length: 2, content: 矣達, SBCK: 淵懿也或問丕承曰由小致大不亦丕乎革夏以天不亦承乎淵懿曰重易六爻不亦淵乎浸以光大不亦懿乎或問命曰命者天}
