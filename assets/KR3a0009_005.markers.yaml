  - {type: variant, offset: 2, length: 3, content: 卷第五, WYG: 明哲煌煌旁燭無疆咸曰明哲之人逆見微隠故施照無窮遜于不虞祕曰遜遜順虞度也遜順乎不虞之非理以保天命咸曰不虞猶不度也遜順也大雅云既明且哲以保其身故不度之辰遜可捨乎揚子之屈身莽庭亦有謂矣故曰邦無道危行言遜光曰李竒曰常行遜順以備不虞光謂雖有明智旁照無極不能思不虞之患而預防之使墜失上天福禄之命猶未足以為明也譔問明祕曰君子見幾而作不俟終日而逺憂患之虞光曰論聖賢之明哲}
