  - {type: variant, offset: 983, length: 0, content: '', WYG: 宜乎累積也克勝也積大言以相勝祕曰累刻猶累日也好大言而累日滋乆以至相傳稱巢父洗耳莫辨其偽不亦宜乎逸士傳曰堯讓天下於許由由逃之巢父聞而洗耳於河濵光曰宋吳本克作刻灑作洗今從李本灑音洗靈場之威宜夜矣乎靈場鬼神之壇靈壇所以為威可宜夜不可經白日祕曰靈壇鬼神之威施於莫夜則見悚虚誕累乆之説施於庸常則見信靈場猶靈壇也光曰妄言可以欺愚不可以誣智朱鳥翾翾歸其肆矣朱鳥燕别名也肆海肆也咸曰周禮𤣥鳥氏司分盖燕也𤣥黒也周禮以黑鳥為燕此註以朱鳥為燕非謂矣朱鳥隨陽之鳥謂鴈也鴈以時來時往何獨燕哉肆非獨海盖其南北所止之區肆祕曰朱鳥鴈也翾翾飛貌肆其所止集之肆非歸其肆傷時之言也南方朱鳥羽蟲之長大戴禮云羽蟲三百六十鳳}
