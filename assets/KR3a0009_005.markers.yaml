  - {type: variant, offset: 1063, length: 2, content: 卿豈, WYG: 侵疆祕曰章章宜為慞慞盖古通用也慞慞懼也魯定公十年與齊景公為夾谷之會孔子攝相事景公懼遂歸所侵魯鄆讙龜隂之田魯不用真儒故也祕曰齊人歸女樂季桓子使定公受之三日不朝孔子行言不聽用孔子故也如用真儒無敵於天下安得削萬物將自賔祕曰孔子使魯安行王道而諸侯强者霸業而已是無敵於天下浩浩之海濟樓航之力也濟渡也言渡大海在舟船興大治在禮樂光曰濟謂所以得濟航人無楫如航何祕曰濟巨航者大海也如無楫柁之利以翼之}
  - {type: variant, offset: 1063, length: 2, content: 卿豈, krp: 侵疆祕曰章章宜為慞慞盖古通用也慞慞懼也魯定公十年與齊景公為夾谷之會孔子攝相事景公懼遂歸所侵魯鄆讙龜隂之田魯不用真儒故也祕曰齊人歸女樂季桓子使定公受之三日不朝孔子行言不聽用孔子故也如用真儒無敵於天下安得削萬物將自賔祕曰孔子使魯安行王道而諸侯强者霸業而已是無敵於天下浩浩之海濟樓航之力也濟渡也言渡大海在舟船興大治在禮樂光曰濟謂所以得濟航人無楫如航何祕曰濟巨航者大海也如無楫柁之利以翼之}
