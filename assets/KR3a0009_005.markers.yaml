  - {type: variant, offset: 1071, length: 2, content: 艱知, WYG: 周之書若周禮周樂周書周頌周易春秋之類傳曰韓宣子適魯見易象與春秋曰周禮盡在魯矣曰舉世寒貂狐不亦燠乎貂狐之裘於體温燠咸曰言貂狐一裘於體雖燠不能救天下之寒周易一經於時雖存不能勝天下之暴祕曰舉世方寒服貂裘狐裘之衣亦可以禦寒而迴燠猶秦世之酷抱禮義之敎亦可以漸迴正治光曰天下無道而獨得先王之術可以自治矣或曰炎之以火沃之以湯燠亦燠矣言秦燒詩書坑儒士於湯火之中但苦太熱耳此謂或人戲嘲揚子辭祕曰何必貂狐之為燠若用湯火亦燠矣猶言何必周書之為治若用刑法亦可治矣光曰言用秦之法以治秦之民亦孰敢不從曰燠哉燠哉時亦有寒者矣歎其秦之無道}
