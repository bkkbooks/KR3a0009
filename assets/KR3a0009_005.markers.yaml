  - {type: 'tls:seg', offset: 859, content: '', id: KR3a0009_tls_005-21a.11}
  - {type: variant, offset: 859, length: 0, content: '', SBCK: 楚人龔君賔龔長倩也當成哀之丗並爲諌大夫俱著令聞號曰兩龔王莽篡位之後崇顯名賢復欲用之稱疾遂終身不仕絜清其志者也蜀莊沈􅁳蜀人姓莊名遵字君平沈􅁳猶􅀇寂泯然無迹之貌是故成哀不得而利之王莽不得而害也蜀莊之才之珍也不作苟見不治苟得所謂沈冥也乆幽而不改其操雖隋和何以加諸乆幽謂賣卜於成都舉兹以旃不亦寶乎吾珍莊也居難爲也人所不能非難}
  - {type: page-break, offset: 859, content: '', id: KR3a0009_SBCK_006-3b}
  - {type: variant, offset: 860, length: 5, content: 樂弛雖札末, SBCK: 何不慕由即夷矣何毚欲之有許由伯夷無欲之至旣不可害亦不可利或問堯將讓天下於許由由恥有諸曰好大者爲之也顧由無求於丗而巳矣允喆堯儃舜之重則不輕於由矣允信也喆知也好大累克巢父洗耳不亦冝乎累積克勝也積大言以相勝也巢父洗耳河濵河主逐之皆非通理之談靈􅂣之威冝夜矣乎靈場􅀑神之壇祠也靈壇所以爲威可􅄀夜不可經白日偏謬之談可獨􅀃不可校諸實朱鳥翾翾歸其肆矣朱鳥燕别名也肆海肆也或曰奚取於朱鳥哉曰時來則來時往則往取其春來秋往隨時冝也能來能往者朱鳥之謂與不愆寒暑之冝能知去就之分或問韓非作􅀃難之書而卒死乎􅀃難敢問何反也韓非作書言􅀃難是也而西入關干秦王伏劒死雲陽故曰何反曰􅀃難蓋其所以死乎曰何也曰君子以禮動以義止合則進否則退確乎不憂其不合也夫􅀃人而憂其不合則亦無所不至矣或曰􅀃之不合非憂耶曰􅀃不由道憂也由道而不合非憂也譏其本自挾詭情以􅀃秦或問哲曰旁明厥思問行曰旁通厥德動靜不能由一塗由一塗不可以應萬變應萬變而不失其正者惟旁通乎揚子法言卷第六揚子法言寡見卷第七大道甚夷而民好徑此其所以發􅀭德音李軌注吾寡見人之好假者也邇文之視邇言之聽假則偭焉歎人皆好視聽諸子近言近􅀃至於聖人逺言逺義則偭然而不視聽或曰曷若兹之甚也先王之道滿門言此談過也學先王之道者亦滿門耳曰不得巳也得巳則巳矣不得巳者官有䇿試者也得巳而不巳者寡哉夫以䇿試而後學者爲官也得不䇿試而好學者爲己也爲己之學也内爲官之學也外外之與内由南之與北相去甚逺是以􅁣其少也好盡其心於聖人之道者君子也人亦有好盡其心矣未必聖人之道也多聞見而識乎正道者至識也多聞見而識乎邪道者迷識也君子多聞見而心愈真也小人多聞見而心愈僞也}
