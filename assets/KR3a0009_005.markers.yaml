  - {type: variant, offset: 1023, length: 2, content: 幾梁, WYG: 主則太公吕望何以加之光曰李本作使起之用兵今從宋吳本惜起之用兵多尚狙詐不能充其言也或問周寶九鼎寶乎祕曰即禹貢金九牧所鑄之鼎成王定于郟鄏故為周寶曰器寶也器寶待人而後寶道存則器不亡道亡則器不存祕曰人君有德則鼎器為寶光曰人能以休明之德取之則信可寶矣苟以姦回强暴而取之雖得九鼎奚足寶哉}
