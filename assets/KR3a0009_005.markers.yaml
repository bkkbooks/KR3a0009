  - {type: variant, offset: 839, length: 0, content: '', SBCK: 未之思矣曰治則見亂則隱隨時之義美之大者治見亂隱鳯之德也鴻飛􅁳􅁳弋人何慕焉君子濳神重􅀇之域丗網不能制禦之鷦明遴集食}
  - {type: page-break, offset: 839, content: '', id: KR3a0009_SBCK_006-3a}
  - {type: variant, offset: 839, length: 0, content: '', WYG: 未之思矣曰治則見亂則隠隨時之義美之大者治見亂隠鳳之德也光曰見賢遍切舊本未之思矣曰治則見光謂曰衍字鴻飛㝠㝠弋人何簒焉君子潛神重𤣥之域世網不能制禦之祕曰樂聖髙邁小人安能制之光曰故書簒作慕音義曰後漢書逸民傳序引揚子作弋者何簒宋衷註云簒取也鴻髙飛㝠㝠雖弋人執繒繳何所施巧而取焉今簒或為慕誤也光謂逆取曰簒鷦明遴集食}
  - {type: variant, offset: 839, length: 0, content: '', krp: 未之思矣曰治則見亂則隠隨時之義美之大者治見亂隠鳳之德也光曰見賢遍切舊本未之思矣曰治則見光謂曰衍字鴻飛㝠㝠弋人何簒焉君子潛神重𤣥之域世網不能制禦之祕曰樂聖髙邁小人安能制之光曰故書簒作慕音義曰後漢書逸民傳序引揚子作弋者何簒宋衷註云簒取也鴻髙飛㝠㝠雖弋人執繒繳何所施巧而取焉今簒或為慕誤也光謂逆取曰簒鷦明遴集食}
  - {type: variant, offset: 840, length: 2, content: 人存, SBCK: 絜者矣遴集者􅀋聚羣游得其所也鷦眀非竹實之絜不食君子非道德之禄不居鳯鳥蹌蹌匪堯之庭蹌蹌者歩趾之威儀也言其降歩于堯之庭非堯之庭}
  - {type: variant, offset: 840, length: 2, content: 人存, WYG: 潔者矣遴集者類聚羣遊得其所也鷦明非竹實之潔不食君子非道德之禄不居咸曰遴行難也猶憚也明當為鸚鷦鵬南方神鳥似鳳也言鷦明冲天而去憚集於世盖其食潔而然也此因上文稱鳳之在亂}
  - {type: page-break, offset: 840, content: '', id: KR3a0009_WYG_005-7a, image: WYG0696/WYG0696-0306a.png}
  - {type: variant, offset: 840, length: 2, content: 人存, krp: 潔者矣遴集者類聚羣遊得其所也鷦明非竹實之潔不食君子非道德之禄不居咸曰遴行難也猶憚也明當為鸚鷦鵬南方神鳥似鳳也言鷦明冲天而去憚集於世盖其食潔而然也此因上文稱鳳之在亂}
  - {type: variant, offset: 843, length: 2, content: 易亡, SBCK: 不降歩也亨龍濳􅂛其貞利乎貞正也利者義之和美龍潛􅂛得正之利或曰龍何如可以貞利而亨曰時未可而濳不亦貞乎得濳之正時可而􅂛不亦利乎得義之和濳􅂛在己用之以時不亦亨乎行止不失其所得嘉之㑹或問活身曰明哲旣明且哲以保其身或曰童蒙}
  - {type: variant, offset: 843, length: 38, content: 易亡則艱延陵季子之於樂也其庶矣乎如樂弛雖札末如之何矣如周之禮樂庶事之備也每可, WYG: 隠故舉鴻冥鷦潔}
