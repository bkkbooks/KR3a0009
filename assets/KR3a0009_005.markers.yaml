  - {type: variant, offset: 996, length: 0, content: '', krp: 曰説音税曰説難盖其所以死乎咸曰言非徒知説難而不能行説難故所以死也光曰宋吳本無其字今從李本探人心而求合則無所不至適足取死曰何也曰君子以禮動以義止合則進否則退確乎不憂其不合也咸曰猶孔孟方衲圎鑿豈所以憂不合哉祕曰用之行而舎之藏何憂之有光曰確乎守正不移貌夫説人而憂其不合則亦無所不至矣祕曰夫不以禮義而惟以談説伺主之顔色憂其不合則邪佞詭譎無所不至宜其死也或曰説之不合非憂邪咸曰言韓非憂説不合為非乎祕曰或曰非謂韓非光曰宋吳本作非憂説之不合非邪今從李本邪余遮切曰説不由道憂也咸曰言説人不以聖人之道此君子之所憂由道而不合非憂也譏本自挾詭憒以説秦咸曰言説人以道而不合則猶仲尼去魯孟軻舍梁何憂之有韓非則不然故所以卒死於説難也祕曰説以道而不見用繫乎時君已則何憂或問哲曰旁明厥思咸曰旁廣厥凡也言凡所思慮廣能明悟而歸諸正者之謂哲祕曰所思皆明也五行傳曰明作哲光曰欲知聖人之道宜廣厥思問行曰旁通厥德動情不能得由一塗由一塗不可以應萬變應萬變而不失其正者惟旁通乎咸曰言凡所立德廣能通逹而貫諸道者之謂行祕曰旁通其德而行之曰行易曰君子以成德為行日可見之行也光曰欲行聖人之道宜廣其德寡見篇咸曰聖人之道嘉善而矜不能故明哲極矣宜矜乎未至者所以寡見之誨次之問明假言周于天地遐逺周徧光曰李宋吳本假作遐今從漢書光謂假當作徧假贊于神明咸曰五經之㫖幽𢎞横度絶于邇言咸曰言幽深𢎞大之間縱横量度之制皆絶去近言始得諸正祕曰贊于神明以通其幽周于天地以範其𢎞縱横制度絶去邇言光曰横者言其廣度猶度絶言其髙絶于近言言去之遼邈也譔寡見祕曰述聖人遐逺之言以悟淺近之惑光曰疾世人蔽於近小而遺其逺大吾寡見人之好假者也邇文之視邇言之聽假則偭焉祕曰遐一本作假古字也我寡見人之好逺者惟邇文則視邇言則聽至於論遐逺之道則背焉所謂舛馳者也偭背也離騷曰偭規矩而改錯光曰偭邇箭彌兖二切或曰曷若兹之甚也先王之道滿門言此談過也學先王之道者亦滿門耳光曰言學先王之道者所在滿於師門不為少曰不得已也得已則已矣祕曰時有䇿試選補故學者不獲已也如得已則各至其所至矣所至邇文邇言光曰宋吳本作得已則至矣今從李本得已而不已者寡哉夫以䇿試而後學者為官也得不䇿試而好學者為己也為己之學也内為官之學也外外之與内由南之與北相去甚逺是以慨其少也祕曰不為補試而不已於聖人之道者寡哉好盡其心於聖人之道者君子也人亦有好盡其心矣未必聖人之道也咸曰盡心於異端揚子所疾也祕曰不入于韓莊則入于楊墨多聞見而識乎正道者至識也祕曰一槩諸聖多聞見而識乎邪道者迷識也君子多聞見而心愈真也小人多聞見而情愈偽也祕曰學非而博如賢人謀之美也詘人而從道咸曰美善也猶仲尼夾谷之㑹屈齊侯去裔夷之樂從盟好之會光曰詘與屈同如往也往就賢人謀之則彼將屈人之心以從正道如小人謀之不美也詘道以從人咸曰猶商鞅屈帝王之道從秦孝公以强國之術祕曰謀為國君謀也或問五經有辯乎曰惟五經為辯説天者莫辯乎易惟變所適應四時之宜祕曰天有五行六子十數三才備乎易説事者莫辯乎書尚書可論政事祕曰二帝之德三王之業政事隆殺備乎書説體者莫辯乎禮咸曰事之體也祕曰經三百儀三千各正其體者備乎禮光曰禮主上下之體説志者莫辯乎詩在心為志發言為詩祕曰四始六義發揚其志者備乎詩説理者莫辯乎春秋屬辭比事之義祕曰傳體有三例情有五不失其理者備乎春秋光曰明事理之是非捨斯辯}
