  - {type: variant, offset: 1145, length: 1, content: 諸, krp: 卷}
  - {type: variant, offset: 1146, length: 1, content: 口, SBCK: 或問周寶九鼎寶乎曰器寶也器寶待人而後寶道存則器不亡道亡則器不存齊桓晉文以下至於秦兼其無觀巳或曰秦無觀奚其兼曰所謂觀觀德也如觀兵開闢以來未有秦也秦以兵兼而不以德莽以詐篡而不以道言秦兵之無可觀則莽之篡不言可知或問魯用儒而削何也􅀭子貴儒學而賤兵彊魯國甞爲齊楚所侵所以譏問曰魯不用儒也昔在􅁎公用於周而四海皇皇奠枕于京皇皇歸美安枕而卧以聽於京師孔子用於魯齊人章章歸其侵疆章章悚懼也一時暫用猶至於是况能終之乎魯不用眞儒故也如用眞儒無敵於天下安得削萬物將自賔灝灝之海濟樓航之力也濟度也言度大海在舟船興大治在禮樂航人無楫如航何雖有舟航而無楫櫂不能濟難雖有民人而無禮樂不能熈化或曰奔壘之車沈流之航可乎言治國及修身者如車奔舟覆故欲救之曰否否不也或曰焉用智失智者貴能解患救難也今有患難不能解救故曰焉用智曰用智於未奔沈言奔沈吾猶人也必也使無奔沈大寒而後索衣裘不亦晚乎禦災在於未發思患在乎預防乗國者其如乗航乎航安則人斯安矣航傾則人危法亂則國亡惠以厚下民忘其死忠以衞上君念其賞自後者人先之自下者人髙之欲上必以其言下之欲先必以其身後之處上而民不重在前而民不害誠哉是言也誠信也或曰􅀪羊榷利而國用足盍榷諸盍何不也曰譬諸父子爲其父而榷其子縱利如子何有若譏十二之稅揚子貶榷利之權􅁲式之云不亦匡乎匡正也桑􅀪羊榷利之時天下大旱􅁲式曰獨烹􅀪羊天乃􅀨式之所言大匡正矣或曰因秦之法淸而行之亦可以致平乎曰譬諸琴瑟鄭衞調俾夔因之亦不可以致簫韶矣俾使也譬諸琴瑟調正則合雅鄭衞則爲淫秦法酷暴雖欲使聖人因之不可以致康哉鄭衞本淫雖使夔拊之而不可致簫韶或問處秦之世抱周之書益乎曰舉世寒貂狐不亦燠乎貂狐之裘於體温燠或曰炎之以火沃之以湯燠亦燠矣言秦焚書坑儒於湯火之中但苦大熱耳此謂或人戲嘲􅀭子之辭曰燠哉燠哉時亦有寒者矣歎秦之無道也時亦有寒者謂四皓隱居尸子避地斯皆清涼其身不燠秦之湯火非其時而望之非其道而行之亦不可以至矣天由其時人由其道非時之有望之不可得見非道而行之不可得至秦之有司負秦之法度秦法巳酷吏又毒之秦之法度負聖人之法度秦􅀪違天地之道而天地違秦亦􅀪矣失德之報何其驗哉揚子法言卷第七揚子法言五百卷第八夫言者所以通理也五百歳一聖非經通之言故辨其惑罔之迷也}
