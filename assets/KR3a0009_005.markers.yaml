  - {type: variant, offset: 7, length: 1, content: 神, SBCK: 明}
  - {type: variant, offset: 7, length: 0, content: '', WYG: 明曰微咸曰夫微研幾極深規於未兆者也祕曰見之於著何足為明或曰微何如其明也咸曰未諭微義疑不為明光曰嫌其明小曰微而見之明其誖乎祕曰微已察之明豈亂哉誖亂也光曰誖布内反聰明其至矣乎在於至妙之人咸曰言窮微乃聰明至極之美也祕曰堯曰聰明文思舜曰聞之聰明光曰聰者聞言察其是非明者見事知其可否人君得之為堯為舜匹夫得之窮}
  - {type: variant, offset: 7, length: 0, content: '', krp: 明曰微咸曰夫微研幾極深規於未兆者也祕曰見之於著何足為明或曰微何如其明也咸曰未諭微義疑不為明光曰嫌其明小曰微而見之明其誖乎祕曰微已察之明豈亂哉誖亂也光曰誖布内反聰明其至矣乎在於至妙之人咸曰言窮微乃聰明至極之美也祕曰堯曰聰明文思舜曰聞之聰明光曰聰者聞言察其是非明者見事知其可否人君得之為堯為舜匹夫得之窮}
