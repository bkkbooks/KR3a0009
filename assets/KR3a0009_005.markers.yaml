  - {type: variant, offset: 999, length: 0, content: '', SBCK: 春木之芚兮援我手之鶉􅀆春木芒然而生譬若孔氏啓導人心有似援手而進言其純美也去之五百歳其人若存􅀆或曰譊譊者天下皆􅀃也奚其存曰曼是爲也天下之亡聖也乆矣其義雖存言天下無復能尊用聖道者乆故也􅈱􅈱之子各識其親譊譊之學各習其師精而精之是在其中矣或曰良玉不彫美言不文何謂也曰玉不彫璵璠不作器言不文典謨不作經或問司馬子長有言曰五經不如老子之約也當年不能極其變終身不能究其業言其要妙曰若是則周公惑孔子賊古者之學耕且養三年通一無訓解故今之學也非獨爲之華藻也又從而繡其其鞶􅍤惡在老不老也鞶大帶也􅍤佩巾也衣有華藻文繡書有經傳訓解也文繡之衣分明易察訓解之書灼然易曉或曰學者之􅀃可約邪疾夫􅀃學繁多故欲約省之也曰可約解科言自可令約省耳但當使得其義㫖不失其科條}
  - {type: page-break, offset: 999, content: '', id: KR3a0009_SBCK_007-2a}
  - {type: page-break, offset: 999, content: '', id: KR3a0009_SBCK_007-2b}
  - {type: variant, offset: 999, length: 0, content: '', WYG: 咸曰捨五經皆小説也光曰宋吳本辯皆作辨今從李本春木之芚兮援我手之鶉兮春木芚然而生譬若孔氏啓導人心有似援手而進咸曰芚猶盛也鶉猶美也祕曰天氣之春使羣木芚然而盛孔子之道使羣士翕然而興援我手相與游處之鶉乎而安之鶉猶言淳也莊子曰聖人鶉居而鷇食尸子曰堯鶉居光曰李本芚作芒今從宋吳本芚徒渾切援音爰去之五百嵗其人若存兮咸曰言去仲尼雖逺而其人如在祕曰去孔子已五百年服行其道常如存在按孔子以魯哀十六年卒至漢甘露元年子雲始生凡四百二十八嵗後天鳳五年子雲卒去孔子凡四百九十八嵗言五百嵗者舉其成數或曰譊譊者天下皆訟也奚其存祕曰今之學者譊譊然爭訟其道之是非也何謂若存譊譊爭聲也光曰李本訟作説今從宋吳本譊女交切曰曼是為也天下之亡聖也久矣其義雖存言天下無復能尊用聖道者乆矣咸曰曼猶不也亡猶去也久猶逺也不是為猶徒是為也言譊譊者徒是為天下雖去聖人逺然其道尚存安能亂哉祕曰曼無也今之學者無如是為之也以其去聖逾逺而不能自悟故也光曰音義曰曼莫半切曼是為者言無能求其是者而從之天下之無聖人已乆矣故衆説無所折衷相與爭訟呱呱之子各識其親祕曰無他知光曰呱音孤譊譊之學各習其師祕曰但然其師而已非師則爭班固曰安其所習毁所不見終以自蔽此學者之大患也精而精之是在其中矣咸曰赤子雖識親因其愛而不知禮之序末學雖習師溺其説而不明道之正然苟能精而益精之則聖與雜其道當各辨於其中矣若秦儀荀孟皎然自殊祕曰精是者是精之精非者非精之各在其中矣光曰宋吳本是作各今從李本聖人之道布在方䇿賢者得其大不賢者得其小各得其一端而不能粹美若有人精心以求其是不離其中矣或曰良玉不彫美言不文何謂也曰玉不彫璵璠不作器祕曰璵璠寳玉也器圭璧書曰如五器卒乃復周禮曰玉作六器以禮天地四方光曰璵以諸切璠符袁切言不文典謨不作經祕曰言之有文如天之有象易曰觀乎天文以察時變觀乎人文以化成天下仲尼祖述堯舜之文其典謨所以作經光曰言文之不可以已虎豹之鞹猶犬羊之鞹或問司馬子長有言曰五經不如老子之約也當年不能極其變終身不能究其業祕曰司馬遷以儒者以六藝為法六藝經傳以千萬數累世不能明其學當年不能究其理故曰博而寡要勞而少功言道家以㫖約而易操事小而功多是謂不如老子之約也班固曰論大道則先黄老而後六經此其所蔽也曰若是則周公惑孔子賊祕曰果如是言則周孔非惑則賊矣古者之學耕且養三年通一經無訓解故光曰李本無經字今從宋吳本今之學也非獨為之華藻也又從而繡其鞶帨惡在老不老也鞶大帶也帨佩巾也衣有華藻文繡書有經傳訓解也文繡之衣服分明易察訓解之書灼然易曉祕曰鞶大帶也帨佩巾也所以備物而為飾也言古之學者存其大體所以易也今之學者有經傳章句如華藻繡鞶帨其文彌繁所以難也安在老易而不老難哉班固曰古之學者耕且養三年而通一藝存其大體玩經文而已是故用日少而畜德多三十而五經立也後世經傳既已􅆾離博學者又不思多聞闕疑之義而務碎義逃難便辭巧説破壊形體説五字之文至於二三萬言桓譚新論云秦近君能記堯典篇目兩字之説至十萬言但説曰若稽古三萬言光曰鞶音盤帨音税惡音烏鞶帨已是外飾又從而繡之言章句華多實少或曰學者之説可約邪疾夫説學繁多故欲約省之也曰可約解科言自可令約省爾但當使得其義㫖不失其科條祕曰可以約解科之章句令不繁光曰解科闕}
