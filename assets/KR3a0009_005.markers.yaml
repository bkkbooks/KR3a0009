  - {type: variant, offset: 1143, length: 1, content: 不, WYG: 法}
  - {type: variant, offset: 1143, length: 1, content: 不, krp: 法}
  - {type: variant, offset: 1144, length: 1, content: 出, SBCK: 聽也或問侍君子以愽乎曰侍坐則聽言有酒則觀禮焉事愽乎或曰不有愽弈者乎曰爲之猶賢於巳耳今之所論自謂侍於君子也侍君子者賢於巳乎君子不可得而侍也人師難遭也侍君子晦斯光窒斯通亡斯有辱斯榮敗斯成如之何賢於巳也窒塞鷦明沖天不在六翮乎拔而傅尸鳩其累矣夫拔鷦明之翼以傅尸鳩不能沖天適足爲累耳諭授小人以大位而不能成大功也又言學小􅀃不能成大儒雷震乎天風薄乎山雲徂乎方雨流乎淵徂往也方四方其事矣乎言此皆天之事矣人不得無事也天事雷風雲雨人事詩書禮樂也魏武侯與吴起浮於西河寶河山之固起曰在德不在固辭在史記曰美哉言乎使起之固兵每如斯則太公何以加}
  - {type: page-break, offset: 1144, content: '', id: KR3a0009_SBCK_007-3a}
