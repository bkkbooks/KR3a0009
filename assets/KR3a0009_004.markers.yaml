  - {type: variant, offset: 383, length: 0, content: '', WYG: 乎曰𤣥之准易非准易之道准易為書也易准天地自天一至地十天地之道備矣𤣥何為哉易之書准天地𤣥之書准厯數}
  - {type: variant, offset: 383, length: 0, content: '', krp: 乎曰𤣥之准易非准易之道准易為書也易准天地自天一至地十天地之道備矣𤣥何為哉易之書准天地𤣥之書准厯數}
  - {type: variant, offset: 386, length: 0, content: '', WYG: 准易也厯數者天之道也自一至九陽數之極也若類之於易則非矣光曰則象天地以為人紀異術無從而入或問經之艱易光曰易移豉切曰存亡或人不諭曰其人存則易咸曰請益可了故易祕曰若孔子在三千之徒並授其義亡則艱咸曰思益各異故艱祕曰若七十子䘮而大義乖光曰人當作文字之誤也秦火之餘六經殘缺雖聖賢}
  - {type: page-break, offset: 386, content: '', id: KR3a0009_WYG_004-10b, image: WYG0696/WYG0696-0301b.png}
  - {type: variant, offset: 386, length: 0, content: '', krp: 准易也厯數者天之道也自一至九陽數之極也若類之於易則非矣光曰則象天地以為人紀異術無從而入或問經之艱易光曰易移豉切曰存亡或人不諭曰其人存則易咸曰請益可了故易祕曰若孔子在三千之徒並授其義亡則艱咸曰思益各異故艱祕曰若七十子䘮而大義乖光曰人當作文字之誤也秦火之餘六經殘缺雖聖賢}
  - {type: variant, offset: 387, length: 0, content: '', WYG: 之亦未易悉通延陵季子之於樂也其庶矣乎祕曰春秋襄二十九年吳公子札來聘請觀周樂光曰聞其聲詩知其國之興衰庶幾可謂知樂矣如樂弛雖札末如之何矣光曰末無也若其聲詩家已廢亡雖札亦不能知也如周之禮樂庶事之備也每可以為不難矣祕曰魯得用天子禮樂盡在魯光曰監於二代曲為之制事為之防學者習之固無難矣如秦之禮樂庶事之不備也每可以為難矣祕曰秦燔滅文章以愚黔首禮樂弛廢雖季子何由知之光曰秦訕笑三代之禮樂屏而去之自為苟簡之制後之學者求先王之禮樂於散亡之餘誠亦難矣衣而不裳未知其可也有上無下猶有君而無臣祕曰君在位而無輔光曰秦收諸侯之禮籍獨取其尊君抑臣者存之是衣而不裳也裳而不衣未知其可也祕曰權在臣下不知有君衣裳其順矣乎三桓專魯陳恒滅齊王莽簒漢三姦之興皆是物也祕曰上衣下裳大順之道光曰先王之禮其於君臣之際雖不失尊嚴而和樂存焉或問文曰訓訓順也咸曰言如五經可垂訓者問武曰克克能咸曰言克定禍亂者光曰克勝也未逹不諭曰事得其序之謂訓順其理也祕曰五常得其倫萬物得其序文之訓也光曰經緯天地綱紀四方勝已之私之謂克惟公亮也祕曰弔民伐罪與天下公共武之克也光曰勝人易勝已難勝已之私以從於道則人無不勝矣為之而行動之而光者其德乎咸曰所為無敢禦者故曰行所動無敢辱者故曰光或曰知德者鮮何其光祕曰知德者盖寡安得有光光曰鮮悉淺切曰我知為之不我知亦為之厥光大矣所謂大人用之不為善惡改常日月用之不為賢愚易光咸曰所以顔淵不改其樂也祕曰為而不息其光愈大必我知而為之光亦小矣咸曰君子之不欺闇室而慎其獨何必知之或曰君子病没世而無名盍勢諸名卿可幾也盍何不也勢親也名卿親執政者也言何不與之合勢以近名也此義猶王孫賈勸仲尼媚於竈也祕曰幾近也言何不附勢於有名之卿可以近名也光曰幾音機下同幾冀}
