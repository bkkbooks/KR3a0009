  - {type: variant, offset: 310, length: 1, content: 閛, WYG: 度一嵗之紀節候鍾律星斗五行咸著焉今或人以為孔子述而不作疑太𤣥不當作故問之祕曰孔子述而不作太𤣥何以作曰其事則述其書則作言昔老彭好述古事孔子比之但述而不作今太𤣥非古事乃自成一家之書故作之也或曰孔子述事者有矣}
