  - {type: variant, offset: 279, length: 2, content: 開明, WYG: 書焉是以似之光曰畫猶圖畫聲畫形君子小人見矣察言觀書斷可識也光曰見賢遍切聲畫者君子小人之所以動情乎咸曰君子所動情者道小人所動情者利各見其言書矣祕曰情動於中而形于聲畫聖人之辭渾渾若川渾渾洪流也祕曰渾渾若大川之流順則便逆則否者其惟川乎祕曰聖人之教順則安逆則危光曰順之則便易逆之則不行或曰仲尼聖者歟何不能居世也曾范蔡之不若咸曰言不能曲傳以圖用如范叔蔡澤之為祕曰范睢魏人也説秦昭王而為相蔡澤燕人也説范睢而代睢為相言孔子不如光曰不如范睢蔡澤能偶合世俗以求富貴曰聖人者范蔡乎咸曰言聖人肯為范蔡之術乎若范蔡其如聖何咸曰范叔魏人干王稽得事秦為相號應侯蔡澤燕人説應侯卒代其位為剛成君二子皆以詭術居位其如聖人之道何光曰仲尼肯為范蔡之行則亦為小人安得為聖或曰淮南太史公者其多知歟曷其雜也祕曰淮南王安著書二十餘萬言太史公司馬談遷之父也著書五十餘萬言其多知}
