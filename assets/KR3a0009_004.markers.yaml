  - {type: variant, offset: 376, length: 2, content: 上無, WYG: 𤣥之專仁義也安在咸曰夫𤣥之道雖以隂陽節候星斗五行之用然其㫖應休咎之占星陽而時數辭從則為休也星隂而時數辭違則為咎也使人知吉凶之來善惡之修豈非仁乎夫義者宜也復使窮渾天之}
