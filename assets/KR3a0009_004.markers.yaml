  - {type: variant, offset: 496, length: 510, content: 禮樂也不見聖人之小禮樂也孰有書不由筆言不由舌吾見天常為帝王之筆舌也智也者知也夫智用不用益不益則不贅虧矣深知器械舟車宮室之為則禮由已或問大聲曰非雷非霆隱隱耾耾久而愈盈尸諸聖或問道有因無因乎曰可則因否則革或問無為曰奚為哉在昔虞夏襲堯之爵行堯之道法度彰禮樂著垂拱而視天下民之阜也無為矣紹桀之後纂紂之餘法度廢禮樂虧安坐而視天下民之死無為乎或問太古塗民耳目惟其見也聞也見則難蔽聞則難塞曰天之肈降生民使其目見耳聞是以視之禮聽之樂如視不禮聽不樂雖有民焉得而塗諸或問新敝曰新則襲之敝則益損之或問太古德懷不禮懷嬰兒慕駒犢從焉以禮曰嬰犢乎嬰犢母懷不父懷母懷愛也父懷敬也獨母而不父未若父母之懿也狙詐之家曰狙詐之計不戰而屈人兵堯舜也曰不戰而屈人兵堯舜也沾項漸襟堯舜乎衒玉而賈石者其狙詐乎或問狙詐與亡孰愈曰亡愈或曰子將六師則誰使曰御得其道則天下狙詐咸作使御失其道則天下狙詐咸作敵故有天下者審其御而已矣或問威震諸侯須於征與狙詐之力也如其亡曰威震諸侯須於狙詐可也未若威震諸侯而不須狙詐也或曰無狙詐將何以征乎曰縱不得不征不有司馬法乎何必狙詐乎申韓之術不仁之至矣若何牛羊之用人也若牛羊用人則狐狸螻螾不膢臘也與或曰刀不利筆不銛而獨加諸砥不亦可乎曰人砥則秦尚, SBCK: ''}
