  - {type: 'tls:seg', offset: 200, content: '', id: KR3a0009_tls_004-4a.14}
  - {type: variant, offset: 200, length: 0, content: '', WYG: 成天下之大順致天下之大利和同天}
  - {type: variant, offset: 200, length: 0, content: '', krp: 成天下之大順致天下之大利和同天}
  - {type: variant, offset: 203, length: 0, content: '', WYG: 間者也光曰大順謂上下各安其分大利謂萬物各得其所天者不為而自成人者為之然後成而同其際使之無間隙皆聖人神心之所為也龍蟠于泥蚖其肆矣惟聖知聖惟龍知龍愚不知聖蚖不知龍聖道未彰羣愚玩矣龍蟠未升蚖其肆矣咸曰蚖蜥蜴也似龍而無角如蛇而有足一云毒蛇也肆區也言龍未飛天則與蚖同區也祕曰與蚖蛇同肆光曰蚖音元肆者肆志以凌之也或曰肆當作肄肄習也曰習見而狎玩之也蚖哉蚖哉惡覩龍之志也歟歎之甚也祕曰聖人在䝉與衆人同列衆人豈知聖人之志歟光曰惡音烏君子之志髙深逺大小人固不得而知也或曰龍必欲飛天乎咸曰疑其長為蚖同肆不能飛天光曰言君子必欲居大位乎曰時飛則飛時潛則潛時可而升未可而潛既飛且潛義兼出處食其不妄形其不可得而制也歟飲食則不妄有形而不可制也咸曰言龍之且潛雖飲食之間不敢忘於形思所以飛于天也聖人尚䝉雖飲食之間不敢忘於形思所以行其道也故暫為蚖所肆愚所侮然猶不能制之矣祕曰既飛且潛惟時所適雖一食之間不忘隠見之形安得而制哉言聖人亦然光曰宋吳本妄作忘今從李本音義曰非義不妄食故不可得而制曰聖人不制則何為乎羑里祕曰文王聖人也何以制乎羑里紂囚文王於羑里曰龍以不制為龍聖人以不手為聖人手者桎梏之屬咸曰手當為干字之誤也言龍雖為蚖同肆然終不制於泥故能謂之龍聖人雖為紂所囚然終不干其刑故能謂之聖人今注文稱手者桎梏之屬意謂文王雖囚而不被於桎梏也按賈誼新書云紂作梏數千睨諸侯之不諂已者杖而梏之文王桎梏囚于羑里七年而後得免是文王常被其桎梏矣安可謂之不手哉祕曰手持也執也文王事不道之紂雖以非}
