  - {type: variant, offset: 208, length: 0, content: '', WYG: 仁義應時而造謂禮樂刑政也或曰易損其一雖憃知闕焉咸曰易損其一者謂大衍之數虚其一此雖憃愚之人皆知闕之也光曰憃書容丑江刄用三切至書之不備過半矣而習者不知本百篇今有四十九故曰過半祕曰言易之六十四若損其一雖愚人可以知其闕者至書百篇漢存者二十九篇得古文又多十六篇其亡過半而習者莫知其義光曰漢世儒者不知書本有百篇故孔臧與從弟安國書曰今學者唯聞尚書二十八篇取象二十八宿謂至然也惜乎書序之不如易也歎恨書序雖存獨不如易之可推㝷咸曰易之虚一者非損失之盖蓍法然也書失過半者經秦火遺墜之也或人不知其義以為易損一而尚可推書失多而不能知故揚子答之以下文祕曰孔子序書存百篇之義而其篇亡不可復知序易存六十四之次設或亡一即可推而知之是序書不如序易光曰序謂篇之次序曰彼數也可數焉故也咸曰言彼損一者盖蓍數之法可揲數而用故也光曰八卦重之成六十四自然之數如書序雖孔子亦末如之何矣數存則雖愚有所不失數亡則雖聖有所不得咸曰如書者實失墜之與易不同雖孔子無如之何言不敢虚詐而補之祕曰彼易卦皆有數亦可以䇿數而知焉故也如書序之存而篇亡皆當時訓誥之事不可以虚補故孔子亦末如之何也昔之説書者序以百叙以百篇而酒誥之篇俄空焉今亡夫秦焚書漢興采集之酒誥又亡一簡中者先師猶俄而空之今漸亡祕曰秦皇燔書漢興劉向以中古文校歐陽大小夏侯三家經文酒誥脱簡一空而亡之也據酒誥今無亡脱盖古文獨存光曰空苦貢切音義曰空缺也虞夏之書渾渾爾深大咸曰渾渾猶淳淳也言虞夏尚有唐風去道未逺淳淳然祕曰渾渾猶言混混也謂其淳雅也商書灝灝爾夷曠咸曰灝灝猶漫漫也言忠質之化制尚䟽濶漫漫然祕曰灝灝猶言浩浩也謂其逺大也周書噩噩爾不阿附也咸曰噩噩猶察察也言尚文而相檢以禮樂察察然祕曰噩噩猶言諤諤也謂其明正也下周者其書誰乎下周者秦言酷烈也袐曰秦書誰乎不合典訓光曰李本誰作譙今從宋吳本渾胡本切灝胡老切噩五各切渾渾朴略難知之貎灝灝富大之貎噩噩明直之貌其書誰乎言不足以為書也}
