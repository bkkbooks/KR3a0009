  - {type: variant, offset: 320, length: 0, content: '', WYG: 所定漢興已久稍為諸儒討正故無古事可述而屈身莽朝自非作書著成一家則何以明其道哉祕曰以為經莫大於易故作太𤣥自子辰申子冠之以甲分二十七章為一會八十一章為一統從子至辰自辰至申自申至子凡四千六百一十七嵗為一元與泰初厯相應亦有顓頊厯焉此其事則述也作二百四十三表七百二十九贊十一篇此其書則作也光曰仁義先王之事也方州部家揚子所作也}
