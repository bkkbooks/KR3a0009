  - {type: variant, offset: 10, length: 0, content: '', SBCK: 亡操而不舎則道義光大能常操而存者其惟聖人乎聖人存神索至存其精神探幽索至成天下之大順致天下之大利順事而無逆利物而無害和同天人之際使之無間}
