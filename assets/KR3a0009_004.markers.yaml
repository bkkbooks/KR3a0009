  - {type: variant, offset: 260, length: 13, content: 取焉耳及搥提仁義絕滅禮學吾, SBCK: 驗乎明逺必有驗乎近大必有驗乎小微必有驗乎著}
  - {type: variant, offset: 260, length: 1, content: 取, WYG: 所發明如白日所照有所蕩除如江河所滌浩浩洪盛無能當之者祕曰照之如白日滌之如江河浩浩洪流誰能禦之面相之辭相適咸曰面相猶面對適往也言面對之時以辭相反也光曰之亦適也捈中心之所欲咸曰捈引也光曰捈同盧佗胡二切通諸人之嚍嚍者莫如言嚍嚍猶憤憤也祕曰㗲㗲猶聲聞也通衆人善惡之聲光曰宋吳本嚍作㗲呼陌切呌呼也今從李本嚍音晉彌綸天下之事記久明逺著古昔之㖧㖧傳千里之忞忞者莫如書㖧㖧目所不見忞忞心所不了咸曰書謂書畫之書㖧㖧猶喋喋忞忞猶勉勉言書畫者所以著古人喋喋之言傳千里勉勉之懐也祕曰㗃㗃不可知也忞忞自彊勉也古昔難知之迹書以著}
