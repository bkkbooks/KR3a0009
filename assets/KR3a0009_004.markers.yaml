  - {type: variant, offset: 133, length: 0, content: '', WYG: 禮而言之也光曰君子之心主此五者譔問神祕曰天有至神為造化之主聖人之神為道之宗其神一也或問神曰心咸曰神謂精義知幾之神言存乎心而已祕曰神者不疾而速不行而至心主於神光曰物之神者莫如心請聞之咸曰未諭心之義故請之光曰李宋吳本作請問之音義曰天復本作請聞之今從之曰潛天而天光曰潛深也潛心於天而知天潛地而地惟其所潛咸曰心潛於天則知天心潛於地則知地光曰潛心於地而知地天地神明而不測者也心之潛也猶將測之况於人乎况於事倫乎咸曰言世所難窮測者惟天地之道神明之義耳然一潛其心可盡見之况人道之近事理之淺安能藏哉倫理也敢問潛心于聖咸曰問何}
