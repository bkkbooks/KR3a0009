  - {type: variant, offset: 320, length: 0, content: '', SBCK: 辭渾渾若川渾渾洪流也順則便逆則否者其惟川乎或曰仲尼聖者與何不能居丗也曽范蔡之不若曰聖人者范蔡乎若范蔡其如聖何或曰淮南太史公者其多知與曷其雜也曰雜乎雜歎不純也人病以多知爲雜惟聖人爲不雜書不經非書也}
