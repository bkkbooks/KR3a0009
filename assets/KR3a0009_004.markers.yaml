  - {type: 'tls:seg', offset: 204, content: '', id: KR3a0009_tls_004-5a.1}
  - {type: variant, offset: 204, length: 1, content: 焉, WYG: 見囚終不能執而戮之所}
  - {type: variant, offset: 204, length: 1, content: 焉, krp: 見囚終不能執而戮之所}
  - {type: variant, offset: 207, length: 0, content: '', WYG: 聖人也公羊傳曰手劒而叱之光曰音義曰不手不制於人之手光謂手謂為人所提攜指使枉己之道而隨人左右也或曰經可損益歟曰易始八卦而文王六十四其益可知也祕曰伏羲始畫八卦因而重之六十四卦備矣黄帝正名百物而名顯文王繫辭而義彰可謂益矣今云文王六十四據司馬遷而言也詩書禮春秋或因或作而成於仲尼乎其益可知也或因者引而伸之或作者又如春秋祕曰因舊文作序例刪定筆削皆成於仲尼光曰宋吳本或作下更有因字今從李本故夫道非天然應時而造者損益可知也咸曰天然者聖人也言仲尼之後或道非聖人而有應時造書以救世而明治道者其益亦可知也如孔伋孟軻之流祕曰故道非若易象之天然雖損益不可増減於乾坤六子也應時而造若三代之禮樂者損益可知也光曰天然謂道}
