  - {type: variant, offset: 138, length: 0, content: '', krp: 盡天人之幾孔子五十以學易而作十翼無不通也逹通也顔淵亦潛心於仲尼矣未逹一聞耳其殆庶幾咸曰聞當作間字之誤也孟子謂顔淵具聖人之}
