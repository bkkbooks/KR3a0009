  - {type: variant, offset: 7, length: 0, content: '', SBCK: 神曰心請問之曰濳天而天濳地而地唯其所濳天地神明而不測者也心之濳也猶將測之況於人乎況於事倫乎敢問濳心于聖曰昔乎仲尼濳心於文王矣逹之逹通顔淵亦濳心於仲尼矣未逹一間耳其殆庶幾神在所濳而巳矣神}
