  - {type: variant, offset: 256, length: 0, content: '', WYG: 幽必有驗乎明咸曰猶易極之精義而見于行事祕曰猶言百神受職驗在禮樂逺必有驗乎近咸曰猶大雅之德及黎庶而本之於已祕曰猶言百世可知驗在損益大必有驗乎小咸曰猶二南獲瑞而由之室家祕曰猶言天地之動驗在璿璣微必有驗乎著咸曰猶春秋之推至隠而顯成法祕曰猶言履霜堅氷至而驗在弑父無驗而言之謂妄君子妄乎不妄言必有中光曰言雖幽深逺大而不可考驗於今者所謂無稽之言也言不能逹其心書不能逹其言難矣哉祕曰難乎為君子光曰難以明}
