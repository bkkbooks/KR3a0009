  - {type: variant, offset: 229, length: 2, content: 匪天, WYG: 之所吠也若謂誾誾中正之義則理不通焉祕曰聖人之作事豈不能使明白如日月乎何使後世之學者徒誾誾貌悦之而不能逹其心也誾誾和也和悦之貌光曰宋吳本訔作誾今從李本訔語巾切訔訔爭辨之貌謂學者爭論是非曰瞽曠能黙瞽曠不能齊不齊之耳狄牙能喊狄牙不能齊不齊之口咸曰曠師曠黙黙審於樂喊咂物聲也祕曰喊聲也瞽曠之和雅能使黙而識之者必有瞽曠之耳不能齊聽者不齊之耳狄牙之甘美能使喊而稱之者必待狄牙之口不能齊食者不齊之口猶聖人立言能使服而行者必須賢哲之人不能齊學者不齊之心也瞽曠師曠也知樂者也晉杜蒯云曠也大師也狄牙易牙也知味者也大戴禮曰失管仲任竪刁狄牙韓非子曰易牙為君主味光曰喊呼覽呼􅰟下漸三切狄儀狄造酒者牙易牙瞽曠能審正聲而人之耳清濁髙下各有所好瞽曠不能齊也狄牙能嘗和味而人之口酸辛鹹苦各有所好狄牙不能齊也聖人能行正道而愚闇邪僻之人相}
