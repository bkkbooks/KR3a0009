  - {type: variant, offset: 321, length: 4, content: 似於水火, SBCK: 不經非言也言書不經多多贅矣動而愈僞或曰述而不作􅀇何以作曰其事則述其書則作育而不苗者吾家之童烏乎童烏子雲之子也仲尼悼顔淵苗而不秀子雲傷童烏育而不苗九齡而與我􅀇文顔淵弱冠與仲尼言易童烏九齡而與揚子論􅀇或曰􅀇何爲曰爲仁義曰孰不爲仁孰不爲義曰勿雜也而巳矣純則巧僞息雜則姦邪興}
  - {type: variant, offset: 321, length: 1, content: 似, WYG: 揚子所作太𤣥之書其所述者亦先聖人之道耳育而不苗者吾家之童烏乎童烏子雲之子也仲尼悼顔淵苗而不秀子雲傷童烏育而不苗九齡而與我𤣥文顔淵弱冠而與仲尼言易童烏九齡而與揚子論𤣥光曰與余茹切與知之或曰𤣥何為祕曰㫖何歸光曰為于僞切言為何事而作曰為仁義咸曰𤣥言者為仁義而作曰孰不為仁孰不為義祕曰賢者而言誰不為仁義何必𤣥曰勿雜也而已矣純則巧僞息雜則姦邪生咸曰言如三鄒田戸吁劇申韓之徒雜以巫祝禨祥刑名浮虚而亂俗今太𤣥獨專}
