  - {type: variant, offset: 8, length: 1, content: 曰, SBCK: 不逺濳心則是天神天明照知四方天以神明光燭幽􅁳照曜四方人以濳心鉤深致逺探􅄨索隱天精天粹萬物作􅀋天以精粹覆萬物各成其􅀋人以濳心考校同異披􅀭精義人心其神矣乎操則存舎則亡人心如神變化無方操而持之則義存舎而廢之則}
