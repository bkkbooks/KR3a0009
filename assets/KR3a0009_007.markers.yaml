  - {type: variant, offset: 117, length: 1, content: 詘, WYG: 俾吴作亂光曰謂進專諸於闔閭使弑僚破楚入郢郢楚都也祕曰子胥父奢為楚平王太子建太傅少傅費無忌讒太子建平王殺奢并殺兄尚子胥亡後奔吴知吴公子光有内志欲殺王而自立未可說以外事乃進專諸旣而公子光乃令專諸襲刺吴王僚而自立是為吴王闔廬闔廬旣立得志乃召伍員以為行}
