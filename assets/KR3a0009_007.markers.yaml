  - {type: variant, offset: 241, length: 0, content: '', WYG: 黄帝也髙辛黄帝之曽孫帝嚳也故天胙之為神明主且著在天庭咸曰天庭謂天帝之庭猶皇階帝籙之義是生民之願也厥饗國乆長神明主郊祀祕曰天福胙之為天地神明之主其顯徳且昭著在天帝之庭是生民之願合乎民心故享國長乆胙古字作祚光曰宋吴本顯懿作顯徳今從李本著在天庭猶云簡在上帝之心五帝三王以明美之徳故為天所祚人所愛而乆長若秦楚强䦧震撲胎籍三正播其虐於黎苖咸曰胎當為跆字之誤也䦧狠也胎籍猶暴侮也祕曰䦧鬪也撲猶言擊也胎始也籍狼籍也謂亂也三正天地人也胎籍猶言俶擾也黎苖九黎三苖也布其虐甚於九黎之亂徳三苖之不㳟光曰䦧許激切胎當作跆徒來切蹋也藉子夜切黎苖民也子弟且欲喪之咸曰子弟至親亦欲其喪亡况於民乎况於鬼神乎廢未􅄩也不道早亡祕曰謂其不仁不親不祚宜速或問仲尼大聖則天曷不胙胙主祕曰不胙之為神明主曰無土祕曰言無土地可因然則舜禹有土乎祕曰舜禹本亦無土曰舜以堯作土禹以舜作土道貴順理動無常因也因土以行化湯文也因聖以登禪舜禹也上無舜禹之時下無湯文之土故不胙耳若秦楚之胙非所以為胙也或問聖人表裏表裏内外曰威儀文辭表也徳行忠信裏也明乎得一而已或問義帝初矯矯立咸曰義帝楚懐王之孫心也胡亥三年沛公與項梁共立為楚懐王至漢元年項羽陽尊之為義帝實不用其命故云初矯光曰矯舉也初舉兵劉龕南陽劉髙祖龕取也光曰龕與戡同音堪項救河北項羽二方分崩一離一合設秦得人如何設假咸曰言義帝初立時闗中旣分為三秦而楚項又}
