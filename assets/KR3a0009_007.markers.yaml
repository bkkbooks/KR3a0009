  - {type: variant, offset: 261, length: 0, content: '', WYG: 阻帯山河四塞之地肥饒可都之項羽見秦皆已燒殘又懐東歸曰富貴不歸故鄉如衣錦夜行韓生曰人謂楚人沐猴而冠果然羽聞之乃斬韓生此言項羽之暴乆矣韓生說之都咸陽旣不能移即富自引反謂人為沐猴雖見烹亦冝矣祕曰生旣知羽如沐猴捨而去之可也乃謂人明言其沐猴而見烹不亦宜乎盖不能危行言遜也光曰言蔡生知項羽暴伉素不為羽所知信獻䇿不用又從而訕之是自有沐猴之狂也易曰君子安其身而後動易其心而後語焦逆訐而順守之雖辯劘虎牙矣逆意而諫順義而守可謂辯説矣然劘近虎牙言其殆也祕曰劘義如摩焦所諫皆逆其意而訐其事所守皆陳母后之大義至順之理雖辯則辯矣譬猶摩虎牙也言無位而廷諫履危之道也光曰訐居謁切劘音磨直數其惡是逆訐歡之以孝入之以忠是順守或問甘羅之悟呂不韋張辟彊之覺平勃皆以十二齡茂良乎祕曰甘羅甘茂孫也以請張唐相燕及先報趙事悟呂不韋辟彊張良之子也以孝惠崩呂太后哭不哀事覺陳平周勃皆十二歲豈甘茂張良為之祖父使之然乎光曰以甘茂之孫張良之子故能如此其慧乎曰才也茂良不必父祖天才自然發其神心無假祖父祕曰人之生天與之才譬如茂良非假父祖使之然也光曰言祖孫父子材性不必相類或問酈食其說陳留下敖倉說齊罷歴下軍何辯也光曰酈音歴食其音異基説音稅韓信襲齊以身脂鼎何訥也曰夫辯也者自辯也如辯人幾矣㡬危也小有才猶未聞君子之大道也斯足以殺其身而已咸曰食其說沛公以陳留天下之衝又願收取滎陽據敖倉之粟又說齊王田廣七十餘城已下矣而韓信為蒯通所說忌其憑軾之功遂乃夜渡兵平原襲齊是使齊王疑食其賣已乃烹之當是之時非食其之不能辯勢之然也何哉夫前與之和後暴之兵安使廣之不疑哉今揚之意言君子之所謂辯者當以正諫之道自辯其身如仲尼之於衰周孟軻之於戰國爾若夫以辯說人則猶商君應侯之徒矣不亦危哉盖恥之也祕曰㡬近也夫辯者辯其禮樂之所歸行之而為君子也如事談說以辯於人不亦㡬乎脂鼎哉光曰幾音機辯者以辯自明其志則可矣若恃其辯欲以欺誘它人此危事也或問蒯通抵韓信不能下又狂之祕曰蒯通說韓信使三分天下鼎足而立信不忍背漢遂謝通通說不聽惶恐乃陽狂為巫抵擠也謂其談說若擠排使之光曰信旣不用其策又陽狂為巫言亦未辯曰方遭信閉如其抵信盡忠髙祖若門户之閉無巇隙也曰巇可抵乎祕曰巇嶮巇也言若設巇嶮之詐謀以動之其可抵乎光曰巇許覊切曰賢者司禮小人司巇况拊鍵乎咸曰可伺也拊拍也言賢者伺見禮制則動小人伺見巇隙則作况拍去闗鍵乎祕曰司主也賢者所主人事使人惟禮是視不為小人巇嶮之謀况信拍鍵而閉之乎言不可為也拊拍也鍵鍵籥光曰拊音撫鍵其輦切鍵鑰匙也賢者見有禮則從之小人見釁隙則抵之抵巇猶不可况閉户無隙而欲拍鍵强入乎或問李斯盡忠胡亥極刑光曰太史公語忠乎光曰斯可謂盡忠乎曰斯以留客秦嘗欲逐諸侯之客斯上書以為不可秦聴之是一事忠至作相祕曰李斯楚上蔡人也斯歎曰吾以忠死宜矣而二世夷其三族此果忠乎始以逐客上書遂留之以至丞相言其信重光曰因上書留客為秦王所知始用事以至為丞相用狂人之言從浮大海立趙髙之邪說廢沙丘之正阿意督責焉用忠始皇信妖言東浮滄海斯為宰相也不能諫止而從行及始皇崩於沙丘斯納趙髙之計矯廢扶蘇而立胡亥胡亥旣立縱暴斯諫之而見怒恐誅乃作督責之書以阿二世之意此諸事皆非忠直光曰於此數事皆不忠欲於何所用其忠乎霍祕曰或人以斯非忠請問霍光忠乎曰始元之初祕曰武帝以光行周公之事輔少主昭帝旣立始元六年詔郡國舉賢良文學之士遂罷郡國㩁酤關内鐡於是利復流下庶人休息擁少帝之微祕曰昭帝立年八歲政事一决光班固曰擁昭立宣摧燕上官之鋒祕曰始元之明年燕刺王旦上官桀等謀反皆誅滅之班固曰摧燕王仆上官處興廢之分祕曰昭帝立十三年而崩無嗣光乃議迎昌邑賀賀立二十七日行滛亂一千一百二十七事光白太后廢昌邑王而立宣帝班固曰處廢置之際臨大節而不可奪堂堂乎忠難矣哉祕曰光兹數事之忠堂堂乎它人之所難行哉光曰李本作始六世之詔宋吴本作始六之詔音義曰天復本作始元之初今從之始元昭帝年號也興廢謂廢昌邑王立宣帝堂堂勇貌言此皆霍光忠於社稷之事人所難說至顯不終矣顯光之夫人名也毒殺許皇后後光心知之而不討賊祕曰光夫人東閭顯使淳于衍毒殺許皇后因勸光納小女成君為后及光死後語泄上始聞之後奪霍禹等印綬終至棄市光曰光知妻顯為邪謀而隠蔽不言忠不終}
