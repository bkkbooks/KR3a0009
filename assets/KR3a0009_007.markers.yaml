  - {type: variant, offset: 796, length: 174, content: 也或曰弘羊榷利而國用足盍榷諸曰譬諸父子為其父而榷其子縱利如子何卜式之云不亦匡乎或曰因秦之法清而行之亦可以致平乎曰譬諸琴瑟鄭衛調俾夔因之亦不可以致簫韶矣或問處秦之世抱周之書益乎曰舉世寒貂狐不亦燠乎或曰炎之以火沃之以湯燠亦燠矣曰燠哉燠哉時亦有寒者矣非其時而望之非其道而行之亦不可以至矣秦之有司負秦之法度秦之法度負聖人之法度秦弘違天地之道而天地違秦亦弘矣, SBCK: 淵騫卷第十一}
