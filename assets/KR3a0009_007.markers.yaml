  - {type: variant, offset: 229, length: 25, content: 天下之亡聖也久矣呱呱之子各識其親譊譊之學各習其師精, SBCK: ''}
  - {type: variant, offset: 229, length: 0, content: '', WYG: 之至也咸曰􅃖􅃖無知也言六國無知皆危弱於周徒為秦終專其政以并天下也祕曰解嘲曰離為十二合為六七秦稱富强故六國之衆皆為秦而弱周終然危懼故秦專其政以擅有天下屏營猶經營也李周翰曰屏營廻惶也光曰音義曰屏音并謂屏營猶旁皇失據之貌言六國相與陵弱周室適足為秦開兼并之資終自失據為秦所滅使秦得專據天下秦失其猷罷侯置守守失其微天下孤暌暌猶乖離咸曰猷道也言秦之失道罷諸侯之制分為三十六郡以置守尉而守尉無防微之援天下遂至孤獨暌乖也祕曰秦患周之敗以為起於諸侯力爭以弱見奪於是削去五等罷諸侯之制分為三十六郡而置郡守守失其道專任刑法無維城之固則天下孤暌矣書曰道心惟微班固曰秦據勢勝之地騁狙詐之兵蠶食山東一切取勝因矜其所習自任其私智姍笑三代蕩滅古法竊自號為皇帝而子弟為匹夫内亡骨肉本根之輔外亡尺土藩翼之衛光曰守手又切秦雖置守又使御史監郡務弱其權守權旣微孤立於上不能制民民苦其賦役故相乖離殺守而為盗由守素微弱故也項氏暴彊改宰侯王故天下擅楚咸曰言秦旣亡是時項羽兵最盛故專命改制諸侯王也光曰宰割也擅楚之月有漢剏業山南發跡三秦追項山東故天下擅漢天也山南漢中也三秦雍翟塞也咸曰項羽旣自立為西楚覇王王梁楚地九郡都彭城旣立沛公為漢王王巴蜀漢中四十一縣都南鄭三分闗中立秦三將章邯為雍王都廢丘司馬欣為塞王都櫟陽董醫為翟王都髙奴於是各就國漢王至南鄭士卒皆思東歸故韓信因陳楚可圖三秦易并之計遂東嚮定三秦追羽於山東因專天下由是數事兼之亦天也光曰剏與創同言周秦楚漢一廢一興皆天命使然非專人事人問人事者何也祕曰獨問人事曰兼尚才權右計左數動謹於時人也咸曰兼用也尚尊也右上也左下也言秦楚漢之成敗或用其才良或尊其權變或上其計策或下其竒數雖皆謹於時然所取之異故一亡一興此乃人事也祕曰雖人事亦須謹慎於時然後動也光曰兼才謂總覧}
