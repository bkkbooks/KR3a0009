  - {type: variant, offset: 235, length: 1, content: 久, WYG: 咸曰言漢能屈已以用羣臣之策羣臣能屈已以悦羣士之力故勝也光曰羣策無能出漢之右者故曰漢屈羣策羣力為羣策所制故曰羣策屈羣力楚憞羣策而自屈其力憞惡也咸曰楚有一范増不能用是惡群策而徒屈已以自用其力故敗也光曰憞徒對切旣廢群策而不用是自屈其力也屈人者克克勝自屈者負負敗天曷故焉言無私親惟應善人咸曰言楚之士自取爾光曰言何預天事或問秦楚旣為天典命}
