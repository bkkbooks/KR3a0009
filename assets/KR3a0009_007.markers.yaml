  - {type: variant, offset: 111, length: 0, content: '', WYG: 簡子之事非一故問之祕曰世多神異也成公十年傳曰晉侯夢大厲被髪及地摶膺而踊曰殺余孫不義杜云趙氏之先祖也八年晉侯殺趙同趙括故怒史記趙簡子五日不知人寤曰我之帝所與百神遊于鈞天廣樂九奏萬舞不類三代之樂其聲動人心曰神怪茫茫若存若亡聖人曼云子不語怪之謂祕曰神怪無實聖人無云小爾雅曰曼未没無也光曰曼無也無言之者或問子胥種蠡孰}
