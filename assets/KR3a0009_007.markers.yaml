  - {type: variant, offset: 297, length: 1, content: 長, WYG: 旣明且哲以保其身則不然或曰當布之急雖明哲如之何曰明哲不終項仕如終焉攸避苟患失之無所不至咸曰言明哲者見於未萌識于未兆觀項羽之庸烏肯終仕之哉如終仕之乃非明哲矣如是則當其急也安可避耶祕曰不終項仕猶言終不仕項言項羽不師古而奮私知謂之明哲豈終仕之哉如果}
