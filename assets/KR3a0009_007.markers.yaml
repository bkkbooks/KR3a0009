  - {type: variant, offset: 590, length: 360, content: 後寶齊桓晉文以下至於秦兼其無觀已或曰秦無觀奚其兼曰所謂觀觀德也如觀兵開闢以來未有秦也或問魯用儒而削何也曰魯不用儒也昔在姬公用於周而四海皇皇奠枕于京孔子用於魯齊人章章歸其侵疆魯不用真儒故也如用真儒無敵於天下安得削灝灝之海濟樓航之力也航人無楫如航何或曰奔壘之車沈流之航可乎曰否或曰焉用智曰用智於未奔沈大寒而後索衣裘不亦晚乎乘國者其如乘航乎航安則人斯安矣惠以厚下民忘其死忠以衛上君念其賞自後者人先之自下者人高之誠哉是言也或曰弘羊榷利而國用足盍榷諸曰譬諸父子為其父而榷其子縱利如子何卜式之云不亦匡乎或曰因秦之法清而行之亦可以致平乎曰譬諸琴瑟鄭衛調俾夔因之亦不可以致簫韶矣或問處秦之世抱周之書益乎曰舉世寒貂狐不亦燠乎或曰炎之以火沃之以湯燠亦燠矣曰燠哉燠哉時亦有寒者矣非其時而望之非其道而行之亦不可以至矣秦之有司負秦之法度秦之法度負, WYG: ''}
