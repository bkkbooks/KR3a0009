  - {type: variant, offset: 216, length: 0, content: '', SBCK: 謂令名也忠不終而躬逆焉攸令或問淳于越曰伎曲請問曰始皇方虎挒而梟磔噬士猶腊肉也越與亢眉終無橈辭可謂伎矣有才伎也仕无妄之國易有无妄卦此亦依義取譬食无妄之粟分无妄之橈自令之閒而不違可謂曲矣橈橈時䇿也自令與始皇併心爲無道或問茅焦厯井幹之死使始皇奉虚左之乗始皇以嫪毒事幽母咸陽宫諫者輙殺於井幹闕下茅焦厯井幹之死而諌始皇即駕輿執轡虚左親迎其母蔡生欲安項咸陽不能移又亨之其者未辯與項羽欲東還下邳蔡生􅀃使都咸陽旣不能移又爲所亨案漢書云韓生􅀭子云蔡生未詳韓蔡孰爲是曰生捨其木侯而謂人木侯亨不亦冝乎語在漢書焦逆訐而順守之雖辯劘虎牙矣逆意而諌順義而守可謂辯􅀃矣然劘近虎牙言其殆也或問甘羅之悟吕不韋張辟強之覺平勃皆以十二齡戊良乎甘羅戊之孫也以張唐之相燕割趙事發悟吕不韋也辟強張良之子也以孝惠崩吕太后哭不哀事􅁴悟陳平周勃也言此之時各年十二欲知自出其意爲復戊良敎之乎曰才也戊良不必父祖天才自然發其神心無假其父祖也或問酈食其􅀃陳留下敖倉􅀃齊罷厯下軍何辯也韓信襲齊以身脂鼎何訥也曰夫辯也者自辯也如辯人幾矣幾危也小有才未聞君子之大道也斯足以殺其軀而巳非長生乆視之道或問蒯通抵韓信不能下又狂之蒯通􅀃韓信令左漢右楚鼎足而立不能下之佯狂弃走曰方遭信閉如其抵信盡忠髙祖若門戸之閉無有巇􅂩也曰巇可抵乎曰賢者司禮小人司巇況拊鍵乎或問李斯盡忠胡亥極刑忠乎曰斯以留客秦甞欲逐諸侯之客斯上書以爲不可秦聽之是一事忠也至作相用狂人之言從浮大海立趙髙之邪􅀃廢沙丘之正阿意督責焉用忠始皇信妖言東浮滄海斯爲宰相不能諌止而從行及始皇崩於沙丘斯納趙髙之計矯廢扶蘇而立胡亥胡亥旣立縱暴斯諫之而見怒恐誅作督責之書以阿二丗之意此諸事皆非忠直也霍漢大將軍霍光曰始六之詔擁少帝之微摧燕上官之鋒處廢興之分堂堂乎忠難矣哉至顯不終矣顯光之夫人名也毒殺許皇后後光心知之而不討賊或問馮唐面文帝得廉頗李牧不能用也諒乎曰彼將有激也親屈帝尊信亞夫之軍至頗牧􅂚不用哉馮唐所知魏尚者爲雲中守擊匈奴有坐欲諌之故激文帝耳非平談也德用士則聞之矣於德又何如曰罪不孥止罪其身不收入妻孥宫不女出宫人嫁之令無怨曠館不新仍舊制也陵不墳葬於霸陽因山不起墳或問交曰仁問餘耳陣餘張耳曰光初有始無終竇灌曰凶終竇嬰灌夫甚相親友不勝相助犯觸田蚡並皆罹禍或問信曰不食其言食僞請人曰􅀳荀息趙程嬰公孫杵臼秦大夫鑿穆公之側此章全論不食言之德問義旣聞諸賢之信又問於義誰得曰事得其冝之謂義義者得死生之冝也不得死生之冝者非義也若程嬰杵臼兼乎信義也秦􅀳大夫可謂重食言之信蹈義則未也或問季布忍焉可爲也季布爲項羽將甞困髙祖髙祖旣立購之千金困迫乃爲奴賣與魯朱家曰能者爲之明哲不爲也言能忍辱貪生者乃爲之或曰當布之急雖明哲如之何曰明哲不終項仕如終項仕焉攸避苟患失之無所不至或問賢曰爲人所不能請人曰顔淵黔婁四皓韋􅀇顔淵簞瓢不改其操黔婁守正不邪死而益彰四皓白首髙尚其事韋􅀇漢丞相賢之少子也賢薨􅀇當襲封􅀍髪佯狂欲以讓兄或曰擬人必於其倫顔子至賢其殆庶幾黔婁四皓旣非其儔況以韋􅀇不亦甚哉釋曰顔淵之賢備體之賢韋􅀇之賢一至之賢王莾篡}
