  - {type: variant, offset: 128, length: 74, content: 美也詘道而從人或問五經有辯乎曰惟五經為辯說天者莫辯乎易說事者莫辯乎書說體者莫辯乎禮說志者莫辯乎詩說理者莫辯乎春秋捨斯辯亦小矣春木之芚兮援我手之鶉兮去, WYG: 得乃掘楚平王墓出其尸鞭}
