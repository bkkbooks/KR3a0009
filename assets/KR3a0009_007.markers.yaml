  - {type: variant, offset: 252, length: 0, content: '', WYG: 靈乆矣非一朝一夕也祕曰天下叛秦秦䘮其社稷之靈已乆矣光曰天下怨怒莫為之用韓信黥布皆劔立南面稱孤卒窮時戮無乃勿乎窮極咸曰卒盡也言當是之時韓信方為漢黥布方為楚其鋒鋩如劔之立而秦欲再起南面稱孤以盡窮時戮無乃不可乎勿猶不也言不可也祕曰時是也韓信封楚王黥布姓英氏封淮南王二玉皆無其徳徒以戰鬭立功使左右劔立南面稱孤終窮於是而見戮無乃勿為王其愈乎劉昭曰自天子至於庶人咸皆帯劔故蕭何劔履上殿是也光曰信布以匹夫杖劔自立雖蹔貴而祸辱随之不若始者勿為或曰勿則無名如何咸曰言不然則為秦臣者無功名如何曰名者謂令名也祕曰夫貴名者善名也忠不終而躬逆焉攸令咸曰令善也焉安也言所謂名者宜立善名也當此之時欲效其忠以為秦且忠未盡而身已見害為之逆矣安可謂善哉祕曰二王皆忠不終而躬為反逆焉有令名或問淳于越曰伎曲咸曰淳于越齊人為秦博士謂始皇曰殷周之王千餘歲封子弟功臣自為枝輔今陛下有海内而子弟為匹夫卒有田常六卿之臣無輔拂何以救哉事不}
  - {type: page-break, offset: 252, content: '', id: KR3a0009_WYG_007-12a, image: WYG0696/WYG0696-0329c.png}
