  - {type: variant, offset: 953, length: 0, content: '', WYG: 褒貶彰矣光曰品第善惡藻餙其事太史遷曰實録不虚美不隠惡咸曰遷採春秋尚書國語戰國䇿而作史記其議事甚多䟽略未盡品藻之善故揚雄稱實録而已盖言但能實録傳記之事也祕曰本傳曰自劉向揚雄博極羣書皆稱遷有良史之材服其善序事理辯而不華質而不俚其文直其事核不虚美不隠惡故謂實録盖言其序事而已光曰記事而已揚子}
