  - {type: variant, offset: 140, length: 1, content: 辯, SBCK: 德而今隕之者明乎秦楚忒惡之所致昔在有熊髙陽髙辛唐虞三代咸有顯懿故天胙之爲神明主且著在天庭是生民之願也厥饗國乆長神明主主郊祀若秦楚強䦧震撲胎藉三正播其虐於黎苗子弟且欲喪之況於民乎況於􅀑神乎廢未速也不道早亡或問仲尼大聖則天􅂚不胙胙主曰無土言無土地可因然則舜禹有土}
