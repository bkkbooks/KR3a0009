  - {type: variant, offset: 107, length: 27, content: 迷識也如賢人謀之美也詘人而從道如小人謀之不美也詘道而從, SBCK: 負負敗天􅂚故焉言無私親惟應善}
  - {type: variant, offset: 107, length: 2, content: 迷識, WYG: 無能違也咸曰漢洛下閎鮮于妄人耿夀昌算造圓儀以考厯度蔡邕云名天體者有三家一曰周髀二曰宣夜三曰渾天宣夜之學絶無師法周髀術數具存考騐天狀多所違失政令官不用惟渾天者近得其情今史官所用候䑓銅儀則其法也揚子作太𤣥亦取象於渾天言渾淪而行故此明渾天之法莫之能違也光曰宋吴本作幾幾乎今從李本光謂象之謂作渾天儀請問蓋天欲知蓋天圖也咸曰蓋天即周髀也其本庖羲氏立周天厯度其所傳則周公受之於商而周人志之故曰周髀言天似蓋笠地法覆槃天地各中髙外下北極之下為天地之中曰蓋哉蓋哉應難未㡬也再言蓋哉者應難以事未有近其理也光曰難乃旦反或問趙世多神何}
  - {type: page-break, offset: 107, content: '', id: KR3a0009_WYG_007-3a, image: WYG0696/WYG0696-0325a.png}
