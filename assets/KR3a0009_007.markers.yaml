  - {type: variant, offset: 242, length: 1, content: 識, WYG: 歸一方當此之際設令秦尚有人復起如何也祕曰龕宜讀如戡戡克也假若義帝如初矯立而使劉漢戡定南陽項羽得救河北二方爭戰一離一合設使秦尚得人以闗中待之如何義帝楚懐王孫心也沛公項梁共立之以從民望是矯也漢王始都南鄭屬山南西道而連南陽在山南東道項羽都彭城屬河南道而連河北道或人以}
