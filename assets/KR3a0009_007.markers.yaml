  - {type: variant, offset: 225, length: 1, content: 曼, WYG: 具備有之也祕曰天數人事相符黙定周建子弟列名城班五爵流之十二當時雖欲漢得乎咸曰言周以公侯伯子男五等爵封建子弟者十有二國故夾輔王室而無患雖欲擅漢不可得也祕曰周封兄弟之國十五人姬姓之國四十人班五等諸侯之爵曁乎周末諸侯流為十二國當}
  - {type: variant, offset: 225, length: 1, content: 曼, krp: 具備有之也祕曰天數人事相符黙定周建子弟列名城班五爵流之十二當時雖欲漢得乎咸曰言周以公侯伯子男五等爵封建子弟者十有二國故夾輔王室而無患雖欲擅漢不可得也祕曰周封兄弟之國十五人姬姓之國四十人班五等諸侯之爵曁乎周末諸侯流為十二國當}
