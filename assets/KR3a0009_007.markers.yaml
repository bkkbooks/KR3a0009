  - {type: variant, offset: 221, length: 1, content: 奚, WYG: 或問嬴政二十六載天下擅秦嬴秦姓政始王名咸曰始皇莊㐮王子也莊㐮王卒政立為秦王當是之時秦地已并巴蜀漢中越宛有郢北收上郡以東河東太原上黨郡東至榮陽滅二周置三川郡矣至二十六年使將軍王賁從燕南攻齊得齊王建始并天下故云二十六載擅秦也秦十五載而楚楚項羽咸曰始皇自并天下後十二年卒胡亥立三年為趙髙閻樂所殺子嬰立四十六日而項羽號西楚覇王故云十五載而楚楚五載而漢咸曰項羽為西楚覇王主命分天下後五年而定歸於漢故云五載而漢五十載之際而天下三擅天邪人邪咸曰言自始皇并天下至漢髙祖元年纔四十六年而天下三專於人}
