  - {type: variant, offset: 416, length: 0, content: '', WYG: 婢圍捕之而無實反獲其罪也或問持滿曰㧖欹欹器在魯桓公廟者欲人推心當如此器戒之咸曰㧖抑也猶抑損之也言持滿者當自抑損以正其欹不然則覆矣祕曰㧖亦持也魯桓公之廟有欹器曰宥坐之器虚則欹中則正滿則覆持滿盈如持欹器也光曰李本無欹字今從宋吴本㧖於革切楊王孫倮𦵏以矯世悼厚葬也祕曰楊王孫孝武時人學黄老之術報祈侯曰盖聞古之聖王緣人情不忍其親故為制禮今則越之吾是以倮葬将以矯世也光曰倮郎果切曰矯世以禮祕曰若用過乎儉喪􅂈乎哀倮乎如矯世則葛溝尚矣古者未知喪送之禮死則褁尸以葛投諸溝壑若王孫之矯世此事復尚為之矣言不可行也孝子仁人必有道以掩其親賢人}
