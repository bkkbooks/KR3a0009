  - {type: variant, offset: 237, length: 2, content: 呱呱, krp: 光曰為天主號令秦縊㶚上楚分江西興廢何速也典主咸曰言秦雖兼天下楚雖暴立但為天掌其命以擇賢主爾故其興之忽廢之速也秦縊㶚上者謂沛公十月至㶚上子嬰係頸以組而降也故謂之縊楚分江西者分散也羽與江東子弟興兵卒敗于垓下以江東言之故謂之西也光曰分謂身首五分曰天胙光徳而隕明忒天之所福光顯有徳而令隕之者明乎秦楚忒惡之所致祕曰昭徳者天福胙之令長彰惡者天隕越之令短光曰胙與祚同忒當作慝惡也光徳謂徳之昭融者明慝謂惡之顯著者昔在有熊髙陽髙辛唐虞三代咸有顯懿咸曰有熊少典}
