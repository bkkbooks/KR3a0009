  - {type: variant, offset: 294, length: 2, content: 司馬, WYG: 季布忍焉可為祕曰季布楚人也項籍使將兵數窘漢王項羽滅髙祖購求千金困廹乃為奴賣與魯朱家光曰季布勇者乃至髠鉗為奴安能忍耻如此曰能者為之明哲不為也言能忍辱貪生者乃為之祕曰進退必以禮義光曰有才能自惜其死欲有所施如管仲季布者則為之君}
