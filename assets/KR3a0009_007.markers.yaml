  - {type: variant, offset: 255, length: 1, content: 精, WYG: 能長乆者非所聞也此問越之道如何而揚以為伎曲言有伎有曲也請問咸曰問伎曲之目曰始皇方虎挒而䲷磔噬士猶腊肉也越與亢眉終無橈辭可謂伎矣有才伎也咸曰虎挒䲷磔言暴也噬士猶腊肉言酷也興起也當是時始皇暴酷如此而越敢起而亢舉其眉以言封建之事其辭不橈可謂有才伎也光曰宋吴本越與作越興今從李本挒音列磔陟格切橈女教切闕仕無妄之國祕曰按易無妄其乾道四徳而秦世稱之者蓋無妄匪正也言秦不以正道而决行於世詎免乎災𤯝若天下雷行而不以正道天命不祐行矣哉食無妄之粟分無妄之橈自令之間而不違可謂曲矣橈時榮也自令與始皇併心為無道咸曰橈亂也自令謂自使令也違去也言秦亡道如是而越自使令之間不能違去於秦以髙飛逺引徒欲分觧其亂雖能强言封建之事亦曲矣祕曰越事秦暴虐必行之國禄其粟受其亂自始皇下令之間又不能違而去}
