  - {type: variant, offset: 232, length: 0, content: '', WYG: 英才右計左數言不離計數之中天不人不因人不天不成天人合應功業乃隆祕曰天命因其人而興之其人非受天命亦無所成天命天數皆天也書曰天之厯數在汝躬詩曰周雖舊邦其命惟新光曰天之禍福必因人事之得失人之成敗必待天命之與奪或問楚敗垓下方死曰天也項羽為髙祖所敗於垓下臨死歎曰天}
