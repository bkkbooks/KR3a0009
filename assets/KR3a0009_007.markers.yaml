  - {type: variant, offset: 4, length: 1, content: 七, SBCK: 十眞僞美惡成敗存亡人君之所以御乎其下人臣之所以事乎其上不可以不察也明此以南面堯之爲君也明此以北面舜之爲臣地李軌注或問南正重司天北正黎司地今何僚也司主也僚官也少皥氏衰九黎亂德帝顓頊命重黎主天地也曰近羲近和堯有羲和之官王莽時亦復立焉聖王之立重黎羲和考其所以重黎羲和耳非莽所立也孰重孰黎曰羲近重和近黎羲主陽和主隂故云耳或問黃帝終始丗有黃帝之書論終始之運當孝文之時三千五百歳天地一周也曰託也假黄帝也昔者姒氏治水土而巫歩多禹姒氏禹也治水土渉山川病足故行跛也禹自聖人是以􅀑神猛獸蜂蠆蛇虺莫之螫耳而俗巫多效禹歩扁鵲盧人也而醫多盧太山盧人夫欲讎僞者必假眞讎􅀋禹乎盧乎終始乎言皆非也於是捨書而歎曰深矣揚子之談也王莽置羲和之官故上章􅀉微言以發重黎之問而此句明言眞僞之分也或問渾天曰落下閎營之鮮于妄人度之耿中丞象之幾乎幾乎莫之能違也幾近也落下閎爲武帝經營之鮮于妄人又爲武帝筭度之耿中丞名壽昌爲宣帝考象之言近近其理矣談天者無能違逺也請問蓋天欲知蓋天圖也曰蓋哉蓋哉應難未幾也再言蓋哉者應難以事未有近其理者或問趙丗多神何也如簡子之事非一故問之曰神怪茫茫若存若亡聖人曼云子不語怪力亂神或問子胥種蠡孰賢曰胥也俾吴作亂破楚入郢郢楚都也鞭尸掘平王墓而鞭其尸藉館君舎君之室大夫舎大夫之室皆不由德報父兄之恥於斯則無禮謀越諫齊不式式用不能去三諫不從於禮可去卒眼之夫差伐越越棲㑹稽請委國爲臣子胥諌曰吴不取越越必取吴又曰有吴無越有越無吴不改是矣吴將伐齊又諌日兵疲於外越必襲吴不聽遂伐齊反役夫差殺之將死曰吴其亡矣乎以}
