  - {type: variant, offset: 6, length: 2, content: 寡見, SBCK: 眼置吴東門以􅀚越之滅吴種蠡不強諫而山棲俾其君詘社稷之靈而童僕又終弊吴賢皆不足邵也邵美至蠡䇿種而遁肥矣哉美蠡功成身退於此一舉最爲善或問陳勝吴廣曰亂此􅁀亂之人也曰不若是則秦不亡曰亡秦乎恐秦未亡而先亡矣夫有干越之劒者匣而藏之不敢用是寳之之至也況乃輕用其身而要乎非命之運不足爲福先適足以爲禍始或問六國並其巳乆矣一病一瘳迄始皇三載而咸皆屬秦也時激地保人事乎曰具請問事曰孝公以下強兵力農以􅁞食六國事也是人事也保問保何等曰東溝大河南阻髙山西采雍梁北鹵涇垠便則申否則蟠保也采食稅也涇涇水也激問激者何曰始皇方斧將相方刀六國方木將相方肉激也方比或問秦伯列爲侯衞在外候望羅衞天子卒吞天下而􅎼曽無以制乎曰天子制公侯伯子男也庸節庸用也節節度也節莫差於􅆫􅆫莫重於􅀕􅀕莫重於地地莫重於天旣盜土地又盜􅀕天則襄文宣靈其兆也始於四公以來者言周之衰非一朝一夕矣昔者襄公始􅆫西畤以祭白帝文宣靈宗興鄜密上下用事四帝而天王不匡反致文武胙宗尊也文公起鄜畤宣公起密畤靈公起上下畤是以四疆之内各以其力來侵攘肌及骨而􅎼獨何以制秦乎}
