  - {type: variant, offset: 267, length: 2, content: 彫美, WYG: 能用也信文帝不能用乎光曰頗滂禾反曰彼將有激也親屈帝尊以信亞夫之軍至頗牧曷不用哉祕曰唐知雲中守魏尚擊匈奴有坐欲以激文帝耳至于不入細柳信亞夫之軍豈不能用頗牧哉光曰信與申同面謂面折徳用士則聞之矣於徳又何如光曰問文帝之徳曰罪不孥止罪其身不收入妻拏宮不女出宮人嫁之令無怨曠館不新仍舊制也陵不墳葬於霸陵因山不起墳或問交曰仁祕曰仁者不棄其交光曰惟仁人之交不以利勢而以徳義問餘耳陳餘張耳曰光初有始無終祕曰餘耳相與為刎頸之交後有隙卒相滅亡故曰光初班固曰勢利之交古人羞之盖謂是矣竇灌曰凶終竇嬰灌夫甚相親友不勝相助犯觸田蚡並皆罹禍光曰竇嬰灌夫之交雖不變其初然終以朋黨陷於大戮亦不足貴也君子義之與比或問信曰不食其}
