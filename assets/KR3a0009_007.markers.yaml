  - {type: variant, offset: 205, length: 0, content: '', WYG: 然後已藉館舍室也各舍楚君大夫之室光曰藉兹夜切皆不由徳報父兄之耻於斯則無禮祕曰自俾吴作亂至藉館皆志在自報其讎非由徳者也謀越諫齊不式式用不能去三諫不從於禮可去卒眼之夫差伐越越棲㑹稽請委國為臣子胥諫曰吴不取越越必取吴又曰有吴無越有越無吴不改是矣吴將伐齊又諌曰兵疲於外越必襲吴不聼遂伐齊反役夫差殺之將死曰吴其亡矣以吾眼置吴東門以觀越之滅吴種蠡不彊諫而山棲光曰責其不彊諫於未敗至使勾踐棲於㑹稽俾其君詘社稷之靈而童僕祕曰越三年勾踐聞吴王夫差日夜勤兵將報越欲先吴未至徃伐之范蠡諫以為未可而勾踐不聴遂興師吴王聞之發精兵擊越敗之夫椒越王乃以餘兵五千人保棲㑹稽之山吴王追而圍之勾踐乃令大夫種行成於吴膝行頓首請與妻為臣妾吴王聴太宰嚭之言遂許之卒赦越罷兵而歸言蠡初諫不從二臣盍强諫而免此敗又終弊吴祕曰勾踐後用范蠡計果大敗吴遂復棲吴王於姑蘇之山吴王使公孫雄肉􅃝膝行請成於越勾踐欲許之范蠡諫以為不可吴王夫差遂自殺賢皆不足邵也邵美祕曰三子之從師無名焉若以賢者議之俱不足髙也至蠡策種而遁肥矣哉美蠡功成身退於此一舉最為善祕曰范蠡旣去越乘舟浮海以行終不反自齊遺大夫種書種見書稱病不朝人或讒之越王乃賜種劔種遂自殺言蠡遺種書知越王可與共患難不可與共樂而遯於賢則不足可以合肥遯之義耳在易遯之上九曰肥遯旡不利光曰䇿謂警之使去賢此一節或問陳勝吴廣曰亂此暴亂之人也光曰言非有髙材逺慮但首亂之人耳曰不若是則秦不亡曰亡秦乎恐秦未亡而先亡矣夫有干越之劔者匝而藏之不敢用是寶之至也况乃輕用其身而要乎非命之運不足為福先適足以為禍始祕曰言為權首者先亡也范曄曰夫為權首鮮或不及陳項且猶未興况庸庸者乎或問六國並其已乆矣一病一瘳迄始皇三載而咸皆屬秦也祕曰韓魏燕趙齊楚之六國並立其乆矣一盛一衰至秦始皇三載而咸按始皇即位以}
