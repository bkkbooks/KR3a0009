  - {type: variant, offset: 415, length: 1, content: 侍, SBCK: 持滿曰扼扼欹器在魯桓公廟者欲人推心當如此器戒之揚王孫倮葬以矯丗悼厚葬也事見漢書曰矯丗以禮倮乎如矯世則葛溝尚矣古者未知葬送之禮死則裹之以􅁑投諸溝壑若王孫之矯丗此事復尚爲之矣言不可行也孝子仁人必有道以掩其親賢人}
  - {type: variant, offset: 415, length: 0, content: '', WYG: 臣自得咸曰忠而正乃臣之自得也祕曰何以全臣之節曰祕曰揚恐不諭舉其人以明之石太僕之對金將軍之謹張衛將軍之善慎邴大夫之不伐善丞相石慶嘗為太僕時上問輿中馬幾匹太僕以策數之畢對曰六匹金将軍日磾為人謹慎目不逆視數十年張衛将軍名安世為人周宻重慎丞相邴吉宣帝少時以巫蠱事嘗在獄中吉嘗救䕶又養視有恩絶口終不言官至御史大夫乳母述之然後乃知封博陽侯請問臣自失咸曰邪而私乃臣之自失也曰李貳師之執二田祈連之濫帥韓馮翊之愬蕭趙京兆之犯魏貳師将軍李廣利說劉屈氂立昌邑王為太子二心不端武帝疑之遂降匈奴祈連将軍田廣名為宣帝擊匈奴不利質滛婦人也韓馮翊名延夀愬御史大夫蕭望之與廩犠為姦而焚其廪也趙京兆名廣漢疑魏丞相夫人殺}
