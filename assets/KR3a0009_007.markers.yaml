  - {type: variant, offset: 260, length: 0, content: '', WYG: 說請有文學詩書百家語有蠲除去之令到滿三十日弗去黥為城旦橈亂也或本作鮑光曰並闕或問茅焦歴井幹之死使始皇奉虚左之乗始皇以嫪毐事幽母咸陽宮諫者輙取於井幹闕下茅焦歴井幹之上而諫始皇即駕與執轡虚左親迎其母蔡生欲安項咸陽不能移又亨之或者未辯歟項羽欲東還下邳蔡生說使都咸陽旣不能移又為所亨案漢書云韓生揚子云蔡生未知孰是咸曰亨當作烹字之誤也言韓生說羽旣不能移又為羽所烹殺也未辯者言韓生未能善辯使其都咸陽以免其殺光曰幹音韓乘繩證切亨與烹同音義曰史記作蔡生光謂井幹謂始皇殺諫者二十七人積屍闕下如井幹之狀言茅焦能移始皇暴怒之意者以其辯也蔡生不能移項羽或者未辯歟曰生捨其木侯而謂人木侯亨不亦宜乎咸曰生謂韓生也木侯當作沐猴亨亦當作烹也項羽旣殺子嬰燒其宫室收寳貨婦女而東韓生說羽曰闗}
