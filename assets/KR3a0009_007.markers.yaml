  - {type: variant, offset: 218, length: 0, content: '', SBCK: 而韋􅀇讓一家於是乎賢耳亦猶論德行稱顔淵閔子騫冉伯牛仲弓凡此數子豈必}
  - {type: variant, offset: 218, length: 0, content: '', WYG: 乃稱皇帝今言始皇三載而咸者盖言稱皇帝後三年東行郡縣上鄒嶧山刻石頌秦功徳封泰山禪梁父而天下咸一也光曰按始皇十七年始滅韓至二十六年滅齊天下為一今云三載闕時激地保人事乎祕曰時可取以激之乎保地勢以全之乎修人事以得之乎光曰激當作徼古堯切徼其可取之時曰具咸曰具備也言三事備有請問事咸曰問三事之目祕曰問人事曰孝公以下彊兵力農以蠶食六國事也祕曰戰國之時不修農政秦自孝公用啇鞅變法修刑務耕稼勸戰死之賞罰於是遂强而蠶食六國修人事之効也保祕曰問地保曰東溝大河南阻髙山西采雍梁北鹵涇垠便則申否則蟠保也采食稅也涇涇水也咸曰賈誼云秦孝公據殽函之固擁雍州之地君臣固守以闚周室有席卷天下并吞八荒之心故慿此險固事便則可申之以取天下未便則蟠屈以堅守是亦有地保之道也祕曰東以大河為溝塹南以商山為險阻西以雍梁二州為供事北以涇水之垠為鹵地勢便則申勢否則屈此地保也采事也書曰百里采孔云供王事而已光曰宋吴本髙山作商山今從李本梁州蜀地也鹵掠也涇垠謂義渠掠其畜食以自資激祕曰問時激曰始皇方斧將相方刀六國方木將相方肉激也方比咸曰賈誼云始皇執敲朴以鞭笞天下言易也此云六國方木將相方肉者言六國與將相之勢方如木肉而始皇與將相之威方如斧刀故以斧刀而伐木肉亦易之矣此亦時激之道也光曰始皇欲斵喪諸侯方如斧而諸侯愚昧方如木秦之將相銳於功利方如刀而諸侯將相懦弱方如肉故始皇所以能兼天下者適丁是時也或問秦伯列為侯衛在外侯望羅衛天子咸曰秦伯謂秦㐮公也周平王東遷秦㐮公始列為諸侯卒吞天下而赧曾無以制乎咸曰赧周赧王也言秦自㐮公始為諸侯由孝公以來益彊至始皇六世卒吞二周而并天下盖非一朝一夕之故何赧王曾無畫以制之乎光曰赧奴板切侯衛畧舉九服逺近曰天子制公侯伯子男也庸節庸以也節度也咸曰庸用也言天子用禮節以制馭五等諸侯各有其序節莫差於僣咸曰言五等之禮各有序不可僣禮之差失者莫大於僣僣莫僣於祭咸曰僣之大者莫大於僣祭祀祭莫重於地地莫重於天旣盗土地又盗祭天祕曰天子得祭天地則㐮文宣靈其兆也始于四公以來者言周之衰非一朝一夕祕曰僣兆已見昔者㐮公始僣西畤以祭白帝光曰畤音止文宣靈宗興鄜宻上下用事四帝光曰鄜芳無切而天王不匡反致文武胙宗尊也文公起鄜畤宣公起宻畤靈公起上下畤咸曰秦㐮公居西垂自以為主少昊之神作西畤祠白帝文公東獵汧渭之間卜居之而吉夢黄蛇自天下屬地其口上於鄜衍史敦曰此上帝之祥君其祠之遂作鄜畤也至宣公作宻畤於渭南祭青帝也其後靈公作吴陽上畤祭黄帝作下畤祭炎帝也此言秦自㐮公以來因周之衰已僣天子之禮用事於白帝青帝黄帝炎帝四帝矣而周之微弱不能正之反致文王武王膰胙於秦也故太史公曰秦雜戎狄之俗位在藩臣而據於郊祀君子懼焉如是則制公侯伯子男之禮何節之有哉光曰宋吴本天王作天下今從李本是以四疆之内各以其力來侵攘肌及骨咸曰肌喻逺骨喻近言當是之時周已衰極諸侯強大四境之内各以兵力來侵逺削而至於近矣赧獨何以制秦乎人之迷也其日固已乆矣數世之壊非一人之所支也咸曰周自平王下衰加之嬴秦累世强暴至始皇卒滅之所謂大樹將顛非一繩所維豈赧王可制乎祕曰周平王東遷秦僣天子之禮至顯王四十四年秦惠王稱王其後諸侯}
