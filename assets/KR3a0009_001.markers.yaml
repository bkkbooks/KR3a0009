  - {type: variant, offset: 706, length: 0, content: '', krp: 咸曰書謂諸傳記之書猶論語孝經爾雅荀孟之類經謂五經也言此等書宗道與經所同也}
  - {type: variant, offset: 707, length: 0, content: '', WYG: 世不尚咸曰漢文帝以論語孝經孟子爾雅皆置博士後罷傳記博士獨立五經博士列學科而已論語爾雅荀孟之類末也故云}
