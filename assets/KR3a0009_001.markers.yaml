  - {type: variant, offset: 260, length: 0, content: '', SBCK: 言諸賢之有妙藝猶百川之有四瀆衆山之有五嶽而川可度嶽可登髙而且大者惟聖人之道如天不可􅂛也}
  - {type: variant, offset: 260, length: 0, content: '', WYG: 言諸賢之有妙蓺猶百川之有四瀆衆山之有五嶽而川可度嶽可登髙而且大者惟聖人之道如天不可升也咸曰觀正文之意當云髙而且大者衆人所不能踰也脱其不字矣何以名之或人問般羿周孔之名如一揚以川冇瀆山有嶽而對之是謂般羿之徒猶川山周孔之道猶嶽瀆自然小大不同髙低有異矣故下篇亦云仲尼之道猶四瀆也由是詳之揚之㫖皆以嶽瀆比聖人明矣註不能辨但依誤文以為之解反謂聖人之道如天不可升且正文安有如天之説哉儻謂揚此文以嶽瀆為易踰不足方聖人則下文以仲尼比四瀆為非矣揚豈首尾自相反如是邪祕曰周孔顔子之道如山川之有嶽瀆豈曰處一而已羿逢䝉良般之蓺如山川髙而且大者甚衆人所能踰也光曰呉宋本作衆人所能踰音義曰俗本脱不字諸本皆有今從之}
  - {type: page-break, offset: 260, content: '', id: KR3a0009_WYG_001-5a, image: WYG0696/WYG0696-0276a.png}
  - {type: variant, offset: 260, length: 0, content: '', krp: 言諸賢之有妙蓺猶百川之有四瀆衆山之有五嶽而川可度嶽可登髙而且大者惟聖人之道如天不可升也咸曰觀正文之意當云髙而且大者衆人所不能踰也脱其不字矣何以名之或人問般羿周孔之名如一揚以川冇瀆山有嶽而對之是謂般羿之徒猶川山周孔之道猶嶽瀆自然小大不同髙低有異矣故下篇亦云仲尼之道猶四瀆也由是詳之揚之㫖皆以嶽瀆比聖人明矣註不能辨但依誤文以為之解反謂聖人之道如天不可升且正文安有如天之説哉儻謂揚此文以嶽瀆為易踰不足方聖人則下文以仲尼比四瀆為非矣揚豈首尾自相反如是邪祕曰周孔顔子之道如山川之有嶽瀆豈曰處一而已羿逢䝉良般之蓺如山川髙而且大者甚衆人所能踰也光曰呉宋本作衆人所能踰音義曰俗本脱不字諸本皆有今從之}
