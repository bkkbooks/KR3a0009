markers:
  front:
  - {type: variant, offset: 0, length: 5, content: 學行卷第一, SBCK: ''}
  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書揚子法言卷一晋李軌唐栁宗元註宋宋咸呉祕司馬光重添註雄見諸子各以其知舛馳顔師古曰舛相背大氐詆訾聖人即為怪迂析辯詭辭以撓世事顔曰大氐大歸也詆訾毁也迂逺也析分也詭異也言諸子之書大歸皆非毁周孔之敎為巧辯異辭以攪亂時政也訾音紫迂音于撓火髙反其字從手光曰光謂氐下脱不字雖小辯終破大道而或衆使溺於所聞而不自知其非也及太史公記六國歴楚漢訖麟止不與聖人同是非頗謬於經故人時有問雄者常用法應之譔以為十三卷顔曰譔與撰同象論語號曰法言}
  - {type: page-break, offset: 0, content: '', id: KR3a0009_WYG_001-1a, image: WYG0696/WYG0696-0274a.png}
  - {type: page-break, offset: 0, content: '', id: KR3a0009_WYG_001-1b, image: WYG0696/WYG0696-0274b.png}
  - {type: variant, offset: 0, length: 0, content: '', krp: 欽定四庫全書揚子法言卷一晋李軌唐栁宗元註宋宋咸呉祕司馬光重添註雄見諸子各以其知舛馳顔師古曰舛相背大氐詆訾聖人即為怪迂析辯詭辭以撓世事顔曰大氐大歸也詆訾毁也迂逺也析分也詭異也言諸子之書大歸皆非毁周孔之敎為巧辯異辭以攪亂時政也訾音紫迂音于撓火髙反其字從手光曰光謂氐下脱不字雖小辯終破大道而或衆使溺於所聞而不自知其非也及太史公記六國歴楚漢訖麟止不與聖人同是非頗謬於經故人時有問雄者常用法應之譔以為十三卷顔曰譔與撰同象論語號曰法言}
  body:
  - {type: variant, offset: 2, length: 3, content: 卷第一, WYG: 篇咸曰自誠而明聖人而已明誠以降何嘗不由乎學故此所以首衆篇光曰行讀如字凡書中好惡長少難易相将使令說樂焉邪之類兩音易辯者惟於始見音之後可以意求不復再出或可疑則更音之天降生民倥侗顓蒙倥侗無知也顓䝉頑愚也祕曰倥侗未有所成顓固而䝉昧也尤曰倥音空侗音同又音通顓與專同恣于情性觸意用事聰明不開闇塞之謂祕曰不能性其情則聰明有所蔽訓諸理訓導咸曰理猶道也言天民蠢闇故敎諸道以開明之也祕曰於是聖人貴學乃訓以仁義禮智信之正理譔}
  - {type: page-break, offset: 2, content: '', id: KR3a0009_WYG_001-2a, image: WYG0696/WYG0696-0274c.png}
