  - {type: variant, offset: 341, length: 0, content: '', SBCK: 桐洞也桐子洞然未有所知之時制命於師也再言之者歎爲人師制人善惡之命不可不明愼也}
  - {type: variant, offset: 341, length: 0, content: '', WYG: 桐洞也桐子洞然未有所知之時制命於師也再言之者歎為人師制人善惡之命不可不明慎也咸曰桐當為侗字之誤也雄自序學行云空侗顓䝉此曰侗子者取是義也不當作桐木之桐註依誤文訓為洞無所據焉祕曰此章言學為王者之事須師道之訓以正㓜主之命也歎而言之重其事也桐子太甲也太甲太丁之子既立不用伊尹之訓伊尹放之桐三年悔過處仁遷義以聽其訓已歸亳復政百姓以寧書曰既往背師保之訓是也伊尹指師哉太甲言桐子者蓋當王莽輔孺子嬰之世其辭文其㫖逺也孝至篇曰勤勞則過於阿衡皆其類歟光曰桐當為侗音同又音通侗未成器之人也}
