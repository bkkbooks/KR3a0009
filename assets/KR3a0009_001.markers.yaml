  - {type: variant, offset: 162, length: 0, content: '', WYG: 肖類也蜾蠃遇螟􅘾而受化久乃變成蜂爾七十子之類仲尼又速於是咸曰螟􅘾桑蟲也蜾蠃蒲蘆也桑蟲子始生而蒲蘆取之於木空中七日祝而化之以變為己子殪者謂其始生未有形性殪然如死故始可以祝而變之祕曰詩草木疏云螟􅘾桑上青蟲蜾蠃細腰蜂言螟􅘾與蜾蠃異類殪而祝之以成其子矧仲尼之聖七十子之賢教而誨之豈不速哉光曰螟音冥􅘾音零蜾音果蠃郎果切祝之又切}
