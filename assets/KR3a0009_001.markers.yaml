  - {type: variant, offset: 688, length: 0, content: '', SBCK: 奚斯魯僖公之臣也慕正考甫作魯頌}
  - {type: variant, offset: 688, length: 0, content: '', WYG: 奚斯魯僖公之臣慕正考甫作魯頌祕曰正考甫商頌蓋美禘祀之事而魯大夫公子奚斯能作僖公之廟亦睎詩之教也而魯頌美之曰松桷有舄路寝孔碩新廟奕奕奚斯所作光曰揚子以謂正考甫作商頌奚斯作閟宫之詩故云然如}
  - {type: variant, offset: 688, length: 0, content: '', krp: 奚斯魯僖公之臣慕正考甫作魯頌祕曰正考甫商頌蓋美禘祀之事而魯大夫公子奚斯能作僖公之廟亦睎詩之教也而魯頌美之曰松桷有舄路寝孔碩新廟奕奕奚斯所作光曰揚子以謂正考甫作商頌奚斯作閟宫之詩故云然如}
