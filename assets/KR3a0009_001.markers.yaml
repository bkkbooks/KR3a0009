  - {type: variant, offset: 227, length: 0, content: '', WYG: 咸曰言孔不習周顔不習孔亦猶夫羿棄弓良去䇿般擲斧而習之也誰曰非乎言實非也祕曰羿與逢蒙業射者也王良業御者也公輸般業巧者也聖人有教無類使射御工巧各捨其業而時習之誰其非之光曰音義曰逢薄紅切般音班按它書逢䝉或作蠭䝉宜讀如字三子皆以其術名於世則其才必有過人者鄉使捨其術而習聖人之道烏有不可也}
