  - {type: variant, offset: 728, length: 0, content: '', SBCK: 射以決科經以䇿試今徒治同經之書而不見䇿用故􅀏之}
  - {type: variant, offset: 728, length: 0, content: '', WYG: 射以决科經以䇿試今徒治同經之書而不見䇿用故笑之祕曰漢之明經必為難問疑義書之於䇿量其大小著為甲乙之科列而置之不使彰顯有欲射者隨其所取得而釋之故曰須以發䇿决科而同經無所施焉是以笑之其當時五經列于學科者易則施孟梁邱京氏書則歐陽大小夏侯氏詩則齊魯韓禮則大小戴慶氏春秋則公糓王莽置周官博士餘不在焉光曰啞於革切}
