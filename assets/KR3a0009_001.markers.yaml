  - {type: variant, offset: 792, length: 0, content: '', WYG: 咸曰參辰二星名晋史董因曰公子重耳以辰出而參入言重耳以驪姬之難出晋當辰於外十九年入晋當參也以參辰出没不相比列而重耳象之終免其禍得出處之正故君子不器乃遷善之法也禮曰安安而能遷鄭康成曰舅犯與姜氏醉重耳而行近之是多其可遷則遷為遷善之義也遷善也者聖人之徒歟祕曰參辰二星不並見猶善惡二途不同迹是以君子貴捨惡而}
