  - {type: variant, offset: 87, length: 0, content: '', WYG: 金寳其口木質其舌傳言如此則是仲尼常在矣宗元曰金口木舌鐸也使諸儒駕孔子之説如木鐸也祕曰金口木舌鐸也後世如将復駕仲尼之説則莫如使諸儒比木鐸而宣揚之也語曰天将以夫子為木鐸書曰每嵗孟春遒人以木鐸徇于路孔安國曰木鐸金鈴木舌所以振文教光曰復扶又切}
