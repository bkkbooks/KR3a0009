  - {type: variant, offset: 678, length: 0, content: '', SBCK: 正考甫宋襄公之臣也尹吉甫周宣王之臣也吉甫作周頌正考甫慕之而作商頌}
  - {type: variant, offset: 678, length: 0, content: '', WYG: 祕曰正考甫宋宣公之上卿尹吉甫周宣王之卿士尹吉甫深於詩教作大雅崧髙烝民之詩以美宣王正考甫慕之亦能得商頌十二篇以頌湯之盛徳昭公七年傳曰及正考父佐戴武宣}
  - {type: variant, offset: 678, length: 0, content: '', krp: 祕曰正考甫宋宣公之上卿尹吉甫周宣王之卿士尹吉甫深於詩教作大雅崧髙烝民之詩以美宣王正考甫慕之亦能得商頌十二篇以頌湯之盛徳昭公七年傳曰及正考父佐戴武宣}
