  - {type: variant, offset: 215, length: 4, content: 至蠡策種, WYG: 言不然則介鱗之類易我衣裳之民也光曰朱厓島夷故云介鱗君人者務在殷民阜財殷富阜盛明道信義光曰行義使民信之致帝者之用光曰極其事業成天地之化使粒食之民光曰粒食謂中國之民粲也晏也粲文采晏和柔祕曰粲然明盛晏然安和享于鬼神不亦饗乎實受其福祕曰民神之主也民之豐阜則神饗其祀也光曰此言王者不應疲弊中國與逺夷爭雄也天道勞功祕曰勞}
