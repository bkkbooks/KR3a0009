  - {type: variant, offset: 233, length: 0, content: '', WYG: 勞考載日一日猶日日也考成也載歲也曰功周而後始以成其歲故曰功光曰載事也天運行}
  - {type: variant, offset: 233, length: 0, content: '', krp: 勞考載日一日猶日日也考成也載歲也曰功周而後始以成其歲故曰功光曰載事也天運行}
  - {type: variant, offset: 234, length: 0, content: '', WYG: 息是其勞也成造化之事是其功也或曰君逸臣勞何天之勞言於人事則君逸臣勞也天為君四時行百物生以喻其勞也曰於事則逸於道則勞於事則逸無功可名於道則勞運轉機衡咸曰言人君之道各有其官已弗親之故於事則逸然修徳不暇日愈新之故於道則勞祕曰生萬物地也而天道則勞矣以其運行不息也理萬事臣也而君道則勞矣以其修省不暇也光曰天則無為自然而萬物生成君則垂衣端拱而百姓乂安是其事逸也天則隂陽徃來生生日新君則求賢訪道一日萬幾是其道勞也周公以來未有漢公之懿也勤勞則過於阿衡漢公王莽也或以此為媚莽之言或以為言遜之為也吾乃以為箴規之深切者也稱其漢公已前之美爾然則居攝之後不貶而惡可知也揚子所以𤣥妙也發至言於當時垂忠教於後世言蔽天地而無慚教闗百代而不耻何遜媚之有乎宗元曰阿衡之事不可過也過則反咸曰成王㓜太甲昏勢亦殆矣然周公居叔父之尊伊尹當阿衡之重二公可取而不取卒以忠勤復辟而正之夫舉其可取不取之因明其不可取而取之事則子雲之罪莾亦大矣祕曰自周公以來未有如王莽而謂之美也惟是折節力行勒勞之事則欲不止於阿衡明其簒也伊周聖人之居師保者漢公王莽也懿美也過謂不止也班固曰莽知漢中外殫微本末俱弱亡所忌憚生其姦心因母后之權假伊周之稱子雲因其假也故以伊周為言光曰法言之成蓋當平帝之世莽專漢政自比伊周欲興禮樂致太平上以惑太后下以欺臣民附已者進異已者誅何武鮑宣以名髙及禍故揚子不得不遜辭以避害也亦猶薛方云堯舜在上下有巢由也當是之時莽猶未簒人臣之盛者無}
