  - {type: variant, offset: 171, length: 0, content: '', krp: 如麟鳳之時儀儀然有義師師然衆盖其至也光曰儀儀師師皆和整尚徳之貌以喻徳服四夷螭虎桓桓仁少威多咸曰桓桓嚴也言王世以武勘禍亂嚴}
  - {type: variant, offset: 172, length: 6, content: 由德謀越諫齊, WYG: 失正鷹隼䎒䎒攫撮急疾咸曰䎒䎒暴也言彊霸之世專為兵詐暴而欲殘未至也未合至徳咸曰言桓桓䎒䎒比之帝世泰和則皆未至也祕曰非泰和之百官皆如螭虎鷹隼之時桓桓武貌䎒䎒然鷙飛貌於其道未至也光曰䎒財于側板二切􅁊􅁊武貌以喻用兵威服逺方或曰訩訩北夷光曰訩翔拱切又音凶訩訩喧嘵之貌被我純繢純繒繢畫光曰繢音㑹帯我金犀金金卯犀劔飾珍膳寕鍸寕鍸鍸其口也咸曰言安然而饗珍膳}
