markers:
  front:
  - {type: variant, offset: 0, length: 0, content: '', SBCK: 􅀭子法言孝至卷第十三始於學行而終於孝至始終之義人倫之事畢矣李軌注孝至矣乎將欲言其美所以歎其至一言而該聖人不加焉一言而孝兼該百行聖人無以加之是至德也父母子之天地與天縣象地載形父受氣母化成無天何生無地何形天地􅁉於萬物乎萬物􅁉於天地乎􅁉足也言萬物取足於天地天地不取足於萬物也􅁉父母之􅁉不􅁉矣養父母自以爲足者乃不足也事父母自知不足者其舜乎自知不足則是舜不可得而乆者事親之謂也孝子愛日舞須􅁷懈於心孝子有祭乎有齊乎祭嚴齊敬孝子之事夫能存亡形屬荒絶者惟齊也亡形復存荒絶復屬者謂祭如在故孝子之於齊見父母之存也是以祭不賔夫齊者交神明之至故致齊三日乃見其所爲齊者禮記之論齊備矣而發斯談者有􅁣乎時人人而不祭豺􅆩乎九月豺祭獸正月􅆩祭魚豺􅆩猶有所先人而不祭豺􅆩之不若也或問子曰死生盡禮可謂能子乎生事愛敬死事哀戚曰石奮石建父子之美也無是父無是子無是子無是父或曰必也兩乎曰與堯無子舜無父不如堯父舜子也必不得􅀟於斯二者當如堯之爲父舜之爲子子有含菽緼絮而致滋美其親將以求孝也人曰僞如之何含食也菽豆也曰假儒衣書服而讀之三月不歸孰曰非儒也或曰何以處僞曰有人則作無人則輟之謂僞觀人者審其作輟而巳矣視其所以觀其所由人焉廋哉不爲名之名其至矣乎太上以德自然之美非至如何爲名之名其次也力行近仁斯亦次矣或問忠言嘉謀曰言合稷契謂之忠謀合皐陶謂之嘉或曰邵如之何曰亦勗之而巳勗勉􅋻則秦儀鞅斯亦忠嘉矣庳下也此所以微言貶乎漢臣而爲王莽之將相者堯舜之道皇兮皇美夏殷周之道將兮將大而以延其光兮二帝三王光延至今或曰何謂也曰堯舜以其讓夏以其功平水土也殷周以其伐聖德同而禪伐異者隨時之義一也此又􅀉言以明其旨焉五君應乎天順乎人王莽違乎人逆乎天或曰食如螘言精細也衣如華服文彩也朱輪駟馬金朱煌煌無巳泰乎曰由其德舜禹受天下不爲泰言當理也不由其德五兩之綸半通之銅亦泰矣綸如青絲繩也五兩之綸半通之銅皆有秩嗇夫之印綬印綬之微者也言不由其德而佩此亦泰況可滔天乎天下通道五所以行之一五謂仁義禮智信也曰勉勉勵或曰力有扛洪鼎掲華旗智德亦有之乎曰百人矣此力百人便能敵之德諧頑嚚諧和也頑嚚舜父母讓萬國以禪禹也知情天地與天地合其德知􅀑神之情狀形不測百人乎人見其形而不能測其量非百人之倫也或問君曰明光問臣曰若禔若順也禔安也敢問何謂也曰君子在上則明而光其下在下則順而安其上明而光其下堯所以爲君也順而安其上舜所以爲臣也王莽之事漢則傾覆其上篡位居攝則􅁀亂其下也或曰聖人事異乎曰聖人德之爲事異亞之故常修德者本也見異而修德者末也本末不修而存者未之有也惑此之甚者必亡而巳矣天地之得斯民也得養育之本故能資生斯民也斯民之得一人也得資生之業是故係之一人也一人之得心矣一人之得統御天下者以百姓之心爲心吾聞諸傳老則戒之在得年彌髙而德彌邵者是孔子之徒與王莽少則得師力行老則詐僞篡奪故揚子寄微言而歎􅁣焉或問德有始而無終與有终而無始也孰寧曰寧先病而後瘳乎寧先瘳而後病乎病篡之深故有先瘳之喻或問大曰小問逺曰邇未達曰天下爲大治之在道不亦小乎道至微渺故曰小也四海爲逺治之在心不亦邇乎或問俊哲洪秀曰知哲聖人之謂俊深識聖義是俊傑也秀穎德行之謂洪禾之秀其穎猶人之洪其道也禾秀穎則實結人崇道則德聞洪大君子動則擬諸事事則擬諸禮事不來則不動動非禮則不擬或問羣言之長羣行之宗曰羣言之長德言也羣行之宗德行也或問泰和曰其在唐虞成周乎觀書及詩温温乎其和可知也發號出令而民􅀃之周康之時頌聲作乎下􅀜雎作乎上習治也齊桓之時緼而春秋美邵陵習亂也緼亦亂也故習治則傷始亂也傷悼習亂則好始治也好樂漢德其可謂允懷矣允信懷至黃支之南大夏之西東鞮北女來貢其珍漢德其可謂允懷矣丗鮮焉明此奕丗之所致而莽一旦行詐以取之荒荒聖德逺人咸慕上也荒荒大也武義璜璜兵征四方次也宗夷猾夏蠢迪王人屈國喪師無次也宗夷者四方羣夷也麟之儀儀鳯之師師其至矣乎螭虎桓桓仁少威多鷹隼䎒䎒攫撮急疾未至也未合至德或曰訩訩北夷􅀍我純繢純繒繢畫帶我金犀金金印犀劒飾珍膳寧餬寧餬餬其口也不亦享乎嫌禮胡如此太盛也曰昔在髙文武實爲兵主今稽首來臣稱爲北蕃是爲宗廟之神社稷之靈也可不享言如此不叮不以盛禮待之也龍堆以西白龍唯也大漠以北鳥夷獸夷鳥夷獸夷者衣鳥獸皮毛郡勞王師漢家不爲也皆在荒忽之外不爲郡屬者也若使勞王師而郡縣之漢家不爲此也朱崖之絶􅂢之之力也朱崖南海水中郡元帝時背叛不臣議者欲往征之賈􅂢之以爲無異禽獸也棄之不足惜不擊不損威元帝聽之事在漢書否則介鱗易我衣裳否不也言不然則介鱗之􅀋易我衣裳之民也君人者務在殷民阜財殷富阜盛明道信義致帝者之用成天地之化使粒食之民粲也晏也粲文采晏和柔享于􅀑神不亦饗乎實受其福天道勞功或問勞功曰日一日勞考載曰功日一日猶日日也考成也載歳也周而復始以成其歳故曰功或曰君逸臣勞何天之勞言於人事則君逸臣勞也天爲君四時行百物生以喻無勞也曰於事則逸於道則勞於事則逸無功可名於道則勞運轉機衡周公以來未有漢公之懿也勤勞則過於阿衡漢公王莽也或以此爲媚莽之言或以爲言遜之謂也吾乃以爲箴規之深切者也稱其漢公以前之美耳然則居攝之後不貶而惡可知揚子所以􅀇妙也發至言於當時垂忠敎於後丗言蔽天地而無慙敎􅀜百代而不耻何遜媚之有乎漢興二百一十載而中天其庶矣乎言人民衆多富盛也辟廱以本之校學以敎之禮樂以容之輿服以表之復其井刑勉人役唐矣夫言若盡此諸美以濟勉人者無羡唐虞之丗也法言序子雲歴自序其篇中之大略耳天降生民倥侗顓蒙倥侗無知也顓蒙頑愚也恣乎情性觸意而行聦明不開闇塞之謂訓諸理訓導譔學行降周迄孔成于王道禮樂備也然後誕章諸子應時而作詭丗之言乖離諸子圖徽貴此聖人坦蕩之夷路賤彼百家雜穢之邪徑譔吾子事有本眞陳施於意動不克咸克能咸皆本諸身自求之義譔修身芒芒天道洪荒混芒之初昔在聖考聖人作而萬物覩謂宓羲肈畫八卦六位成章過則失中不及則不至二五得中然後利見不可姦罔譔問道神心忽恍經緯萬方事繫諸道德仁義禮譔問神明哲煌煌旁燭無疆遜于不虞以保天命譔問明遐言周于天地遐逺周遍賛于神明幽􅀪撗廣絶于邇言譔寡見聖人聦明淵懿繼天測靈冠乎羣倫經諸範範模譔五百立政鼓衆動化天下莫尚於中和中和之發在於哲民情哲智譔先知仲尼以來國君將相卿士名臣參差不齊患丗論之不實褒貶之失中一槩諸聖一以聖人之道槩平之譔重􅀺仲尼之後訖于漢道德行顔閔股肱蕭曹爰及名將尊卑之條稱述品藻定其差品及文質也譔淵騫君子純終領聞純善也領令也聞名也言善於終而有令名也蠢迪撿押蠢動也迪道也險押猶隱括也言君子舉動則當蹈規矩旁開聖則開通也則法也譔君子孝莫大於寧親寧親莫大於寧神寧神莫大於四表之歡心言尊視考安神靈故四方驩心譔孝至揚子法言卷第十三揚子法言音義學行卷第一李軌注軌字􅀪範東晉尚書郎都亭侯撰周易音尚書音春秋公羊音小爾雅音各一卷泰始泰寧咸和起居注共六十七卷又撰齊都賦一卷集八卷見隋書經籍志好學呼報切下同復駕扶又切諸儒金口而木舌柳宗元曰金口木舌鐸也使諸儒駕孔子之􅀃如木鐸也礲諸盧紅切焉攸於䖍切下焉知同螟􅘾上音冥下音靈殪於計切蜾蠃上音果下郎果切祝之之又切羿五計切逄蒙薄江切般音班不能踰也俗本脫不字諸本皆有鑄與音余下同五石俗本作玉石誤踧爾子六切桐子音通與侗同亦音同未成人也漢書曰母桐好逸一閧下降切不勝音􅂛之平皮命切鄭司農云質劑月平價也於戲上音烏下音呼又虚冝切爲其于僞切下爲道爲利同楶音節之乗繩證切易乎以豉切啞爾於革切相比毗志切徒與音余下皆同疑者別出􅢟斯羊茹切鸒雅烏如其富俗本下句作如其義非猗頓於離切其粗于胡切紆朱邕俱切其樂音洛下同瞿然音句祇其音支適也有敎立道無心仲尼有學術業無心顔淵天復本並作無止吾子卷第二少而詩照切好賦呼報切組麗音祖狴犴狴邊兮切犴音岸獄也太􅀇曰蹛于狴獄家語曰獄犴不治景差􅀄佳切舊本作景􅜚枚乗繩證切多哇烏􅀲切確乎苦角反俗本作榷非惡烏路切淈古忽切屈原九勿切如瑩烏定切又音榮石次玉者一曰玉色逸論語曰如玉之瑩伉口浪切徤也何休曰有辯護伉正者爲里正陸德明一音苦杏切稱則尺證切足言將住切又如字下同詭辭九委切斷木都管切梡革音緩又音款斷木也爲鞠居六切峛崺上力紙切下移爾切惡沱上哀都切下徒何切舍書也切下同惡覩音烏下同好乎呼報切下好書好􅀃同山􅠌戸經切又口耕切孟子曰山徑之蹊蒼頡胡結切羊質而虎皮見草而􅀃音恱天復本作見羊而恱虎别彼列切下同不要一遥切則辟芳辟反述正道而稍邪哆者有矣未有述邪哆而稍正哆昌者切又尺氏切天復本作稍正道其較音角且易以䜴切下並同帡幪李善曰帡莫經切幪莫公切覆也帡又音并又音萍脩身卷第三矯思斯恣切必中丁仲切樂天音洛聖人之辭可爲也使人信之所不可爲也天復本作不可爲也使人敬之可以有爲俗本作可以爲友非是好大呼報切卑也如字又音婢田圃田上田音佃下田如字圃音甫莠羊乆切喬喬音驕詩作驕必矇音蒙瞽也熒魂戸扃切糟莩李軌讀糟如字莩音浮熟也柳宗元曰熒明也熒魂司見之用者也糟當爲精莩如葮莩之莩目精之表也言魂之熒明曠乆則枯精之輕浮曠乆則沈不面日月則目之用廢矣以至於索塗冥行而巳舊本亦作精莩擿埴他歴切下宫職切索塗山責切重行下孟切下行重行輕同重好呼報切下好重好輕好問並同有觀古玩切則賈音古俗本作史後人改之爾舊本皆作賈謂賈人衒鬻過實下篇云衒玉賈石是也臞如其俱切瘠也捽茹上音在忽切下音人恕切菜也之樂音洛鞹苦郭切騂息營切刲羊苦圭切罷賔音疲勞也犒考告切惡在音烏鮮德息淺切引諸門乎門本或作問夷貉莫白切肄乎羊至切三好呼報切下並同人門俗本人作仁誤禔身是支切又音支又音題元憞徒對切問道卷第四則渾戸昆切請問禮莫知天復本作請問莫知或曰焉得直道而由諸天復本無或曰二字焉於䖍切下以意求之或曰事雖曲而通諸聖天復本無或曰二字天與音余搥提搥都回切舊本皆從手擲也提徒計切亦擲也漢書云以愽局提吴太子則苓音聆閛然匹庚切閉門也俗本作闇然誤諸本皆作閛疣贅羽求切下之瑞切而治直吏切下爲治同哨哨音消又七􅀏切則貉莫自切則禮由已一本作由也耾耾戸萌切俗本作肱誤宋玉風賦曰耾耾雷聲裨蒼曰耾聲皃狙詐千預切又七余切不戰而屈人兵堯舜也天復本無堯舜也三字漸襟子廉切衒音縣賈石音古子將子亮切螻螾上落侯切下餘忍切膢臘上音力朱切又落侯切銛息廉切本或作鈷誤砥音紙反目􅅭形一本作反自􅅭刑􅅭音縣漸諸子廉切如台音貽問神卷第五請問之天復本作請聞之舍則書也切索至山責切無閒閒廁之閒蚖音元惡覩音烏食其不妄俗本作不忘字之誤也非義不妄食故不可得而制楚辭曰鳯亦不貪餧而妄食羑里羊九切不手不制於人之手惷書容切又丑江切又丑用切俄空苦貢切缺也渾渾戸昆切又胡本切灝灝胡老切噩五各切譙乎俗本作誰舊本皆作譙詩傳云譙殺也殺所戒切故注云酷烈易知以䜴切下艱易同覆物敷又切訔訔語巾切爭訟也喊呼覽切又呼嫌下斬切之解胡買切曉也面相息亮切捈他胡切又同盧切引也嚍嚍音即刃切俗本作㗲㗲誤㖧㖧呼昆切忞忞武巾切見矣賢遍切與我音預者鮮悉淺切君子病没丗而無名盍勢諸名卿可幾也漢書曰或問君子疾没丗而名不稱盍勢諸名卿可幾師古注曰以身而無名爲病孟康曰盍何不也云何不因名卿之埶以求名幾音機下同君子德名爲幾韋昭曰言有􅀔之名卿庶幾可不朽揚子以爲不然唯有德者可以有名師古曰或人以事有權力之卿用自表顯則其名可庶幾而立揚雄以爲自蓄其德則有名也梁齊趙楚之君非不富且貴也惡乎成名漢書曰梁齊楚趙之君非不富且貴也惡虖成其名師古曰謂當時諸侯王也惡於何也音烏谷口鄭子眞不屈其志而耕乎巖石之下名振于京師豈其卿豈其卿漢書曰谷口鄭子眞不詘其志耕於巖石之下名震于京師與今文不同螘垤上魚綺切下徒結切能別似者彼列切俗本作能參以似非是問明卷第六誖布内切􅅭􅅭胡㳙切幽逺皃大知如字孟子疾過我門而不入我室過古禾切不入室者孟子疾之不食實者揚子疾之近人注法言誤以孟子疾爲句絶摭我音􅃗樂天音洛下同庸行下孟切下庸行同去諸丘莒切抏也五官切漢書云海内抏􅁦下抏秦同舊本皆作抏臯陶音遥􅘱女耕切譻􅘱天復本作謣謣音于又音糽妄言也敗俗必邁切下同又如字􅘱好呼報切下於好好文同亟於紀力切聵五怪切在治直吏切下同則見賢遍切弋人何慕後漢書逸民傳序引揚子作弋者何篡宋􅂨注云篡取也鴻髙飛冥冥薄天雖有弋人執増繳何所施巧而取焉喻賢者深居亦不罹暴亂之害今篡或爲慕誤也鷦明上音焦􅀃文曰東方發明南方焦明西方鷫鷞北方幽昌中央鳯皇又司馬相如傳云鷦鵬巳翔乎寥廓之宇又樂緯曰鷦鵬狀如鳯皇遴集鄰振切蹌七羊切翳路烏計切蜀莊沈冥蜀莊之才之珍也不作苟見不治苟得乆幽而不改其操雖隨和何以加諸舉兹以旃不亦珍乎漢書孟康注曰湛深淵黙無欲也師古曰湛讀曰沈不爲苟顯之行不事苟得之業隨隨侯珠也和和氏璧也諸之也旃亦之也言舉此人而用之不亦國之寳乎三輔決録曰子眞名樸君平名尊毚欲士銜切貪也俗本作利欲儃舜蟬戰切累克俗本誤作刻灑耳音洗翾翾許緣切飛㹸歸其肆矣注非也朱爲往來以時不累其身放肆自遂􅀃難劉伯莊史記音義曰􅀃難上式拙切下如字司馬正史記索隱曰􅀃音稅難音如干切言游􅀃之道爲難故􅀃難書其辭甚髙故特載之然此篇亦與韓子微異煩省少不同劉伯莊亦申其意粗釋其微文幽旨故有劉􅀃確苦角切問行下孟切寡見卷第七好徦音遐本或作遐下同偭焉彌兖切好盡呼報切援我音􅀽鶉兮音純譊譊女交切皆􅀃一本􅀃作訟曼是莫半切曼衍無極也􅈱音􅀌璵璠上以諸切下附􅀽切鞶􅍤上音盤下音稅惡在音烏拂乎符勿切而樂音洛焉事於䖍切窒珍栗切六翮下革切其累力僞切奠枕章袵切樓航或作斻亦作杭榷利音角貂音彫陶同衣人於旣切不抎于粉切天復本作眃音雲耳中聲也屬其音燭肉辟婢亦切實予音與惡在音烏下惡得同於乎上音烏政核下革切不離力智切下同􅖁徒玩切卵壞不剡以冉切甄陶居延切甈五計切破瓦也坏芳盃切未燒瓦也俗本作怌字之誤也注甈燥也俗本誤作躁坏濕也誤作怌懼也衆田音佃田侯田上田同上音下如字}
