  - {type: variant, offset: 1530, length: 2, content: 葛溝, SBCK: 失中不及則不至不可姦罔蘇林曰罔誣也言不可作姦誣於聖道明􅈒煌煌旁燭無疆漢書揚雄傳作旁燭亡疆師古曰煌煌盛貌也燭照也無疆猶無極也遜于不虞以保天命李竒曰常行遜順備不虞遐言周于天地漢書揚雄傳作假言周于天地師古曰假至也幽􅀪橫廣絶于邇言李竒曰理過近丗人之言也經諸範漢書揚雄傳作經諸范師古曰經常也范法也立政鼓衆動化天下莫}
  - {type: page-break, offset: 1530, content: '', id: KR3a0009_SBCK_014-8b}
  - {type: variant, offset: 1533, length: 1, content: 矣, SBCK: 於中和漢書揚雄傳尚作上鄧展曰鼓亦動也參差不齊師古曰言志業不同也參初林切一槩諸聖師古曰一以聖人大道槩平槩工代切譔淵騫柳宗元曰按漢書淵騫自有序文語俗近不􅀋蓋後人増之}
