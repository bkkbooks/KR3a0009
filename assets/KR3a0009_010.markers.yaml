  - {type: variant, offset: 58, length: 3, content: 扁鵲盧, WYG: 受天下不為泰言當理也不由其徳五兩之綸半通之銅亦泰矣綸如青絲繩也五兩之綸半通之銅皆有秩嗇夫之印綬印綬之微者也言不由其徳而佩猶為泰矣况滔天乎咸曰綸青絲綬也諸本註皆作青絲繩盖傳寫誤也光曰綸古頑切又音倫李宋本通闕天下之通道五所以行之者一五謂仁義禮智信也曰勉勉勵咸曰能一勉而修則五得之矣祕曰非勉則不復其性或曰力有扛洪鼎掲華旗智徳亦有之乎咸曰言古有力者能扛鼎掲旗夫智徳亦有能之乎光曰掲渠列切曰百}
