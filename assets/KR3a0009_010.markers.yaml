  - {type: variant, offset: 9, length: 8, content: 重司天北正黎司地, WYG: 道佐其君者皆非忠嘉或曰邵如之何咸曰邵猶繼也言欲繼稷契臯陶者如之何而可祕曰邵髙也欲髙之則如之何光曰問稷契臯陶道髙不可及柰何曰亦朂之而已朂勉咸曰言欲繼稷契臯陶者當朂勉其道而已庳則秦儀鞅斯亦忠嘉矣庳下也此所以微言貶乎漢臣而為王莽之将相者祕曰朂勉也庳下也言人欲自髙則勉行而已如其庳下而不能自勉則秦儀鞅斯亦可謂之忠嘉矣盖言其自足也光曰庳音婢若嫌論太髙而卑之則䧟入於狙詐矣堯舜之道皇兮祕曰皇美夏殷周之道将兮祕曰將大而以延其光兮二帝三王光延至}
