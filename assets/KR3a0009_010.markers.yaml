  - {type: variant, offset: 84, length: 1, content: 渾, WYG: 君曰明光問臣曰若禔祕曰若順禔宜讀如媞爾雅曰媞媞安也光曰禔是支切又杜奚切又音支敢問何謂也曰君子在上則明而光其下在下則順而安其上明而光其下堯之為君也順而安其上舜之為臣也王莽之事漢則傾覆其上簒位居攝則暴亂其下也祕曰明而光其下法}
