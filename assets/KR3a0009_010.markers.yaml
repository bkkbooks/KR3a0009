  - {type: variant, offset: 1516, length: 0, content: '', SBCK: 郎果切淵騫卷第十一惡乎音烏曰寢俗本作曰在寢在衍字扛鼎音江魯仲連而不制藺相如制而不與蕩同忼辭苦兩切免罿音􅓘幾矣音機之知音智下知國如字周之順赧諸本皆作順赧順靚王及赧王也俗本作周之傾字之誤也史記作愼靚王索隱作順靚王或是愼轉爲順赧奴板切東并音併壍山七􅃩切臨洮音叨相也息亮切窬音踰擔石都濫切又都甘切秦將子亮切下同牙欸烏開切又許介切要離一遥切求反俗本脫求字蛛蝥俗本作蛛螫誤賈􅁩新書曰蛛蝥作網蝥音矛焉可於䖍切下皆同爲嚴于僞切下爲姊爲丹同刺相息亮切下董相同曼面謨官切塗面督亢音剛惡諸烏路切秦行下孟切美行同鷙翰胡安切又侯盰切􅀃而失贅切任人音任難之乃旦切園公史記留侯丗家作東園公角里上音鹿漢書作甪里執正俗本作政誤折節之設切葘異葘與災同樊酈音歴槧人七􅃩切盎烏浪切晁錯曰愚天復本作由忠捋踈上音郎活切俗本作將誤没齒無愁也俗本誤作没齒然也雋京徂兖切將子亮切下同冠軍古亂切奉使色吏切膚使同行不下孟切下其行聖行賢行談行並同詼逹上音恢舊本皆作詼逹漢書曰朔詼逹多端不名一行本或作談逹又作名字逹皆誤惡比音烏滑稽音骨朝隱直遥切妄譽音餘不累良爲切絀臣與黜同愀如親小切舊本皆作俶如昌六切動色皃鄲聞鄲音丹猶但也或古鄲但通用亦音但本或作但育賁音奔君子卷第十二弸中蒲萌切又普耕切般音班有中丁仲切其知音智侻也他括切可也牛􅀇騂白俗本作􅀇牛騂白誤騂息營切睟而睟與粹同隊乎直􅀋切鮮取悉踐切下鮮儷同人}
