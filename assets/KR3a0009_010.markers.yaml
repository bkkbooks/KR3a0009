  - {type: punctuation, offset: 149, content: 「, id: KR3a0009_tls_010-bkkpn76}
  - {type: variant, offset: 149, length: 0, content: '', WYG: 羣言之長羣行之宗曰羣言之長徳言也咸曰謂由徳而言乃為羣言之長羣行之宗徳行也咸曰謂由徳而行乃為羣行之宗或問泰和咸曰問太平和樂之道光曰天下和平之至曰其在唐虞成周乎觀書及詩温温乎其和可知也發號出令而民說之咸曰言觀書二典詩小大雅見唐虞成周之盛信泰和矣光曰言千載之後觀其詩書猶温温然和樂况生其世乎周康之時頌聲作乎下闗雎作乎上習治也咸曰習積習也言由成王來積習為治祕曰習治習見治世之道齊桓之時緼而春秋美邵陵習亂也緼亦亂也咸曰齊桓公㑹諸侯于陘楚遣屈完如師以觀齊覩齊之盛因而求盟桓公退次召陵與之盟以禮楚也祕曰緼亦亂也言齊桓之時下陵上替而春秋美邵陵之㑹能服楚也習亂亦謂習見亂世之事按僖公四年楚屈完來盟}
  - {type: page-break, offset: 149, content: '', id: KR3a0009_WYG_010-8a, image: WYG0696/WYG0696-0351a.png}
  - {type: variant, offset: 149, length: 0, content: '', krp: 羣言之長羣行之宗曰羣言之長徳言也咸曰謂由徳而言乃為羣言之長羣行之宗徳行也咸曰謂由徳而行乃為羣行之宗或問泰和咸曰問太平和樂之道光曰天下和平之至曰其在唐虞成周乎觀書及詩温温乎其和可知也發號出令而民說之咸曰言觀書二典詩小大雅見唐虞成周之盛信泰和矣光曰言千載之後觀其詩書猶温温然和樂况生其世乎周康之時頌聲作乎下闗雎作乎上習治也咸曰習積習也言由成王來積習為治祕曰習治習見治世之道齊桓之時緼而春秋美邵陵習亂也緼亦亂也咸曰齊桓公㑹諸侯于陘楚遣屈完如師以觀齊覩齊之盛因而求盟桓公退次召陵與之盟以禮楚也祕曰緼亦亂也言齊桓之時下陵上替而春秋美邵陵之㑹能服楚也習亂亦謂習見亂世之事按僖公四年楚屈完來盟}
  - {type: variant, offset: 150, length: 1, content: 胥, WYG: 師盟于邵陵左傳無美之之文子雲據公羊而言也故習治則傷始亂也傷悼咸曰太平之民追歎舊亂祕曰習見治世之事覩始亂則傷之始亂謂幽厲之時也孔子曰嗚呼哀哉我觀周道幽厲傷之光曰先儒多以為周道衰詩人本諸祍席闗雎作故揚子以為始亂習亂則好始治也好樂咸曰乆汚之俗喜安少治祕曰習見亂世之事覩始治則好之始治謂邵陵之盟也公羊傳曰桓公救中國而攘夷狄卒怗荆以此為王者之事也漢徳其可謂允懐矣允信懐至祕曰漢之有徳信能懐服逺人光曰允謂信及四夷懐謂逺人來服黄支之南大夏之西東鞮北女來貢其珍漢徳其可謂允懐矣世鮮焉明此奕世之所致而莽一旦行詐以取之祕曰言漢徳之盛四夷來貢信能懐逺矣而歴世少及焉此所以明漢興者天之本也黄支南蠻去合浦日南三萬里大夏西戎去中華一萬二千里東鞮北女未詳或傳寫之誤當言北鞮東女匈奴謂漢曰若鞮自曰呼韓邪後見漢帝為孝慕之故皆為若鞮哀帝建平四年烏昧留若鞮單于上書願朝是也東夷有東女國西羌别}
  - {type: page-break, offset: 150, content: '', id: KR3a0009_WYG_010-8b, image: WYG0696/WYG0696-0351b.png}
