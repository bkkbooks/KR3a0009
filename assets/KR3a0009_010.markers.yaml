  - {type: variant, offset: 1, length: 4, content: 黎卷第十, WYG: 添註孝至篇咸曰人道之大莫大乎孝孝道之全莫全於終故啓之乎足没且誡焉豈易量哉法言始於學而終於孝理亦粹矣孝莫大於寕親寕親莫大於寕神寕神莫大於四表之歡心言尊祖考安神靈故先王以孝治天下也祕曰寕神奉宗廟也夫孝始於寕親終於天下之歡心其道甚大光曰神者祖考之神大孝宜若周公然譔孝至祕曰夫學所以開明也故為其始孝所以報本也故為其終動天地感鬼神者莫速於孝乎光曰論孝及至徳因叙漢室之盛孝至矣将欲言其義所以歎其至祕曰先王之至徳一言而該光曰至徳要道無所不該聖人不加焉一言而孝兼該百行聖人無以加之是至徳也祕曰該備也光曰聖人之徳無以加於孝父母子之天地歟天懸象地載形父受氣母化成無天何生無地何形天地裕於萬物萬物裕於天地裕足也言萬物取足於天地天地不取足於萬物也咸曰正文當云萬物非裕於天地疑脫去非字裕饒裕也天地生萬物非冀其報故能饒裕於萬物而萬物不能饒裕於天地也光曰裕謂饒益優厚也揚子設為疑問以明天地則能裕萬物萬物豈能裕天地乎裕父母之裕不裕矣養父母自以為足者乃不足也咸曰父母雖為子之天地然俟其報與天地異也故親以生育之思饒裕其子則子也以孝養之徳饒裕於親若夫但樂生育之裕不能全孝養之裕則不為裕矣故曰裕父母之裕不裕矣以别萬物之於天地也祕曰父母有餘裕於其子其子豈能裕父母哉以父母之裕而裕其父母不為裕矣是父母裕於子也常有餘子孝於父母也常不足光曰欲報之徳昊天罔極事父母自知不足者其舜乎自知不足則是舜咸曰舜所以愈裕而不自充足者懼夫失所以孝養之裕也不可得而乆者事親之謂也祕曰父母之年不可不知孝子愛日無須臾懈於心祕曰其心無懈光曰木欲静而風不止子欲養而親不述故孝子養親惟日不足孝子有祭乎有齋乎祭嚴齊敬孝子之事光曰言齋重於祭夫能存亡形屬荒絶者惟齋乎亡形復存荒絶復属者謂祭如在光曰屬之欲切謂齋之日故孝子之於齋見父母之存也祕曰見其居處語笑所樂所嗜謂思而見之是以祭不賔夫齋者交神明之至故致齋三日乃見其所為齋者禮記論之備矣而發斯談者有􅁣乎時也咸曰祭不賔者孝子盡精極思而存夫親何暇乎賔之接也祕曰專乎所親光曰賔謂敬多而親少如待賔客人而不祭豺􅆩乎九月豺祭獸正月􅆩祭魚豺􅆩猶有所先人而不祭豺􅆩之不若也或曰死生盡禮可謂能子乎生事愛敬死事哀戚祕曰問今世湏死生盡禮方可謂能子乎光曰此問荅不類疑下有脫文曰石奮石建父子之美也無是父無是子無是子無是父祕曰萬石君石奮少子建皆以馴孝行謹官至二千石光曰言父子孝謹相成或曰必也兩乎祕曰言人必湏父子孝謹方為美乎曰與堯無子舜無父不如堯父舜子也必不得雙於斯二者當如堯之為父舜之為子咸曰子雲方論孝至而遽以萬石君父子與堯舜較短長得非傷君臣之道輕孝至之禮乎曰子雲之心盖所以重孝至而謹君臣之道者也何哉天下之重莫大乎孝未有天子而無父也故自天子至子庶人其禮雖異而其為孝一也夫孝君行之於上而臣行之於下則四海莫不孝矣四海皆孝則忠臣得矣故曰求忠臣於孝子之門由是言之子雲所以重孝至而謹君臣亦明矣有㫖哉子雲也學者辨之祕曰與堯之無子舜之無父不若使堯爲父而舜為子不必兩也堯子丹朱不肖舜父瞽瞍頑雖有如無光曰父子俱聖尤美子有含菽緼絮而致滋美其親将以求孝也人曰偽如之何含食也菽豆也咸曰言人有自含食其菽緼被絮而能致滋丼之味美麗之服於其親思以為孝或非之以為偽何如也光曰緼於盆切含菽菲食緼絮惡衣曰假儒衣書服而讀之三月不歸孰曰非儒也咸曰言設有人假儒衣書服而讀之三月不輟而歸誰曰非乎言亦可以為儒也如彼之自薄而厚於親儻乎不輟則亦可為孝矣三月者時一變也天時且變而已不變是可為儒矣祕曰已欲孝斯孝矣已欲儒斯儒矣誰其非之光曰服儒衣讀儒書經時不輟斯亦儒矣或曰何以處僞咸曰問何以見其偽者祕曰為之則真何以居偽曰有人則作之無人則輟之之謂偽咸曰禮云道不可斯湏離其身可離非道也所以君子慎其獨矣故有人則修而作之無人則輟而止之非偽而何君子耻之觀人者審其作輟而已矣視其所以觀其所由人焉瘦哉不為名之名其至矣太上以徳自然之美非至而何祕曰君子行善其名自彰至矣為名之名其次也力行近仁斯亦次矣祕曰欲求善名而行為次也光曰畏惡名慕善名猶有所耻}
