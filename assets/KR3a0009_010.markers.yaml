  - {type: variant, offset: 145, length: 2, content: 曼云, WYG: 之謂俊深識聖義是俊傑也祕曰知哲於聖人之道俊哲也秀穎徳行之謂洪禾之秀其頴猶人之洪其道也禾秀頴則實結人崇道則徳聞洪大祕曰秀頴於徳行洪秀也光曰知哲當為哲知言哲能知聖人之道不溺於異端智之俊者也秀謂材秀能修徳行使穎出於衆秀之大者也君子動則擬諸事事則擬諸禮事不來則不動動非禮則不擬咸曰擬或作凝非也擬據也言君子不妄其動乃據事而後動不偽其事乃據禮而後事祕曰凝成也君子不妄動動則成於事事則成於禮凝一本作擬光曰吴本擬作凝今從李宋本擬度也動則度其事之可否事則度於禮為是為非}
  - {type: page-break, offset: 145, content: '', id: KR3a0009_WYG_010-7b, image: WYG0696/WYG0696-0350d.png}
