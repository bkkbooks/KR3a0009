  - {type: variant, offset: 202, length: 0, content: '', WYG: 也可不享乎言如此不可不以盛禮待之也祕曰髙祖圍乎平城文帝不雪憤辱之耻孝武亟興邉略實為兵主矣至宣帝時呼韓邪來臣稱北藩扞禦北虜盖漢神靈之祐豈可不享之哉光曰為兵主省謂髙帝得天下之後文帝武帝承平之時兵所以不得息者正以匈奴之故也今幸}
