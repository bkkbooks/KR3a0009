  - {type: variant, offset: 103, length: 1, content: 幾, WYG: 不睿是謂不聖又曰貌言視聽以心為主故一人之得心矣光曰天地因人而成功故天地之所以得其道者在民也民之所以得其道者在君也君之所以得其道者在心也吾聞諸傳祕曰傳記謂論語光曰傳直戀切老則戒之在得年彌髙而徳彌邵者咸曰邵美也祕曰邵亦髙也老則不貪而有徳彌髙者雖聖人何以加焉是孔子之徒歟王莽少則得師力行老則詐偽簒奪故揚子寄㣲言而歎慨焉或問徳有始而無終與有終而無始也孰寕光曰宋吴本作有始而無終歟有終而無始歟音義曰天復本寕作愈今從李本孰寕寕為誰曰寕先病而後瘳}
