  - {type: variant, offset: 1517, length: 2, content: 矯世, SBCK: 巫鼔天復本作又以巫鼔其行下孟切下以行言行同好人呼報切下同勌與倦同儷音麗囂囂五刀切虙音伏偟音皇孝至卷第十三有齊側皆切下同屬荒音燭含菽本亦作唅音同爲名于僞切庳音婢下也螘與蟻同之綸古頑切又音倫扛音江揭渠列切若禔是支切又音支又音題諸傳直戀切與有終而無始與如字孰寧天復本作孰愈知哲上音智之長丁丈切群行下孟切德行同東鞮都奚切丗鮮息淺切芒芒謨郎切下同璜璜音黃螭丑知切䎒䎒財千切又側板切訩訩許容切又詡拱切􅂢之與專切周公以來未有漢公之懿也勤勞則過於阿衡柳宗元}
