  - {type: variant, offset: 162, length: 6, content: 破楚入郢鞭尸, WYG: 也蠢廸猶陵踐也王人王室之官言五霸六國然也祕曰宗夷猶言夷族也蠢動也廸蹈也言四夷之族猾亂中夏動蹈我邉疆而犯王人又屈國䘮師焉無禦戎之次也光曰蠢動廸蹈也中國㣲弱四夷交侵騷動蹈}
