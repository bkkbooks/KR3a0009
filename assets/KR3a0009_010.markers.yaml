  - {type: variant, offset: 1520, length: 2, content: 矯世, SBCK: 阿衡之事不可過也過則反矣漢興二百一十載而中天其庶矣乎柳宗元曰揚子極隂陽之數此言知漢祚之方半耳法言序倥侗顓蒙漢書􅀭雄傳鄭氏注曰童蒙無知也師古曰倥音空侗音同顓與專同侗又音通􅀃文大貌詩神罔時侗一曰侗未成器之人訓諸理師古曰訓告也迄孔許訖切師古曰周周公旦也迄至也孔孔子也言自周公}
  - {type: variant, offset: 1523, length: 6, content: 禮倮乎如矯世, SBCK: 降至於孔子設敎垂法皆帝王之道終後誕章乖離諸子圖徽漢書揚雄傳作諸子圖微師古曰言其後澆末虚誕益章乖於七十子所謀㣲妙之言事有本眞陳施于意漢書揚雄傳作陳施於億李竒曰布陳於億萬事也動不克咸李竒曰不能皆善也芒芒天道昔在聖考李竒曰聖人能成天道過}
  - {type: punctuation, offset: 1524, content: ，, id: KR3a0009_tls_010-bkkpn645}
