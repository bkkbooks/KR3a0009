  - {type: variant, offset: 87, length: 1, content: 落, WYG: 光謂能顯忠遂良安謂能順美救惡或曰聖人事異乎咸曰言聖人亦以妖異為事乎曰聖人徳之為事祕曰徳盛則無異異亞之祕曰見異修徳者次之故常修徳者本也咸曰猶堯舜常脩其徳何異之也見異而修徳者末也咸曰猶太戊武丁見異而後修非上徳矣故為之末焉祕曰失於常徳災異乃見修而禳之事在末後本末不修而存者未之有也惑此之甚者必亡矣咸曰猶桀紂本末不修其亡忽焉光曰災異應時君之徳故以徳爲本異為末天地之得斯民也得養育之本故能資生斯民也祕曰天地之大徳曰生生斯民也易曰有天地然後有萬物有萬物然後有男女是人與萬物齊生而最靈者也班固曰夫人聰明精粹有生之最靈故曰得斯民斯民之得一人也得資生之業是故係之一人也咸曰言斯民之衆在得一人而治之也祕曰書曰惟天生民有欲無主乃亂一人之得心矣一人之得統御天}
