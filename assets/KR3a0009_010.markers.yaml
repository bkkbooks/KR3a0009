  - {type: variant, offset: 1315, length: 237, content: 請人曰晉荀息趙程嬰公孫杵臼秦大夫鑿穆公之側問義曰事得其宜之謂義或問季布忍焉可為也曰能者為之明哲不為也或曰當布之急雖明哲如之何曰明哲不終項仕如終項仕焉攸避或問賢曰為人所不能請人曰顏淵黔婁四皓韋玄問長者曰藺相如申秦而屈廉頗欒布之不塗朱家之不德直不疑之不校韓安國之通使或問臣自得曰石太僕之對金將軍之謹張衛將軍之慎丙大夫之不伐善請問臣自失曰李貳師之執貳田祁連之濫帥韓馮翊之愬蕭趙京兆之犯魏或問持滿曰扼揚王孫倮葬以矯世曰矯世以禮倮乎如矯世則葛溝尚矣或問周官曰立事左氏曰品藻太史遷曰實錄, WYG: 卷十}
