  - {type: variant, offset: 297, length: 0, content: '', WYG: 仁則人必歸之光曰仁者人道之常義以宜之咸曰有義則事得其宜禮以體之咸曰冇禮則時保其體天也五者人之天性祕曰五者之備天命全也光曰天性自然不可増損合則渾離則散光曰渾户昆切五者合而言之則渾而為一隨事言之則散而為五一人而兼統四體者其身全乎四體合則渾成人五羙備則混為聖一人兼統者徳備如身全祕曰道統仁義禮徳故謂之道人統四體故謂之人可合而不離其身乃全也韓吏部曰老子之所謂道徳云者去仁與義言之也二人之私言也其不全哉光曰闕一則不成人或問徳表祕曰問徳之的然為天下表者光曰問有徳之人在上其治化表見於外者何如曰莫知作上作下作為也莫知為上之樂為下之苦咸曰非也作修也君聖而修之於上臣忠而修之於下故上下交修而民日用不知此所以為徳之標凖也祕曰徳足乎已加乎民天下有道比屋可封豈冇的然作之於上竹之於下而莫知也請問莫知言已冇禮制則有尊卑咸曰言民日由禮而不知其制也祕曰徳既然矣請問禮光曰李宋吴本皆作請問禮莫知音義曰天復本作請問莫知今從之或者以為治化既出於上豈得人莫知之曰行禮於彼而民得於此奚其知君自行禮於上而民承化於下咸曰民可使由之不可使知之威儀三千豈可盡詳哉故禮不下庶人蓋上既行而下能效則民得之矣何制之知焉祕曰禮亦然光曰徳者得也有徳者行禮於上而民各得其所於下人自為善豈知治化之所自邪或曰孰若無禮而徳祕曰何如去禮而專任徳光曰或者以為曷若専修徳安用繁文之禮曰禮體也人而無禮焉以為徳禮如體無體何得為人無禮何能立徳祕曰譬人無體非人也何由為徳光曰言禮者得之體也或問天曰吾於天歟見無為之為矣咸曰謂不言而四時行萬物生祕曰天何為哉雷動風散雨潤日烜山止澤説而萬物生焉或問彫刻衆形者匪天歟祕曰荘子曰彫刻衆形而不為巧曰以其不彫刻也如物刻而彫之焉得力而給諸咸曰言萬彚紛錯得之自然一一而刻之何力能給老子之言道徳吾有取焉耳可以止奔競訓饕餮祕曰老子以道道其所道徳徳其所徳雖然猶未離道也故有取耳光曰虚静謙柔及搥提仁義絶滅禮學吾無取焉耳老子絶學蓋言至理之極以明無為之本斯乃聖人所同子雲豈異哉夫能統逺㫖然後可與論道悠悠之徒既非所逮方崇經世之訓是故無取焉爾者不得已之為敎也祕曰聖人以仁義禮俱道也老子以仁義禮别為一端以至崇道徳薄仁義非禮學故無取焉耳揚子言老子者皆據虚無二篇而言也甞試稽之家語孔子問禮於老聃是與聖人之道同也故曽子問有記孔子聞諸老聃蔵羣廟之主取羣廟之主以從迎四廟之主出入必蹕之類老聃云又稱老聃曰諸侯朝天子見日而行逮日而舎奠大夫使見日而行逮日而舎之類皆曰吾聞諸老聃云此誠學禮之效也觀此二章老子深於禮者也與虚無二篇絶不相侔豈老子所為㢤今道家流有黄庭内景之類亦曰老氏之作也言胎食之術文辭淺近又與虚無二篇不侔矣豈非道家為之名歟昔崔浩甞讀荘老之書不過数十行輒棄之曰此矯誣不近人情必非老子所作老聃習禮仲尼所師豈設非法之言以亂先王之敎也光曰音義曰搥都回切舊本皆從手擲也漢書云以博局提吳太子吾焉開明哉咸曰言搥仁義滅禮學則吾道瞽矣惟聖人為可以開明它則苓開發咸曰苓當為䝉字之誤也言開吾道之瞽以為之明者惟聖人爾他則愈蒙闇矣指莊列之類祕曰吾道何以開明哉惟間聖人之言為可開明若諸子它道無所聞焉苓苓耳也苓耳徒有其名而無聆聞之實郭璞云苓耳形似耳業生如盤光曰開啓明白言通逹可行苓音聆闕大哉聖人言之至也開之廓然見四海日月齊明視其文者不下堂知四方祕曰聖人言之極至吾道無所昬曀開之廓然見四海光曰無所不通閉之閛然不覩牆之裏不開聖卷諭無所見祕曰自背其道不見數仭之内光曰宋吴本閛作閔今從李本音義曰閛匹庚切閉門也光謂不學牆靣聖人之言似於水火或問水火曰水測之而益深窮之而益逺火用之而彌明宿之而彌壯祕口宿安也安而久之則彌壮左氏傳曰官宿其業光曰宿蓄火也以諭藏之於身允治天下不待禮文與五教則吾以黄帝堯舜為疣贅咸曰五禮五教始於黄帝而備於堯舜信冶天下而捨是雖黄帝堯舜之聖亦外物爾疣贅體之外物者也祕口黄帝堯舜俱以禮文五常之教為治若信治天下不俟禮敎則黄帝堯舜以為外物邪光曰疣羽求切贅之瑞切疣贅言冗長無用也或曰太上無法而治法非所以為治也咸曰或以太古無法陶然自化疑今之制無益於道祕曰伏羲以前無聞焉疑其無法制而自治曰鴻荒之世聖人惡之咸曰惡其與禽獸同祕曰近禽獸而無别是以法始乎伏羲而成乎堯伏羲畫八卦以敘上下至於堯舜君臣大成也祕曰伏羲大明天地之撰畢天下之能事而唐堯順考古道以天下讓是法制始於伏羲而成乎堯光曰伏羲始畫八卦造書契至於唐堯而煥乎其有文章匪伏匪堯禮義哨哨聖人不取也咸曰哨哨多言貌禮所謂猩猩鸚鵡能言夫羲堯之上道若鳥獸徒然多言爾故聖人獨取羲而下祕曰哨哨不正貌由伏由堯者正道也非伏非堯者它道也禮曰枉矢哨壼光曰哨七笑反或問八荒之禮禮也樂也孰是祕曰八荒之禮曰蠻曰流禮樂孰是光曰言八方之俗各有禮樂人人是其所習果誰為是曰殷之以中國殷正也中國之制五百里甸服五百里侯服五百里綏服五百里要服五百里荒服或曰孰為中國正直北辰為天之齊也俱偏僻未知誰為居中國曰五政之所加七賦之所養中於天地者為中國五政五常之政也七賦五榖桑麻也中於天地者土圭測影晷度均也咸曰古者言天體者有三其一曰周髀言天地各中髙外下北極之下為天地之中今上注引是義此注引土圭測影夫土圭者周公之法也冝為是祕曰五常之政之所加五榖桑麻之政之所養以土圭之法測土深正日影以求天地之中則為中國矣過此而往人也哉譬八荒之於中國如彼諸子之於聖人如是咸曰正文伹論華夷之禮樂爾註引諸子非其㫖焉祕曰八荒之外聖王以禽獸畜之光曰言夷狄無異禽獸其所謂禮樂者安足取哉聖人之治天下也礙諸以禮樂礙限祕曰礙止也止以為凖無則禽異則貉咸曰左衽兠離與諸夏殊祕曰無禮樂則禽異禮樂則貉吾見諸子之小禮樂也不見聖人之小禮樂也孰有書不由筆言不由舌吾見天常祕曰五常為帝王之筆舌也天常五常也帝王之所制奉也譬諸書言之於筆舌為人之由禮樂也祕曰帝王之道著于五常猶書言之}
