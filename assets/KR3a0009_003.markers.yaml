  - {type: variant, offset: 344, length: 0, content: '', SBCK: 法乎何必狙詐乎申韓之術不仁之至矣若何牛羊之用人也峻刑戰之術制民如牛羊臨之}
  - {type: page-break, offset: 344, content: '', id: KR3a0009_SBCK_004-4b}
  - {type: variant, offset: 345, length: 1, content: 驥, SBCK: 刀爼故曰不仁之至也若牛羊用人則狐貍螻螾不膢臘也與膢八月旦也今河東俗奉之以爲大節祭祀先人也臘䄍也見禮記或曰刀不利筆不銛而獨加諸砥}
  - {type: variant, offset: 345, length: 1, content: 驥, WYG: 九伐之法正邦國若不得不征當用是法何必狙詐哉光曰司馬法齊人所述古兵法近正道者申韓之術不仁之至矣祕曰申不害韓非之術不先教化専任刑法至於殘害至親傷恩薄厚不仁之至若何牛羊之用人也峻刑戮之術制民如牛羊臨之以刀俎故曰不仁之至也祕曰不教而殺視人如牛羊若牛羊用人則狐狸螻螾不膢臘也歟膢八月旦也今河東俗奉以為大節祭祀先人也臘蜡也見禮記咸曰臘獵也冬則獵取百獸故狐狸至是死矣螻天螻也螾應劭云蚯蚓也吕氏春秋曰南吕之月蟄虫入冘故螻螾至是絶矣夫以申韓刑名如牛羊之用人則人之生也何可久乎其趍死猶狐狸螻螾不過乎膢臘之候矣光曰螻膢皆落侯切螾餘忍切或曰刀不利筆不銛而獨加諸砥咸曰砥磨石也精曰砥麄曰礪}
