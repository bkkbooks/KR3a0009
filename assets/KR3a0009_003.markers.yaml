  - {type: variant, offset: 299, length: 0, content: '', WYG: 弗用弗益之則囊括而祕退藏於密故顔守一瓢而道彌光孟著七篇而名愈彰皆有餘者也何虧之云哉所以用與不用益與不益不能虧其一贅多也祕曰智者見用不見用受益不受益於智無一贅之􅃜矣光曰不贅虧不蓋衍字有餘曰贅不足曰􅃜言天地之理人物之性皆生於自然不可强變智者能知其可以然則因而導之爾苟或恃其智巧欲用所不可用益所不可益譬如人之形體益之則贅損之則虧矣}
