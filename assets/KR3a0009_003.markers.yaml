  - {type: variant, offset: 298, length: 0, content: '', WYG: 著于筆舌光曰天常即禮樂也言治天下而不用禮樂猶無筆而書無舌而言也智也者知也夫智用不用益不益則不贅虧矣咸曰用謂任用之益謂増益之夫智者無不知也用之益之則惟變所適出奇無窮故姜牙興於周而退於齊少伯覇於越而歸於陶皆有餘者也何虧之云}
