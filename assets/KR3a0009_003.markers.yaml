  - {type: variant, offset: 342, length: 1, content: 率, SBCK: 不戰而屈人兵堯舜也沾項漸􅁭堯舜乎衒玉而賈石者其狙詐乎或問狙詐與亡孰愈亡無曰亡愈或曰子將六師則誰使曰御得其道則天下狙詐咸作使御失其道則天下狙詐咸作敵失其御則反閒背叛故有天下者審其御而巳矣或問威震諸矦須於征與狙詐之力也如其亡曰威震諸矦須於狙詐可也未足多也未若威震諸矦而不須狙詐也或曰無狙詐將何以征乎曰縱不得不征不有司}
  - {type: variant, offset: 342, length: 1, content: 率, WYG: 嬰犢乎難無禮也咸曰言今若亡禮人皆嬰犢矣可乎祕曰人殊禽獸豈皆嬰犢乎嬰犢母懷不父懷咸曰禽獸知有母而不知有父祕曰嬰之未有知犢之畜類乃母懷而已母懷愛也父懷敬也獨母而不父未若父母之懿也兼乎愛敬而後盡其美善咸曰言今或去禮則人獨知母而不知父皆如駒犢矣故兼知父母禮可備也祕曰懐父母乃愛敬之道豈直以德而不禮是與其嬰犢之懷曷若夫人父母之懷之美也懿美也狙詐之家咸曰狙猿也宋有狙公者愛狙養之成羣有朝三暮四朝四暮三之言以欺籠之故荘子曰聖人以智籠羣愚亦猶狙公以智籠衆狙也狙詐之家猶言巧詐之家揚子惡世尚詐欲排斥之故為之言祕曰狙詐兵法權謀家流也狙善詐故以為名猶狐疑猶豫之類光曰狙七余切又干預切曰狙詐之計不戰而屈人兵堯舜也咸曰言我用巧詐之計可以不戰而使人兵屈敗雖堯舜亦然矜之之辭也光曰言狙詐之術雖不用仁義亦能不戰而服人與堯舜之道何異曰不戰而屈人兵堯舜也霑項漸襟堯舜乎咸曰言屈人之兵則或血霑染其項漸漬其襟此亦堯舜之為乎祕曰權謀之家不戰而屈人兵謂之堯舜至于汙血之霑項漸襟亦可謂堯舜乎漸漬也光曰漸子亷切􅃷玉而賈石者其狙詐乎或曰􅃷言其玉而賈售以石此巧詐之為也可乎祕曰言堯舜而實以詐者也光曰衒音縣賈音古或問狙詐與亡孰愈亡無咸曰言有詐與無詐誰優愈猶優也光曰言不用狙詐則亡國如陳餘曰亡愈祕曰無愈於有光曰言與其用狙詐不若亡國猶勝也深疾狙詐之辭或曰子將六師則誰使咸曰子指揚子也言無詐為愈則子将六軍無狙詐之人將使誰也以軍師必尚竒勝祕曰或者疑其無權謀則武備闕光曰将子亮切下可以意求曰御得其道則天下狙詐咸作使咸曰得其道猶言全七徳合軍志之類光曰若漢髙祖用韓信彭越陳平之徒御失其道則天下狙詐咸作敵失其御則反間背叛光曰若曹操為治世之能臣亂世之姦雄故有天下者審其御而已矣咸曰修徳任賢則舞于兩階而三苗格故仁者無敵於天下何狙詐之有祕曰駕御權謀亦須有道光曰當以識度恩威為本或問威震諸侯須於征歟徂詐之力也如其亡咸曰言将征伐諸候以為威必資狙詐其可亡乎光曰言立威必須征伐征伐必須狙詐奈何云寧亡國而不為狙詐乎曰威震諸侯須於狙詐可也未足多也祕曰如五霸未若威震諸侯而不須狙詐也咸曰當以徳威之祕曰若三王或曰無狙詐将何以征乎咸曰言征伐必須此乃可祕曰若三王者亦皆有征伐曰縱不得不征不有司馬法乎何必狙詐乎咸曰言不得已須征之自有周禮司馬之法何必詐哉祕曰周官司}
