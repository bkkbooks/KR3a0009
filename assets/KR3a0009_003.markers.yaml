  - {type: variant, offset: 350, length: 0, content: '', SBCK: 刀鈍礪之砥筆秃挺削以刀申韓行法欲以救亂如加刀砥亦所以利也曰人砥則秦尚矣嚴刑裁民亦猶刀之割􅁏以人爲砥酷之甚也秦之嚴刑難復尚矣}
  - {type: variant, offset: 350, length: 0, content: '', WYG: 刀鈍礪之以砥筆秃銛之以刀申韓行法以救亂如刀砥亦所以利之也秘曰民不遵禮教而加之刑名不亦可乎銛當為鉆砥所以礪鋒者也筆之有鋒故喻云光曰宋本銛作鉆敕淹巨淹二切今從李吴本銛息亷切古以木為筆或者亦可砥乎曰人砥則秦尚矣嚴刑裁民亦猶刀之割肉以人為砥酷之甚也秦之嚴刑難復尚矣祕曰秦尚刑法而加諸人光曰言用法以礪人如用砥以礪刀則莫若秦為尚矣其如不仁何}
