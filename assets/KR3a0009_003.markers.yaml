  - {type: variant, offset: 324, length: 1, content: 治, SBCK: 殷}
  - {type: variant, offset: 324, length: 2, content: 治己, WYG: 黄老之道貴因循曰可則因否則革革與因雖異隨變而通理也故先王之事世相反而其道一也祕曰隨時制宜光曰前人所為是則因之否則變之無常道太𤣥曰夫道冇因有循有革有化因而循之與道神之革而化之與時冝之故因而能革天道乃得革而能因天下乃馴夫物不因不生不革不成故知因而不知革物失其則知革而不知因物失其均革之匪時物失其基因之匪理物䘮其紀因革乎因革國家之矩範也矩範之動成敗之効也或問無為曰奚為哉應化而已光曰所}
  - {type: variant, offset: 324, length: 2, content: 治己, krp: 黄老之道貴因循曰可則因否則革革與因雖異隨變而通理也故先王之事世相反而其道一也祕曰隨時制宜光曰前人所為是則因之否則變之無常道太𤣥曰夫道冇因有循有革有化因而循之與道神之革而化之與時冝之故因而能革天道乃得革而能因天下乃馴夫物不因不生不革不成故知因而不知革物失其則知革而不知因物失其均革之匪時物失其基因之匪理物䘮其紀因革乎因革國家之矩範也矩範之動成敗之効也或問無為曰奚為哉應化而已光曰所}
  - {type: variant, offset: 325, length: 1, content: 己, SBCK: 之}
  - {type: variant, offset: 327, length: 2, content: 仲尼, SBCK: 中國殷正}
  - {type: variant, offset: 327, length: 2, content: 仲尼, WYG: 有為者救時之失耳時不失道又何為哉在昔虞夏襲堯之爵行堯之道法度彰禮樂著垂拱而視天民之阜也咸曰阜盛也富也無為矣祕曰阜厚也垂衣拱手視天民之厚盛何為哉紹桀之後纂紂之餘法度廢禮樂虧安坐而視天民之死無為乎紹桀者成湯也纂紂者周武也當此之時湯武不可安坐視天下民之死而欲無為也所謂可則因否則革矣應變順時故迹不同致理而言皆非為也祕曰湯武革命應天順人自然有為之時光曰宋吴本皆作天民無下字李本作天下民}
  - {type: page-break, offset: 327, content: '', id: KR3a0009_WYG_003-8b, image: WYG0696/WYG0696-0293b.png}
  - {type: variant, offset: 327, length: 2, content: 仲尼, krp: 有為者救時之失耳時不失道又何為哉在昔虞夏襲堯之爵行堯之道法度彰禮樂著垂拱而視天民之阜也咸曰阜盛也富也無為矣祕曰阜厚也垂衣拱手視天民之厚盛何為哉紹桀之後纂紂之餘法度廢禮樂虧安坐而視天民之死無為乎紹桀者成湯也纂紂者周武也當此之時湯武不可安坐視天下民之死而欲無為也所謂可則因否則革矣應變順時故迹不同致理而言皆非為也祕曰湯武革命應天順人自然有為之時光曰宋吴本皆作天民無下字李本作天下民}
