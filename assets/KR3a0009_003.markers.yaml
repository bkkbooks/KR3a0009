  - {type: punctuation, offset: 331, content: 「, id: KR3a0009_tls_003-bkkpn112}
  - {type: variant, offset: 331, length: 0, content: '', SBCK: 孰爲中國正直北辰爲天之齊今俱偏僻未知誰爲居中國曰五政之所加七賦之所養中於天地者爲中國五政五常之政也七賦五穀桑麻也中於天地者土圭測景晷度均也過此而往者人也哉譬八荒之於中國如彼諸子之於聖人如是聖人之}
  - {type: variant, offset: 331, length: 0, content: '', WYG: 太古塗民耳目惟其見也聞也見則難蔽聞則難塞人以為太古不如絶禮樂以塗塞人之耳目令不見不聞使之純一祕曰太古未作禮樂是塗塞人之耳目使其純愚光曰老子曰古之}
  - {type: variant, offset: 331, length: 0, content: '', krp: 太古塗民耳目惟其見也聞也見則難蔽聞則難塞人以為太古不如絶禮樂以塗塞人之耳目令不見不聞使之純一祕曰太古未作禮樂是塗塞人之耳目使其純愚光曰老子曰古之}
  - {type: variant, offset: 332, length: 0, content: '', SBCK: 天下也礙諸以禮樂礙限無則禽異則貉吾見諸子之小禮樂也不見聖人之小禮樂也孰有書不由筆言不由舌吾見天常爲帝王之筆舌也天常五常也帝王之所制奉也譬諸書言之於筆舌爲人之由禮樂也智也者知也夫智用不用益不益則不贅虧矣深知器械舟車宫室之爲則禮由}
  - {type: page-break, offset: 332, content: '', id: KR3a0009_SBCK_004-3a}
  - {type: variant, offset: 332, length: 1, content: 己, WYG: 者非}
  - {type: variant, offset: 332, length: 1, content: 己, krp: 者非}
  - {type: variant, offset: 333, length: 0, content: '', SBCK: 或問大聲曰非雷非霆隱隱耾耾久而愈盈尸諸聖尸主也雷霆之聲聞當時聖人之言傳無窮或問道有因無因乎曰可則因否則革革之與因雖異隨變而通理也故先王之事丗相反而其道一也或問無爲曰奚爲哉應化而巳在昔虞夏襲堯之爵行堯之道法度彰禮樂著垂拱而視天下民之阜也無爲矣紹桀之後纂紂之餘法度廢禮樂虧安坐而視天下民之死無爲乎紹桀者成湯也纂紂者周武也當此之時湯武不可得安坐視天下民之死而欲無爲也所謂可則因否則革矣應變順時故迹不同致理而言皆非爲也或問太古塗民耳目惟其見也聞也見則難蔽聞則難塞人}
  - {type: page-break, offset: 333, content: '', id: KR3a0009_SBCK_004-3b}
  - {type: variant, offset: 334, length: 6, content: 仲尼仲尼奚寡, SBCK: 爲太古不如絶禮樂以塗塞人之耳目令不見不聞使之純一曰天之肈降生民使其目見耳聞是以視之禮聽之樂因其耳目而節之如視不禮聽不樂雖有民焉得而塗諸或問新敝曰新則襲之敝則益損之值其日新則襲而因之值其敝亂則損益隨時或問太古德懷不禮懷嬰兒慕駒犢從焉以禮曰嬰犢乎歎無禮也嬰犢母懷不父懷母懷愛也父懷敬也獨母而不父未若父母之懿也兼乎愛敬然後盛其美善狙詐之家曰狙詐之計不戰而屈人兵堯舜}
  - {type: page-break, offset: 334, content: '', id: KR3a0009_SBCK_004-4a}
  - {type: variant, offset: 334, length: 6, content: 仲尼仲尼奚寡, WYG: 明民将以愚之故欲搥提仁義絶滅禮學曰天之肇降生民使其目見耳聞是以視之禮聽之樂因其耳目而節之祕曰天之始生人即使其目能視耳能聞是以聖人配地作禮以養其視應天作樂以養其聽如視不禮聽不樂雖有民焉得而塗諸咸曰言使民視聽皆由禮樂則安用塗之如其視邪聽滛雖欲塗之末由也㔾祕曰視聽無禮樂則大亂雖有民焉得而塞之光曰聖人所以能使其民者以有禮樂也若皆去之則民将散亂而不可制雖欲取其耳目而塗之安可得哉或問新敝祕曰問政教之隆殺如衣之新敝曰新則襲之敝則損益之值其日新則襲而因之值其敝亂則損益随時咸曰新猶初革命之始也敝猶久守成之際也夫革命之始制度未立始仍舊貫故曰襲之守成之際觀可以變故曰損益之孔子曰殷因於夏禮所損益可知也周因於殷禮所損益可知也此之謂矣祕曰政教之隆則因而襲之敝則革而損益之或問太古徳懷不禮懷祕曰道家尚徳而薄禮故言太古之人未有禮惟懷徳爾嬰兒慕駒犢從焉以禮咸曰焉安也言太古之人歸於上也猶嬰兒之慕母駒犢之從乳安用禮祕曰二者俱懷母之徳}
  - {type: page-break, offset: 334, content: '', id: KR3a0009_WYG_003-9a, image: WYG0696/WYG0696-0293c.png}
  - {type: page-break, offset: 334, content: '', id: KR3a0009_WYG_003-9b, image: WYG0696/WYG0696-0293d.png}
