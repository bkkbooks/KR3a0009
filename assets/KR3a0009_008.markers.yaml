  - {type: variant, offset: 198, length: 3, content: 儀魯徵, WYG: 智用行舍藏功成身退陳平之無悮内明其畫外無違悮祕曰所舉必行無謬悮光曰李本悮作悟今從宋吴本悮與忤同絳侯勃之果祕曰誅諸呂立代王果於大事霍將軍之勇祕曰光擢燕上官之鋒處興廢之分而不懼終之以禮樂則可謂社稷之臣矣此數公遭漢初定倉卒之際則權應當時苟以救世不能與稷契伊周同風未終}
