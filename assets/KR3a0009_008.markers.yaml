  - {type: variant, offset: 106, length: 1, content: 詘, WYG: 得其死然祕曰秦悼武秦惠王之子也武王有力好戯力士任鄙烏獲孟說皆至大官王與孟說舉鼎絶臏而死抃牛亦多力也呂氏春秋曰遂擒推移大犧髙誘云桀多力能推移大犧因以為號光曰抃牛謂以兩牛相撃}
