  - {type: variant, offset: 115, length: 0, content: '', SBCK: 也仲尼荅以俎豆子雲應之以德義魯仲連而不制髙談以救時難功成而不受禄賞藺相如制而不好義崇理屈身伸節輔佐本國繫時之務也或問鄒陽曰未信而分疑忼辭免罿幾矣哉鳥罟謂之罿猶人之縲紲幾危也獄中出慷􅁣之辭得以自免亦巳危矣或問信陵平原孟甞春申益乎曰上失其政姦臣竊國命何其益乎當此四君之時實皆有益於其國而􅀭子譏之者蓋論上失其政故辯明之樗里子之知也使知國如葬}
  - {type: variant, offset: 115, length: 2, content: 則何, WYG: 也仲尼荅以爼豆子雲應以徳義祕曰養浩然之氣勇之大者光曰孔子曰見義不為無勇也魯仲連􅀈而不制髙談以救時難功成而不受爵賞咸曰魯仲連齊人不肯仕宦好持髙游於趙㑹秦軍圍邯鄲魏使新垣衍說趙王令尊秦昭王為帝而仲連挫之垣衍不敢復言帝秦秦将聞之為却軍五十里遂引而去於是平原君欲封魯連魯連遂辭而去終身不復見􅀈猶倨慢也制猶整肅也言仲連倨慢於爵利而不能整肅於官事也光曰宋吴本􅀈作偒制作剬介甫曰餳古蕩字剬古制字今從李本藺相如制而不􅀈好義崇禮屈身伸節輔佐本國繫時之務也咸曰藺相如趙人相趙惠王與秦昭王會澠池旣罷歸以相如功大拜為上卿位在亷頗之右頗羞不忍為之下宣言曰我見相如必辱之相如聞之常引車避匿嘗曰顧吾念彊秦所}
  - {type: page-break, offset: 115, content: '', id: KR3a0009_WYG_008-3b, image: WYG0696/WYG0696-0335d.png}
