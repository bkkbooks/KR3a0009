  - {type: variant, offset: 116, length: 0, content: '', SBCK: 吾以疾爲蓍􅀛疾者樗里子之名死葬豫言後當有兩天子宫夾我果如其言使其䇿筭國事如之則吾以疾爲蓍􅀛者有爲有行動而問焉周之順赧以成周而西傾秦之惠文昭襄以西山而東并孰愈曰周也羊秦也狼然則狼愈與曰羊狼一也過猶不及兩不與也或問蒙恬忠而􅀍誅忠奚可爲也曰壍山堙谷起臨洮擊遼水力不足而死有餘忠不足相也相助也雖盡一身之節而殘百姓之命非所以務民之義或問吕不韋其智矣乎以人易貨吕不韋陽翟賈人也出千金以助子楚子楚旣立不韋相之曰誰謂不韋智者與以國易宗雖開列封先􅀏後愁身旣鴆死宗族竄流不韋之盜穿窬之雄乎不以其道非盜}
