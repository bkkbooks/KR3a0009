  - {type: variant, offset: 570, length: 489, content: 用他道亦無由至矣赫赫乎日之光群目之用也渾渾乎聖人之道群心之用也或問天地簡易而聖人法之何五經之支離曰支離蓋其所以為簡易也已簡已易焉支焉離或曰聖人無益於庸也曰世人之益者倉廩也取之如單仲尼神明也小以成小大以成大雖山川丘陵草木鳥獸裕如也如不用也神明亦末如之何矣或問聖人占天乎曰占天地若此則史也何異曰史以天占人聖人以人占天或問星有甘石何如曰在德不在星德隆則晷星星隆則晷德也或問大人曰無事於小為大人請問小曰事非禮義為小聖人之言遠如天賢人之言近如地瓏𤫩其聲者其質玉乎聖人矢口而成言肆筆而成書言可聞而不可殫書可觀而不可盡周之人多行秦之人多病行有之也病曼之也周之士也貴秦之士也賤周之士也肆秦之士也拘月未望則載魄于西既望則終魄于東其遡於日乎彤弓盧矢不為有矣聆聽前世清視在下鑑莫近於斯矣或問何如動而見畏曰畏人何如動而見侮曰侮人夫見畏之與見侮無不由己或問禮難以強世曰難故強世如夷俟倨肆羈角之哺果而啗之奚其強或性或強及其名一也見弓之張兮弛而不失其良兮或曰何謂也曰檠之而已矣川有防器有範見禮教之至也經營然後知幹楨之克立也莊揚蕩而不法墨晏儉而廢禮申韓險而無化鄒衍迂而不信聖人之材天地也次山陵川泉也次鳥獸草木也, SBCK: 巳}
