  - {type: variant, offset: 777, length: 282, content: 遠如天賢人之言近如地瓏𤫩其聲者其質玉乎聖人矢口而成言肆筆而成書言可聞而不可殫書可觀而不可盡周之人多行秦之人多病行有之也病曼之也周之士也貴秦之士也賤周之士也肆秦之士也拘月未望則載魄于西既望則終魄于東其遡於日乎彤弓盧矢不為有矣聆聽前世清視在下鑑莫近於斯矣或問何如動而見畏曰畏人何如動而見侮曰侮人夫見畏之與見侮無不由己或問禮難以強世曰難故強世如夷俟倨肆羈角之哺果而啗之奚其強或性或強及其名一也見弓之張兮弛而不失其良兮或曰何謂也曰檠之而已矣川有防器有範見禮教之至也經營然後知幹楨之克立也莊揚蕩而不法墨晏儉而廢禮申韓險而無化鄒衍迂而不信聖人之材天地也次山陵川泉也次鳥獸草木也, WYG: 卷八}
