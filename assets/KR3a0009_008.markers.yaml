  - {type: variant, offset: 202, length: 1, content: 生, WYG: 王之禮樂祕曰言此數公旣立功之後以禮樂自終則社稷臣矣光曰言雖兼數公之才業不能修禮樂以成治平之化亦末足謂之社稷之臣也或問公孫𢎞董仲舒孰邇欲知此二人用心誰近聖人之道祕曰誰近社稷之臣曰仲舒欲為而不可得𢎞容而已矣利用安身祕曰仲舒欲施禮樂之事而武帝外之故不可得也禮樂志曰時上方征討四夷銳志武功不暇留意禮文之事又曰未有立禮成樂此賈誼仲舒王吉劉向之徒所為發憤而增歎也𢎞嘗與公卿約議至上前皆背其約以順上㫖是取容而已何暇禮樂战或問近世名卿曰若張廷尉之平張釋之堆存公平無阿}
