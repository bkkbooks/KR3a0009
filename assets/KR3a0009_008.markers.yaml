  - {type: variant, offset: 142, length: 1, content: 重, krp: 惡諸祕曰皆飾詐辯尚權變聖人不取也曰孔子讀而儀秦行何如也欲讀仲尼之書而行蘇張之辯曰甚矣鳳鳴而鷙翰也咸曰鳳鳴謂孔子讀也鷙翰謂秦儀行也祕曰鷙擊也鄒陽曰鷙鳥累百光曰輸胡安侯肝二切鷙鷹隼也翰羽翼也曰然則子貢不為歟言子貢亦㳺說抑齊破吴以救魯祕曰齊欲伐魯子貢行而說齊存魯破吴彊晉覇越言儀秦非道則子貢學孔子矣不為之乎光曰子貢存魯亂齊破吴强晉覇越考其年與事皆不合蓋六國㳺說之士託為之辭太史公不加考校因而記之揚子亦據太史公書發此語曰亂而不解子貢耻諸說而不富貴儀秦耻諸耻國亂而不觧其義髙耻㳺說而不富貴其情下祕曰子貢之志在觧於禍亂儀秦之志在求於富貴苟求富貴則無所不至矣或曰儀秦其才矣乎跡不蹈矣蘇秦佩六國相印以抑彊秦張儀入秦而復其衛後破山東咸曰迹不蹈已者蹈踐也言儀秦之才術超卓自然不踐循舊人之迹祕曰儀秦雖同術豈非才乎秦則務縱横儀則務觧之二人之迹各不相蹈曰昔在任人帝曰難之亦才矣祕曰任佞也巧言近佞不以才也光曰宋吴本作昔在任人帝而難之不以才矣今從李本任音壬難讀如字佞者口才也舜謂知人安民惟帝其難之能哲而惠何畏乎巧言令色孔壬揚子言驩兠之徒能以巧言惑聖人其才亦不在人下矣才乎才非吾徒之才也祕曰儀秦之才非元凱之才也光曰口才君子所不貴美行園公綺里季夏黄公角里先生避秦之亂隠居商山不朝髙祖而從太子帝客禮之祕曰行人所不能四皓也光曰角盧谷切或作角音同言辭婁敬陸賈婁敬說髙祖都闗中陸賈說尉佗為漢臣又作新語髙祖善之執正王陵申屠嘉呂后欲王諸呂陵執意不從免陵乃得封之文帝佞幸鄧通至使慢禮嘉折之又晁錯犯憲嘉奏誅錯光曰宋吴本正作政今從李本折節周昌汲黯髙祖欲易太子周昌面爭以為不可武帝時公孫𢎞為丞相汲黯面折𢎞於上前以為𢎞諛不忠祕曰折節言其能降也夫彊直之人降則為亂若二公者夭姿彊直而能乃降其折節可尚矣守儒袁固申公袁固守正以得辠於竇太后后使入圏擊彘申公守正以事楚王卒為楚王所烹此二公終不屈}
  - {type: variant, offset: 145, length: 5, content: 而輕其祿眾, SBCK: 菑異董相夏侯勝京房董仲舒夏侯勝京房皆善推隂陽知災異或問蕭曹曰蕭也規曹也隨蕭何規剏於前如一曹參奉隨於後不失滕灌樊酈曰俠介四}
  - {type: variant, offset: 145, length: 0, content: '', WYG: 祕曰袁固生以治詩孝景帝時為博士竇太后好老子書召袁固生問老子書固曰此是家人言耳頃之為清河王太傅乆之病免申公以詩經為訓及趙綰王臧謂天子欲立明堂以朝諸侯不能就其事乃言師申公於是天子使使東帛加壁安車駟馬迎申公以為太中大夫舍魯邸議明堂事竇太后不說儒術得綰臧之過申公以疾免災異董相夏侯勝京房董仲舒夏侯勝京房皆善推隂陽知災異或問蕭曹曰蕭也規曹也随蕭何規剏於前如一曹參奉随於後不失光曰非蕭不能規非曹不能随二人恊心共成漢道其賢等耳滕灌樊酈曰俠介滕公灌嬰樊噲酈商此四人前後輔夾髙帝咸曰俠與挾同持也介衛也言髙帝為沛公時}
