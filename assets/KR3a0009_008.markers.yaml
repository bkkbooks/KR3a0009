  - {type: variant, offset: 207, length: 0, content: '', SBCK: 疑後至収而治之乃明巫成方遂也尹扶風之絜尹翁歸清廉有節不􅀍滋垢王子貢之介王子貢名尊成帝時人治任公正誅鉏豪強不避貴戚斯近丗名卿矣將旣聞名卿次問名將曰若條侯之守長平冠軍之征伐愽陸之持重可謂近丗名將矣請問古欲知古之良將曰鼓之以道德征之以仁義輿尸血刃皆所不爲也張騫蘇武之奉使也執節没身不屈王命雖古之膚使其猶劣諸膚美丗稱東方生之盛也言不純師行不純表其流風遺書蔑如也或曰隱者也曰昔之隱者吾聞其語矣又聞其行矣昔之隱者文王拘於羑里而重易六爻箕子隱於殷朝而爲周陳洪範接輿之在楚而歌鳯􅀆或曰隱道多端曰固也聖言聖行不逢其時聖人隱也賢言賢行不逢其時賢者隱也談言談行而不逢其時談者隱也昔者箕子之漆其身也狂接輿之􅀍其髮也欲去而恐罹害者也箕子之洪範接輿之歌鳯也哉或問東方生名過實者何也曰應諧不窮正諫穢德由此四事得名應諧似優似倡優不窮似哲正諫似直穢德似隱請問名曰詼達惡比欲知誰比曰非夷齊而是柳下惠戒其子以尚容首陽爲拙柱下爲工飽食安坐以仕易農依隱玩丗詭時不逢其滑稽之雄乎非夷齊是柳下惠戒其子以尚同依隱玩丗飽食安坐以仕易農此滑稽之雄者也或問柳下惠非朝隱者與此問發於東方朔也曰君子謂之不恭古者髙餓顯下禄隱孟子曰伯夷隘柳下惠不恭隘與不恭君子不由也然則餓顯不獨髙禄隱未爲下今發髙下之談蓋有厲乎素飱也妄譽仁之賊也妄毀義之賊也賊仁近郷原賊義近郷訕同乎流俗合乎汙丗衆皆􅀃之以爲是而不可與入堯舜之道者德之賊也孔子惡似而非者孟軻論之備矣或問子蜀人也請人曰有李仲元者人也蜀有嚴君平豈伊仲元君平巳顯仲元未聞其爲人也柰何曰不屈其意不累其身曰是夷惠之徒與曰不夷不惠可否之間也隨時之義治亂若鳯如是則奚名之不彰也曰無仲尼則西山之餓夫與東國之絀臣惡乎聞餓夫夷齊絀臣柳下惠也曰王陽貢禹遇仲尼乎曰明星皓皓華藻之力也與星雖皓皓有華藻然非}
