  - {type: variant, offset: 137, length: 0, content: '', WYG: 乃使蒙恬将三十萬衆北逐戎狄收河南築長城起臨洮至遼東延袤萬里又始皇欲遊天下乃使蒙恬通道自九原抵丼泉塹山堙谷後始皇卒胡亥立與其弟蒙毅俱為趙髙所害吞藥而死司馬遷謂蒙恬所為秦築長城亭障塹山堙谷通直道固輕百姓力矣夫秦之初滅諸侯天下之心未定痍傷者未瘳而恬為名将不以此時强諫振百姓之急養老存孤務修衆庻之和而阿意興功此其兄弟遇誅不亦宜乎今揚㫖與遷同故備載之以見始末光曰李本屍作死今從宋吴本塹七豔切洮士刀切相息亮切或問呂不韋其智矣乎以人易貨呂不韋陽翟賈人也出千金以助子楚子楚旣立不韋相之祕曰呂不韋陽翟大賈人也秦子楚質於趙不韋曰此竒貨可居故曰人易貨光曰捐千金而得子楚曰誰謂不韋智者歟以國易宗雖聞列封先笑後愁身旣鴆死宗族竄流祕曰不韋仕不由道用貨財而佞於華陽夫人以取顯位終乃家屬徙蜀飲鴆而死是徼取國權以易宗族光曰貪國權而䘮其宗呂不韋之盗穿窬之雄乎不以其道非盗而何穿窬也者吾見擔石矣未見雒陽也雒陽不韋所封國也揭雒陽而行天下豈徒擔石乎祕曰穿窬者伺慢藏而得之不􅂈一擔一石而不韋伺人顔色而取之雒陽之封是其雄也子楚立是為荘㐮王以不韋為丞相封為文信侯食河南雒陽十萬户光曰窬音踰擔都濫切秦將白起不仁奚用為也長平之戰四十萬人死蚩尤之亂不過於此矣原野厭人之肉川谷流人之血將不仁奚用為奚何咸曰白起事秦為武安君前後伐韓魏斬殺甚多昭王四十七年與王齮伐趙圍其将趙括於長平旣殺趙括括軍敗卒四十萬人降起起乃挾詐而盡坑殺之故揚以為不仁光曰用将所以救亂誅暴翦問王翦祕曰王翦頴陽東鄉人也問其將略曰始皇方獵六國而翦牙欸咀噬用牙言其酷也欸者絶語歎聲祕曰言翦之助惡也牙欸謂切齒而怒也欸怒聲太史公曰王翦為秦将夷六國光曰欸烏開切翦為之牙以噬物或問要離非義者歟不以家辭國祕曰要離吴人棄家而為國疑其有義光曰要一遙切曰離也火妻灰子以反於慶忌實蛛蝥之靡也焉可謂之義也義者臣子死節乎君親之難也離自平入而焚燒妻子詐為吴仇讎求信於慶忌反而刺之若蜘蛛之小巧耳祕曰吴王闔閭欲殺王子慶忌要離詐以罪亡令吴王燔其妻子而揚其灰走見慶忌以劔刺之譬如蜘蛛之螫毒於人而靡死也焉可為義哉靡披靡而死也光曰宋吴本蝥作螫今從李本蛛音誅蝥音矛靡興糜同音義曰賈誼新書曰蛛蝥作網光謂靡爛也政也祕曰聶政軹深井里人也問其義乎為嚴氏犯韓刺相俠累曼面為姊實壮士之靡也焉可謂之義也俠累韓相名也祕曰嚴仲子事韓哀侯與韓相俠累有郤仲子恐誅亡去游齊交聶政政後伏劔至韓刺殺俠累因自鈹面决眼自屠出腸遂以死其姊嫈如韓之市伏尸哭於邑悲哀而死政之旁曼無也言政知姊之忠烈乃鈹其面使他人無所識認且欲全其姊者也小爾雅曰曼無也光曰音義曰曼謨官切塗面軻也問荆軻祕曰荆軻也義乎為丹奉於期之首燕督亢之圖入不測之秦實刺客之靡也咸曰燕太子丹以荆軻為上卿欲以報秦先是秦将樊於期得罪亡入燕太子丹受而舍之秦購樊於期首金千斤邑萬家荆軻謂太子丹曰誠得樊将軍首與燕督亢之地圖以獻秦王王必恱見臣臣乃得以報矣於是說樊於期於期遂自刎軻乃與秦舞陽盛於期首函封之及求天下利匕首與秦督亢之地圖至秦秦王聞之喜乃見於咸陽宮軻奉於期首而秦舞陽奉地圖秦王發圖窮而軻以左手持把秦王之袖右手持匕首揕之秦王驚自引而起軻知事不就倚柱而笑箕倨以罵秦王左右遂前殺軻矣光曰亢音剛焉可謂之義也三士所死皆非君親之難也非義之義君子}
