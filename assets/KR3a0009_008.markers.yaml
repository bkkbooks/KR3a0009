  - {type: 'tls:seg', offset: 140, content: '', id: KR3a0009_tls_008-4a.2}
  - {type: variant, offset: 140, length: 0, content: '', WYG: 或問儀秦學乎鬼谷術而習乎縱横言安中國者各十餘年是夫祕曰張儀魏人也蘇秦雒陽人也俱事鬼谷先生學術裴駰曰按風俗通乂曰鬼谷先生六國時縱横家於是張儀相秦蘇秦相六國乃投縱約書於秦秦兵不敢闚谷闗十五年問是道夫曰詐人也}
  - {type: variant, offset: 140, length: 0, content: '', krp: 或問儀秦學乎鬼谷術而習乎縱横言安中國者各十餘年是夫祕曰張儀魏人也蘇秦雒陽人也俱事鬼谷先生學術裴駰曰按風俗通乂曰鬼谷先生六國時縱横家於是張儀相秦蘇秦相六國乃投縱約書於秦秦兵不敢闚谷闗十五年問是道夫曰詐人也}
  - {type: variant, offset: 142, length: 1, content: 重, SBCK: 惡諸曰孔子讀而儀秦行何如也欲讀仲尼之書而行􅂫張之辯曰甚矣鳯鳴而鷙翰也然則子貢不爲與言子貢亦行游􅀃抑齊破吴以救魯曰亂而不解子貢恥諸􅀃而不富貴儀秦恥諸恥國亂而不解於義髙恥游􅀃而不富貴其情下或曰儀秦其才矣乎跡不蹈巳儀不迹秦曰昔在任人帝曰難之亦才矣任佞才乎才非吾徒之才也美行園公綺里季夏黃公角里先生避秦之亂隱居商山不朝髙祖而從太子帝客禮之言辭婁敬陸賈婁敬􅀃髙祖都􅀜中陸賈􅀃尉佗爲漢臣又作新語髙祖善之執正王陵申屠嘉吕后欲王諸吕陵執意不從免陵乃得封文帝佞幸鄧通至使慢禮嘉収通晁錯犯憲奏誅錯折節周昌汲黯折節謂直諫守儒轅固申公轅固守正以得辠於竇太后后使入圏擊彘申公守正以事楚王卒爲所亨此二人終不屈}
  - {type: page-break, offset: 142, content: '', id: KR3a0009_SBCK_011-3b}
  - {type: variant, offset: 142, length: 1, content: 重, WYG: 惡諸祕曰皆飾詐辯尚權變聖人不取也曰孔子讀而儀秦行何如也欲讀仲尼之書而行蘇張之辯曰甚矣鳳鳴而鷙翰也咸曰鳳鳴謂孔子讀也鷙翰謂秦儀行也祕曰鷙擊也鄒陽曰鷙鳥累百光曰輸胡安侯肝二切鷙鷹隼也翰羽翼也曰然則子貢不為歟言子貢亦㳺說抑齊破吴以救魯祕曰齊欲伐魯子貢行而說齊存魯破吴彊晉覇越言儀秦非道則子貢學孔子矣不為之乎光曰子貢存魯亂齊破吴强晉覇越考其年與事皆不合蓋六國㳺說之士託為之辭太史公不加考校因而記之揚子亦據太史公書發此語曰亂而不解子貢耻諸說而不富貴儀秦耻諸耻國亂而不觧其義髙耻㳺說而不富貴其情下祕曰子貢之志在觧於禍亂儀秦之志在求於富貴苟求富貴則無所不至矣或曰儀秦其才矣乎跡不蹈矣蘇秦佩六國相印以抑彊秦張儀入秦而復其衛後破山東咸曰迹不蹈已者蹈踐也言儀秦之才術超卓自然不踐循舊人之迹祕曰儀秦雖同術豈非才乎秦則務縱横儀則務觧之二人之迹各不相蹈曰昔在任人帝曰難之亦才矣祕曰任佞也巧言近佞不以才也光曰宋吴本作昔在任人帝而難之不以才矣今從李本任音壬難讀如字佞者口才也舜謂知人安民惟帝其難之能哲而惠何畏乎巧言令色孔壬揚子言驩兠之徒能以巧言惑聖人其才亦不在人下矣才乎才非吾徒之才也祕曰儀秦之才非元凱之才也光曰口才君子所不貴美行園公綺里季夏黄公角里先生避秦之亂隠居商山不朝髙祖而從太子帝客禮之祕曰行人所不能四皓也光曰角盧谷切或作角音同言辭婁敬陸賈婁敬說髙祖都闗中陸賈說尉佗為漢臣又作新語髙祖善之執正王陵申屠嘉呂后欲王諸呂陵執意不從免陵乃得封之文帝佞幸鄧通至使慢禮嘉折之又晁錯犯憲嘉奏誅錯光曰宋吴本正作政今從李本折節周昌汲黯髙祖欲易太子周昌面爭以為不可武帝時公孫𢎞為丞相汲黯面折𢎞於上前以為𢎞諛不忠祕曰折節言其能降也夫彊直之人降則為亂若二公者夭姿彊直而能乃降其折節可尚矣守儒袁固申公袁固守正以得辠於竇太后后使入圏擊彘申公守正以事楚王卒為楚王所烹此二公終不屈}
