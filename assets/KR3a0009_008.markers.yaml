  - {type: variant, offset: 207, length: 0, content: '', WYG: 疑後至取而治之乃巫成方遂也光曰雋徂兖切尹扶風之絜尹翁歸清亷有節不避滋垢王子貢之介王子貢名尊成帝時人治任公正誅鋤豪彊不避貴戚斯名卿矣将旣聞名卿次問名将曰若條侯之守咸曰周亞夫也守謂守細栁光曰璧昌邑不救梁以弊吴雖有詔書亦不從長平冠軍之征伐祕曰長平侯衛青冠軍侯霍去病俱征伐匈奴立功博陸之持重祕曰博陸侯霍光賛曰臨大節而不可奪遂正國家安社稷可謂名将矣請問古欲知古之良将曰鼓之以道徳咸曰猶益賛禹而有苗格祕曰以道勝者帝以徳勝者王帝王之兵前無敵孫子五教之計一曰道征之以仁義咸曰猶常武所謂旣敬旣戒惠此南國祕曰荀卿曰桓文之節制不可以敵湯武之仁義輿尸血及皆所不為也張騫蘇武之奉使也執節没身不屈王命雖古之膚使其猶劣諸膚美也咸曰張騫嘗使月氐道經匈奴中來徃兩為匈奴所得留騫十餘歲然騫持漢節不失後亡歸初騫行時百餘人去十三歲惟二人得還蘇武嘗使匈奴中單于說武令降武不聼單于怒幽武寘大窖中絶不與食又徙武北海上無人處使牧羝武旣至海上杖漢節牧羊卧起持操節旄盡落留匈奴凡十九年至昭帝即位匈奴與漢和親漢求武得歸故二人雖古之美使所不及矣光曰没身者乆留匈奴不顧其死世稱東方生之盛也言不純師行不純表其流風遺書蔑如也咸曰揚鄙朔之為政所以自發論也表則也蔑絶也謂朔之言行不純一於聖人之師則如詼諧射覆隠語之類也故宗聖之風立教之書絶而不傳今觀朔嘗上書陳農戰强國之計數萬言又有封太山貴和氏璧及皇太子生禖屏風平樂觀賦諸篇頗存盖子雲惡其雜而不取之也祕曰顔師古曰言辭義淺薄不足稱也光曰朔言行駁雜所師表者不能純壹其流風遺書皆蔑然無足觀也或曰隠者也成曰或見揚之短朔故問以為世稱朔吏隠者也光曰宋吴本或曰作或問今從李本曰昔之隠者吾聞其語矣又聞其行矣昔之隠者文王拘於羑里而重易六爻箕子隠於殷朝而為周陳洪範接輿之在楚而歌鳳兮咸曰吾聞其語又聞其行者如夫子所謂作者七人之義也言隠道當如此七人者祕曰聞其聖賢之言行光曰言皆不然或曰隠道多端咸曰或言隠之道多端如朔者亦其一也曰固也咸曰固實也言隠道實多端故陳之于下聖言聖行不逢其時聖人隠也咸曰仲尼亦然祕曰易曰龍徳而隠者也不易乎世不成乎名遯世旡悶不見是而旡悶樂則行之憂則危之其聖人隠也賢言賢行不逢其時賢者隠也咸曰孟軻亦然祕曰捨之則蔵光曰考其言行之素皆聖賢也以不逢其時故隠以避害耳談言談行不逢其時談者隠也咸曰子貢仲連亦然祕曰有文而不遇者儒行曰言談者仁之文也光曰朔談者耳不遇戰國縱横之時故依隠玩世不足貴也昔者箕子之漆其身也狂接輿之被其髮也欲去而恐罹害者也箕子之洪範接輿之歌鳳也哉咸曰彼之隠者猶為行道立教而干於時如楚狂箕子去而隠以避害言隠雖有此數端而朔不可以及是祕曰此皆多端也箕子為之奴孔子曰殷有三仁焉而有聞著乎洪範接輿佯狂孔子下欲與之言而有聞著乎歌鳯是皆多端之甚者而其道純正罹一本作離光曰二子皆晦迹以避害遇聖人則自顯或問東方生名􅂈實者何也咸曰言朔旣不及此而世稱之􅂈實何也曰應諧不窮正諫穢徳由此四事得名應諧似優似倡優咸曰應諧謂應言而諧戲之如與倖倡郭舍人隠語者不窮似哲咸曰問則輙應如射覆見微者祕曰變詐鋒出莫能窮者似智慧光曰吴本哲作智今從李宋木正諫似直咸曰蓋諌上休斥董偃請焚甲乙帳者祕曰時觀察顔色直言切諌似峭直穢徳似隠祕曰懐肉汙衣歲更娶婦似隠迹請問名曰談逹􅁖比欲知誰比祕曰朔之名也談也達也何為倫比談一本作詼字光曰宋本作請問名字逹吴本作請問名談逹今從李本音義引漢書朔談達多端不名一行或問朔所為當何以名之揚子謂朔談諧敏逹之人耳惡音烏曰非夷齊而是栁下惠戒其子以尚容首陽為拙柱下為工飽食安坐以仕易農依隠玩世詭時不逢其滑稽之雄乎非夷齊是栁下惠戒其子以尚同依隠玩世飽食安歩以仕易農此滑稽之雄者也咸曰言朔非夷曠而尚取容依約其隠玩弄於世但滑稽之雄者而已何所比哉光曰李宋吴本皆云非夷尚容依隠玩世其滑稽之雄乎按漢書具載揚子之言恐諸家脫悮也今從漢書滑音骨言朔依託隠者以玩侮世人以詭譎欺時人不逢迕取禍也滑稽多智員曲之貌或問栁下惠非朝隠者歟此問發於東方朔也咸曰或以揚之短朔疑朔與惠同道故舉之為請祕曰朔旣非隠則栁下惠降志辱身言中倫行中慮豈非朝隠者也光曰朝直遥切曰君子謂之不㳟古者髙餓顯下禄隠孟子曰伯夷隘柳下惠不㳟君子不由也然則餓顯不獨髙禄隠未為下人發髙下之談蓋有厲乎素飡咸曰揚以或人用朔比惠故舉孟軻不㳟之言以非栁下惠又以夷惠隘不㳟二者雖皆不可然推而取之寧以伯夷餓顯為髙終以栁下惠禄隠為下故曰古者髙餓顯下禄隠猶奢寕儉易寕戚之義爾亦所以短朔也光曰餓顯謂夷齊餓于首陽之下民到于今稱之妄譽仁之賊也妄毁義之賊也光曰譽音余下同仁以褒善義以貶惡而妄以毁譽加人是賊傷仁義者也賊仁近鄉原賊義近鄉訕同乎流俗合乎汙世衆皆說之以為是而不可與入堯舜之道者徳之賊也孔子惡似而非者孟軻論之備矣光曰鄉原謂所至之鄉徇衆随俗求媚於人者鄉訕謂所至之鄉喜造謗訕使人畏其口者或問子蜀人也請人祕曰問蜀人曰有李仲元者人也蜀有嚴君平然君早已顯仲元未聞祕曰仲元則其人也李仲元名𢎞見秦宓傳光曰人者蜀之賢人也仲元事見常璩華陽國志尤詳其為人也柰何咸曰柰何猶曰如何曰不屈其意不累其身光曰累良偽切不以爵位屈其意禄利累其身曰是夷惠之徒歟曰不夷不惠可否之間也随時之義治亂若鳳光曰冇清和之美而無隘與不㳟之失從衆而不害於義則可害於義則否如是則奚名之不彰也曰無仲尼則西山之餓夫與東國之絀臣惡乎聞餓夫夷齊絀臣栁下惠也咸曰東國魯也左傳云下展禽即栁下惠也言夷恵得仲尼譽之名始聞光曰絀與黜同惡音烏曰王陽貢禹遇仲尼乎咸曰王吉字子陽事宣帝為諌議大夫貢禹字少翁二人為友世稱王陽在位貢禹彈冠言其取捨同也元帝即位遣使徵貢禹與吉吉年老道病卒禹後為御史大夫此言李仲元不遇仲尼則名不彰而王陽貢禹之顯豈遇仲尼乎光曰言王貢力學絜已而名著海内豈必遇仲尼曰明星皓皓華藻之力也歟星雖皓皓有華藻然非能自顯耀也要湏著天而後天下見之光曰言星之明非藻飾所}
