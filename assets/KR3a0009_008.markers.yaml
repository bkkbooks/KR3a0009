  - {type: variant, offset: 5, length: 0, content: '', WYG: 晋李軌唐栁宗元註宋宋咸吴祕司馬光重添註淵騫篇咸曰以君臣者率廸淵騫之行則可勝道哉故次之重黎仲尼之後迄于漢道光曰宋吴本迄作訖今從李本迄至也徳行顔閔股肱蕭曹爰及名將尊卑之條稱述品藻定其差品及文質也咸曰品歴世之臣貴為不少矣然以淵騫為不可及而冠章首有意哉子雲也有以知長爵之逹弗逮乎廣道之尊乎或云是篇與重黎共序然漢書有之疑非揚辭而班固實之未知其據焉祕曰論漢道以仲尼之後蕭曹名将以徳行顔閔所以為品藻也光曰尊卑謂才徳髙下譔淵騫祕曰聖人之道豈不大哉賢哲所得各有差品一本無此序}
