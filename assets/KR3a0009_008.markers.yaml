李仲元者人也蜀有嚴君平然君早已顯仲元未聞祕曰仲元則其人也李仲元名𢎞見秦宓傳光曰人者蜀之賢人也仲元事見常璩華陽國志尤詳其為人也柰何咸曰柰何猶曰如何曰不屈其意不累其身光曰累良偽切不以爵位屈其意禄利累其身曰是夷惠之徒歟曰不夷不惠可否之間也随時之義治亂若鳳光曰冇清和之美而無隘與不㳟之失從衆而不害於義則可害於義則否如是則奚名之不彰也曰無仲尼則西山之餓夫與東國之絀臣惡乎聞餓夫夷齊絀臣栁下惠也咸曰東國魯也左傳云下展禽即栁下惠也言夷恵得仲尼譽之名始聞光曰絀與黜同惡音烏曰王陽貢禹遇仲尼乎咸曰王吉字子陽事宣帝為諌議大夫貢禹字少翁二人為友世稱王陽在位貢禹彈冠言其取捨同也元帝即位遣使徵貢禹與吉吉年老道病卒禹後為御史大夫此言李仲元不遇仲尼則名不彰而王陽貢禹之顯豈遇仲尼乎光曰言王貢力學絜已而名著海内豈必遇仲尼曰明星皓皓華藻之力也歟星雖皓皓有華藻然非能自顯耀也要湏著天而後天下見之光曰言星之明非藻飾所}
