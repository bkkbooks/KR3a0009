  - {type: variant, offset: 194, length: 2, content: 制君, krp: 分國邑侯子弟而諸侯自弱也故以錯為愚酷吏曰虎哉虎哉角而翼也郅都寗戚張湯杜周之徒咸曰韓詩外傳云無為虎傅翼将飛入邑擇人而食此以酷吏猶虎而角翼者言暴之甚也光曰不仁之人而得勢位如虎之得角翼貨殖曰蚊咸曰孔子云賜不受命而貨殖焉又曰求也為之聚歛是則貨殖聚歛聖人之所疾也漢書稱揚子不汲汲於富貴不戚戚於貧賤家無甔石之儲晏如也今或人問貨殖故荅之曰蚊亦疾之甚焉夫蚊之為蟲喙人而求生可鄙惡者也貨殖之徒兼并聚歛非義是存亦所謂喙人而求生矣祕曰貨殖之人折毫顧利㣲而食人其猶蚊乎曰血國三千使將䟽飲水褐博没齒然也咸曰揚旣以蚊貶貨殖或以是言難之也云天下之民有骨血者三千國非貨殖則将使其飯䟽食飲水被褐終年而已乎言衣食僅給而不能富庶也今下無荅文者蓋揚鄙其不諭教而彊見難故不對之也三千國者昔禹㑹塗山執五帛者萬國於商周之世已漸并之矣故至漢但可三千而已舉大較也褐博者孟子云褐寛博謂獨夫之被褐者没終也齒年也祕曰揚恐未諭故再釋之曰貨殖之心若蚊自務輕飽而血視三千之國使将䟽飯飲水衣褐博之衣没其年齒而後已也齒齡也按周一千八百國而漢郡國一百三縣邑千三百一十四云三千者蓋貨殖之人倍取於國且言其多歟光曰李本作没齒無愁也今從宋吴本蚊下曰衍字褐毛布也褐博以褐為寛博之衣也三千言其衆也言貨殖如蚊噆民之血使之皆貧困以終其身也或問循吏曰吏也鄭子産公儀休孫叔敖之徒咸曰言如是者始可謂之吏也游俠曰竊國靈也靈命也朱亥田仲郭觧劇孟原渉之徒咸曰苟恱士立氣勢作威福結私交以立彊於國者謂之㳺俠此云竊國靈蓋言竊行國之威靈以為之彊祕曰靈福也遷載㳺俠竊國之威靈為已之私義者也光曰國之所以能為國者以在上者執號令御其下如人之有神靈也佞幸曰不料而已籍儒鄧通周文仁韓王孫李延年之徒咸曰料度也夫佞幸者日以寵進位非才升憑乎城社卒蹈機穽亦不度者也光曰不自料其才徳不稱其寵禄而貪竊之以取禍敗此皆論太史公書所載或問近世社稷之}
