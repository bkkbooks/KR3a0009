  - {type: variant, offset: 138, length: 1, content: 為, SBCK: 仁奚用爲也長平之戰四十萬人死􅃖尤之亂不過於此矣原野猒人之肉川谷流人之血將不仁奚用爲奚何翦問王翦何將也曰始皇方獵六國而翦牙欸咀噬用牙言其酷也欸者絶語歎聲或問要離非義者與不以家辭國曰離也火妻灰子以求反於慶忌實蛛蝥之劘也焉可謂之義也義者臣子死節乎君親之難也離由平人而焚燒妻子詐爲呉讎求信於慶忌反而刺之若蜘蛛之䖝小巧耳政問聶政爲嚴氏犯韓刺相俠累曼面爲姊實壯士之靡也焉可謂之義也俠累韓相名也軻問荆軻爲丹奉於期之首燕督亢之圖入不測之秦實刺客之靡也焉可謂之義也三士所死皆非君親之難也非義之義君子不爲也或問儀秦學乎􅀑谷術而習乎縱橫言安中國者各十餘年是夫曰詐人}
