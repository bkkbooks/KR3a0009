  - {type: variant, offset: 128, length: 1, content: 如, SBCK: 揭}
  - {type: variant, offset: 128, length: 0, content: '', WYG: 獄中出慷慨之辭由得以自免亦已危矣咸曰鄒陽事漢景帝弟梁孝王為羊勝公孫詭所疾而讒之孝王怒下陽吏将殺之陽從獄中上書孝王立出之卒為上客未信而分疑者言未為梁王所信方為其所疑雖能分觧以免固亦危矣光曰忼苦兩切罿昌鐘切幾音機孔子稱信而後諫未信則以為謗已也陽初仕梁未為孝王所信而深言以觸機事分取孝王之疑故曰未信而分疑或問信陵平原孟嘗春申益乎祕曰信陵君魏無忌魏安釐王異母弟也平原君趙勝趙之諸公子趙惠文王弟也孟嘗君田文齊威王孫也春申君黄歇楚人也問有益於國乎曰上失其政姦臣竊國命何其益乎當此四君之時實皆有益於其國而揚子譏之者蓋論上失其政故辯明之祕曰進賢育善權在國君而四君專之故曰竊國命光曰洪範曰臣無有作福作威四豪聚私黨以專國政故曰姦臣竊國命樗里子之智也使知國}
  - {type: page-break, offset: 128, content: '', id: KR3a0009_WYG_008-4a, image: WYG0696/WYG0696-0336a.png}
  - {type: variant, offset: 128, length: 0, content: '', krp: 獄中出慷慨之辭由得以自免亦已危矣咸曰鄒陽事漢景帝弟梁孝王為羊勝公孫詭所疾而讒之孝王怒下陽吏将殺之陽從獄中上書孝王立出之卒為上客未信而分疑者言未為梁王所信方為其所疑雖能分觧以免固亦危矣光曰忼苦兩切罿昌鐘切幾音機孔子稱信而後諫未信則以為謗已也陽初仕梁未為孝王所信而深言以觸機事分取孝王之疑故曰未信而分疑或問信陵平原孟嘗春申益乎祕曰信陵君魏無忌魏安釐王異母弟也平原君趙勝趙之諸公子趙惠文王弟也孟嘗君田文齊威王孫也春申君黄歇楚人也問有益於國乎曰上失其政姦臣竊國命何其益乎當此四君之時實皆有益於其國而揚子譏之者蓋論上失其政故辯明之祕曰進賢育善權在國君而四君專之故曰竊國命光曰洪範曰臣無有作福作威四豪聚私黨以專國政故曰姦臣竊國命樗里子之智也使知國}
  - {type: variant, offset: 129, length: 1, content: 詘, SBCK: 雒}
  - {type: variant, offset: 129, length: 1, content: 詘, WYG: 知𦵏則吾以疾為􅆱龜祕曰樗里子名疾秦惠王之弟有滑稽多智秦人號曰智囊卒𦵏子渭南章䑓之東曰後百歲當有天子之宮夾我墓至漢興長樂宮在其東未央宮在其西言使其知國家未來之安危亦如别𦵏則其神智如蓍龜周之順赧以成周而西傾咸曰昔周武王都於鎬京謂之宗周即西周也至幽王以犬戎亂平王東遷於洛即周公所營之王城是謂成周亦曰東周也秦都咸陽在西而赧王為秦所滅故曰西傾光曰宋吴本作周之傾赧今從李本音義曰諸本皆作順赧順靚王及赧王也俗本作傾誤也史記作慎靚王索隠作順靚王或是慎轉為順秦之惠文昭㐮以西山而東并祕曰周顯王四十四年秦惠文始稱王至昭㐮王五十一年乃滅周時秦都雍州西山在焉而東滅周故曰東并本紀曰文公卒𦵏西山光曰并音併孰愈咸曰問西傾東并誰優祕曰或者以子雲不與秦故問西傾東并誰為優曰周也羊秦也狼咸曰周衰弱如羊秦强暴如狼然則狼愈歟光曰問强猶勝於弱乎曰羊狼一也􅂈猶不及兩不與也咸曰言周以不}
