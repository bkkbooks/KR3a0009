  - {type: variant, offset: 110, length: 0, content: '', WYG: 軻也者謂孟軻也若荆軻君子盗諸祕曰荆軻衛人也為燕太子刺秦王以君子之道類之則大盗耳光曰比諸盗賊請問孟軻之勇曰勇於義而果於徳不以貧富貴賤死生動其心於勇也其庻乎或人之問勇若}
