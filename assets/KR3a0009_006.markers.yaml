  - {type: variant, offset: 236, length: 1, content: 讀, SBCK: 人有所不訓或問聖人占天乎曰占天地言皆占之若此則史也何異曰史以天占人聖人以人占天聖人以人占天者先乎天也史以天占人者後乎天也大聖先天而天不違良史後天而奉天時知其所先後則天人之情得矣或問星有甘石何如甘公石申夫善觀天文者也曰在德不在星德隆則晷星星隆則晷德也或問大人曰無事於小爲大人賢者志大之謂請問小曰事非禮義爲小尚志在乎禮義大人之事備矣聖人之言逺如天天懸􅁚著明而人不能察聖人設教施令而人不能究賢人之言近如地山川澤田之形可得而鍳瓏􅌑其聲者其質玉乎玉之瓏􅌑其聲亦猶君子清泠其德音聖人矢口而成言肆筆而成書矢正也肆操也言可聞而不可殫書可觀而不可盡性與天道周之人多行貴尚德義人人得行其道秦之人多病道屈沈也行有之也病曼之也行有之者周有德也病曼之者秦無道也周之士也貴道泰業隆故尊貴秦之士也賤道否人卑故窮賤周之士也肆肆放任意而道義行秦之士也拘拘制曲從不肆王道月未望則載魄于西載始也魄光也載魄于西者光始生於西面以漸東滿旣望則終魄于東光稍虧於西面以漸東盡其遡於日乎遡迎也言爲人臣終始盛衰向迎其君如月迎日天理然彤弓盧矢不爲有矣以諭有君而無臣聆聽前丗清視在下鑑莫近於斯矣執古以御今御今以古則殷鑑不逺或問何如動而見畏曰畏人何如動而見侮曰侮人禍福無門惟人所召夫見畏之與見侮無不由已我欲仁斯仁至或問禮難以強丗言禮事至難難可以強丗使行曰難故強丗如夷俟倨肆羈角之哺果而啗之奚其強或性或強及其名一也性者天然生知也強者習學以至也雖爲小異功業旣成其名一也見弓之張􅀆弛而不失其良兮弛舎或曰何謂也曰㯳之而巳矣弓良在擏格人良在禮樂川有防器有範見禮教之至也川防禁溢器範檢形以諭禮教人之防範也以舊防爲無所用而壞之者必有水敗以舊禮爲無所用而去之者必有亂患也經營然後知幹楨之克立也幹楨築牆版之屬也言經營宫室立城郭然後知幹楨之能有所立也建宗廟立社稷然後知禮樂之能有所成也莊􅀭蕩而不法墨晏儉而廢禮申韓險而無化險克所以無德化鄒衍迃而不信迃迴不可承信聖人之材天地也覆載與天地合其德次山陵川泉也次聖者大賢也髙顯如山陵通潤如川泉次鳥獸草木也區别各有所長揚子法言卷第八􅀭子法言先知卷第九圖難於其易求大於其細爲之乎其未有治之乎其未亂如斯而巳矣李軌注先知其幾於神乎幾近也神以知來探未兆也逆識先知近於神也敢問先知曰不知荅以不知者神悟則先知非問之所及也知其道者其如視舉目便見忽眇緜作昞眇緜逺視先甲一日易後甲一日難甲者一旬之始巳有之初也先之一日未兆也後之一日巳形也夫求福於未兆之前易救禍於巳形之後難或問何以治國曰立政曰何以立政曰政之本身也身立則政立矣子帥以正孰敢不正或問爲政有幾幾要也欲知爲政善惡之要曰思斁斁猒或問思斁曰昔在周公征于東方四國是王王正召伯述職蔽芾甘棠其思矣夫齊桓欲徑陳陳不果内執轅濤塗其斁矣夫伐楚雖美而御師不整故不欲令徑於戲從政者審其思斁而巳矣或問何思何斁曰老人老􅀌人􅀌病者養死者葬男子畒婦人桑之謂思爲政如此民所思也若汚人老汚慢屈人􅀌屈窮病者獨死者逋田畒荒杼軸空之謂斁民猒苦也爲政日新或人敢問日新曰使之利其仁樂其義厲之以名引之以美使之陶陶然之謂日新或問民所勤勤苦曰民有三勤曰何哉所謂三勤曰政善而吏惡一勤也吏善而政惡二勤也政吏駢惡三勤也政君也駢並也禽獸食人之食土木衣人之帛穀人不足於晝絲人不足於夜之謂惡政人君苑囿禽獸故穀人竭力於晝也土木衣綈錦故絲人竭力於夜也晝夜竭力而猶不足是故爲惡政聖人文質者也因人才質刻而畫之文而藻之車服以彰之車服等差辨彰貴賤藻色以明之藻色輕重顯明尊卑聲音以􅀭之歌於管􅃶詠其德美詩書以光之載其功德光照後丗籩豆不陳玉帛不分琴瑟不鏗鍾鼓不抎則吾無以見聖人矣言此諸禮存故得覩聖人或曰以往聖人之法治將來譬猶膠柱而調瑟有諸曰有之曰聖君少}
