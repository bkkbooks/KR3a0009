  - {type: variant, offset: 19, length: 1, content: 微, SBCK: 叔孫通欲制君臣之儀徴先生於齊魯所不能致者二人髙帝時叔孫通爲奉常欲制君臣之禮乗亂之餘權時之制不合聖典雖盡其美未盡其善故不能致之曰若是則仲尼之開跡諸侯也非邪曰仲尼開迹將以自用也欲行其道制素法也如委己}
