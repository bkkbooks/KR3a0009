  - {type: variant, offset: 235, length: 0, content: '', SBCK: 曰丗人之益者倉􅅒也取之如單有時而盡仲尼神明也小以成小大以成大雖山川丘陵草木鳥獸裕如也學其道者大小各隨其本量而取足如不用也神明亦末如之何矣神明有所不及}
  - {type: variant, offset: 235, length: 0, content: '', WYG: 祕曰庸用也老子有絶}
