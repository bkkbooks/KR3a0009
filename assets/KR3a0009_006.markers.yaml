  - {type: variant, offset: 14, length: 0, content: '', krp: 以不詘祕曰不詘謂不順從靈公而對以爼豆之事光曰陳直刄切曰詘身將以信道也如詘道而信身雖天下不可為也仲尼之敬陽虎楊子之臣王莽所詘形也於神何時撓哉諸如此例學者宜識其㫖咸曰信讀如屈伸之伸言見南子陽虎是身也雖詘之可矣於道何損對靈公是道也將詘之可乎雖得天下不當為矣故孔子曰君子之行已可以詘則詘可以伸則伸楊子之於事莽亦斯之謂乎光曰信與伸同雖利之以天下猶不可為詘道伸身之事聖人重其道而輕其禄衆人輕其道而重其禄聖人曰於道行歟衆人曰於禄殖歟聖人以行道為務凡人以禄殖為先光曰殖豐多也昔者齊魯有大臣史失其名以道事君不可則止為大臣也史失其名者不書其名也曰如何其大也曰叔孫通欲制君臣之儀徴先生於齊魯所不能致者二人髙帝時叔孫通為奉常欲制君臣之禮乘亂之餘權時之制不合聖典雖盡其美未盡其善故不能致之祕曰叔孫通為漢髙起朝儀召魯諸生三十餘人魯有兩生不肯行曰又欲起禮樂禮樂所由起積德百年而後可興也吾不忍為公所為不合古吾不行公往矣毋汙我通笑曰若真鄙儒也不知時變遷固二史皆曰魯有兩生而楊謂齊魯豈其接近而言哉光曰先生謂宿儒曰若是則仲尼之開跡諸侯也非邪咸曰開謂開布其跡於諸侯之國祕曰若以二生為是則仲尼欲行教於諸侯非歟開開説其君臣之義跡跡述其禮儀之制光曰或難楊子以齊魯二生知道不行而不起為是則仲尼之歴聘為非邪曰仲尼開跡將以自用也欲行其道制素法也祕曰欲行已之道合於聖人之法如委已而從人雖有規矩凖繩焉得而用之咸曰規矩凖繩猶制度也言委已而從人則雖有制度不得專而用之故二人所以不至也如孔子則不然祕曰通制漢儀得墮時之義而楊獨許此二生者盖善其惡叔孫之面諛而雜用秦儀且欲自明揚之志不隨莽改作也光曰二生所守三王之禮而叔孫通阿諛希世雜用秦儀若起則當委已而從之安得自用其道也或問孔子之時諸侯有知其聖者歟曰知之曰知之則曷為不用曰不能曰知聖而不能用也可得聞乎曰用之則宜從之祕曰用其人當從其道從之則棄其所習光曰習謂故常所安逆其所順光曰順謂情志所欲彊其所劣光曰彊其亮切劣謂彼所難能捐其所能咸曰夫子所習者正彼所習者不正故當棄之夫子所順者道彼所順者非道故當逆之夫子所劣者非彼所劣者是故當彊之夫子所能者德彼所能者不德故當捐之祕曰既從聖人之道則諸侯習其異聞者棄之順非而澤者逆之劣於仁義者彊之以攻戰聚歛為能者捐之是之謂能用之光曰捐與專切能謂心所素有衝衝如也光曰心相逆鬭之貎非天下之至德孰能用之咸曰衝衝猶多也言諸侯如是者多矣安能用之祕曰當時諸侯衝衝然非有天下之至德至道誰能用之哉光曰李宋呉本皆無德字音義稱天復本有之今從之至德謂至明之德也或問孔子知其道之不用也則載而惡乎之欲知載道術何所之詣祕曰何所之乎光曰惡音烏曰之後世君子許來哲祕曰與諸後世之王者禮運曰禹湯文武成王周公由此其選也此六君子者未有不謹於禮者也光曰俟後之聖賢必有能用其道者曰賈如是不亦鈍乎言畜貨以遺後畜道俟將來是遲鈍祕曰譬如賈之不售光曰賈音古言行道者貴於及身乃載以遺後世譬諸為賈求利者如此不亦鈍乎曰衆人愈利而後鈍咸曰邪道苟合久而益非祕曰行一切之利不可經世聖人愈鈍而後利咸曰正德不偶乆而益光祕曰初不苟合乆而利博光曰言利愈近則愈小愈逺則愈大闗百聖而不慙祕曰闗猶言管也荀子曰天下之道管是矣百王之法一是矣楊倞曰管樞要也光曰孔子之道雖經百聖不可易蔽天地而不耻咸曰蔽猶塞也言道塞於天地而無所愧光曰蔽當作弊終也能言之類莫能加也祕曰自生民以來未有如夫子也光曰為衆説郛貴無敵富無倫光曰堯舜所不能踰利孰大焉祕曰他貴以位而富以財聖人貴以道而富以教無倫敵矣利及萬世非大而何光曰範圍天地曲成萬物或曰孔子之道不可小歟嫌孔子大其道故當其時不能見用曰小則敗聖如何祕曰小道害聖如之何可小光曰音義曰天復本無如何字今從李宋吳本曰若是則何為去乎咸曰言不見用則已何去魯去衞之為乎光曰道既不可小則所如不合何必去父母之邦曰愛日祕曰欲及時急於行道曰愛日而去何也咸曰言欲及時施道則止魯可矣何去之祕曰去魯光曰留魯而化之則收効彌逺曰由羣婢之故也不聽正諫而不用噫者吾於觀庸邪無為飽食安坐而懕觀也齊人歸女樂季桓子受之三日不聽朝政諫而不用於是遂行咸曰孔子相魯齊人懼而欲敗其政選齊國中女子好者八十人皆衣文衣而舞容璣文馬三十駟以遺魯君季桓子語魯君為周道游觀終日怠於政事子路曰夫子可行矣孔子曰魯今且郊如致膰乎大夫則吾猶可以止桓子卒受之三日不聽政郊又不致膰爼於大夫遂行而師已送之曰夫子則非罪也孔子曰吾歌可乎歌曰彼婦之口可以出走彼婦之謁可以死敗優哉游哉聊以卒嵗師已反歌桓子曰孔子亦何言師已以實告桓子曰夫子罪我以羣婢故也不聽正當作不聽政字之誤也雉噫猶歌歎之聲梁鴻五噫之類也庸邪謂女樂也言仲尼所以雉噫然歌之而去者盖不能飽食安坐懕觀庸邪之樂欲愛日汲汲於施道也光曰宋吳本作不用雉噫者今從李本無雉字正與政同懕一塩反季桓子受齊女樂不聽政孔子諫不用乃嘆曰吾為大夫豈可坐觀其政亂民困邪故去之佗國觀庸闕由此觀之夫子之日亦愛矣惜寸隂光曰知已道必不行於魯故汲汲去之他國或曰君子愛日乎祕曰君子必如夫子愛日乎曰君子仕則欲行其義居則欲彰其道祕曰仕則欲道之行居則欲道之著光曰居處不仕事不懕教不倦焉得日日不暇給咸曰言不廢一晷安得餘日而愛之或問其有繼周者雖百世可知也秦已繼周矣不待夏禮而治者其不驗乎祕曰孔子言殷因於夏禮周因於殷禮三代損益相因若循環而繼周者宜復用夏禮矣秦不用而治是聖人之言無驗乎曰聖人之言天也咸曰聖人之所言者天命也如五運正統者爾故能相因而損益天妄乎祕曰聖人之言天意也聖言不驗豈天或妄乎無妄也言暴亂者非天意也光曰聖人之言譬如天天運行有常豈妄動乎繼周者未欲泰平也咸曰妄忘也天似未欲天下之平而忘乎命聖人以繼周故秦非正統偶因暴而得之也祕曰秦不用三代之禮是未欲太平也如欲泰平也捨之而用佗道亦無由至矣暴秦之繼周王莽之簒漢臧獲猶將悼之賢者能無慨歎乎咸曰佗道謂邪道指秦政也言天如欲天下之平則捨秦而立用聖人矣用聖人則秦之邪道亦無由至矣今註辭殊不據文釋之但引王莽比秦似非正文之意夫王莽簒也而秦并天下其可謂簒邪秦與王莽暴則同矣而其所取異焉祕曰如秦之意亦欲泰平也捨禮而用刑法亦無由至也赫赫乎日出之光羣目之用也渾渾乎聖人之道羣心之用也祕曰羣目非日光無以辨色羣心非聖道無以表正光曰渾户昆胡本二切目因日光然後能有見心因聖道然後能有知渾渾廣大疏通之貎或問天地簡易而聖人法之何五經之支離嫌難了咸曰支離猶委曲也祕曰支離猶言分散也各有科條分散而難通光曰支離猶扶疎繁多之貎曰支離葢其所以為簡易也支離分别之而後朗然事得簡易祕曰五經分散各有科條使人㳂波討源然後知聖人之道法天地之簡易也已簡已易焉支焉離既簡既易乃是混茫之初焉支焉離言不可了也咸曰言天地之道闢闔舒慘是亦先委曲經營而後至於無為五經之文浩博祕奥亦先委曲分别而後至於易了}
