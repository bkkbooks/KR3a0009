  - {type: variant, offset: 458, length: 1, content: 氏, krp: 切甄陶天下者其在和乎咸曰和謂剛柔得所剛則甈柔則坯甈燥也坯慢也言失和也夫陶者失剛柔}
  - {type: variant, offset: 460, length: 1, content: 孫, WYG: 和則不成器為政失寛猛之中則不成治咸曰甈破瓦又破甖也坯怌恐也言陶法太剛則破裂太柔則恐弱而不能成光曰宋吳本坯作怌今從李木甄居延切甈五計切坯鋪回切坯土踈慢不黏也言甄者和土剛柔之齊太剛則破裂太柔則踈慢治天下亦猶是也龍之􅅗亢不獲其中矣初九􅅗龍勿用上九亢龍有悔祕曰天地以中為用是以過中則惕九三居下卦之上過其中則夕惕也不及中則躍九四居上卦之下不及中故躍淵其近於中乎二五得中故有利見之吉光}
