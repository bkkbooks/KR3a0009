  - {type: variant, offset: 21, length: 0, content: '', SBCK: 從人雖有規矩準繩焉得而用之或問孔子之時諸侯有知其聖者與曰知之知之則􅂚爲不用曰不能曰知聖而不能用也可得聞乎曰用之則冝從之從之則弃其所習逆其所順強其所劣􅂢其所能衝衝如也非天下之至孰能用之􅂢棄或問孔子知其道之不用也則載而惡乎之欲知載送道術何所之詣曰之後丗君子許來哲曰賈如是不亦鈍乎言畜貨以遺後畜道俟將來是遲鈍曰衆人愈利而後鈍聖人愈鈍而後利關百聖而不慙蔽天地而不恥能言之􅀋莫能加也貴無敵富無倫倫匹利孰大焉或曰孔子之道不可小與嫌孔子大其道故當其時不能}
