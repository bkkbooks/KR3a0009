  - {type: variant, offset: 9, length: 1, content: 微, WYG: 夫天地之道或㤗而通或否而塞㤗則萬物阜否則萬化閼弗一而常也夫聖人之道或生而出或亡而絶出則萬物遂絶則萬化滅亦弗一而常也是故天地不常秦亦不常否聖人不常出亦不常絶楊子因上論聖人之生有以合天地之化遂為之言爾註以别為一義且云首擬天腹擬地以形體解之甚失揚㫖矣夫人之冇血氣形體首圓象天足方象地至於肢藏各有所法雖庸愚者皆然豈獨聖人哉學者宜辨之祕曰聖人有以擬法天地而叅乎言行也管子曰聖人若天然無私覆也若地然無私載也禮曰譬如天地之無不持載無不覆燾皆言聖人之道也光曰言德與天地叅者則為聖人無疏數之期也或問聖人有詘乎咸曰問有所詘身之事光曰詘與屈同曰有曰焉詘乎咸曰焉安也言安所詘曰仲尼於南子所不欲見也祕曰南子衛靈公夫人也孔子本不欲見也於陽虎所不欲敬也祕曰陽虎陽貨為季氏家臣專魯之政孔子本不欲敬也見所不見敬所不敬不詘如何祕曰孔子見其本不欲見者欲使靈公行治道也敬其本不欲敬者如有用我者吾其為東周乎是欲詘身以行道語曰子見南子又曰時其亡也而往拜之}
  - {type: page-break, offset: 9, content: '', id: KR3a0009_WYG_006-2b, image: WYG0696/WYG0696-0314b.png}
