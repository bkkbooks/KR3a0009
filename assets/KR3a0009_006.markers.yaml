  - {type: variant, offset: 244, length: 2, content: 甚矣, SBCK: 眞僞用眞人逺佞僞眞僞則政核善善明則眞人顯惡惡著則佞僞息眞僞審則政事核也如眞不眞僞不僞則政不核北面之禍南面之賊也鼓舞萬物者雷風乎鼓舞萬民者號令乎天以雷風鼓舞萬物君以號令制御萬民雷不一三令五申風不再制無二也聖人樂陶成天下之化使人有士君}
  - {type: variant, offset: 244, length: 1, content: 甚, WYG: 喜怒哀樂之未發謂之中發而皆中節謂之和中也者天下之大本也和也者天下之逹道也致中和天地位焉萬物育焉光曰哲當作晢晢明也言將發中和之政在先明民情譔先知祕曰聖人逹于事幾吉之先見故能成天下之化光曰論為政之道先知其幾於神乎幾近也神以知來探未兆也逆識先知近於神也光曰幾音機下同敢問先知曰不知答以不知者神悟則先知非問之所及祕曰知之其神乎知其道者其如視舉目便見忽眇緜作昞眇緜逺視咸曰忽輕也眇細也緜逺也昞謂炳然光明也此言先知之道臨事則悟如明目之視忽輕眇細緜逺之物皆炳然而見也注從其如視隔為一句復以眇緜為一事釋之頗失其義光曰宋吳本昞作炳今從李本音丙闕先甲一日易後甲一日難甲者一旬之始已有之祕也先之一日未兆也後之一日已形也夫求福於未兆之前易救禍於已形之後難咸曰甲者教令之始也夫明王之道先令後刑故先甲一日以昭而示之也示之而雖犯猶宥之故曰先一日易也後甲一日以廣而諭之也諭之而尚犯則犯之故曰後一日難也祕曰周禮縣治象之法于象魏使萬民觀治象挾日而歛之鄭司農云從甲至癸謂之挾日凡十日是以易稱先甲三日先庚三日皆為申命令之義夫干有十日自甲至癸皆挾日之義而易獨取甲庚者以甲木主仁而示其寛令也庚金主義而示其嚴令也今夫先見者察民未犯之前先一日申其令則其為治易也如當已犯之後後一日申其令則其為治難也光曰並闕或問何以治國曰立政曰何以立政曰政之本身也身立則政立}
