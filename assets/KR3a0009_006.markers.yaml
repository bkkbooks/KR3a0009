  - {type: variant, offset: 238, length: 0, content: '', krp: 司馬談班固之徒各稱老嚴之妙而詆訾聖人是以或人問難多此類也曰世人之益者倉廪也取之如單有時而盡光曰倉廪雖於人有近益而所藏不多仲尼神明也小以成小大以成大雖山川邱陵草木鳥獸裕如也學其道者大小各隨其本量而取足祕曰神者所以用乾坤六子而生萬物者也聖人之道神明之道也得其小大各有所成而無所窮盡裕如也光曰神明造化也生物無窮裕如有餘貎如不用也神明亦末如之何矣神明有所不及聖人有所不訓祕曰如有固背之而不用亦猶草木鳥獸斸之齧之使不得遂其生雖神明亦無如之何也光曰頑石朽木造化所不能移昬君愚人聖人所不能益或問聖人占天乎曰占天地言能占之祕曰孔安國曰無事不通謂之聖光曰仰觀象俯觀法若此則史也何異曰史以天占人聖人以人占天聖人以人占天者先乎天也史以天占人者後乎天也大聖先天而天不違良史後天而奉天時知其所先後則天人之情得矣祕曰以天占人者觀天以見人事也以人占天者因人以知天意也光曰史考察象數知人事之吉凶聖人修人事知天道不能違或問星有甘石何如祕曰或人復問史之尤著者善於占星晉志曰諸侯之史齊有甘德魏有石申夫皆掌著天文各論圖驗其巫咸甘石之説後代所宗曰在德不在星德隆則晷星星隆則晷德也咸曰晷影也猶影蔽之也隆尚也言隆尚於德則影蔽星晷隆尚於星則影蔽德業祕曰晷規也星之妖瑞不虚發應有德無德之隆盛亦規德而已光曰晷影也影從形者也德崇則星從而祥星崇則德從而壊或問大人曰無事於小為大人賢者志大之謂祕曰小小道請問小曰事非禮義為小尚志在乎禮義大人之事備矣光曰治禮義則餘無不治者所以為大聖人之言逺如天天懸象著明而人不能察聖人設教施令而人不能究賢人之言近如地山川澤田之形可得而鑒光曰天髙逺不可及地雖近亦承天而時行瓏􅌑其聲者其質玉乎玉之瓏􅌑其聲亦猶君子清玲其德音祕曰諭逺近之美孟子曰玉振也者終條理也光曰瓏􅌑宋吳本作􅌑瓏今從李本瓏盧紅切􅌑音靈質美則聲清德充則言善聖人矢口而成言肆筆而成書矢正也肆操也祕曰矢放也肆恣也放口恣筆動成典訓爾雅曰矢弛也郭云弛放言可聞而不可殫書可觀而不可盡性與天道祕曰所以逺如天光曰聖人縱心所欲皆合於道不可殫盡言深逺也周之人多行貴尚德義仁人得行其道咸曰正文但云周之人是統言衆人矣而注為仁人得行其道况衆人者非能行道若以為仁人則又與正文相反非揚㫖也此盖言周盛王道禁網疏闊商賈之人皆得謗議於市故衆人略無諱忌所行皆可爾秦之人多病道屈沉也咸曰以道屈沉為病又非為衆人安有道可沉哉此言秦法刻密偶語者棄市所忌甚多衆庶之人無措手足動則見病爾行有之也病曼之也行有之者周有德也病曼之者秦無道也咸曰注殊不解行有之病曼之之義但云周有德秦無道即未知行有之病曼之果何語邪甚非謂矣夫行有之者謂他人所敢行天下或有之或無之惟周之人所敢行者天下皆有之言多也病曼之者曼長也言他人所病者或作之或愈之惟秦之人所有病者天下長然言無愈時也祕曰曼無也多行樂於事業而不壅也多病困於刑罰而不蘇也周人所以多行者由君存而有之也秦人所以多病者由君視之如無也刑法志曰秦用商鞅連相坐之法造參夷之誅光曰行下孟切曼莫半切周人多賢行者有聖人之道以教之也秦則無無之故多疵病周之士也貴道泰業隆故尊貴咸曰言周棄邪用賢為貴閑祕曰周之士以德行道藝而升之所以貴光曰於禮樂故可貴秦之士也賤道否人卑故窮賤咸曰言秦棄賢用邪故賤祕曰秦之士以刑法而責成之所以賤光曰習於刑名故可賤周之士也肆肆放任意而道義行咸曰古者天子聽政公卿至於列士皆得獻詩以諫言周無所忌故臣下皆得肆縱直言祕曰肆猶縱恣也縱行公道光曰優游仁義之間秦之士也拘拘制曲從不肆正道咸曰此謂秦以忠諫為妖言或皆族之故臣下無敢議事而拘忌祕曰拘拘束於法光曰動為文罔所制月未望則載魄于西載始也魄光也載魄于西者光始出於西而漸東滿光曰魄當作朏明也明始於西以漸變魄既望則終魄于東光稍虧於西而漸東盡咸曰按周書召誥曰惟丙午朏傳云朏明也月三日明生之名康誥曰惟三月載生魄傳云三月始生魄月十六日明消而魄生是則朏為明魄為晦矣夫月未望者即始生明之時也正文宜曰月未望則載朏于西夫月既望者即始生魄之時也正文故曰既望則終魄于東今未望亦言魄盖字之誤也而註文隨誤强解以魄為光恐失其義光曰明在於東成魄之終其遡於日乎遡迎也言為人臣終始盛衰向迎其君如月迎日天理然也咸曰遡向也夫日行遲一嵗而周天月行速一月而周天故月之行終始皆向日也非有迎日之義其上下弦之時行度近日所以光損而未盛及夫月十五日其行度逺而與日相對望所以光滿而明也猶臣之近君則威損逺君則勢盛揚子上言周秦之士故因論日月之分以明君臣之道當然而秦不然也光曰遡音素月迎日而有光猶臣賴君而有功彤弓黸矢不為有矣以諭有君而無臣咸曰周之制諸侯得賜弓矢然後專征伐故平王東遷晉文侯有安定之功遂賜彤弓一彤矢百玈弓百玈矢千也此言秦之士賤而拘頗失君臣之道則安所用忠而得賜於彤玈弓矢哉故曰不為有矣注謂以諭有君兼臣不連上文失之也光曰黸落胡切與玈同彤弓玈矢人臣之上賞也人臣不得君之任使安能有功故雖受彤弓玈矢之賜未可自謂已功恬而有之也晉平公問齊桓之霸君之力乎臣之力乎師曠曰管仲善斷割隰朋善煎熬賔胥無善齊和羮已熟矣奉而進之而君不食誰能彊之亦其君之力也樂羊㧞中山返而論功魏文侯示之謗書一篋樂羊再拜稽首曰此非臣之功君之力也聆德前世清視在下鑑莫近於斯矣執古以御今御今以古則殷鑒不逺咸曰聆聽也前世謂周秦也下謂士庶也言後之為君者辨聽周秦之䟽闊刻密明視臣庶之行病拘肆則為鑑之道無近於此矣光曰李本聆德作聆聽今從宋吳本前世不可見故云聽臣民今在下故云視或問何如動而見畏曰畏人何如動而見侮曰侮人禍福無門惟人所召咸曰鄭康成云心服曰畏此言畏猶心服而畏敬之也故畏敬於人則人亦畏敬之慢侮於人則人亦慢侮之夫見畏與見侮無不由己我欲仁斯仁至矣或問禮難以彊世言禮事至難難以彊世使行光曰彊其兩切下同世人皆苦禮之拘難以彊之曰難故彊世祕曰禮者君子之所好而世俗之所難也以其難故彊之使過者俯而就之不及者跂而及之光曰以其難故彊使遵之如夷俟倨肆羈角之哺果而㗖之奚其彊咸曰夷俟倨肆皆驕倨之謂也羈角猶總角也傳曰貴不期驕而驕自至是夷俟倨肆不學而能人所易也總角之童哺㗖其果亦易之也設于禮道不難如驕㗖之易則安用彊教於世哉光曰夷俟若原壤者凡剪髮男角女羈謂㓜子也人之箕倨驕慢及㓜子㗖果皆其情所欲何必彊也或性或彊及其名一也性者天然生知之彊者習學以至也雖為小異功業既成其名一也咸曰性者言人之性自然而好禮也彊者言人之所難用使而為禮也性與彊既皆由禮是其為名於行禮同也盖因上文彊禮之論故於此誘之爾註以生知習學之義别為一叚解之非謂矣光曰人或性安於禮或自彊以從禮及其成名一也見弓之張兮弛而不失其良兮弛合或曰何謂也曰擏之而已矣弓良在擏格人良在禮樂咸曰周禮謂擏為正弓之器也言弓之一弛一張而不失其良者以有擏正之也人之一動一靜而不失其善者以有禮制之也此亦因上文而為之言光曰擏居影切川有防器有範見禮教之至也川防禁溢器範檢形以喻禮教人之防範也以舊防為無所用而壊之者必有水敗以舊禮為無所用而去之者必有亂患也祕曰川無防則水為害器無範則人廢業禮教失則禍亂生王制曰用器不中度不鬻於市經營然後知幹楨之克立也幹楨築牆版之屬也言經營宫室立城郭然後知幹楨之能有所立也建宗廟立社稷然後知禮樂之能有所成也莊揚蕩而不法咸曰莊周揚朱之道放蕩而非法墨晏儉而廢禮咸曰墨謂墨家也司馬遷曰墨者儉而難遵晏謂晏嬰也禮曰晏子祀其先人豚肩不掩豆澣衣濯冠以祭是皆不中禮也申韓險而無化祕曰申不害韓非之法傷於險而無教化鄒衍迂而不信迂逥不可承信咸曰鄒衍之術推天地未生及海外山川之事迂誕而不可信也聖人之材天地也覆載與天地合其德祕曰不可逾也光曰無不覆載次山陵川泉也次聖者大賢也髙顯如山陵通潤如川泉光曰得天地之一端佐天地以育物次鳥獸草木也區别各有所長咸曰班固分人為三等演而成九品揚亦以人分較為三等矣上聖人如天地也中賢人如山陵川泉也下庶人如鳥獸草木也夫人之不學以勉為賢則鳥獸草木之流矣有㫖哉揚子之言祕曰衆人也語曰譬諸草木區以别矣馬融曰言大道與小道殊異譬如草木異類區别言學當以次光曰依於山陵川泉以自生所得彌小先知篇咸曰聖人之哲動則先知故次之五百立政鼓衆動化天下莫尚於中和光曰鼔謂鼔舞中和之發在哲民情哲智祕曰五行傳曰哲知也中和之發則民之情偽無不先知中}
  - {type: variant, offset: 239, length: 0, content: '', SBCK: 君多如獨守仲尼之道是漆也漆甚於膠曰聖人之法未甞不􅀜盛衰焉昔者堯有天下舉大綱命舜禹夏殷周屬其子不膠者卓矣卓逺唐虞􅁚刑惟明法度彰也夏后肉辟三千不膠者卓矣二帝三王期於存公不恤私也堯親九族恊和萬國湯武桓桓征伐四克由是言之不膠者卓矣五君之跡雖異隨時順冝其道一也禮樂征伐自天子所出春秋之時齊􅀳實予不膠者卓矣禮樂征伐當由天子所出而春秋之時天子微弱齊桓􅀳文專命征討然而所爲皆尊王室故春秋公羊傳文雖不予而實予之存於公正也或曰人君不可不學律令曰君子爲國張其綱紀議其教化網之有綱紀猶君之有股肱也綱紀張則網目正股肱良則庶事康導之以仁則下不相賊莅之以廉則下不相盜臨之以正則下不相詐修之以禮義則下多德讓此君子所當學也如有犯法則司獄在執契而巳或苦亂苦患曰綱紀綱紀然後網目正曰惡在於綱紀曰大作綱小作紀網頼綱紀君任輔佐如綱不綱紀不紀謂失綱紀之任雖有羅網惡得一目而正諸網無綱紀目不正君無股肱國不治或曰齊得夷吾而霸仲尼曰小器請問大器曰大器其猶規矩準繩乎先自治而後治人之謂大器夫以規矩準䋲而能使上下無猜者大器也大器者必籠沓羣疑之表莫得與之爭量也管子相桓公不能以之自固三歸反坫然後獲安或曰正國何先曰躬工人績躬身也工官也言先正身以臨百官次乃覽察其人考其勲績也或曰爲政先殺後敎曰於乎於乎者駭歎之聲天先秋而後春乎將先春而後秋乎天道先春後秋以成歳爲政先令後誅以成治吾見􅀇駒之歩􅀇駒蚍蜉子也雉之晨雊也雊鳴化其可以巳矣哉感陽應節自然之化化之所感有自來矣民可使覿德是以堯舜之民可比屋而封不可使覿刑是以桀紂之民可比屋而誅覿德則純覿刑則亂象龍之致雨也難矣哉象似也言畫繒刻木以爲龍而求致雨則不可得也曰龍乎龍乎歎非眞龍眞龍而後能致雲􅀨明君而後道化}
