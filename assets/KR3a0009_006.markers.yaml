  - {type: variant, offset: 7, length: 0, content: '', SBCK: 五百歳而聖人出有諸孟軻史遷皆有此言曰堯舜禹君臣也而並文武周公父子也而處湯孔子數百歳而生因往以推來雖千一不可知也千歳一人一歳千人不可知也聖人有以擬天地而參諸身乎稟天地精靈合德齊}
  - {type: variant, offset: 7, length: 0, content: '', WYG: 五百嵗而聖人出有諸孟軻史遷皆有此言祕曰趙岐言五百嵗聖人一出天道之常也曰堯舜禹君臣也而並光曰並世文武周公父子也而處光曰同處湯孔子數百嵗而生光曰湯上距禹下距文王孔子上距周公皆數百嵗因往以推來雖千一不可知也千嵗一人一嵗千人不可知也祕曰堯舜禹三聖相並後數百年始生湯文武周公三聖同處後數百年始生孔子先則比年而三聖後則逺年而一聖因往以推來雖千年一聖亦未可知也夏后氏有國四百三十二嵗而湯興周有國五百七十二嵗而孔子生聖人有以擬天地而叅諸身乎禀天地精靈合德齊}
  - {type: page-break, offset: 7, content: '', id: KR3a0009_WYG_006-2a, image: WYG0696/WYG0696-0314a.png}
