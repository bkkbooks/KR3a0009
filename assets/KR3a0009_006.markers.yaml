  - {type: punctuation, offset: 12, content: 「, id: KR3a0009_tls_006-bkkpn9}
  - {type: variant, offset: 12, length: 1, content: 微, SBCK: 焉詘乎曰仲尼於南子所不欲見也陽虎所不欲敬也見所不見敬所不敬不詘如何曰衛靈公問陳則何以不詘曰詘身將以信道也如詘道而信身雖天下不爲也仲尼之敬陽虎􅀭子之臣王莽所詘者形也於神何時撓哉諸如此例學者冝識其旨聖人重其道而輕其禄衆人重其禄而輕其道聖人曰於道行與衆人曰於禄殖與聖人以行道爲務凡人以禄食爲先昔者齊魯有大臣史失其名以道事君不可則止爲大臣也史失其名者不書其名也曰}
  - {type: page-break, offset: 12, content: '', id: KR3a0009_SBCK_008-1b}
  - {type: variant, offset: 12, length: 1, content: 微, WYG: 衛靈公問陳則}
  - {type: variant, offset: 12, length: 1, content: 微, krp: 衛靈公問陳則}
