  - {type: variant, offset: 506, length: 263, content: 君子競諸謣言敗俗謣好敗則姑息敗德君子謹於言慎於好亟於時吾不見震風之能動聾聵也或問君子在治曰若鳳在亂曰若鳳或人不諭曰未之思矣曰治則見亂則隱鴻飛冥冥弋人何慕焉鷦明遴集食其絜者矣鳳鳥蹌蹌匪堯之庭亨龍潛升其貞利乎或曰龍何如可以貞利而亨曰時未可而潛不亦貞乎時可而升不亦利乎潛升在己用之以時不亦亨乎或問活身曰明哲或曰童蒙則活何乃明哲乎曰君子所貴亦越用明保慎其身也如庸行翳路衝衝而活君子不貴也楚兩龔之絜其清矣乎蜀莊沈冥蜀莊之才之珍也不作苟見不治苟得久幽而不改其操雖隋和何以加諸舉茲以旃不亦寶乎吾珍莊也居難為也不慕由即夷矣何毚欲之有或問堯將讓, SBCK: 什一}
