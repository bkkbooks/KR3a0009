  - {type: variant, offset: 293, length: 2, content: 乎皋, WYG: 在周公征于東方四國是王王匡咸曰詩云周公東征四國是皇光曰王當為匡詩傳云皇匡也召伯述職蔽芾甘棠其思矣夫祕曰周公旦攝政三監管蔡商及奄之四國叛周公東征三年而歸四國於是從王命也故東山二章言其思也詩云亦可畏也伊可懐也召公奭聽訟於甘棠之下國人思其人美其樹詩云蔽芾甘棠勿翦勿伐皆其思矣光曰召實詔切芾非貴切夫音扶下同齊桓公欲徑陳陳不果内執袁濤塗其斁矣夫伐楚雖美而御師不整故不敢令徑祕曰齊桓公既伐楚而欲徑從陳陳不欲内之故執袁濤塗僖公四年左氏無斁之之文揚據公羊而言也公羊傳曰濤塗謂桓公曰君既服南夷矣何不還師濵海而東服東夷且歸桓公曰諾於是還師濵海而東大䧟于沛澤之中顧而執濤塗古者周公東征則西國怨西征則東國怨桓公假塗于陳而伐楚則陳不欲其反由己者師不正也不脩其師而執濤塗古之人討則不然也光曰内音納嗚呼從政者審其思斁而已矣或問何思何斁光曰何以致之曰老人老孤人孤病者養死者葬男子畝婦人桑之謂思為政如此人所思也祕曰使人各得其所則見思矣若汙人老汙慢祕曰汙辱也光曰汙哀都切屈人孤屈窮祕曰屈抑之病者獨祕曰無所養死者逋祕曰見死者逋逃而不葬光曰逃棄不葬田畝荒杼軸空之謂斁民厭苦也祕曰使人各失其所則見厭矣為政日新或人敢問日新咸曰欲知其㫖曰使之利其仁樂其義咸曰使民以仁為利以義為樂則勤於進矣祕曰博愛為仁則其利彌廣合宜為義則其樂無窮光曰仁義者顯榮故利而樂之厲之以名引之以美咸曰以名譽而勵勸之以美善而引導之則喜於行矣使之}
