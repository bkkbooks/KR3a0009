  - {type: variant, offset: 457, length: 0, content: '', WYG: 所謂天與賢則與賢也祕曰大綱皇綱也堯命舜舜命禹光曰大綱謂天下之政夏殷周屬其子不膠者卓矣卓逺咸曰夏殷周屬其子孟子所謂天與子則與子也祕曰卓然可見光曰屬音燭唐虞象刑惟明法度彰矣祕曰畫象也何休曰孔子曰三皇設言民不違五帝畫象世順機三王肉刑揆象加漢文令曰盖聞有虞之時畫衣冠異章服以為戮而民不犯光曰揚子以象刑為畫衣冠異章服也夏后肉辟三千不膠者卓矣二帝三王期於存公不恤私也祕曰五刑之屬三千光曰辟步役切堯親九族恊和萬國湯武􅁊􅁊征伐四克由是言之不膠者卓矣人君之跡雖異隨時順宜其道一也祕曰仲尼之道亦二帝三王之道也禮樂征伐自天子所出祕曰道之常也春秋之時齊晉實予不膠者卓矣禮樂征伐當由天子所出而春秋之時天子㣲弱齊桓晉文專命征討然其所為皆尊王室故春秋公羊傳文雖不予而實予之存於公正也祕曰予與與同春秋之時齊晉得專征伐者盖前王與之爾僖四年傳管仲曰昔召康公命我先君太公曰五侯九伯女實征之以夾輔周室周制諸侯有大功賜弓矢然後專征平王賜晉文侯彤弓一彤矢百黸弓一黸矢百實與者謂孔子刪書而序文侯之命無所黜去則齊亦宜然也自湯武以上稱由是言之明二霸之迹不可繼也或曰人君不可不學律令曰君子為國張其綱紀謹其教化網之有綱紀猶君之有股肱也綱紀張則綱目正股肱良則庶事康導之以仁則下不相賊莅之以㢘則下不相盜臨之以正則下不相詐修之以禮義則下多德讓此君子所當學也如有犯法則司獄在執契而已祕曰各有司存或苦亂苦患祕曰或人以任有司苦患其紊亂曰綱紀綱紀然後綱目正祕曰提其綱正其紀則有條而不紊光曰自天子至於庶人上下相承如身使臂臂使指曰惡在於綱紀光曰惡音烏下同曰大作綱小作紀網賴綱紀君任輔佐光曰天子為四方之綱諸侯為一國之綱卿大夫士各紀其職亂何自生如綱不綱紀不紀謂失綱紀之任雖有羅網惡得一目而正諸網無綱紀目不正君無股肱國不治祕曰王者之教化也仁㢘禮義為其綱以紏之則百辟自正或曰齊得夷吾而霸仲尼曰小器祕曰管仲之器小哉請問大器曰大器其猶規矩凖繩乎先自治而後治人之謂大器夫以規矩凖繩而能使上下無猜者大器也大器者必籠沓羣疑之表莫得與之爭量也管子相桓公不能以之自固三歸反坫然後獲安祕曰規矩先自圓方凖繩先自平直然後能為器器出於是大器者也管子不知禮安能以禮正國哉或曰正國何先曰躬工人績躬身也工官也言先正身以臨百官次乃覺察其人考其勲績也光曰工巧則績善工拙則績惡言當先正其身然後正人或曰為政先殺後教光曰言當先使民畏威然後可教曰嗚呼嗚呼駭歎之聲天先秋而後春乎將先春而後秋乎天道先春後秋以成嵗為政先令後誅以成治吾見𤣥駒之步𤣥駒蚍蜉子也雉之晨雊也雊鳴化其可以已矣哉感陽應節自然之化化之所感有自來矣祕曰聖人之教化亦非强為之盖順春秋自然之道先教不從而後刑焉聖王奉若天道牧之而已譬如螘之能行雉之晨雊蟲之㣲者非教化之所及所以然者天道自然先化之耳斯為政所以先教也步行也崔豹古今註云螘曰𤣥駒光曰宋吳本已作成今從李本螘出蟄而行雉之朝雊皆春候也天以陽氣薫蒸萬物而成春聖人以道德陶染百姓而成化故見春物而知教化安可以已哉民可使覿德是以堯舜之民比屋可封不可使覿刑是以桀紂之民比屋可誅祕曰王者可以德示民而不可以刑示民亦先德後刑之義也在易坎險為刑而象曰王公設險以守其國隠刑言險是不可顯示於人此聖人深㫖也爾雅曰坎律銓也郭云易坎卦主法法律皆所以銓量輕重覿德則純覿刑則亂祕曰觀德則民歸厚故純觀刑則民生偽故亂象龍之致雨也難矣哉象似也言畫繒刻木以為龍而求致雨則不可得也曰龍乎龍乎難非真龍真龍而後能致雲雨明君而後道化行也祕曰言龍非其然乎真龍然後雲行雨施若大旱非有傅説賢明之實者豈能為霖雨哉光曰言非龍也為政者當務實不可以文飾致治或問政核咸曰核實也問為政之實光曰核下革切謂精確得其實曰真偽用真人逺佞偽真偽則政核善善明則真人顯惡惡著則佞偽息真偽審則政事核也祕曰真真而偽偽則政得其實光曰真偽真偽當作真真偽偽古書多然如真不真偽不偽則政事不核北面之禍南面之賊也祕曰真偽而偽真則政事不實鼓舞萬物者其雷風乎鼓舞萬民者其號令乎天以雷風鼓舞萬物君以號令制御萬民雷不一三令五申風不再制無二也祕曰雷發則羣蟄皆起雷收則羣蟄坯户不主於一者也春風至則萬物皆生秋風至則萬物皆落不俟乎再者也猶王者號令一出天下大同大同則何一之有一出則何再之有光曰一再言其少洊雷隨風乃能動物三令五申乃能齊衆聖人樂天咸曰聖人知天命遇與否皆樂焉陶成天下之化使人有士君子之器者也咸曰言明道立教使天下皆成其器猶陶甄者隨小大而制之祕曰陶者無模範則泥不成器聖人無禮制則人不成君子光曰宋吳本樂下有天字今從李本故不遁于世不離于羣咸曰故仲尼惶惶于宋鄭之郊孟子區區於齊梁之間者盖此也祕曰所謂樂天光曰離力智切遁離者是聖人乎祕曰傃隠行怪非聖人歟光曰長沮桀溺之徒君子所不與雌之不才其􅆑􅖁矣􅖁敗光曰􅖁音段君之不才其民野矣民之陶化猶泥之在鈞祕曰􅖁謂壊而不化野謂朴而無禮或曰載使子草律載設也草創也祕曰載則也曰吾不如𢎞恭咸曰𢎞恭與石顯皆少坐法腐刑為中尚書漢宣元朝專律令時詭辨以中傷人光曰恭習律令草奏曰吾不如陳湯咸曰陳湯字子山漢成帝朝王鳳奏以為從事中郎幕府事一皆决於湯湯明法令常受人金錢作章奏卒以此敗光曰湯善草奏曰何為曰必也律不犯奏不剡論語云聽訟吾猶人也必也使無訟乎此亦言當以純德化之使不犯律不剡奏也光曰剡以}
