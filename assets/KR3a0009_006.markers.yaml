  - {type: variant, offset: 23, length: 1, content: 明, SBCK: 故也不聽正諫而不用噫者吾於觀庸邪無爲飽食安坐而厭觀也齊人歸女樂季桓子受之三日不聽朝正諌而不用於是遂行由此觀之夫子之日亦愛矣惜寸隂或曰君子愛日乎曰君子仕則欲行}
