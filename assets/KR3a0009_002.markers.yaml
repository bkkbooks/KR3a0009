  - {type: variant, offset: 885, length: 0, content: '', SBCK: 揚子法言卷第二揚子法言修身卷第三求己以反本守母以存子此其大要李軌注修身以爲弓矯思以爲矢立義以爲的奠而後發發必中矣無敵於天下也人之性也善惡混混雜也荀子以爲人性惡孟子以爲人性善而􅀭子以爲人性雜三子取譬雖異然大同儒敎立言㝷統厥義兼通耳惟聖罔念作狂惟狂克念作聖揚子之言備極兩家反覆之喻於是俱暢修其善則爲善人修其惡則爲惡人所謂混也氣也者所以適善惡之馬也與御氣爲人若御馬渉道由通衢則迅利適惡路則駑蹇或曰孔子之事多矣不用則亦勤且憂乎曰聖人樂天知命樂天則不勤知命則不憂或問銘曰銘哉銘哉有意於愼也歎美戒愼之至聖人之辭可爲也使人信之所不可爲也是以君子彊學而力行貴令信敬素著珍其貨而後市貨珍價必貴修其身而後交身修交必固善其謀而後動成道也無所不通君子之所愼言禮書愼言無口過愼禮無失儀言禮是愼兼之於書上交不諂下交不驕則可以有爲矣或曰君子自守奚其交曰天地交萬物生人道交功勲成奚其守天地之交以道人道之交以理俱當順天人之道理而無所迕逆也好大而不爲大不大矣好髙而不爲髙不髙矣仰天庭而知天下之居卑也哉覩聖道然後知諸子之淺小公儀子董仲舒之才之邵也公儀子爲魯相婦織於室遣去之園有葵拔弃之不與民爭利也董仲舒爲江都相下帷三年不闚園此二子才德髙美使見善不明用心不剛儔克爾儔誰或問仁義禮智信之用曰仁宅也義路也禮服也智燭也信符也仁如居宅可以安身義如道路可以安行禮如衣服可以表儀智如燈燭可以照察信如符契可以致誠處宅由路正服明燭執符君子不動動斯得矣有意哉孟子曰夫有意而不至者有矣未有無意而至者也或問治已曰治己以仲尼或曰治已以仲尼仲尼奚寡也曰率馬以􅂹不亦可乎或曰田圃田者莠喬喬思逺人者心忉忉雖有喬喬之莠其􅂖不可得雖懷忉忉之思逺人不可見言仲尼之道深逺不可以治學曰日有光月有明三年不目日視必盲三年不目月精必矇不見日月而盲矇以諭不學爲闇人熒魂曠枯糟莩曠沈莩熟也擿埴索塗冥行而巳矣埴土也盲人以杖擿地而求道雖用白日無異夜行夜行之義面墻之諭也或問何如斯謂之人曰取四重去四輕則可謂之人曰何謂四重曰重言重行重貌重好言重則有法行重則有德貌重則有威好重則有觀可觀望也敢問四輕曰言輕則招憂行輕則招辜貌輕則招辱好輕則招淫禮多儀美其多威儀也或曰日􅉴不食􅁏􅁏必乾日􅉴不飲酒酒必酸賔主百拜而酒三行不巳華乎曰實無華則野華無實則賈華實副則禮華實相副然後合禮文質彬彬然後君子山雌之肥其意得乎或曰回之簞瓢臞如之何曰明明在上百官牛羊亦山雌也闇闇在上簞瓢捽茹亦山雌也何其臞千鈞之輕烏獲力也簞瓢之樂顔氏德也千鈞之重烏獲舉之而輕多力耳簞食瓢飲顔氏處之而樂德盛也或問犂牛之鞹與􅀇騂之鞹有以異乎曰同然則何以不犂也曰將致孝乎􅀑神不敢以其犂也宗廟貴純色君子貴純德如刲羊刺豕罷賔犒師惡在犂不犂也刲羊義見易有德者好問聖人或曰魯人鮮德奚其好問仲尼也言魯定哀公孟仲季孫皆問仲尼曰魯未能好問仲尼故也如好問仲尼則魯作東周矣或問人有􅀝孔子之牆􅁌鄭衞之聲誦韓莊之書則引諸門乎曰在夷貉則引之􅀝門牆則麾之莊周與韓非同貫不亦甚乎惑者甚衆敢問何謂也曰莊雖借諭以爲通妙而丗多不解韓誠觸情以言治而險薄傷化然則周之益也其利迂緩非之損也其害交急仁旣失中兩不與耳亦不以齊其優劣比量多少也統斯以往何嫌乎哉又問曰自此以下凡論諸子莫不連言乎莊生者何也荅曰妙指非見形而不及道者之言所能統故每遺其妙􅀉而去其麤迹一以貫之應近而巳惜乎衣未成而轉爲裳也衣上也裳下也聖典本也諸子末也轉上爲下捨木而逐末者是可惜聖人耳不順乎非惟正之聽口不肄乎善性與天道發言成章不肄習賢者耳擇口擇耳擇所聽口擇所言衆人無擇焉觸情任意或問衆人曰富貴生苟貪冨貴不義而生賢者曰義行義以逹其道聖人曰神神德行也觀乎賢人則見衆人觀乎聖人則見賢人觀乎天地則見聖人天下有三好衆人好己從賢人好己正聖人好己師天下有三檢衆人用家檢家人自其爲法賢人用國檢聖人用天下檢天下有三門由於情欲入自禽門所謂觸情由於禮義入自人門由於獨智入自聖門或問士何如斯可以禔身禔安曰其爲中也􅀪深中者心志也􅀪深猶敦重也其爲外也肅括則可以禔身矣外者威儀也肅敬也括法也君子微愼厥德悔吝不至何元憞之有微纎也悔吝小疵也元憞大惡上士之耳訓乎德訓順下士之耳順乎己苟欲令人順己言不慙行不恥者孔子憚焉言不違理故形不慙行不邪僻故心不恥言行能如此仲尼所敬憚難也揚子法言卷第三}
