  - {type: variant, offset: 885, length: 0, content: '', krp: 脩身篇咸曰吾道之學先諸身者也脩則克矣故次之吾子事有本真祕曰凡事有本有真真正道也陳施于意動不克咸克能咸皆咸曰陳布也施行也言正道之事當在己意自布行之而勿求備於人故曰不克咸本諸身自求之義祕曰言陳施之動成萬法而不能咸一其本在脩身光曰咸感也人欲陳施其意治化天下動而不能感人者盖由外逐浮偽内無本真不能正己以正物故當先本諸身也譔脩身祕曰内充至理而行止出處皆成律度脩身以為弓矯思以為矢祕曰矯思猶正思也說文云矯揉箭箝也光曰思斯恣切箝巨淹切立義以為的奠而後發發必中矣無敵於天下祕曰事得其宜之謂義言脩身正思定而後發俱中道之宜奠定也光曰中丁仲切人之性也善惡混混雜也荀子以為人性惡孟子以為人性善惟揚子以為人性雜三子取譬雖異然大同儒敎立言尋流厥義兼通耳惟聖罔念作狂惟狂克念作聖揚子之言該兩家之論反覆於是俱暢祕曰天命之謂性性命之初善惡兼全故赤子之生七情未著而先有號笑喜怒喜怒者善惡之端也是正性與善惡相混脩其善則為善人脩其惡則為惡人所謂混也咸曰孔子云中人以上可以語上中人以下不可以語上也又曰上智與下愚不移考聖人之言則是人有上中下三品矣上焉者善下焉者惡中焉者可上可下善惡混也故賈誼新書亦於人主分三等曰有上主有中主有下主夫上主者可以引之而上不可以引之而下下主者可以引之而下不可以引之而上中主者可以引之而上亦可以引之而下也故上主者堯舜是也夏禹后稷與之為善則行鯀驩兠欲引而為惡則誅故可與為善而不可與為惡也下主者桀紂是也飛㢘惡来與之為惡則行比干龍逢欲引而為善則誅故可與為惡而不可與為善也中主者齊桓公是也得管仲隰朋則覇用竪貂子牙則亂今楊子之意謂孟子已言人性善是論上品矣荀子已言人性惡是論下品矣而未及中品故於此謂人之性善惡混又曰脩其善則為善人脩其惡則為惡人觀其文是止言中品之性明矣非謂人皆然也得非夫子所謂中人以上可以語上中人以下不可以語上者邪得非賈誼所謂可以引之而上亦可以引之而下者邪故三子言性各舉其品教亦備矣祕曰習與性成光曰孟子以為人性善其不善者外物誘之也荀子以為人性惡其善者聖人教之也是皆得其一偏而遺其本實夫性者人之所受於天以生者也善與惡必兼有之猶陰之與陽也是故雖聖人不能無惡雖愚人不能無善其所受多少之間則殊矣善至多而惡至少則為聖人惡至多而善至少則為愚人善惡相半則為中人聖人之惡不能勝其善愚人之善不能勝其惡不勝則從而亡矣故曰惟上智與下愚不移雖然不學則善日消而惡日滋學焉則惡日消而善日滋故曰惟聖罔念作狂惟狂克念作聖必曰聖人無惡則安用學矣必曰愚人無善則安用教矣譬之於田稻粱藜莠相與並生善治田者薅其藜莠而養其稻粱不善治田者反之善治性者長其善而去其惡不善治性者反之孟子以為仁義禮智皆出乎性者也是豈可謂之不然乎然殊不知暴慢貪惑亦出乎性也是信稻粱之生於田而不信藜莠之亦生於田也荀子以為爭奪殘賊之心人之所生而有也不以師法禮義正之則悖亂而不治是豈可謂之不然乎然殊不知慈愛羞惡之心亦生而有也是信藜莠之生於田而不信稻粱之亦生於田也故揚子以人之性善惡混混者善惡雜處於心之謂也顧人所擇而脩之何如耳脩其善則為善人脩其惡則為惡人斯理也豈不曉然明白矣哉如孟子之言所謂長善者也如荀子之言所謂去惡者也揚子則兼之矣韓文公解揚子之言以為始也混而今也善惡亦非知揚子者也氣也者所適善惡之馬也歟御氣為人若御馬渉道由通衢則迅利適惡路則駑蹇祕曰人馭氣而行猶乗馬也善惡二途惟其所適光曰夢得曰志之所生則氣隨之言不可不養以適正也乗而之善則為忠為義乘而之惡則慢慢為暴或曰孔子之事多矣祕曰揔百王之法不用則亦勤且憂乎光曰孔子以天下不治為己任則其事多矣然終不見用於世則徒勤且憂乎曰聖人樂天知命樂天則不勤咸曰孟子謂孔子可以速而速可以久而久可以處而處可以仕而仕又曰孔子聖人之時者也兹所謂不勤矣知命則不憂咸曰匡人圍之乃援琴而歌又曰桓魋其如予何兹所謂不憂矣或問銘祕曰若湯之盤正考父之鼎皆有銘之類曰銘哉銘哉有意於慎也歎羙戒慎之至聖人之辭可為也所謂文章可得而聞使人信之所不可為也祕曰聖人之辭先王之法故可為也人有善惡好惡不同必使皆信所不可為也語曰未若郷人之善者好之其不善者惡之光曰音義曰天復本信作敬今從諸家本以其有至誠全徳故人信其言是以君子彊學而力行貴令信敬素著祕曰彊學以多識力行以安道善者𨗳之以仁惡者𨗳之以義雖蠻貊之邦亦可行矣珍其貨而後市珍貨價必貴修其身而後交脩身交必固善其謀而後動成道也無所不通祕曰貨珍者價必倍猶如身脩者交必賢謀善者動必得所以成道也光曰先成己道然後接物君子之所慎言禮書慎言無口過慎禮無失儀言禮是慎兼之於書祕曰慎言榮辱之主慎禮有則安無則危慎書習是勝非上交不諂下交不驕則可以有為矣光曰宋吳本有為作為友今從李本或曰君子自守奚其交曰天地交萬物生人道交功勲成奚其守天地之交以道人道之交以理但當順天人之道理而無所逆祕曰易曰各從其類自然之理也君子之交謂之朋友非朋黨也小人之交謂之朋黨非朋友也好大而不為大不大矣好髙而不為髙不髙矣祕曰譬如為山未成一簣止吾止也仰天庭而知天下之居卑也哉覩聖道然後知諸子之淺小祕曰仰聖人之道彌髙而知止於異習者居卑也哉光曰人情莫不好大好髙而徳常小行常卑若仰觀聖人之道則知己所守之下矣公儀子董仲舒之才之邵也邵髙也公儀休為魯相婦織於室遣去之園有葵拔棄之不與民爭利也董仲舒為江都相下帷三年不窺園以二君才徳髙羙光曰董仲舒曰皇皇求財利常恐乏匱者庻人之意也皇皇求仁義常恐不能化民者大夫之意也此所以為髙使見善不明用心不剛儔克爾儔誰咸曰明謂明悟剛謂剛正祕曰休舒明而且剛故能爾儔誰也光曰誰能如此捨利而取義也或曰仁義禮智信之用曰仁宅也祕曰可以安處義路也祕曰可以遵行禮服也祕曰可以飾身智燭也祕曰可以照物信符也仁如居宅可以安身義如道路可以安行禮如衣服可以表儀智如燈燭可以照察信如符契可以致誠祕曰可以合契光曰符契使人可憑以為驗處宅由路正服明燭執符君子不動動斯得矣祕曰發而皆中道有意哉祕曰謂志於道孟子曰夫有意而不至者有矣未有無意而至者也祕曰惡乎自畫光曰按孟子無此語或問治己曰治己以仲尼咸曰言當以仲尼之道治脩其己或曰治己以仲尼仲尼奚寡也咸曰言世無仲尼祕曰生民已来一人而已光曰若人人治己以仲尼則仲尼宜多曰率馬以驥不亦可乎祕曰治己以道當以仲尼之道率馬以材當以騏驥之材可也光曰髙山仰止景行行止或曰田甫田者莠喬喬思逺人者心忉忉雖有喬喬之莠其糓不可得雖懐忉忉之怨逺人不可見言仲尼之道深逺不可彊學咸曰喬喬當為驕驕甫大也齊風甫田詩曰無田甫田維莠驕驕無思逺人勞心忉忉盖大夫刺襄公無徳而求諸侯猶大田無人功終不能獲今揚子上言當率循有如仲尼之道者而取之或人未諭故引是詩言居今之世而求仲尼猶大田莨莠驕驕而盛欲遂其獲不可得也故徒思逺人心忉忉者也逺人指仲尼祕曰圃讀如甫喬讀如驕或人以仲尼之道逺且大力不及也猶田大田而少功徒使莠驕驕而盛思逺人而不見徒使心忉忉而勞詩曰無田甫田維莠驕驕無思逺人勞心忉忉光曰李本甫作圃今從宋吳本上田音甸喬音驕曰日有光月有明咸曰此言仲尼雖沒而其道存焉猶日月雖逺而光明在焉祕曰日月在此光明甚邇三年不目日視必盲三年不目月精必矇不見日月而盲矇以喻不學闇人咸曰言仲尼道存則可學之否則狂愚矣日月光明則可視之否則盲矇矣夫日月幾三年則一差變故五年而再閏言三者舉成數也夫道不可須㬰而離其身目不可造次而失其視以三年日月之變而心目不能易則道去矣視絶矣遂至熒枯莩沈𡨕行而已矣祕曰三者用數之終數終而不視仲尼之道其猶盲矇矣光曰矇音蒙熒魂曠枯糟莩曠沈莩郭也光曰莩芳无切擿埴索塗冥行而已矣埴土也盲人以杖擿地而求道雖用白日無異夜行夜行之義靣牆之論也宗元曰熒明也熒魂司目之用者也糟當為精莩如葭莩之莩目精之表也言魂之熒明曠久則枯精之輕浮曠久則沈不目日月目之用廢矣以至於索塗冥行而已矣祕曰熒光熒魂神光精莩精之白也故本精作糟桞宗元云糟當為精言盲矇之患神光久曠則枯目精久曠則沈於是以杖擿地而求路冥冥然行矣張晏云莩者葭之白皮埴地也光曰擿它歴切挑也埴常職切索山責切人學於聖人然後能立猶目之資於日月然後能視也或脩身而不由聖人則為棄人矣視物而不見日月則為棄目矣或問何如斯謂之人曰取四重去四輕則可謂之人曰何謂四重曰重言重行重貌重好光曰宋吳本言重行重貌重好重今從李本行下孟反下可以意求言重則有法行重則有徳貌重則有威好重則有觀可觀望也祕曰非禮不好必有可觀光曰觀古玩切敢問四輕曰言輕則招憂咸曰犯人必衆故憂及矣行輕則招辜咸曰冒禁必多故罪至矣貌輕則招辱咸曰人必易之所辱亦多好輕則招滛咸曰嗜其邪也不亦滛乎禮多儀美其多威儀也或曰日􅉴不食肉肉必乾日􅉴不飲酒酒必酸賔主百拜而酒三行不已華乎曰實無華則野華無實則史史音古或作賈咸曰論語云質勝文則野文勝質則史此義同之宜如史字音古非也祕曰野謂樸野史謂文勝其質光曰李本史作賈音古音義曰賈人衒鬻過實今從吳宋本華實副則禮華實相副然後合禮文質彬彬然後君子山雌之肥其意得乎咸曰山雌之肥由其無憂適意之然君子之樂由其守道遇時之貴光曰言山梁雌雉所以能肥如是者以其飲啄遊處得意也喻君子之樂道亦然或曰回之簞瓢臞如之何咸曰臞瘠也此譏顔回之一簞一瓢已甚瘠矣何自得之有祕曰臞瘠也簞瓢之臞何以不改其樂光曰臞其俱切曰明明在上百官牛羊亦山雌也闇闇在上簞瓢捽茹亦山雌也何其臞咸曰捽謂以手捽菹茹也祕曰邦有道富且貴樂也邦無道貧且賤樂也顔何臞哉光曰捽在忽切百官牛羊若堯之所以養舜也千鈞之輕烏獲力也簞瓢之樂顔氏徳也千鈞之重烏獲舉之而輕多力耳簞食瓢飲顔氏處之而樂徳盛也祕曰烏獲秦之力士千鈞之輕簞瓢之樂他人之所不能或問犂牛之鞹與𤣥騂之鞹有以異乎咸曰犂牛雜色之牛𤣥黒也騂赤也鞹皮亦猶色也或問犠牛有不純之色與黒赤之色皆牛也豈有異乎祕曰犂雜色𤣥黝也騂赤也皮去毛曰鞹光曰鞹苦郭切騂息營切曰同咸曰言其為牛一也故曰同祕曰毛附則異然則何以不犂也咸曰言既為牛之同而宗廟何取𤣥騂而不用犂也祕曰祭祀之牲取黝騂而何不用犂也語曰犂牛之子騂且角雖欲勿用山川其含諸光曰或者言凡人顧其中心何如耳何必外貌之禮文曰將致孝乎鬼神不敢以其犂也祕曰致孝於宗廟山川貴純色而不敢用犂也如刲羊刺豕罷賓犒師惡在犂不犂也刲羊義見易咸曰罷當為饗字之誤也夫晏饗之牛羊不毛雖雜色可矣故犂與不犂皆用之祕曰如為賓客師旅之牲安問色之雜不雜也罷以禮罷之犒餉之郷飲酒義曰朝不廢朝莫不廢夕鄭康成云既朝乃飲先夕則罷光曰刲苦圭切惡哀都切音義曰罷音疲勞也揚子以為若欲為君子則不可無禮文若欲為衆人則何必禮文也有徳者好問聖人或曰魯人鮮徳奚其好問仲尼也言魯定哀公孟仲季孫皆問仲尼祕曰若哀公問儒服儒行定公問君使臣臣事君之類光曰鮮息淺切曰魯未能好問仲尼故也咸曰夫有徳者好問聖人則好行之今魯人雖問之而不能用祕曰今魯不用其言非好而問之也如其好問仲尼則魯作東周矣或謂咸曰自平王東遷周衰劇矣故仲尼降王黍離詩於國風明其不能復雅政而齊等於邦君也而揚子謂魯人好問仲尼則但能使魯作東周不亦易乎曰不然也孔子云如有用我者吾其為東周乎此言當復興西周之盛於東周之地也豈仲尼但能作平王之道哉今揚子之意謂使魯能好問仲尼則魯亦可尊樹王室復興西周之盛於東周之地爾豈止使魯如平王之衰邪學者宜辨之光曰興周道於東方或門人有倚孔子之牆絃鄭衛之聲誦韓莊之書則引諸門乎祕曰韓非莊周本俱學於老子者也今人惟知韓非言法而不知其本韓書有解老喻老二篇故曰韓莊之書門謂孔子之門光曰宋本門作問今從李吳本曰在夷貉則引之祕曰韓莊之書使人不知禮鄭衛之音使人不知樂禮樂之不存在蠻貊則引之也倚門牆則麾之咸曰麾去莊周與韓非同貫不亦甚乎惑者甚衆敢問何謂也曰莊雖借喻以為通妙而世多不解韓誠觸情以言治而險薄傷化然則周之益也其利迂緩非之損也其害絞急位既失中兩不與耳亦不以齊其優劣比量多少也統斯以往何嫌乎又問自此已下凡論諸子莫不連言乎莊生者何也荅曰妙指非見形而不及道者之言所能統故毎道其妙寄而去其麄迹一以貫之應近而已光曰貉毋百切言夷貉之人生而未嘗見禮義猶恐於在門牆者也惜乎衣未成而轉為裳也衣上也裳下也聖典本也諸子末也轉上為下捨本逐末者是可惜祕曰上衣下裳惜乎習聖道未成而轉為諸子也光曰上曰衣下曰裳遊諸子之門者本欲學聖人之正道今乃絃鄭衛誦韓莊聖道未成而更於邪僻矣安用之聖人耳不順乎非惟正之聽口不𨽻乎善性與天道發言成章不𨽻習祕曰無聽不是無言不善𨽻習也言不俟習光曰𨽻羊至切賢者耳擇口擇耳擇所聽口擇所言祕曰可聽則聽可言則言衆人無擇焉觸情任意或問衆人曰富貴生苟貪富貴不義而生祕曰志在苟求富貴貪生而已賢者曰義行義以逹其道祕曰惟義所在義也者所以冝仁而適道者也聖人曰神神徳行也咸曰天神應乎萬變聖人如之豈止益於徳行而已祕曰神猶道也荀子曰道出乎一曷謂一執神而固曷謂神曰盡善挾治之謂神萬物莫足以傾之謂固神固之謂聖人觀乎賢人則見衆人光曰賢人能為人所不能必有以殊於衆觀乎聖人則見賢人光曰卓爾有立不可及觀乎天地則見聖人祕曰天地之道聖人管之聖人之道賢者宗之賢人之道衆人日用之光曰天地聖人之所取法天下有三好衆人好已從賢人好已正聖人好己師祕曰欲廣其道光曰己師為己之師也天下有三檢光曰檢猶限度也衆人用家檢家人自以為法光曰所安利者不出其家賢人用國檢聖人用天下檢光曰安利徧於天下天下有三門由於情欲入自禽門所謂觸情祕曰不性其情光曰如禽獸由於禮義入自人門祕曰禮者人之所履義者人之所宜光曰宋吳本人作仁今從李本由於獨智入自聖門祕曰上智也光曰生而知之獨運明智極深研幾非常人所能逮或問士何如斯可以禔身禔安祕曰禔福也福者百順之名光曰禔是支社奚二切又音題曰其為中也𢎞深中者心志也𢎞深敦重也其為外也肅括則可以禔身矣外威儀也肅敬也括法也祕曰心志廣深而儀形肅括斯士之福也括猶檢括也光曰𢎞深不淺露肅括不放肆君子㣲慎厥徳悔吝不至何元憞之有微纎也悔吝小疵也元憞大惡也祕曰悔吝生乎分元憞大惡也光曰憞徒對切慎之於微則過惡不大上士之耳訓乎徳訓順下士之耳訓乎已苟或令人順已祕曰上士好徳聞而誠之下士是已聞而誡之訓誡也言不慙行不耻者孔子憚焉言不違理故形不慙行不邪僻故心不耻言行能如此仲尼所敬憚難也祕曰言焉而不慙於言行焉而不恥於行雖聖人猶畏憚之光曰人之言行無可慙耻者是全徳之人也故雖聖人猶敬憚焉揚子法言卷二}
