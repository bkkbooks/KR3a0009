  - {type: variant, offset: 2, length: 2, content: 卷第, WYG: 篇咸曰人既裕乎學也則吾道有歸焉故次之學行降周迄孔成于王道禮樂備也光曰宋本迄作訖今從李吳本迄許訖切顔曰周周公也迄至也然後誕章諸子應時而作詭世之言矣祕曰迄至也一本作訖誕大也章明也周孔之後禮樂大明光曰漢書及李本然作終今從宋吳本乖離咸曰然後誕章乖離當為一句言自仲尼之後詭誕之章作而乖離於道今註於誕章文下釋之隔乖離}
