  - {type: variant, offset: 81, length: 0, content: '', SBCK: 言狴犴使人多禮辭賦使人放蕩惑亂也}
  - {type: variant, offset: 81, length: 0, content: '', WYG: 言擊劒使人狴犴多禮辭賦使人放蕩惑亂咸曰狴當作狴字之誤也狴犴牢獄也劒客之論謂劒可以衛身揚以君子之衛身當由夫道故對之以為若使擊鍋可衛身則囹圄之牢有三木之威囚者多恭豈使人多禮乎言不能也盖特沮其劒術爾今註文與好賦相聨叚解之復以狴犴為擊劒之形貌又以􅀈作狴犴矣祕曰狴犴牢獄也言劒之威乆莫敢犯豈牢獄之威使人多禮乎狴或作􅀈古今字爾光曰狴邊兮切或作狴又匹迷切犴音岸人在牢獄之中不得動揺因謂之多禮不知其已陷危辱之地不若不入牢獄之為善也劒雖可以衛身不若以道自防不至於用劒之為善也}
