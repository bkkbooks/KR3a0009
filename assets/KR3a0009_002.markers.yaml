  - {type: variant, offset: 272, length: 0, content: '', WYG: 夫智者達天命審行廢如玉之瑩磨而不磷今屈方逐感激爰變雖有文彩丹青之倫爾咸曰非也言原事楚王入則圖議國事出則接遇賔客方正盡忠義有瑕汙如玉之瑩矣然為上官大夫子蘭之讒卒以放逐是為丹青所變矣復不能計窮達之命自沈而死是智不足矣丹青喻讒祕曰原負明正之資本為椘之忠臣如玉如瑩也被上官大夫子蘭之毁不能捨之則蔵遂著文華流於後世廼為楚之辭臣爰變丹青也遇不遇命也何必湛身如何其智如何其智非智也光曰音義曰瑩音營又音榮又烏定切石次玉者玉瑩喻清潔丹青喻有文彩言屈原雖有行能如此之美而不能樂天知命悲憂憤懣至於自沉不足言其智也}
