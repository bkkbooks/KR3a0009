  - {type: variant, offset: 51, length: 0, content: '', WYG: 相如作大人賦武帝覽之飄飄然有凌雲之志咸曰此正文正宜有曰字諸本並無盖脱之也祕曰諷之必推類而言極靡麗之辭然後諷之有正如其不已廼復成勸言不正也光曰宋吳本無曰字今從李本}
