  - {type: variant, offset: 817, length: 0, content: '', WYG: 咸曰墨翟之道摩頂放踵以利天下為之是兼愛也然無親踈之别楊朱之道拔一毛以利天下不為之是為己也然為己乃獨善其身兼愛獨善俱偏於道而教授其徒以亂天下是塞聖人之路者也然為己猶得不毁傷之義無親踈之别大為不可故孟子曰逃墨必歸於楊逃楊必歸於儒歸斯受之而已矣此孟子闢之之辭也祕曰楊朱墨翟之横議充塞聖人之正路孟子辯而開之廓然無復塞矣孟子曰楊墨之道不息孔子之道不著是邪說誣民充塞仁義也}
