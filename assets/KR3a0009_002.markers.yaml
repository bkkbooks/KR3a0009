  - {type: variant, offset: 309, length: 0, content: '', SBCK: 足言夸毗之辭足容戚施之面言皆藻飾之僞非篤實之真}
  - {type: variant, offset: 309, length: 0, content: '', WYG: 足言夸毗之辭足容戚施之靣言皆藻飾之為非篤實之真咸曰足當為足恭之足法言凖論語故有足言足容也若以充足呼之則未可為夸毗戚施之義也祕曰言滿天下無口過足言也容止可觀足容也言也容也為有徳之文藻矣光曰足子預切如字足言善辭令足容盛威儀有徳則為文章無徳則為澆偽}
