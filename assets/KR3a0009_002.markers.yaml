  - {type: variant, offset: 5, length: 0, content: '', SBCK: 崇本在乎抑末學大道絶乎小辯也李軌注}
  - {type: variant, offset: 5, length: 0, content: '', WYG: 字於下句甚失其義諸子祕曰異端起乃乖離於諸子矣圖徽貴此聖人坦蕩之夷路賤彼百家雜穢諸之邪徑咸曰徽善也諸子謂吾道之子也言詭誕之章乖離於道諸子當圖其善而學之戒夫習者也祕曰圖謀也徽美也辨其異端而謀其徽美光曰漢書作圖徽今從諸家譔吾子祕曰綺靡荒唐雕刻詭誕俱謂之文人各矜尚而不知其正者正之光曰貴道徳抑浮辭}
