  - {type: variant, offset: 63, length: 280, content: 則政立矣或問為政有幾曰思斁或問斁曰思昔在周公征于東方四國是王召伯述職蔽芾甘棠其思矣夫齊桓欲徑陳陳不果內執轅濤塗其斁矣夫於戲從政者審其思斁而已矣或問何思何斁曰老人老孤人孤病者養死者葬男子畝婦人桑之謂思若污人老屈人孤病者獨死者逋田畝荒杼軸空之謂斁為政日新或人敢問日新曰使之利其仁樂其義厲之以名引之以美使之陶陶然之謂日新或問民所勤曰民有三勤曰何哉所謂三勤曰政善而吏惡一勤也吏善而政惡二勤也政吏駢惡三勤也禽獸食人之食土木衣人之帛穀人不足於晝絲人不足於夜之謂惡政聖人文質者也車服以彰之藻色以明之聲音以揚之詩書以光之籩豆不陳玉帛不分琴瑟不鏗鍾鼓不抎則吾無以見聖人矣或曰以往, WYG: 言旁通}
