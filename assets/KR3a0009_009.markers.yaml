  - {type: variant, offset: 482, length: 1, content: 君, SBCK: 有齊死生同貧富等貴賤何如齊死生者莊生所謂齊物者非好死惡生之謂也而或者}
  - {type: page-break, offset: 482, content: '', id: KR3a0009_SBCK_012-3b}
  - {type: variant, offset: 482, length: 1, content: 君, WYG: 有齊死生同貧富等貴賤何如懼者畏義也此章有似駁荘子荘子之言逺有其㫖不統其逺㫖者遂徃而不反所以辨之思各統其所言之㫖而两忘其言則得其意也祕曰人有如荘生之齊物者何如光曰荘列之論如是曰作此者其有懼乎祕曰非聖人者無法懼有誅戮之責作此齊物之論然後以夷曠為妙達曰道家流當然也禮曰行偽而堅言偽而辨學非而博順非而澤以疑衆殺光曰懼謂有憂患}
  - {type: page-break, offset: 482, content: '', id: KR3a0009_WYG_009-7a, image: WYG0696/WYG0696-0346a.png}
  - {type: variant, offset: 482, length: 1, content: 君, krp: 有齊死生同貧富等貴賤何如懼者畏義也此章有似駁荘子荘子之言逺有其㫖不統其逺㫖者遂徃而不反所以辨之思各統其所言之㫖而两忘其言則得其意也祕曰人有如荘生之齊物者何如光曰荘列之論如是曰作此者其有懼乎祕曰非聖人者無法懼有誅戮之責作此齊物之論然後以夷曠為妙達曰道家流當然也禮曰行偽而堅言偽而辨學非而博順非而澤以疑衆殺光曰懼謂有憂患}
  - {type: variant, offset: 484, length: 0, content: '', SBCK: 諭故問曰作此者其有懼乎懼者畏義也此章有似駮莊子莊子之言逺有其旨不統其逺旨者逐往而不反所以辯之也各統其所言之㫖而兩忘其言則得其意也信死生齊貧富同貴賤等則吾以聖人爲囂囂通天地人曰儒道術深奥通天地而不通人曰伎伎藝偏能人必先作然後人名之先求然後人與之人理云云萬物動静無不由我以名彼者人必其自愛也而後人愛諸人必其自敬也而後人敬諸自愛仁之至也自敬禮之至也未有不自愛敬而人愛敬之者也或問龍􅀛鴻鵠不亦壽乎曰壽曰人}
  - {type: variant, offset: 485, length: 0, content: '', SBCK: 壽乎曰物以其性人以其仁物性之壽其質生存延年長也仁者之壽死而}
  - {type: variant, offset: 485, length: 0, content: '', WYG: 避故作此論以自寛信死生齊貧富同貴賤等則吾以聖人為囂囂祕曰夫死生異理貧富殊塗貴賤差等較然之義也而荘子託以道家遂以係表逺去忘言得意稱其齊一而好之者無不甘心焉是虚華之大者若信是言則吾以聖人六經之㫖爲囂囂之虚語耳光曰囂許驕切人好生惡死苫貧樂富重貴輕賤乃其常情聖人因之以設勸沮立政教若信然齊等則聖人號令典謨徒囂囂然煩言耳通天地人曰儒道業深與祕曰隂陽剛柔仁義之道始於太極成乎五行主於至神運於六子管於聖人是謂通之其名曰儒通天地而不通人曰伎伎藝偏能祕曰知天地之變隂陽之數而不知其所以變所以數是不通於聖人之㫖若子之道名曰伎藝人必先作然後人名之先求然後人與之人理云云萬物動静無不由我以明彼者祕曰若求仁而得仁光曰作為善惡而人以善惡名之自求禍福而人以禍福與之人必其自愛也然後人愛諸咸曰言先自愛於人而人亦愛之人必其自敬也然後人敬諸咸曰言先自敬於人而人亦敬之自愛仁之至也祕曰韓吏部曰博愛之謂仁自敬禮之至也祕曰曲禮曰毋不敬未有不自愛敬而人愛敬之者也祕曰未有不自愛敬於人而人愛敬於己者也光曰敦仁所以自愛也隆禮所以自敬也或問龍龜鴻鵠不亦夀乎曰夀曰人可夀乎曰物以其性人以其仁物性之夀其質生存延年長也仁者之壽死而不亡名無窮也咸曰故顔氏之子年雖夭而仁不能窮之也光曰龍龜鴻鵠性自夀耳人則為仁然後能保其夀孔子曰仁者夀或問人言仙者有諸乎祕曰秦皇漢武俱欲求之故問焉曰吁吾聞伏犧神農殁黄帝堯舜殂落而死文王畢孔子魯城之北祕曰魯城之北孔子𦵏所也言伏羲至孔子並聖人皆死爾光曰文王𦵏於畢孔子𦵏於魯城之北獨子愛其死乎非人之所及也仙亦無益子之彚矣祕曰彚類也仙者皆有虚名而無益於事實者也光曰借使有仙亦如龍龜等非人類所能學也或曰聖人不師仙厥術異也聖人之於天下耻一物之不知仙人之於天下耻一日之不生光曰言聖人所以}
