  - {type: variant, offset: 485, length: 0, content: '', krp: 避故作此論以自寛信死生齊貧富同貴賤等則吾以聖人為囂囂祕曰夫死生異理貧富殊塗貴賤差等較然之義也而荘子託以道家遂以係表逺去忘言得意稱其齊一而好之者無不甘心焉是虚華之大者若信是言則吾以聖人六經之㫖爲囂囂之虚語耳光曰囂許驕切人好生惡死苫貧樂富重貴輕賤乃其常情聖人因之以設勸沮立政教若信然齊等則聖人號令典謨徒囂囂然煩言耳通天地人曰儒道業深與祕曰隂陽剛柔仁義之道始於太極成乎五行主於至神運於六子管於聖人是謂通之其名曰儒通天地而不通人曰伎伎藝偏能祕曰知天地之變隂陽之數而不知其所以變所以數是不通於聖人之㫖若子之道名曰伎藝人必先作然後人名之先求然後人與之人理云云萬物動静無不由我以明彼者祕曰若求仁而得仁光曰作為善惡而人以善惡名之自求禍福而人以禍福與之人必其自愛也然後人愛諸咸曰言先自愛於人而人亦愛之人必其自敬也然後人敬諸咸曰言先自敬於人而人亦敬之自愛仁之至也祕曰韓吏部曰博愛之謂仁自敬禮之至也祕曰曲禮曰毋不敬未有不自愛敬而人愛敬之者也祕曰未有不自愛敬於人而人愛敬於己者也光曰敦仁所以自愛也隆禮所以自敬也或問龍龜鴻鵠不亦夀乎曰夀曰人可夀乎曰物以其性人以其仁物性之夀其質生存延年長也仁者之壽死而不亡名無窮也咸曰故顔氏之子年雖夭而仁不能窮之也光曰龍龜鴻鵠性自夀耳人則為仁然後能保其夀孔子曰仁者夀或問人言仙者有諸乎祕曰秦皇漢武俱欲求之故問焉曰吁吾聞伏犧神農殁黄帝堯舜殂落而死文王畢孔子魯城之北祕曰魯城之北孔子𦵏所也言伏羲至孔子並聖人皆死爾光曰文王𦵏於畢孔子𦵏於魯城之北獨子愛其死乎非人之所及也仙亦無益子之彚矣祕曰彚類也仙者皆有虚名而無益於事實者也光曰借使有仙亦如龍龜等非人類所能學也或曰聖人不師仙厥術異也聖人之於天下耻一物之不知仙人之於天下耻一日之不生光曰言聖人所以}
  - {type: variant, offset: 486, length: 5, content: 學律令曰君, SBCK: 亡名無窮也或問人言仙者有諸乎吁吾聞宓羲神農殁黃帝堯舜殂落而死文王畢孔}
  - {type: page-break, offset: 486, content: '', id: KR3a0009_SBCK_012-4a}
  - {type: punctuation, offset: 487, content: 《, id: KR3a0009_tls_009-bkkpn183}
  - {type: variant, offset: 487, length: 1, content: 律, WYG: 仙者道不同故也聖人務多知仙人務長生曰生乎生乎名生而實死也咸曰名惡名也實善實也言今之為仙者惡名存也善實死也如始皇孝武至今為天下笑非惡存而善死者乎祕曰神仙者謂之羽化蟬蛻而升天是名生也其實則降年盡而死耳故曰實死光曰安期羡門徒有其名而人未嘗見實死也或曰世無仙則焉得斯語曰語乎者非囂囂也歟惟囂囂能使無為有咸曰仙本無也而盧生之徒以為有非囂囂不逞者孰能祕曰囂囂然方士之虚語爾囂囂之多則能使無為有也光曰多言之人喜妄說或問仙之實曰無以為也咸曰言無以為其實光曰無用問為有與無非問也咸曰謂之有謂之無皆不當問祕曰天地之間本無此理無而問有有而問無皆非問也問也者忠孝之問也言惟問忠與孝之事耳祕曰忠孝者修身之本忠臣孝子偟乎不偟偟暇咸曰忠臣謇謇於事君孝子汲汲於事親何暇其仙乎祕曰偟暇忠孝之人何暇問無益之事乎光曰偟音皇或問夀可益乎曰徳光曰惟修徳可以益夀曰回牛之行徳矣曷夀之不益也咸曰言顔回冉伯牛徳而何不夀曰徳故爾咸曰庸以長生為夀聖以不朽為夀顔冉有徳故不朽爾如囬之殘牛之賊也焉徳爾言復甚也咸曰言假}
