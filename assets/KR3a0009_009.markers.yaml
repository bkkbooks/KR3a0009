  - {type: variant, offset: 377, length: 0, content: '', SBCK: 猶四瀆也經營中國終入大海他人之道者西北之流也綱紀夷貉或入于沱或淪于漢淮南􅀃之用不如太史公之用也太史公聖人將有取焉實録不隱故可采擇淮南鮮取焉爾浮辯虚妄不可承信必也儒乎乍出乍入淮南也或出經或入經文麗用寡長卿也多愛不忍子長也史記叙事但美其長不貶其短故曰多愛仲尼多愛愛義也子長多愛愛竒也或曰甚矣傳書之不果也曰不果則不果矣苟非所能自可爾人以巫鼓巫鼓猶妄􅀃也妄􅀃傷義甚於不言一曰巫鼓之儔奚徒不果而巳乃復􅀉詼誕以自大假不學爲髙通故揚子旣吐觸情之談又發巫鼓之義或問聖人之言炳若丹青有諸曰吁}
  - {type: page-break, offset: 377, content: '', id: KR3a0009_SBCK_012-2b}
  - {type: variant, offset: 377, length: 0, content: '', WYG: 猶四瀆也經營中國終入大海祕曰爾雅曰江河淮濟為四瀆四瀆者發源注海者也它人之道者西北之流也綱紀夷貉或入于沱或淪于漢祕曰西北之流水經夷貉而不返或向東者亦入沱漢而已言其異而小也書曰嶓冡導漾東流為漢又曰岷山導江東别為沱孔云沱東行光曰言諸子之道雖時有小用而非順正不可以致逺淮南說之用不如太史公之用也太史公聖人將有取焉實録不隠故可採擇咸曰司馬遷雖雜尚有禮樂儒學之說於聖人之道可取而用之於劉安溺異端之痼者也故曰鮮取焉光曰今之所以知古後之所以知先史不可廢淮南鮮取焉爾浮辯虛妄不可承信祕曰太史公實録猶如魯史舊文聖人将有取焉以正褒貶淮南劉安之書雜而不典少有可採光曰鮮息淺切空言雖辯博而駁雜迂誕可取者少必也儒乎光曰聖道於}
  - {type: page-break, offset: 377, content: '', id: KR3a0009_WYG_009-3b, image: WYG0696/WYG0696-0344b.png}
  - {type: variant, offset: 377, length: 0, content: '', krp: 猶四瀆也經營中國終入大海祕曰爾雅曰江河淮濟為四瀆四瀆者發源注海者也它人之道者西北之流也綱紀夷貉或入于沱或淪于漢祕曰西北之流水經夷貉而不返或向東者亦入沱漢而已言其異而小也書曰嶓冡導漾東流為漢又曰岷山導江東别為沱孔云沱東行光曰言諸子之道雖時有小用而非順正不可以致逺淮南說之用不如太史公之用也太史公聖人將有取焉實録不隠故可採擇咸曰司馬遷雖雜尚有禮樂儒學之說於聖人之道可取而用之於劉安溺異端之痼者也故曰鮮取焉光曰今之所以知古後之所以知先史不可廢淮南鮮取焉爾浮辯虛妄不可承信祕曰太史公實録猶如魯史舊文聖人将有取焉以正褒貶淮南劉安之書雜而不典少有可採光曰鮮息淺切空言雖辯博而駁雜迂誕可取者少必也儒乎光曰聖道於}
  - {type: variant, offset: 378, length: 1, content: 漆, SBCK: 何言與吁者駭歎之聲丹青初則炳乆則渝渝乎哉丹青􅀄則炳然乆則渝變聖人之書乆而益明或曰聖人之道若天天則有常矣奚聖人之多變}
  - {type: variant, offset: 378, length: 1, content: 漆, WYG: 乎在乍出乍入淮南也或出經或入經祕曰必也以儒為名乎内篇論道外篇雜說乍出乍入雜而不純者也文麗用寡長卿也咸曰司馬相如文賦雖麗施用則少祕曰相如文雖麗而寡於用多愛不忍子長也史記叙事但美其長不貶其短故曰多愛咸曰遷之學不專純於聖人之道至於滑稽日者貨殖遊俠九流之技皆多愛而取不忍棄之祕曰不可以垂世立教者司馬遷皆叙而録之是多愛不忍也仲尼多愛愛義也子長多愛愛奇也光曰仲尼稱管仲為仁史魚為直蘧伯玉為君子之類亦多愛或曰甚矣傳書之不果也咸曰非經謂之傳或人旣聞揚子上論淮南子長之言愛竒而雜故因駭之而為問也言甚矣彼傳記之書不果純於聖人之道也祕曰古者詩三千餘篇孔子刪定取止乎禮義者三百一十一篇而已是愛義也子長史記至於滑稽日者刺客貨殖之類皆不忍去是愛竒也或人曰甚矣淮南子長之傳言不果全於聖人之道也曰不果則不果矣苟非所能自可耳咸曰言今人之不果純於聖人之道者尚可導而果之如淮南子長皆已没矣其書皆已行矣安可道而果之哉誠為不果純矣祕曰内不果純文亦不果道矣人以巫鼓巫鼓猶妄說也妄說傷義甚於不言一曰巫鼔之儔奚徒不果而已乃復竒談誕以自大假不學為髙通故揚子旣吐觸情之談又發巫鼓之義咸曰夫巫左道者也言彼之書非徒不果純於聖人之道而已今大行於世復使人學之得其雜說如左道之巫以鼓動其事惑夫衆者也如淮南㳺仙化金之說鼓動末俗使其學之非左道而何也光曰音義曰天復本人作又並闕或問聖人之言炳若丹青有諸曰吁是何言歟吁者駭嘆之辭丹青初則炳乆則渝渝乎哉丹青初則炳然久則渝變聖人之言乆而益明或曰聖人之道若天天則有常矣奚聖人之多變也成曰言五經支離萬事錯綜祕曰天有一定之髙有常也聖人無可無不可多變}
