  - {type: punctuation, offset: 363, content: 「, id: KR3a0009_tls_009-bkkpn147}
  - {type: variant, offset: 363, length: 0, content: '', WYG: 大器固不周於小乎光曰言有大志者不顧小節曰斯械也君子不械械器也航衝之器無所不施咸曰君子之道惟變所適航衝之器主一而用注謂航衝無所不施反矣光曰器械適於一用君子明道無施不可或問孟子知言之要知徳之奥曰非苟知之亦允蹈之咸曰允信也蹈行也言孟子於要言奥徳非惟苟且而知之亦能信而行之或曰子小諸子孟子非諸子乎曰諸子者以其知異於孔子者也祕曰知所知之道光曰以其小知立異於孔子之道孟子異乎不異道同仲尼也或曰荀卿非數家之書侻也彈駁數家侻合於教光曰宋吴本侻作脫今從李本音義曰侻佗括切可也至于子思孟軻詭哉譏此則乖詭咸曰孔伋字子思孔子之孫孟軻之師也荀子有非十二子之言亦兼非子思孟軻此言非它數家則偶脫可矣至于非軻伋則邪詭也祕曰荀卿非十二子若惠施鄧析之徒則脱異}
  - {type: page-break, offset: 363, content: '', id: KR3a0009_WYG_009-2b, image: WYG0696/WYG0696-0343d.png}
  - {type: variant, offset: 363, length: 0, content: '', krp: 大器固不周於小乎光曰言有大志者不顧小節曰斯械也君子不械械器也航衝之器無所不施咸曰君子之道惟變所適航衝之器主一而用注謂航衝無所不施反矣光曰器械適於一用君子明道無施不可或問孟子知言之要知徳之奥曰非苟知之亦允蹈之咸曰允信也蹈行也言孟子於要言奥徳非惟苟且而知之亦能信而行之或曰子小諸子孟子非諸子乎曰諸子者以其知異於孔子者也祕曰知所知之道光曰以其小知立異於孔子之道孟子異乎不異道同仲尼也或曰荀卿非數家之書侻也彈駁數家侻合於教光曰宋吴本侻作脫今從李本音義曰侻佗括切可也至于子思孟軻詭哉譏此則乖詭咸曰孔伋字子思孔子之孫孟軻之師也荀子有非十二子之言亦兼非子思孟軻此言非它數家則偶脫可矣至于非軻伋則邪詭也祕曰荀卿非十二子若惠施鄧析之徒則脱異}
  - {type: variant, offset: 364, length: 0, content: '', WYG: 人之道已至于子思孟軻不異者也是苟卿之詭說也曰吾於荀卿歟見同門而異户也同出一門而異其户同述一聖而有乖詭光曰言荀卿亦述孔子之道而所見不能無小異惟聖人為不異前聖後聖法制𤣥合大同仁義也祕曰純終牛𤣥騂白睟而角其升諸廟乎是以}
