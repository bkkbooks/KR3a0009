  - {type: variant, offset: 489, length: 0, content: '', WYG: 顔行之殘冉行之賊則安得不朽之夀如是哉光曰顔冉之命自短耳若加之殘賊則斯命亦不能保也曰殘賊或夀曰彼妄也君子不妄論語曰人之生也直罔之生也幸而免揚子之說亦猶此義咸曰禮云庶人曰死死斯盡也死則盡無所聞矣如殘賊者安得不朽哉彼言不朽者乃欺妄也彼問亦以長生為壽揚對終以不朽為夀祕曰殘賊之人妄生於世爾豈有不朽之夀哉君子不妄生者也光}
