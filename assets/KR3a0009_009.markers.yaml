  - {type: variant, offset: 386, length: 1, content: 嘗, SBCK: 得其所以書也宰我子貢得其言矣未得其所以言也顔淵閔子騫得其行矣未得其所以行也聖人以妙外往諸賢以方中來聖人之書言行天也天其少變乎所以應無方也或曰聖人自恣與何言之多端也曰子未覩禹之行水與一東一北行之無礙也君子之行獨無礙乎如何直往也水避礙則通于海君子避礙則通于理君子好人之好嘉其善也而忘己之好若}
  - {type: page-break, offset: 386, content: '', id: KR3a0009_SBCK_012-3a}
  - {type: variant, offset: 386, length: 1, content: 嘗, WYG: 得其所以書也宰我子貢得其言矣未得其所以言也顔淵閔子得其行矣未得其所以行也聖人以妙外徃諸賢以方中來祕曰通之者聖也習之者賢也光曰行下孟切下同六子皆學於孔子而未逹其本原故雖各有所得而未能盡其變通聖人之書言行天也天其少變乎所以應無方也咸曰此論六子猶孟軻所謂子張子游子夏得聖人之一體顔閔具體而微之謂也夫天多變然後有成聖多變然後有倫天變隠於萬化而難知故曰天則有常聖變布於五經而可見故曰聖人固多變祕曰夫天之髙也及其變則二氣推移四時更迭三辰運行萬物生瘁}
