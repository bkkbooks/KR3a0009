body:
  text: 先知卷第九先知其幾於神乎敢問先知曰不知知其道者其如視忽眇緜作昞先甲一日易後甲一日難或問何以治國曰立政曰何以立政曰政之本身也身立則政立矣或問為政有幾曰思斁或問斁曰思昔在周公征于東方四國是王召伯述職蔽芾甘棠其思矣夫齊桓欲徑陳陳不果內執轅濤塗其斁矣夫於戲從政者審其思斁而已矣或問何思何斁曰老人老孤人孤病者養死者葬男子畝婦人桑之謂思若污人老屈人孤病者獨死者逋田畝荒杼軸空之謂斁為政日新或人敢問日新曰使之利其仁樂其義厲之以名引之以美使之陶陶然之謂日新或問民所勤曰民有三勤曰何哉所謂三勤曰政善而吏惡一勤也吏善而政惡二勤也政吏駢惡三勤也禽獸食人之食土木衣人之帛穀人不足於晝絲人不足於夜之謂惡政聖人文質者也車服以彰之藻色以明之聲音以揚之詩書以光之籩豆不陳玉帛不分琴瑟不鏗鍾鼓不抎則吾無以見聖人矣或曰以往聖人之法治將來譬猶膠柱而調瑟有諸曰有之曰聖君少而庸君多如獨守仲尼之道是漆也曰聖人之法未嘗不關盛衰焉昔者堯有天下舉大綱禹夏命舜殷周屬其子不膠者卓矣唐虞象刑惟明夏后肉辟三千不膠者卓矣堯親九族協和萬國湯武桓桓征伐四克由是言之不膠者卓矣禮樂征伐自天子所出春秋之時齊晉實予不膠者卓矣或曰人君不可不學律令曰君子為國張其綱紀議其教化導之以仁則下不相賊莅之以廉則下不相盜臨之以正則下不相詐循之以禮義則下多德讓此君子所當學也如有犯法則司獄在或苦亂曰綱紀曰惡在於綱紀曰大作綱小作紀如綱不綱紀不紀雖有羅網惡得一目而正諸或曰齊得夷吾而霸仲尼曰小器請問大器曰大器其猶規矩準繩乎先自治而後治人之謂大器或曰正國何先曰躬工人績或曰為政先殺後教曰於乎天先秋而後春乎將先春而後秋乎吾見玄駒之走雉之震雊也化其可以已矣哉民可使覿德不可使覿刑覿德則純覿刑則亂象龍之致雨也難矣哉曰龍乎龍乎或問政核曰真偽真偽則政核如真不真偽不偽則政不核鼓舞萬物者雷風乎鼓舞萬民者號令乎雷不一風不再聖人樂陶成天下之化使人有士君子之器者也故不遁于世不離于群遁離者是聖人乎雌之不才其卵毈矣君之不才其民野矣或問曰載使子草律曰吾不如弘恭草奏曰吾不如陳湯曰何為曰必也律不犯奏不剡甄陶天下者其在和乎剛則甈柔則坏龍之潛亢不獲其中矣是以過中則惕不及中則躍其近於中乎聖人之道譬猶日之中矣不及則未過則昃什一天下之中正也多則桀寡則貉井田之田田也肉刑之刑刑也田也者與眾田之刑也者與眾棄之法無限則庶人田侯田處侯宅食侯食服侯服人亦多不足矣為國不迪其法而望其效譬諸筭乎
