body:
  text: 問明卷第六或問明曰微或曰微何如其明也曰微而見之明其悖乎聰明其至矣乎不聰實無耳也不明實無目也敢問大聰明曰眩眩乎惟天為聰惟天為明夫能高其目而下其耳者匪天也夫或問小每知之可謂師乎曰是何師與是何師與天下小事為不少矣每知之是謂師乎師之貴也知大知也小知之師亦賤矣孟子疾過我門而不入我室或曰亦有疾乎曰托我華而不食我實或謂仲尼事彌其年蓋天勞諸病矣夫曰天非獨勞仲尼亦自勞也天病乎哉天樂天聖樂聖或問鳥有鳳獸有麟鳥獸皆可鳳麟乎曰群鳥之於鳳也群獸之於麟也形性豈群人之於聖乎或曰甚矣聖道無益於庸也聖讀而庸行盍去諸曰甚矣子之不達也聖讀而庸行猶有聞焉去之抏也抏秦者非斯乎投諸火或問人何尚曰尚智曰多以智殺身者何其尚曰昔乎皋陶以其智為帝謨殺身者遠矣箕子以其智為武王陳洪範殺身者遠矣仲尼聖人也或者劣諸子貢子貢辭而精之然後廓如也於戲觀書者違子貢雖多亦何以為盛哉成湯丕承也文王淵懿也或問丕承曰由小致大不亦丕乎革夏以天不亦承乎淵懿曰重易六爻不亦淵乎浸以光大不亦懿乎或問命曰命者天之命也非人為也人為不為命請問人為曰可以存亡可以死生非命也命不可避也或曰顏氏之子冉氏之孫曰以其無避也若立巖牆之下動而徵病行而招死命乎命乎吉人凶其吉凶人吉其凶辰辰乎曷來之遲去之速也君子競諸謣言敗俗謣好敗則姑息敗德君子謹於言慎於好亟於時吾不見震風之能動聾聵也或問君子在治曰若鳳在亂曰若鳳或人不諭曰未之思矣曰治則見亂則隱鴻飛冥冥弋人何慕焉鷦明遴集食其潔者矣鳳鳥蹌蹌匪堯之庭亨龍潛升其貞利乎或曰龍何如可以貞利而亨曰時未可而潛不亦貞乎時可而升不亦利乎潛升在己用之以時不亦亨乎或問活身曰明哲或曰童蒙則活何乃明哲乎曰君子所貴亦越用明保慎其身也如庸行翳路衝衝而活君子不貴也楚兩龔之潔其清矣乎蜀莊沈冥蜀莊之才之珍也不作苟見不治苟得久幽而不改其操雖隋和何以加諸舉茲以旃不亦寶乎吾珍莊也居難為也不慕由即夷矣何毚欲之有或問堯將讓天下於許由由恥有諸曰好大者為之也顧由無求於世而已矣允哲堯儃舜之重則不輕於由矣好大纍克巢父洗耳不亦宜乎靈場之威宜夜矣乎朱鳥翾翾歸其肆矣或曰奚取於朱鳥哉曰時來則來時往則往能來能往者朱鳥之謂與或問韓非作說難之書而卒死乎說難敢問何反也曰說難蓋其所以死乎曰何也曰君子以禮動以義止合則進否則退確乎不憂其不合也夫說人而憂其不合則亦無所不至矣或曰說之不合非憂耶曰說不由道憂也由道而不合非憂也或問哲曰旁明厥思問行曰旁通厥德
