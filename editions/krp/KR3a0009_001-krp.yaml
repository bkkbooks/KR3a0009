body:
  text: 揚子法言卷一晋李軌唐栁宗元註宋宋咸呉祕司馬光重添註雄見諸子各以其知舛馳顔師古曰舛相背大氐詆訾聖人即為怪迂析辯詭辭以撓世事顔曰大氐大歸也詆訾毁也迂逺也析分也詭異也言諸子之書大歸皆非毁周孔之敎為巧辯異辭以攪亂時政也訾音紫迂音于撓火髙反其字從手光曰光謂氐下脱不字雖小辯終破大道而或衆使溺於所聞而不自知其非也及太史公記六國歴楚漢訖麟止不與聖人同是非頗謬於經故人時有問雄者常用法應之譔以為十三卷顔曰譔與撰同象論語號曰法言學行篇咸曰自誠而明聖人而已明誠以降何嘗不由乎學故此所以首衆篇光曰行讀如字凡書中好惡長少難易相将使令說樂焉邪之類兩音易辯者惟於始見音之後可以意求不復再出或可疑則更音之天降生民倥侗顓蒙倥侗無知也顓䝉頑愚也祕曰倥侗未有所成顓固而䝉昧也尤曰倥音空侗音同又音通顓與專同恣于情性觸意用事聰明不開闇塞之謂祕曰不能性其情則聰明有所蔽訓諸理訓導咸曰理猶道也言天民蠢闇故敎諸道以開明之也祕曰於是聖人貴學乃訓以仁義禮智信之正理譔學行祕曰譔撰述也古或通用夫人自有聰明天命非學則不能啓發故謀道常以學為先學行之上也祕曰夫學者所以為道者也率性行道表則後世學之上也言之次也祕曰能辯醇疵發成謨訓學之次也先曰言者徒能言而不行敎人又其次也咸曰行性而言訰可以為師矣故又居其次祕曰欲廣其業以覺後覺學之又其次也光曰古之學者為已今之學者為人為人故又為其次咸無焉為衆人此三者敎之大倫也皆無此三者民斯為下矣祕曰三者無一斯衆人矣或曰人羡久生将以學也可謂好學已乎光曰好呼報切下可以意求者皆不音倣此曰未之好也學不羡仲尼志道朝聞夕死揚子好學不羡久生祕曰學如不及豈俟羡久生然後為學哉光曰死生有命富貴在天好學者修己之道無羡於彼有羡者皆非好學者也天之道不在仲尼乎不在在也祕曰天生五行其性仁義禮智信仲尼駕説者也不在兹儒乎駕𫝊也祕曰仲尼乘行而賛述之駕説者也其道豈不在兹大儒也如将復駕其所説則莫若使諸儒金口而木舌金寳其口木質其舌傳言如此則是仲尼常在矣宗元曰金口木舌鐸也使諸儒駕孔子之説如木鐸也祕曰金口木舌鐸也後世如将復駕仲尼之説則莫如使諸儒比木鐸而宣揚之也語曰天将以夫子為木鐸書曰每嵗孟春遒人以木鐸徇于路孔安國曰木鐸金鈴木舌所以振文教光曰復扶又切或曰學無益也如質何咸曰質猶性也言性有能否不由於學故為無益祕曰孝經説曰性者生之質或言學無益也其如人之質禀受已定何曰未之思矣夫有刀者礲諸有玉者錯諸不礲不錯焉攸用礲錯石名也咸曰揚子善誘于人以為未之思爾苟思矣何無益焉猶夫刀玉非磨而琢之則安能成割圭璋之用光曰礲盧紅切焉於䖍切雖有良金以為刀不礲則不能㫁割雖有羙玉不錯則不能成器如是則何所用矣礲而錯諸質在其中矣咸曰性雖否學則得之既得之則誠性亦在其中矣故曰或生而知之或學而知之及其知之一也此之謂矣祕曰學而至道質性愈全光曰金玉二物苟礲而錯之隨其質之羙惡皆有所用譬之於人賢者學以成徳愚者學以寡過豈得謂之無益也否則輟否不也輟止也此章各盡其性分而已咸曰揚子既誘之矣如其不從則任其止焉不欲以能彊人也祕曰止焉則止也光曰不學則盡其天質而止矣不能復進益光大也家語子路曰南山有竹不揉自直斬而用之逹于犀革以此言之何學之有孔子曰栝而羽之鏃而礪之其入之不亦深乎螟􅘾之子殪而逢蜾蠃祝之曰類我類我久則肖之矣速哉七十子之肖仲尼也肖類也蜾蠃遇螟􅘾而受化久乃變成蜂爾七十子之類仲尼又速於是咸曰螟􅘾桑蟲也蜾蠃蒲蘆也桑蟲子始生而蒲蘆取之於木空中七日祝而化之以變為己子殪者謂其始生未有形性殪然如死故始可以祝而變之祕曰詩草木疏云螟􅘾桑上青蟲蜾蠃細腰蜂言螟􅘾與蜾蠃異類殪而祝之以成其子矧仲尼之聖七十子之賢教而誨之豈不速哉光曰螟音冥􅘾音零蜾音果蠃郎果切祝之又切學以治之祕曰治其性思以精之祕曰精於道朋友以磨之切磋琢磨祕曰過則勿憚改名譽以崇之祕曰立身揚名不倦以終之祕曰自彊不息可謂好學也已矣上士聞此五者勤而行之不可謂不好也孔子習周公者也顔淵習孔子者也羿逄䝉分其弓良捨其䇿般投其斧而習諸孰曰非也咸曰言孔不習周顔不習孔亦猶夫羿棄弓良去䇿般擲斧而習之也誰曰非乎言實非也祕曰羿與逢蒙業射者也王良業御者也公輸般業巧者也聖人有教無類使射御工巧各捨其業而時習之誰其非之光曰音義曰逢薄紅切般音班按它書逢䝉或作蠭䝉宜讀如字三子皆以其術名於世則其才必有過人者鄉使捨其術而習聖人之道烏有不可也或曰此名也咸曰周孔顔之名彼名也咸曰羿逢蒙良般之名處一焉而已矣咸曰或人見揚子并論周孔良般疑其名等如一故揚荅以下文祕曰或人謂有道之名有蓺之名有名無二曰川有瀆山有嶽髙而且大者衆人所不能踰也言諸賢之有妙蓺猶百川之有四瀆衆山之有五嶽而川可度嶽可登髙而且大者惟聖人之道如天不可升也咸曰觀正文之意當云髙而且大者衆人所不能踰也脱其不字矣何以名之或人問般羿周孔之名如一揚以川冇瀆山有嶽而對之是謂般羿之徒猶川山周孔之道猶嶽瀆自然小大不同髙低有異矣故下篇亦云仲尼之道猶四瀆也由是詳之揚之㫖皆以嶽瀆比聖人明矣註不能辨但依誤文以為之解反謂聖人之道如天不可升且正文安有如天之説哉儻謂揚此文以嶽瀆為易踰不足方聖人則下文以仲尼比四瀆為非矣揚豈首尾自相反如是邪祕曰周孔顔子之道如山川之有嶽瀆豈曰處一而已羿逢䝉良般之蓺如山川髙而且大者甚衆人所能踰也光曰呉宋本作衆人所能踰音義曰俗本脱不字諸本皆有今從之或問世言鑄金金可鑄歟方術之士言能銷五石化為黄金故有此問祕曰或人謂三品之金皆可鑄為黄金歟曰吾聞覿君子者問鑄人不問鑄金祕曰揚子以或者非問之問故荅以鑄人光曰覿見也或曰人可鑄歟曰孔子鑄顔淵矣鑄之令殆庶㡬光曰借問顔淵不學亦常人耳遇孔子而敎之乃庶㡬於聖人化他物為黄金何以異此或人踧爾曰㫖哉問鑄金得鑄人踧爾驚貌㫖美也喜於問鑄金而得鑄人富莫大焉利莫重焉祕曰或人悮㫖問妖妄之鑄金得具體之鑄人光曰踧子六切學者所以脩性也祕曰性仁義禮智信也視聽言貌思性所有也學則正否則邪祕曰其性禮者其事視其性智者其事聽其性義者其事言其性仁者其事貌其性信者其事思學焉則本性正不學則逐物移而天理滅光曰五事人皆有之不學則隨物而遷不得其正師哉師哉桐子之命也桐洞也桐子洞然未有所知之時制命於師也再言之者歎為人師制人善惡之命不可不明慎也咸曰桐當為侗字之誤也雄自序學行云空侗顓䝉此曰侗子者取是義也不當作桐木之桐註依誤文訓為洞無所據焉祕曰此章言學為王者之事須師道之訓以正㓜主之命也歎而言之重其事也桐子太甲也太甲太丁之子既立不用伊尹之訓伊尹放之桐三年悔過處仁遷義以聽其訓已歸亳復政百姓以寧書曰既往背師保之訓是也伊尹指師哉太甲言桐子者蓋當王莽輔孺子嬰之世其辭文其㫖逺也孝至篇曰勤勞則過於阿衡皆其類歟光曰桐當為侗音同又音通侗未成器之人也務學不如務求師求師者就有道而正焉祕曰務學之先莫如得其人而師之師者人之模範也模不模範不範為不少矣傷夫欲為而不得其道者多矣祕曰有似是而非而學者不悟從而為道者多矣光曰師者先正已而後能正人一閧之市不勝異意焉賣者欲貴買者欲賤非異如何咸曰閧闘也孟子云鄒與魯閧言市聲如闘而閧然光曰閧下降切勝音升一卷之書不勝異説焉一鬨之市必立之平一卷之書必立之師市無平必失貴賤之正書無師必謬典謨之㫖祕曰一閧猶言一巷也一巷市之小人意各殊必立質人以平之一卷書之少人説各異必立師氏以正之周禮質人中士二人鄭云質平也主平定物價者師氏中大夫一人鄭云師敎人以道者之稱也光曰平皮命切習乎習歎所玩習光曰歎習貫之移人也以習非之勝是也咸曰非謂異端之術光曰南方之俗以雕題為美𦍑戎之俗以焚尸為榮安於所習不知其非習小道者亦類於此况習是之勝非乎咸曰是謂正經之術光曰聖人之道明則異端自息矣於戲光曰宋吳本作烏呼音義曰上音烏下音乎又許宜切學者審其是而已矣祕曰習乎習誡慎其習也以習諸子之勝於五經也况習五經以勝於諸子乎學者詳審而已矣桓譚曰昔老聃著虚無之言兩篇薄仁義非禮學然後好之者尚以過於五經或曰焉知是而習之祕曰道家亦非儒曰視日月而知衆星之蔑也光曰蔑微也仰聖人而知衆説之小也大小之相形髙下之相傾祕曰衆説之小所見者小也光曰人苟盡心於聖人之道則衆説之不足學易知矣學之為王者事其已久矣堯舜禹湯文武汲汲仲尼皇皇其已久矣祕曰儒學者本聖人之道聖人之道乃王者之事故二帝三王孔子汲汲皇皇焉其來乆矣荀子曰堯學於君疇舜學於務成昭禹學於西王國新序子夏對哀公曰堯學於君夀舜學於務成昭禹學於西王國湯學於成子伯文王學於時子思武王學於郭叔曽子問曰吾聞諸老聃學禮也昭公十七年傳曰仲尼聞之見於郯子而學之學紀官也樂記曰唯丘之聞諸萇𢎞學樂也君疇君夀史或作尹夀一也光曰仲尼雖不王乃所學則王道也或問進祕曰進於道曰水或曰為其不舎晝夜歟光曰為于偽切曰有是哉滿而後漸者其水乎水滿坎而後進人學博而後仕祕曰盈科則漸進也光曰子路有聞未之能行唯恐有聞君子之學不務博而務精不務知而務行或問鴻漸曰非其往不往非其居不居漸猶水乎鴻之不失寒暑亦猶水之因地制行祕曰鴻漸于陵水流就下其漸一也光曰鴻避寒而就温學者去非而從是然鴻之飛也不决起直上必以漸而至髙學者亦自近小而至逺大猶水之滿而後進也請問大漸祕曰易曰山上有木漸曰止於下而漸於上者其木也哉亦猶水而已矣止於下者根本也漸於上者枝條也士人據道義為根本業貴無虧進禮學如枝條徳貴日新祕曰巽木上長木漸於上水流就下其漸亦一也光曰本根不動而枝葉進長學者正心修身而家齊國治然十仭之木非朝夕而成聖人之徳非造次而立亦猶水之滿而後進也吾未見好斧藻其徳若斧藻其楶者歟斧藻猶刻桷丹楹之飾楶櫨也祕曰栭謂之楶光曰楶音節斧斵削也藻文飾也鳥獸觸其情者也祕曰無别也衆人則異乎祕曰衆人有禮義之别所以異乎觸情光曰人為萬物之靈賢人則異衆人矣奉宣訓誨咸曰賢人豈特但能奉宣教誨而已蓋言其有明誠之性而異衆人祕曰賢者述之異於衆人光曰能循禮義聖人則異賢人矣制立禮教咸曰聖人豈特但止制立禮教而已蓋言其生而知之乂異賢人祕曰聖人作之異於賢人光曰極深研幾禮義之作有以矣夫言訓物者其豈徒哉咸曰聖賢以鳥獸雌雄無常觸情則動故作禮義使衆人自别誠有㫖焉祕曰聖人制作禮義使人自别於鳥獸豈强為之教哉人而不學雖無憂如禽何是以聖人作經禮以教人使人以有禮知自别於禽祕曰人而不學禮義之經雖夷曠而無憂柰如禽何光曰不學則不知禮義學者所以求為君子也光曰言非獨習其文而已求而不得者有矣夫未有不求而得之者也有其志而猶或不能成其事無其志安能立其業祕曰求而不得蓋有所未至睎驥之馬亦驥之乘也睎顔之人亦顔之徒也祕曰睎睎慕也光曰乗䋲證切或曰顔徒易乎睎之則是祕曰顔子庶㡬疑其難至光曰易以豉切曰昔顔常睎夫子矣正考甫常睎尹吉甫矣祕曰正考甫宋宣公之上卿尹吉甫周宣王之卿士尹吉甫深於詩教作大雅崧髙烝民之詩以美宣王正考甫慕之亦能得商頌十二篇以頌湯之盛徳昭公七年傳曰及正考父佐戴武宣公子奚斯常睎正考甫矣奚斯魯僖公之臣慕正考甫作魯頌祕曰正考甫商頌蓋美禘祀之事而魯大夫公子奚斯能作僖公之廟亦睎詩之教也而魯頌美之曰松桷有舄路寝孔碩新廟奕奕奚斯所作光曰揚子以謂正考甫作商頌奚斯作閟宫之詩故云然如不欲睎則已矣如欲睎孰禦焉或曰書與經同咸曰書謂諸傳記之書猶論語孝經爾雅荀孟之類經謂五經也言此等書宗道與經所同也而世不尚咸曰漢文帝以論語孝經孟子爾雅皆置博士後罷傳記博士獨立五經博士列學科而已論語爾雅荀孟之類末也故云世不尚治之可乎曰可咸曰揚以為皆本諸道雖世不尚亦可治而學之祕曰凡諸書與五經同而時世不尚未列于學官者治之可乎書謂若左氏傳古文尚書毛詩樂記之類或人啞爾笑曰須以發策决科射以决科經以䇿試今徒治同經之書而不見䇿用故笑之祕曰漢之明經必為難問疑義書之於䇿量其大小著為甲乙之科列而置之不使彰顯有欲射者隨其所取得而釋之故曰須以發䇿决科而同經無所施焉是以笑之其當時五經列于學科者易則施孟梁邱京氏書則歐陽大小夏侯氏詩則齊魯韓禮則大小戴慶氏春秋則公糓王莽置周官博士餘不在焉光曰啞於革切曰大人之學為道也小人之學為利也子為道乎為利乎咸曰或人謂可以决科之經則治之是為利而非為道也故揚以君子小人正之或曰耕不穫獵不饗耕獵乎祕曰或人以書不得禄利而治之譬猶耕獵不得穫饗亦耕獵乎曰耕道而得道獵徳而得徳是穫饗也耕獵如此利莫大焉祕曰必須治者以道徳資焉吾不覩參辰之相比也是以君子貴遷善咸曰參辰二星名晋史董因曰公子重耳以辰出而參入言重耳以驪姬之難出晋當辰於外十九年入晋當參也以參辰出没不相比列而重耳象之終免其禍得出處之正故君子不器乃遷善之法也禮曰安安而能遷鄭康成曰舅犯與姜氏醉重耳而行近之是多其可遷則遷為遷善之義也遷善也者聖人之徒歟祕曰參辰二星不並見猶善惡二途不同迹是以君子貴捨惡而遷善者聖人徒也書曰推狂克念作聖光曰比皮志切參辰所以不相近者以定居其所不能相就也君子則不然能去惡而遷善去惡遷善而不息則為聖人之徒矣百川學海而至于海行之不息歸之不已丘陵學山而不至于山是故惡夫畫也畫止祕曰語曰今女畫畫止也光曰惡烏路切百川亦海之類而小故曰學海百川動而不息故至於海丘陵止而不進故不至於山學者亦猶是矣頻頻之黨甚於􅢟斯亦賊夫糧食而已矣􅢟斯羣行啄榖喻人黨比游晏賊害糧食有損無益也祕曰􅢟斯鵯鶋小而多羣言頻頻黨比之人甚於鵯鶋之羣徒好賊稻粱而已矣光曰􅢟羊茹切人而不學飽食終日無所用心徒耗糧食何以異於野鳥朋而不心靣朋也友而不心靣友也匿怨仲尼之所恥靣朋揚子之所譏光曰言朋友當以誠心相與切磋琢磨不可心知其非而不告但外貌相媚悦羣居遊戲相從飲食而已或謂子之治産不如丹圭之富祕曰白圭周人也名丹字圭亦曰丹圭趨時若猛獸鷙鳥之發天下言治生者祖白圭言揚子一㕓一區不如丹圭之富曰吾聞先生相與言則以仁與義咸曰先生有道之稱猶先覺先知之士市井相與言則以財與利如其富祕曰彼利我義言當以義光曰宋吳本作如其富如其義音義曰俗本下句作如其義非今從之或曰先生生無以養死無以葬如之何曰以其所以養養之至也以其所以葬葬之至也養不必豐葬不必厚各順其宜惟義所在祕曰生事之以禮不必豐也死葬之以禮不必厚也孔子曰啜菽飲水盡其歡斯之謂孝歛手足形還葬而無椁稱其財斯之謂禮光曰養皆余亮切或曰猗頓之富以為孝不亦至乎顔其餒矣祕曰猗頓用監鹽起魯之富者言旑頓之富是謂能養顔子簞瓢是為餒矣光曰猗於離切或人以為顔氏之親恐不免於餒也曰彼以其粗祕曰施以飲饌顔以其精祕曰奉以承順彼以其回顔以其貞回邪也頁正也顔其劣乎顔其劣乎至足者外物不能累其内祕曰彼以犬馬之養回而不正顔以承順顔色正而不回顔豈劣㦲光曰粗干胡切養體為粗養志為精驕亂爭疾為邪屡空不改其樂為正或曰使我紆朱懐金其樂不可量也祕曰紆朱之美服懐金之重寳以為樂光曰樂音洛下可以意求朱衣金印貴者之服下章言富不足慕此章言貴不足樂皆不如學也曰紆朱懐金之樂不如顔氏子之樂顔氏子之樂也内至樂内足不待於外紆朱懐金之樂也外内樂不足是故假於金珠外物爾乃説樂也祕曰顔子樂道故曰内或人樂物故曰外或曰請問屢空之内欲以此義嘲揚子也咸曰或人以揚言顔子樂内而非紆朱懷金故以顔之屡空為難非以嘲揚子之意也祕曰顔子屡空何為樂内光曰言顔子貧賤家資屡空其内何樂之有曰顔不孔雖得天下不足以為樂祕曰顔得孔子而臻于道所以樂也非此雖得天下豈顔子之樂哉然亦有苦乎光曰顔雖樂孔子之道豈能不以貧賤為苦乎曰顔苦孔之卓也咸曰言顔之所苦無他焉惟苦孔子之道卓然耳故曰仰之彌髙鑚之彌堅祕曰顔子曰如有所立卓爾雖欲從之末由也已光曰李本作顔苦孔之卓之至也今從宋吳本或人瞿然咸曰瞿然猶駭也曰兹苦也祗其所以為樂也歟祕曰瞿疾視貌或本作懼祗當為祗祗適也或人瞿然曰兹苦孔之卓也何適之所以為樂哉雜記曰見似目瞿聞名心瞿光曰瞿音句祇音支孔子之道至髙顔子悦而慕之所以為樂也曰有敎立道無心仲尼有學術業無心顔淵祕曰言有敎立道此外無心者仲尼是也有學術業此外無心者顔淵是也光曰音義曰天復本心作止今從李宋吳本言教立道者當以仲尼為心學術業者當以顔淵為心或曰立道仲尼不可為思矣術業顔淵不可為力矣咸曰或人疑孔顔之道不可以思力學之故對以下文為可學也祕曰據孔子所立卓爾顔淵聞一知十曰未之思也孰禦焉孔子習周公顔回習孔子無止之者祕曰習孔者孔之徒睎顔者顔之徒誰止焉揚子法言卷一
