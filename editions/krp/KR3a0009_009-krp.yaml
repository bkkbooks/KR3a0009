body:
  text: 揚子法言卷九晉李軌唐栁宗元註宋宋咸吴祕司馬光重添註君子篇咸曰以淵騫道亞諸聖曰非君子曷克然故次之淵騫君子純終領聞純善也領令也聞名也言善於終而有令名也祕曰君子之道純而終之受其令聞光曰領郎定切聞音問君子旣樂善以終又有令名聞於後世者以立言不朽故也蠢廸檢押蠢動也廸道也檢押猶隠括也言動則由於檢押咸曰廸當訓為蹈履之蹈檢押猶法度也言動必履蹈於法度光曰檢押當作檢柙押户夾切旁開聖則祕曰則法則也光曰開通也君子立言旁通聖人之法譔君子祕曰君子小人在人所為而已擇而行之區品彰矣光曰論立言之是非或問君子言則成文動則成徳何以也咸曰問君子何以能然曰以其弸中而彪外也弸滿也彪文也積行内滿文辭外發光曰弸普耕薄萌二切學成道充言動皆美般之揮斤羿之激矢君子不言言必有中也不行行必有稱也咸曰般羿之斤矢精之至也君子之言行正之至也祕曰般輸之揮斤后羿之激矢猶如君子之言行素習於内發中䋲準光曰般音班中丁仲切稱尺證切稱者得事之宜或問君子之柔剛曰君子於仁也柔於義也剛仁愛大徳故柔屈其心節義大業故剛厲其志祕曰木性則仁故柔金性則義故剛光曰柔於愛人剛於去惡或問航不漿衝不薺有諸樓航不挹漿衝車不載薺曰有之或曰大器固不周於小乎光曰言有大志者不顧小節曰斯械也君子不械械器也航衝之器無所不施咸曰君子之道惟變所適航衝之器主一而用注謂航衝無所不施反矣光曰器械適於一用君子明道無施不可或問孟子知言之要知徳之奥曰非苟知之亦允蹈之咸曰允信也蹈行也言孟子於要言奥徳非惟苟且而知之亦能信而行之或曰子小諸子孟子非諸子乎曰諸子者以其知異於孔子者也祕曰知所知之道光曰以其小知立異於孔子之道孟子異乎不異道同仲尼也或曰荀卿非數家之書侻也彈駁數家侻合於教光曰宋吴本侻作脫今從李本音義曰侻佗括切可也至于子思孟軻詭哉譏此則乖詭咸曰孔伋字子思孔子之孫孟軻之師也荀子有非十二子之言亦兼非子思孟軻此言非它數家則偶脫可矣至于非軻伋則邪詭也祕曰荀卿非十二子若惠施鄧析之徒則脱異聖人之道已至于子思孟軻不異者也是苟卿之詭說也曰吾於荀卿歟見同門而異户也同出一門而異其户同述一聖而有乖詭光曰言荀卿亦述孔子之道而所見不能無小異惟聖人為不異前聖後聖法制𤣥合大同仁義也祕曰純終牛𤣥騂白睟而角其升諸廟乎是以君子全徳色純曰晬咸曰宗廟之牛貴純毛如黒赤白三色各純粹而角􅀈中禮則可升諸廟矣所以君子亦貴純全其徳今荀卿學聖人之道而非孔孟亦不粹矣祕曰韓吏部曰大醇小疵此之謂歟光曰宋吴本牛𤣥騂白作𤣥牛騂白睟作粹今從李本睟與粹同或問君子似玉曰純淪温潤柔而堅玩而廉隊乎其不可形也君子於玉比徳焉禮記論玉備矣咸曰隊衆也言玉之徳衆乎不可盡形容之祕曰淪猶澤也玩猶珍也亷稜也隊乎猶言垂之如隊其惟以徳不可形状光曰玩當作刓音完謂亷而不劌隊直類切隊與墜同謂垂之如墜或問仲尼之術周而不泰大而不小用之猶牛䑕也使牛捕䑕雖大無施光曰周而不泰謂禮儀周備而無閑泰曰仲尼之道猶四瀆也經營中國終入大海祕曰爾雅曰江河淮濟為四瀆四瀆者發源注海者也它人之道者西北之流也綱紀夷貉或入于沱或淪于漢祕曰西北之流水經夷貉而不返或向東者亦入沱漢而已言其異而小也書曰嶓冡導漾東流為漢又曰岷山導江東别為沱孔云沱東行光曰言諸子之道雖時有小用而非順正不可以致逺淮南說之用不如太史公之用也太史公聖人將有取焉實録不隠故可採擇咸曰司馬遷雖雜尚有禮樂儒學之說於聖人之道可取而用之於劉安溺異端之痼者也故曰鮮取焉光曰今之所以知古後之所以知先史不可廢淮南鮮取焉爾浮辯虛妄不可承信祕曰太史公實録猶如魯史舊文聖人将有取焉以正褒貶淮南劉安之書雜而不典少有可採光曰鮮息淺切空言雖辯博而駁雜迂誕可取者少必也儒乎光曰聖道於是乎在乍出乍入淮南也或出經或入經祕曰必也以儒為名乎内篇論道外篇雜說乍出乍入雜而不純者也文麗用寡長卿也咸曰司馬相如文賦雖麗施用則少祕曰相如文雖麗而寡於用多愛不忍子長也史記叙事但美其長不貶其短故曰多愛咸曰遷之學不專純於聖人之道至於滑稽日者貨殖遊俠九流之技皆多愛而取不忍棄之祕曰不可以垂世立教者司馬遷皆叙而録之是多愛不忍也仲尼多愛愛義也子長多愛愛奇也光曰仲尼稱管仲為仁史魚為直蘧伯玉為君子之類亦多愛或曰甚矣傳書之不果也咸曰非經謂之傳或人旣聞揚子上論淮南子長之言愛竒而雜故因駭之而為問也言甚矣彼傳記之書不果純於聖人之道也祕曰古者詩三千餘篇孔子刪定取止乎禮義者三百一十一篇而已是愛義也子長史記至於滑稽日者刺客貨殖之類皆不忍去是愛竒也或人曰甚矣淮南子長之傳言不果全於聖人之道也曰不果則不果矣苟非所能自可耳咸曰言今人之不果純於聖人之道者尚可導而果之如淮南子長皆已没矣其書皆已行矣安可道而果之哉誠為不果純矣祕曰内不果純文亦不果道矣人以巫鼓巫鼓猶妄說也妄說傷義甚於不言一曰巫鼔之儔奚徒不果而已乃復竒談誕以自大假不學為髙通故揚子旣吐觸情之談又發巫鼓之義咸曰夫巫左道者也言彼之書非徒不果純於聖人之道而已今大行於世復使人學之得其雜說如左道之巫以鼓動其事惑夫衆者也如淮南㳺仙化金之說鼓動末俗使其學之非左道而何也光曰音義曰天復本人作又並闕或問聖人之言炳若丹青有諸曰吁是何言歟吁者駭嘆之辭丹青初則炳乆則渝渝乎哉丹青初則炳然久則渝變聖人之言乆而益明或曰聖人之道若天天則有常矣奚聖人之多變也成曰言五經支離萬事錯綜祕曰天有一定之髙有常也聖人無可無不可多變也曰聖人固多變天縱之也光曰聖人志道秉常随時應物如天之隂陽五行變化無窮子游子夏得其書矣未得其所以書也宰我子貢得其言矣未得其所以言也顔淵閔子得其行矣未得其所以行也聖人以妙外徃諸賢以方中來祕曰通之者聖也習之者賢也光曰行下孟切下同六子皆學於孔子而未逹其本原故雖各有所得而未能盡其變通聖人之書言行天也天其少變乎所以應無方也咸曰此論六子猶孟軻所謂子張子游子夏得聖人之一體顔閔具體而微之謂也夫天多變然後有成聖多變然後有倫天變隠於萬化而難知故曰天則有常聖變布於五經而可見故曰聖人固多變祕曰夫天之髙也及其變則二氣推移四時更迭三辰運行萬物生瘁不為少也光曰言天之變化亦多也或曰聖人自恣歟何言之多端也祕曰或人聞多變之語不逹其歸趣恐聖人率意而言故云多端光曰謂問同答異理或相違曰子未覩禹之行水歟一東一北行之無礙也君子之行獨無礙乎如何直徃也祕曰時有可否礙也水避礙則通于海君子避礙則通于理咸曰髙者水之礙故避之則流雜者聖之礙故避之則行祕曰随時制宜不失其正理則通矣君子好人之好嘉其善也而忘已之好若不足也小人好已之好我名而不自知而忘人之好物物而不識彼或曰子於天下則誰與祕曰與何等人光曰與許也曰與夫進者乎或曰貪夫位也慕夫禄也何其與曰此貪也非進也夫進也者進於道慕於徳殷之以仁義進而進祕曰禮進則進退而退祕曰義退則退日孳孳而不知勌者也光曰勌與倦同殷中也退而退當作退而進言不以禄位之進退務進於道徳而已故下文云請問退進或曰進退則聞命矣請問退進曰昔乎顔淵以退為進後名而名先也天下鮮儷焉祕曰人不堪其憂回也不改其樂終日如愚而囘也不愚是以退為進少有其偶光曰鮮息淺切儷音麗顔囘在陋巷不苟仕好學不倦是以退為進或曰若此則何小於必退也祕曰若然則必退於道者何故小之光曰揚子謂聖人不遁於世不離於羣是小必退曰心進易儷也必退易儷也必苟也苟進則貪禄利苟退則慕偽名也祕曰輕於進退者衆進以禮退以義難儷也進退不失其正者君子也咸曰猶仲尼之於魯也用之則攝相事而輔夾谷淫女樂廢膰胙則歌之而行祕曰進之退之惟禮義所在或曰人有齊死生同貧富等貴賤何如懼者畏義也此章有似駁荘子荘子之言逺有其㫖不統其逺㫖者遂徃而不反所以辨之思各統其所言之㫖而两忘其言則得其意也祕曰人有如荘生之齊物者何如光曰荘列之論如是曰作此者其有懼乎祕曰非聖人者無法懼有誅戮之責作此齊物之論然後以夷曠為妙達曰道家流當然也禮曰行偽而堅言偽而辨學非而博順非而澤以疑衆殺光曰懼謂有憂患不可避故作此論以自寛信死生齊貧富同貴賤等則吾以聖人為囂囂祕曰夫死生異理貧富殊塗貴賤差等較然之義也而荘子託以道家遂以係表逺去忘言得意稱其齊一而好之者無不甘心焉是虚華之大者若信是言則吾以聖人六經之㫖爲囂囂之虚語耳光曰囂許驕切人好生惡死苫貧樂富重貴輕賤乃其常情聖人因之以設勸沮立政教若信然齊等則聖人號令典謨徒囂囂然煩言耳通天地人曰儒道業深與祕曰隂陽剛柔仁義之道始於太極成乎五行主於至神運於六子管於聖人是謂通之其名曰儒通天地而不通人曰伎伎藝偏能祕曰知天地之變隂陽之數而不知其所以變所以數是不通於聖人之㫖若子之道名曰伎藝人必先作然後人名之先求然後人與之人理云云萬物動静無不由我以明彼者祕曰若求仁而得仁光曰作為善惡而人以善惡名之自求禍福而人以禍福與之人必其自愛也然後人愛諸咸曰言先自愛於人而人亦愛之人必其自敬也然後人敬諸咸曰言先自敬於人而人亦敬之自愛仁之至也祕曰韓吏部曰博愛之謂仁自敬禮之至也祕曰曲禮曰毋不敬未有不自愛敬而人愛敬之者也祕曰未有不自愛敬於人而人愛敬於己者也光曰敦仁所以自愛也隆禮所以自敬也或問龍龜鴻鵠不亦夀乎曰夀曰人可夀乎曰物以其性人以其仁物性之夀其質生存延年長也仁者之壽死而不亡名無窮也咸曰故顔氏之子年雖夭而仁不能窮之也光曰龍龜鴻鵠性自夀耳人則為仁然後能保其夀孔子曰仁者夀或問人言仙者有諸乎祕曰秦皇漢武俱欲求之故問焉曰吁吾聞伏犧神農殁黄帝堯舜殂落而死文王畢孔子魯城之北祕曰魯城之北孔子𦵏所也言伏羲至孔子並聖人皆死爾光曰文王𦵏於畢孔子𦵏於魯城之北獨子愛其死乎非人之所及也仙亦無益子之彚矣祕曰彚類也仙者皆有虚名而無益於事實者也光曰借使有仙亦如龍龜等非人類所能學也或曰聖人不師仙厥術異也聖人之於天下耻一物之不知仙人之於天下耻一日之不生光曰言聖人所以不學仙者道不同故也聖人務多知仙人務長生曰生乎生乎名生而實死也咸曰名惡名也實善實也言今之為仙者惡名存也善實死也如始皇孝武至今為天下笑非惡存而善死者乎祕曰神仙者謂之羽化蟬蛻而升天是名生也其實則降年盡而死耳故曰實死光曰安期羡門徒有其名而人未嘗見實死也或曰世無仙則焉得斯語曰語乎者非囂囂也歟惟囂囂能使無為有咸曰仙本無也而盧生之徒以為有非囂囂不逞者孰能祕曰囂囂然方士之虚語爾囂囂之多則能使無為有也光曰多言之人喜妄說或問仙之實曰無以為也咸曰言無以為其實光曰無用問為有與無非問也咸曰謂之有謂之無皆不當問祕曰天地之間本無此理無而問有有而問無皆非問也問也者忠孝之問也言惟問忠與孝之事耳祕曰忠孝者修身之本忠臣孝子偟乎不偟偟暇咸曰忠臣謇謇於事君孝子汲汲於事親何暇其仙乎祕曰偟暇忠孝之人何暇問無益之事乎光曰偟音皇或問夀可益乎曰徳光曰惟修徳可以益夀曰回牛之行徳矣曷夀之不益也咸曰言顔回冉伯牛徳而何不夀曰徳故爾咸曰庸以長生為夀聖以不朽為夀顔冉有徳故不朽爾如囬之殘牛之賊也焉徳爾言復甚也咸曰言假令顔行之殘冉行之賊則安得不朽之夀如是哉光曰顔冉之命自短耳若加之殘賊則斯命亦不能保也曰殘賊或夀曰彼妄也君子不妄論語曰人之生也直罔之生也幸而免揚子之說亦猶此義咸曰禮云庶人曰死死斯盡也死則盡無所聞矣如殘賊者安得不朽哉彼言不朽者乃欺妄也彼問亦以長生為壽揚對終以不朽為夀祕曰殘賊之人妄生於世爾豈有不朽之夀哉君子不妄生者也光曰君子修徳以俟命不為殘賊而冀得妄夀有生者必有死有始者必有終自然之道也因論神仙之事遂至原始要終以盡死生之說也祕曰夫春生則秋殺陽始而隂終亦猶人也豈有使之然哉自然之道也光曰天常春而不秋日常朝而不暮則人長生而不死矣君子忠人况已乎小人欺已况人乎夫至人其猶先存諸已而後存諸人者言乎有其真然後可以訓物况乃其身之不諭又安能諭諸人哉光曰盡誠於人曰忠揚子法言卷九
