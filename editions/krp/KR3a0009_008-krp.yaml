body:
  text: 揚子法言卷八晋李軌唐栁宗元註宋宋咸吴祕司馬光重添註淵騫篇咸曰以君臣者率廸淵騫之行則可勝道哉故次之重黎仲尼之後迄于漢道光曰宋吴本迄作訖今從李本迄至也徳行顔閔股肱蕭曹爰及名將尊卑之條稱述品藻定其差品及文質也咸曰品歴世之臣貴為不少矣然以淵騫為不可及而冠章首有意哉子雲也有以知長爵之逹弗逮乎廣道之尊乎或云是篇與重黎共序然漢書有之疑非揚辭而班固實之未知其據焉祕曰論漢道以仲尼之後蕭曹名将以徳行顔閔所以為品藻也光曰尊卑謂才徳髙下譔淵騫祕曰聖人之道豈不大哉賢哲所得各有差品一本無此序或問淵騫之徒惡乎在祕曰據顔淵閔子騫之徒已没光曰惡音烏問今世何無其人曰寢咸曰孔子云由也升堂矣未入於室也寢亦室也言游夏諸子在室眀入聖人之奥者也祕曰在當為不字之誤也名愈彰而道愈隆故曰不寝光曰宋吴本作在寝今從李本言淵騫之才今亦有耳但寝伏不為人所知也或曰淵騫曷不寝咸曰言游夏之徒尚在室而淵騫二子奚不然祕曰淵騫非有文章著世何為不寝曰攀龍鱗附鳳翼巽以揚之勃勃乎其不可及乎如其寝如其寝咸曰夫入室見奥尚可至焉如顔閔則與聖人髙飛㝠㝠而絶者也其可慕乎故孟子云子游子夏子張皆有聖人之一體閔子顔淵則具體而微揚子之論在於是邪巽風也勃勃輕迅貌祕曰淵騫得聖人而師之譬如攀龍鱗附鳳翼㢲風以揚之勃勃然而興後之人不可及也如何其寝如何其寝言其道愈不寝也光曰宋吴本作㢲以揚之今從李本揚發揚也如其寝言其不可寝伏也七十子之於仲尼也日聞所不聞見所不見文章亦不足為矣咸曰揚以門人為三品論之也言淵騫為其絶游夏之黨得其奥七十子亦被其淳道矧文章末業爾何難為哉祕曰非止淵騫也至于七十二子皆日有聞見所以學為賢哲君子也至於文章何足可為哉文章謂若卜啇序詩曽參孝經之類史記曰孔子以曾參能通孝道故授之業作孝經光曰宋吴本作七十二子今從李本言遊孔門者務學道徳不事文章君子絶徳小人絕力或問絶徳曰舜以孝禹以功臯陶以謨非絶徳邪是皆徳之殊絶祕曰冠乎上世力絶力者何祕曰問絶力秦悼武烏獲任鄙扛鼎抃牛非絶力邪皆以多力舉重崩中而死所謂不得其死然祕曰秦悼武秦惠王之子也武王有力好戯力士任鄙烏獲孟說皆至大官王與孟說舉鼎絶臏而死抃牛亦多力也呂氏春秋曰遂擒推移大犧髙誘云桀多力能推移大犧因以為號光曰抃牛謂以兩牛相撃如抃手状或問勇曰軻也曰何軻也曰軻也者謂孟軻也若荆軻君子盗諸祕曰荆軻衛人也為燕太子刺秦王以君子之道類之則大盗耳光曰比諸盗賊請問孟軻之勇曰勇於義而果於徳不以貧富貴賤死生動其心於勇也其庻乎或人之問勇若衛靈公之問陳也仲尼荅以爼豆子雲應以徳義祕曰養浩然之氣勇之大者光曰孔子曰見義不為無勇也魯仲連􅀈而不制髙談以救時難功成而不受爵賞咸曰魯仲連齊人不肯仕宦好持髙游於趙㑹秦軍圍邯鄲魏使新垣衍說趙王令尊秦昭王為帝而仲連挫之垣衍不敢復言帝秦秦将聞之為却軍五十里遂引而去於是平原君欲封魯連魯連遂辭而去終身不復見􅀈猶倨慢也制猶整肅也言仲連倨慢於爵利而不能整肅於官事也光曰宋吴本􅀈作偒制作剬介甫曰餳古蕩字剬古制字今從李本藺相如制而不􅀈好義崇禮屈身伸節輔佐本國繫時之務也咸曰藺相如趙人相趙惠王與秦昭王會澠池旣罷歸以相如功大拜為上卿位在亷頗之右頗羞不忍為之下宣言曰我見相如必辱之相如聞之常引車避匿嘗曰顧吾念彊秦所以不敢加兵於趙者徒以吾二人在也今兩虎共其勢不俱生吾所以為此者以先國家之急而後私讎也亷頗聞之肉袒負荆至相如門謝罪此言藺相如自屈如是欲整肅於官事而不倨慢於爵利也光曰音義曰􅀈與蕩同光謂蕩謂逸其身心制謂拘於禄位仲連不以富貴動其心而未能忘死生相如不以死生動其心而未能忘富貴故云然或問鄒陽祕曰鄒陽去吴之梁然否曰未信而分疑忼辭免罿幾矣哉鳥罟謂之罿猶人之縲紲㡬危也獄中出慷慨之辭由得以自免亦已危矣咸曰鄒陽事漢景帝弟梁孝王為羊勝公孫詭所疾而讒之孝王怒下陽吏将殺之陽從獄中上書孝王立出之卒為上客未信而分疑者言未為梁王所信方為其所疑雖能分觧以免固亦危矣光曰忼苦兩切罿昌鐘切幾音機孔子稱信而後諫未信則以為謗已也陽初仕梁未為孝王所信而深言以觸機事分取孝王之疑故曰未信而分疑或問信陵平原孟嘗春申益乎祕曰信陵君魏無忌魏安釐王異母弟也平原君趙勝趙之諸公子趙惠文王弟也孟嘗君田文齊威王孫也春申君黄歇楚人也問有益於國乎曰上失其政姦臣竊國命何其益乎當此四君之時實皆有益於其國而揚子譏之者蓋論上失其政故辯明之祕曰進賢育善權在國君而四君專之故曰竊國命光曰洪範曰臣無有作福作威四豪聚私黨以專國政故曰姦臣竊國命樗里子之智也使知國如知𦵏則吾以疾為蓍龜祕曰樗里子名疾秦惠王之弟有滑稽多智秦人號曰智囊卒𦵏子渭南章䑓之東曰後百歲當有天子之宮夾我墓至漢興長樂宮在其東未央宮在其西言使其知國家未來之安危亦如别𦵏則其神智如蓍龜周之順赧以成周而西傾咸曰昔周武王都於鎬京謂之宗周即西周也至幽王以犬戎亂平王東遷於洛即周公所營之王城是謂成周亦曰東周也秦都咸陽在西而赧王為秦所滅故曰西傾光曰宋吴本作周之傾赧今從李本音義曰諸本皆作順赧順靚王及赧王也俗本作傾誤也史記作慎靚王索隠作順靚王或是慎轉為順秦之惠文昭㐮以西山而東并祕曰周顯王四十四年秦惠文始稱王至昭㐮王五十一年乃滅周時秦都雍州西山在焉而東滅周故曰東并本紀曰文公卒𦵏西山光曰并音併孰愈咸曰問西傾東并誰優祕曰或者以子雲不與秦故問西傾東并誰為優曰周也羊秦也狼咸曰周衰弱如羊秦强暴如狼然則狼愈歟光曰問强猶勝於弱乎曰羊狼一也過猶不及兩不與也咸曰言周以不道而弱秦以不道而强强與弱雖異而不道一也祕曰夫湯武革命順乎天而應乎人者以道徳易暴亂者也今秦以暴虐易㣲弱而民不安堵何愈之有或問蒙恬忠而被誅忠奚可為也曰塹山堙谷起臨洮擊遼水力不足而屍有餘忠不足相也相助也雖盡一身之節而殘百姓之命非所以務民之義咸曰秦已并天下乃使蒙恬将三十萬衆北逐戎狄收河南築長城起臨洮至遼東延袤萬里又始皇欲遊天下乃使蒙恬通道自九原抵丼泉塹山堙谷後始皇卒胡亥立與其弟蒙毅俱為趙髙所害吞藥而死司馬遷謂蒙恬所為秦築長城亭障塹山堙谷通直道固輕百姓力矣夫秦之初滅諸侯天下之心未定痍傷者未瘳而恬為名将不以此時强諫振百姓之急養老存孤務修衆庻之和而阿意興功此其兄弟遇誅不亦宜乎今揚㫖與遷同故備載之以見始末光曰李本屍作死今從宋吴本塹七豔切洮士刀切相息亮切或問呂不韋其智矣乎以人易貨呂不韋陽翟賈人也出千金以助子楚子楚旣立不韋相之祕曰呂不韋陽翟大賈人也秦子楚質於趙不韋曰此竒貨可居故曰人易貨光曰捐千金而得子楚曰誰謂不韋智者歟以國易宗雖聞列封先笑後愁身旣鴆死宗族竄流祕曰不韋仕不由道用貨財而佞於華陽夫人以取顯位終乃家屬徙蜀飲鴆而死是徼取國權以易宗族光曰貪國權而䘮其宗呂不韋之盗穿窬之雄乎不以其道非盗而何穿窬也者吾見擔石矣未見雒陽也雒陽不韋所封國也揭雒陽而行天下豈徒擔石乎祕曰穿窬者伺慢藏而得之不過一擔一石而不韋伺人顔色而取之雒陽之封是其雄也子楚立是為荘㐮王以不韋為丞相封為文信侯食河南雒陽十萬户光曰窬音踰擔都濫切秦將白起不仁奚用為也長平之戰四十萬人死蚩尤之亂不過於此矣原野厭人之肉川谷流人之血將不仁奚用為奚何咸曰白起事秦為武安君前後伐韓魏斬殺甚多昭王四十七年與王齮伐趙圍其将趙括於長平旣殺趙括括軍敗卒四十萬人降起起乃挾詐而盡坑殺之故揚以為不仁光曰用将所以救亂誅暴翦問王翦祕曰王翦頴陽東鄉人也問其將略曰始皇方獵六國而翦牙欸咀噬用牙言其酷也欸者絶語歎聲祕曰言翦之助惡也牙欸謂切齒而怒也欸怒聲太史公曰王翦為秦将夷六國光曰欸烏開切翦為之牙以噬物或問要離非義者歟不以家辭國祕曰要離吴人棄家而為國疑其有義光曰要一遙切曰離也火妻灰子以反於慶忌實蛛蝥之靡也焉可謂之義也義者臣子死節乎君親之難也離自平入而焚燒妻子詐為吴仇讎求信於慶忌反而刺之若蜘蛛之小巧耳祕曰吴王闔閭欲殺王子慶忌要離詐以罪亡令吴王燔其妻子而揚其灰走見慶忌以劔刺之譬如蜘蛛之螫毒於人而靡死也焉可為義哉靡披靡而死也光曰宋吴本蝥作螫今從李本蛛音誅蝥音矛靡興糜同音義曰賈誼新書曰蛛蝥作網光謂靡爛也政也祕曰聶政軹深井里人也問其義乎為嚴氏犯韓刺相俠累曼面為姊實壮士之靡也焉可謂之義也俠累韓相名也祕曰嚴仲子事韓哀侯與韓相俠累有郤仲子恐誅亡去游齊交聶政政後伏劔至韓刺殺俠累因自鈹面决眼自屠出腸遂以死其姊嫈如韓之市伏尸哭於邑悲哀而死政之旁曼無也言政知姊之忠烈乃鈹其面使他人無所識認且欲全其姊者也小爾雅曰曼無也光曰音義曰曼謨官切塗面軻也問荆軻祕曰荆軻也義乎為丹奉於期之首燕督亢之圖入不測之秦實刺客之靡也咸曰燕太子丹以荆軻為上卿欲以報秦先是秦将樊於期得罪亡入燕太子丹受而舍之秦購樊於期首金千斤邑萬家荆軻謂太子丹曰誠得樊将軍首與燕督亢之地圖以獻秦王王必恱見臣臣乃得以報矣於是說樊於期於期遂自刎軻乃與秦舞陽盛於期首函封之及求天下利匕首與秦督亢之地圖至秦秦王聞之喜乃見於咸陽宮軻奉於期首而秦舞陽奉地圖秦王發圖窮而軻以左手持把秦王之袖右手持匕首揕之秦王驚自引而起軻知事不就倚柱而笑箕倨以罵秦王左右遂前殺軻矣光曰亢音剛焉可謂之義也三士所死皆非君親之難也非義之義君子不為也或問儀秦學乎鬼谷術而習乎縱横言安中國者各十餘年是夫祕曰張儀魏人也蘇秦雒陽人也俱事鬼谷先生學術裴駰曰按風俗通乂曰鬼谷先生六國時縱横家於是張儀相秦蘇秦相六國乃投縱約書於秦秦兵不敢闚谷闗十五年問是道夫曰詐人也聖人惡諸祕曰皆飾詐辯尚權變聖人不取也曰孔子讀而儀秦行何如也欲讀仲尼之書而行蘇張之辯曰甚矣鳳鳴而鷙翰也咸曰鳳鳴謂孔子讀也鷙翰謂秦儀行也祕曰鷙擊也鄒陽曰鷙鳥累百光曰輸胡安侯肝二切鷙鷹隼也翰羽翼也曰然則子貢不為歟言子貢亦㳺說抑齊破吴以救魯祕曰齊欲伐魯子貢行而說齊存魯破吴彊晉覇越言儀秦非道則子貢學孔子矣不為之乎光曰子貢存魯亂齊破吴强晉覇越考其年與事皆不合蓋六國㳺說之士託為之辭太史公不加考校因而記之揚子亦據太史公書發此語曰亂而不解子貢耻諸說而不富貴儀秦耻諸耻國亂而不觧其義髙耻㳺說而不富貴其情下祕曰子貢之志在觧於禍亂儀秦之志在求於富貴苟求富貴則無所不至矣或曰儀秦其才矣乎跡不蹈矣蘇秦佩六國相印以抑彊秦張儀入秦而復其衛後破山東咸曰迹不蹈已者蹈踐也言儀秦之才術超卓自然不踐循舊人之迹祕曰儀秦雖同術豈非才乎秦則務縱横儀則務觧之二人之迹各不相蹈曰昔在任人帝曰難之亦才矣祕曰任佞也巧言近佞不以才也光曰宋吴本作昔在任人帝而難之不以才矣今從李本任音壬難讀如字佞者口才也舜謂知人安民惟帝其難之能哲而惠何畏乎巧言令色孔壬揚子言驩兠之徒能以巧言惑聖人其才亦不在人下矣才乎才非吾徒之才也祕曰儀秦之才非元凱之才也光曰口才君子所不貴美行園公綺里季夏黄公角里先生避秦之亂隠居商山不朝髙祖而從太子帝客禮之祕曰行人所不能四皓也光曰角盧谷切或作角音同言辭婁敬陸賈婁敬說髙祖都闗中陸賈說尉佗為漢臣又作新語髙祖善之執正王陵申屠嘉呂后欲王諸呂陵執意不從免陵乃得封之文帝佞幸鄧通至使慢禮嘉折之又晁錯犯憲嘉奏誅錯光曰宋吴本正作政今從李本折節周昌汲黯髙祖欲易太子周昌面爭以為不可武帝時公孫𢎞為丞相汲黯面折𢎞於上前以為𢎞諛不忠祕曰折節言其能降也夫彊直之人降則為亂若二公者夭姿彊直而能乃降其折節可尚矣守儒袁固申公袁固守正以得辠於竇太后后使入圏擊彘申公守正以事楚王卒為楚王所烹此二公終不屈其道祕曰袁固生以治詩孝景帝時為博士竇太后好老子書召袁固生問老子書固曰此是家人言耳頃之為清河王太傅乆之病免申公以詩經為訓及趙綰王臧謂天子欲立明堂以朝諸侯不能就其事乃言師申公於是天子使使東帛加壁安車駟馬迎申公以為太中大夫舍魯邸議明堂事竇太后不說儒術得綰臧之過申公以疾免災異董相夏侯勝京房董仲舒夏侯勝京房皆善推隂陽知災異或問蕭曹曰蕭也規曹也随蕭何規剏於前如一曹參奉随於後不失光曰非蕭不能規非曹不能随二人恊心共成漢道其賢等耳滕灌樊酈曰俠介滕公灌嬰樊噲酈商此四人前後輔夾髙帝咸曰俠與挾同持也介衛也言髙帝為沛公時而夏侯嬰灌嬰樊噲酈商皆已從之為持衛也祕曰滕公夏侯嬰灌嬰樊噲酈商皆俠剛介之士易曰介如石焉光曰介助也叔孫通曰槧人也叔孫通秦博士避二世之亂遇髙祖起兵從之天下旣定還復從儒見事敏疾祕曰叔孫通采古禮與秦儀雜著漢儀簡牘之人也槧猶牘也說文曰􅢥璞也西京雜記曰子雲好事常懐鈆提槧光曰槧才敢切亷七艶三切闕袁盎曰忠不足而談有餘說景帝斬晁錯以謝七國實挾私怨而不為國祕曰袁盎譛誅晁錯忠不足也諌遷淮南王而談有餘也晁錯曰愚畫策削諸侯王七國旣反令盎得行其說智而不能自明朝服斬於東市祕曰晁錯知七國之彊不奉辭伐罪而請削乃為袁盎之所中而不能預言古之愚也直晁錯有焉光曰音義曰天復本愚作由忠今從諸家錯知諸侯太彊必為亂故削之而七國尋反身死東井不若主父偃從諸侯所欲分國邑侯子弟而諸侯自弱也故以錯為愚酷吏曰虎哉虎哉角而翼也郅都寗戚張湯杜周之徒咸曰韓詩外傳云無為虎傅翼将飛入邑擇人而食此以酷吏猶虎而角翼者言暴之甚也光曰不仁之人而得勢位如虎之得角翼貨殖曰蚊咸曰孔子云賜不受命而貨殖焉又曰求也為之聚歛是則貨殖聚歛聖人之所疾也漢書稱揚子不汲汲於富貴不戚戚於貧賤家無甔石之儲晏如也今或人問貨殖故荅之曰蚊亦疾之甚焉夫蚊之為蟲喙人而求生可鄙惡者也貨殖之徒兼并聚歛非義是存亦所謂喙人而求生矣祕曰貨殖之人折毫顧利㣲而食人其猶蚊乎曰血國三千使將䟽飲水褐博没齒然也咸曰揚旣以蚊貶貨殖或以是言難之也云天下之民有骨血者三千國非貨殖則将使其飯䟽食飲水被褐終年而已乎言衣食僅給而不能富庶也今下無荅文者蓋揚鄙其不諭教而彊見難故不對之也三千國者昔禹㑹塗山執五帛者萬國於商周之世已漸并之矣故至漢但可三千而已舉大較也褐博者孟子云褐寛博謂獨夫之被褐者没終也齒年也祕曰揚恐未諭故再釋之曰貨殖之心若蚊自務輕飽而血視三千之國使将䟽飯飲水衣褐博之衣没其年齒而後已也齒齡也按周一千八百國而漢郡國一百三縣邑千三百一十四云三千者蓋貨殖之人倍取於國且言其多歟光曰李本作没齒無愁也今從宋吴本蚊下曰衍字褐毛布也褐博以褐為寛博之衣也三千言其衆也言貨殖如蚊噆民之血使之皆貧困以終其身也或問循吏曰吏也鄭子産公儀休孫叔敖之徒咸曰言如是者始可謂之吏也游俠曰竊國靈也靈命也朱亥田仲郭觧劇孟原渉之徒咸曰苟恱士立氣勢作威福結私交以立彊於國者謂之㳺俠此云竊國靈蓋言竊行國之威靈以為之彊祕曰靈福也遷載㳺俠竊國之威靈為已之私義者也光曰國之所以能為國者以在上者執號令御其下如人之有神靈也佞幸曰不料而已籍儒鄧通周文仁韓王孫李延年之徒咸曰料度也夫佞幸者日以寵進位非才升憑乎城社卒蹈機穽亦不度者也光曰不自料其才徳不稱其寵禄而貪竊之以取禍敗此皆論太史公書所載或問近世社稷之臣曰若張子房之智用行舍藏功成身退陳平之無悮内明其畫外無違悮祕曰所舉必行無謬悮光曰李本悮作悟今從宋吴本悮與忤同絳侯勃之果祕曰誅諸呂立代王果於大事霍將軍之勇祕曰光擢燕上官之鋒處興廢之分而不懼終之以禮樂則可謂社稷之臣矣此數公遭漢初定倉卒之際則權應當時苟以救世不能與稷契伊周同風未終先王之禮樂祕曰言此數公旣立功之後以禮樂自終則社稷臣矣光曰言雖兼數公之才業不能修禮樂以成治平之化亦末足謂之社稷之臣也或問公孫𢎞董仲舒孰邇欲知此二人用心誰近聖人之道祕曰誰近社稷之臣曰仲舒欲為而不可得𢎞容而已矣利用安身祕曰仲舒欲施禮樂之事而武帝外之故不可得也禮樂志曰時上方征討四夷銳志武功不暇留意禮文之事又曰未有立禮成樂此賈誼仲舒王吉劉向之徒所為發憤而增歎也𢎞嘗與公卿約議至上前皆背其約以順上㫖是取容而已何暇禮樂战或問近世名卿曰若張廷尉之平張釋之堆存公平無阿於意咸曰釋之為廷尉天下無寃民其所謂平矣祕曰張釋之為廷尉不族盗宗廟御物者執法之平也賛曰張釋之之守法雋京兆之見雋不疑當昭帝時有人自稱亡衛太子百官莫知其所不疑後至取而治之乃巫成方遂也光曰雋徂兖切尹扶風之絜尹翁歸清亷有節不避滋垢王子貢之介王子貢名尊成帝時人治任公正誅鋤豪彊不避貴戚斯名卿矣将旣聞名卿次問名将曰若條侯之守咸曰周亞夫也守謂守細栁光曰璧昌邑不救梁以弊吴雖有詔書亦不從長平冠軍之征伐祕曰長平侯衛青冠軍侯霍去病俱征伐匈奴立功博陸之持重祕曰博陸侯霍光賛曰臨大節而不可奪遂正國家安社稷可謂名将矣請問古欲知古之良将曰鼓之以道徳咸曰猶益賛禹而有苗格祕曰以道勝者帝以徳勝者王帝王之兵前無敵孫子五教之計一曰道征之以仁義咸曰猶常武所謂旣敬旣戒惠此南國祕曰荀卿曰桓文之節制不可以敵湯武之仁義輿尸血及皆所不為也張騫蘇武之奉使也執節没身不屈王命雖古之膚使其猶劣諸膚美也咸曰張騫嘗使月氐道經匈奴中來徃兩為匈奴所得留騫十餘歲然騫持漢節不失後亡歸初騫行時百餘人去十三歲惟二人得還蘇武嘗使匈奴中單于說武令降武不聼單于怒幽武寘大窖中絶不與食又徙武北海上無人處使牧羝武旣至海上杖漢節牧羊卧起持操節旄盡落留匈奴凡十九年至昭帝即位匈奴與漢和親漢求武得歸故二人雖古之美使所不及矣光曰没身者乆留匈奴不顧其死世稱東方生之盛也言不純師行不純表其流風遺書蔑如也咸曰揚鄙朔之為政所以自發論也表則也蔑絶也謂朔之言行不純一於聖人之師則如詼諧射覆隠語之類也故宗聖之風立教之書絶而不傳今觀朔嘗上書陳農戰强國之計數萬言又有封太山貴和氏璧及皇太子生禖屏風平樂觀賦諸篇頗存盖子雲惡其雜而不取之也祕曰顔師古曰言辭義淺薄不足稱也光曰朔言行駁雜所師表者不能純壹其流風遺書皆蔑然無足觀也或曰隠者也成曰或見揚之短朔故問以為世稱朔吏隠者也光曰宋吴本或曰作或問今從李本曰昔之隠者吾聞其語矣又聞其行矣昔之隠者文王拘於羑里而重易六爻箕子隠於殷朝而為周陳洪範接輿之在楚而歌鳳兮咸曰吾聞其語又聞其行者如夫子所謂作者七人之義也言隠道當如此七人者祕曰聞其聖賢之言行光曰言皆不然或曰隠道多端咸曰或言隠之道多端如朔者亦其一也曰固也咸曰固實也言隠道實多端故陳之于下聖言聖行不逢其時聖人隠也咸曰仲尼亦然祕曰易曰龍徳而隠者也不易乎世不成乎名遯世旡悶不見是而旡悶樂則行之憂則危之其聖人隠也賢言賢行不逢其時賢者隠也咸曰孟軻亦然祕曰捨之則蔵光曰考其言行之素皆聖賢也以不逢其時故隠以避害耳談言談行不逢其時談者隠也咸曰子貢仲連亦然祕曰有文而不遇者儒行曰言談者仁之文也光曰朔談者耳不遇戰國縱横之時故依隠玩世不足貴也昔者箕子之漆其身也狂接輿之被其髮也欲去而恐罹害者也箕子之洪範接輿之歌鳳也哉咸曰彼之隠者猶為行道立教而干於時如楚狂箕子去而隠以避害言隠雖有此數端而朔不可以及是祕曰此皆多端也箕子為之奴孔子曰殷有三仁焉而有聞著乎洪範接輿佯狂孔子下欲與之言而有聞著乎歌鳯是皆多端之甚者而其道純正罹一本作離光曰二子皆晦迹以避害遇聖人則自顯或問東方生名過實者何也咸曰言朔旣不及此而世稱之過實何也曰應諧不窮正諫穢徳由此四事得名應諧似優似倡優咸曰應諧謂應言而諧戲之如與倖倡郭舍人隠語者不窮似哲咸曰問則輙應如射覆見微者祕曰變詐鋒出莫能窮者似智慧光曰吴本哲作智今從李宋木正諫似直咸曰蓋諌上休斥董偃請焚甲乙帳者祕曰時觀察顔色直言切諌似峭直穢徳似隠祕曰懐肉汙衣歲更娶婦似隠迹請問名曰談逹悪比欲知誰比祕曰朔之名也談也達也何為倫比談一本作詼字光曰宋本作請問名字逹吴本作請問名談逹今從李本音義引漢書朔談達多端不名一行或問朔所為當何以名之揚子謂朔談諧敏逹之人耳惡音烏曰非夷齊而是栁下惠戒其子以尚容首陽為拙柱下為工飽食安坐以仕易農依隠玩世詭時不逢其滑稽之雄乎非夷齊是栁下惠戒其子以尚同依隠玩世飽食安歩以仕易農此滑稽之雄者也咸曰言朔非夷曠而尚取容依約其隠玩弄於世但滑稽之雄者而已何所比哉光曰李宋吴本皆云非夷尚容依隠玩世其滑稽之雄乎按漢書具載揚子之言恐諸家脫悮也今從漢書滑音骨言朔依託隠者以玩侮世人以詭譎欺時人不逢迕取禍也滑稽多智員曲之貌或問栁下惠非朝隠者歟此問發於東方朔也咸曰或以揚之短朔疑朔與惠同道故舉之為請祕曰朔旣非隠則栁下惠降志辱身言中倫行中慮豈非朝隠者也光曰朝直遥切曰君子謂之不㳟古者髙餓顯下禄隠孟子曰伯夷隘柳下惠不㳟君子不由也然則餓顯不獨髙禄隠未為下人發髙下之談蓋有厲乎素飡咸曰揚以或人用朔比惠故舉孟軻不㳟之言以非栁下惠又以夷惠隘不㳟二者雖皆不可然推而取之寧以伯夷餓顯為髙終以栁下惠禄隠為下故曰古者髙餓顯下禄隠猶奢寕儉易寕戚之義爾亦所以短朔也光曰餓顯謂夷齊餓于首陽之下民到于今稱之妄譽仁之賊也妄毁義之賊也光曰譽音余下同仁以褒善義以貶惡而妄以毁譽加人是賊傷仁義者也賊仁近鄉原賊義近鄉訕同乎流俗合乎汙世衆皆說之以為是而不可與入堯舜之道者徳之賊也孔子惡似而非者孟軻論之備矣光曰鄉原謂所至之鄉徇衆随俗求媚於人者鄉訕謂所至之鄉喜造謗訕使人畏其口者或問子蜀人也請人祕曰問蜀人曰有李仲元者人也蜀有嚴君平然君早已顯仲元未聞祕曰仲元則其人也李仲元名𢎞見秦宓傳光曰人者蜀之賢人也仲元事見常璩華陽國志尤詳其為人也柰何咸曰柰何猶曰如何曰不屈其意不累其身光曰累良偽切不以爵位屈其意禄利累其身曰是夷惠之徒歟曰不夷不惠可否之間也随時之義治亂若鳳光曰冇清和之美而無隘與不㳟之失從衆而不害於義則可害於義則否如是則奚名之不彰也曰無仲尼則西山之餓夫與東國之絀臣惡乎聞餓夫夷齊絀臣栁下惠也咸曰東國魯也左傳云下展禽即栁下惠也言夷恵得仲尼譽之名始聞光曰絀與黜同惡音烏曰王陽貢禹遇仲尼乎咸曰王吉字子陽事宣帝為諌議大夫貢禹字少翁二人為友世稱王陽在位貢禹彈冠言其取捨同也元帝即位遣使徵貢禹與吉吉年老道病卒禹後為御史大夫此言李仲元不遇仲尼則名不彰而王陽貢禹之顯豈遇仲尼乎光曰言王貢力學絜已而名著海内豈必遇仲尼曰明星皓皓華藻之力也歟星雖皓皓有華藻然非能自顯耀也要湏著天而後天下見之光曰言星之明非藻飾所能致以其居髙故為人所瞻仰王貢之名所以彰著有位於朝故也曰若是則奚為不自髙光曰言仲元何不仕曰皓皓者已也引而髙之者天也星著天而後天下見王陽貢禹時主所揚而後名顯也仲元雖有賢徳而時不髙之故不彰子欲自髙邪君子行徳俟命而已祕曰仲元之不見察舉猶如或人豈能自達哉仲元世之師也見其貌者肅如也咸曰貌端故見者肅然敬聞其言者愀如也咸曰言正故聞者愀然謹光曰愀親小在九二切愀然變動貌觀其行者穆如也咸曰行温故觀者穆然和但聞以徳詘人矣咸曰詘人者使人而從已徳也光曰李本但作鄲音義曰古鄲但通用今從宋吴本未聞以徳詘於人也咸曰詘於人者以已徳而從人也光曰言仲元徳能服人而未嘗屈節仲元畏人也言可畏敬咸曰言使人心服而畏之祕曰人所畏服或曰育賁言夏育孟賁亦使人畏祕曰夏育孟賁皆衛人言其勇力亦人所畏也光曰賁音奔下同曰育賁也人畏其力而侮其徳咸曰非心服之畏請條問其目也祕曰條目曰非正不視非正不聴非正不言非正不行夫能正其視聴言行者昔吾先師之所畏也所畏謂言不慚行不耻孔子憚焉祕曰孔子之所畏憚之如視不視聴不聴言不言行不行雖有育賁其猶侮諸揚子法言卷八
