body:
  text: 揚子法言卷三晉李軌唐栁宗元註宋宋咸吴祕司馬光重添註問道篇咸曰身乎克修道乃可議故次之修身芒芒大道洪荒混茫之初咸曰大道統言聖人之道芒芒者大之稱也注以混茫之初釋之可乎光曰漢書及李本大作天今從宋吴本昔在聖考聖人作萬物覩伏羲肇畫八卦六位成章咸曰昔在聖考者言此大道並古先聖人考制之猶周公作禮樂仲尼刪詩書之義故篇中皆統論堯舜文王仲尼之事復有非老荘之說注獨指伏羲畫卦以解之不亦謬乎過則失中不及則不至二五得中然後利見咸曰言履聖人之道罕有得諸正者如門人之衆其殆庶㡬者惟顔子而已今言失中不及者猶師也過商也不及之義爾故禮尊中庸書貴皇極此之謂也注以二五解之甚非類矣彼二五者言一時居位安危之象此統講中庸之理相去異焉學者辨之祕曰大道芒芒然惟聖人考之遂明大中之制是以河出圖也大易明二五之中洛出書也洪範貴皇極之義舜執其兩端用其中於民回之為人也擇乎中庸孔子曰道之不行也我知之矣知者過之愚者不及也不可姦罔咸曰中而正者非姦罔所及光曰姦謂侵壊罔謂誣罔言聖人大中之道天下莫能易也譔問道祕曰世以虚無湛寂為道之本而求乎洪荒夷曠之理不知天地聖人貴乎大中自然之道光曰尊道徳禮樂黜老荘申韓或問道曰道也者通也無不通也萬物由之以通咸曰無不通者言道之施也無所不通注謂萬物由之以通與正文相反矣祕曰道貫三才合仁與義而言之無不通也或曰可以適他歟言道既可以通中國而適夷狄學亦可以統正典而兼諸子也咸曰他猶邪也曲也言既云聖人之道無不通亦可以通邪曲之方乎祕曰他異端也曰適堯舜文王者為正道非堯舜文王者為他道君子正而不他或問道光曰宋吴本無道字今從李本曰道若塗若川車航混混不捨晝夜車之由塗航之由川混混往来交通咸曰上荅以正而不他或人以為川塗之道皆曲而不正何車航之行晝夜不息言諸子雜說亦可適於聖理也今下無荅文者盖鄙其不諭教故不對之也法言諸如此類者數雖問荅皆出於子雲然其立事垂制理當為之然也學者辨之注殊不明其㫖何以哉或曰焉得直道而由諸塗川皆形曲也此因形以取譬咸曰非也或人知揚罪以曲道而不達故曰而復請之以為安得直道而從之也祕曰譬如塗川皆曲而車航不捨晝夜何所擇得直道而由乎曰塗雖曲而通諸夏則由諸川雖曲而通諸海則由諸祕曰塗雖曲而通夏川雖曲而通海由之可也猶諸子之異端若能自通於聖人之道亦可也故揚墨歸儒受之而已荘周申韓漸諸篇則顔閔其如台或曰事雖曲而通諸聖則由諸乎大解曲道歸正之義咸曰行既止答以川塗雖曲可通諸夏諸海而或人不喻復謂曲事可通聖道乎今下無荅文者亦鄙其問之失而不對之也夫聖人無不正也安有曲事而能通之哉注懵其㫖以謂大解曲道通歸正義深失之矣祕曰或人喻其㫖也事謂異端之事光曰音義曰天復本焉得直道及事雖曲上皆無或曰二字今從李宋吴本揚子設為或人意寤以結上意耳道徳仁義禮譬諸身乎不可無之於一祕曰合譬一身夫道以導之咸曰導達也有道則行斯達矣徳以得之咸曰有徳則動斯得矣仁以人之咸曰有仁則人必歸之光曰仁者人道之常義以宜之咸曰有義則事得其宜禮以體之咸曰冇禮則時保其體天也五者人之天性祕曰五者之備天命全也光曰天性自然不可増損合則渾離則散光曰渾户昆切五者合而言之則渾而為一隨事言之則散而為五一人而兼統四體者其身全乎四體合則渾成人五羙備則混為聖一人兼統者徳備如身全祕曰道統仁義禮徳故謂之道人統四體故謂之人可合而不離其身乃全也韓吏部曰老子之所謂道徳云者去仁與義言之也二人之私言也其不全哉光曰闕一則不成人或問徳表祕曰問徳之的然為天下表者光曰問有徳之人在上其治化表見於外者何如曰莫知作上作下作為也莫知為上之樂為下之苦咸曰非也作修也君聖而修之於上臣忠而修之於下故上下交修而民日用不知此所以為徳之標凖也祕曰徳足乎已加乎民天下有道比屋可封豈冇的然作之於上竹之於下而莫知也請問莫知言已冇禮制則有尊卑咸曰言民日由禮而不知其制也祕曰徳既然矣請問禮光曰李宋吴本皆作請問禮莫知音義曰天復本作請問莫知今從之或者以為治化既出於上豈得人莫知之曰行禮於彼而民得於此奚其知君自行禮於上而民承化於下咸曰民可使由之不可使知之威儀三千豈可盡詳哉故禮不下庶人蓋上既行而下能效則民得之矣何制之知焉祕曰禮亦然光曰徳者得也有徳者行禮於上而民各得其所於下人自為善豈知治化之所自邪或曰孰若無禮而徳祕曰何如去禮而專任徳光曰或者以為曷若専修徳安用繁文之禮曰禮體也人而無禮焉以為徳禮如體無體何得為人無禮何能立徳祕曰譬人無體非人也何由為徳光曰言禮者得之體也或問天曰吾於天歟見無為之為矣咸曰謂不言而四時行萬物生祕曰天何為哉雷動風散雨潤日烜山止澤説而萬物生焉或問彫刻衆形者匪天歟祕曰荘子曰彫刻衆形而不為巧曰以其不彫刻也如物刻而彫之焉得力而給諸咸曰言萬彚紛錯得之自然一一而刻之何力能給老子之言道徳吾有取焉耳可以止奔競訓饕餮祕曰老子以道道其所道徳徳其所徳雖然猶未離道也故有取耳光曰虚静謙柔及搥提仁義絶滅禮學吾無取焉耳老子絶學蓋言至理之極以明無為之本斯乃聖人所同子雲豈異哉夫能統逺㫖然後可與論道悠悠之徒既非所逮方崇經世之訓是故無取焉爾者不得已之為敎也祕曰聖人以仁義禮俱道也老子以仁義禮别為一端以至崇道徳薄仁義非禮學故無取焉耳揚子言老子者皆據虚無二篇而言也甞試稽之家語孔子問禮於老聃是與聖人之道同也故曽子問有記孔子聞諸老聃蔵羣廟之主取羣廟之主以從迎四廟之主出入必蹕之類老聃云又稱老聃曰諸侯朝天子見日而行逮日而舎奠大夫使見日而行逮日而舎之類皆曰吾聞諸老聃云此誠學禮之效也觀此二章老子深於禮者也與虚無二篇絶不相侔豈老子所為㢤今道家流有黄庭内景之類亦曰老氏之作也言胎食之術文辭淺近又與虚無二篇不侔矣豈非道家為之名歟昔崔浩甞讀荘老之書不過数十行輒棄之曰此矯誣不近人情必非老子所作老聃習禮仲尼所師豈設非法之言以亂先王之敎也光曰音義曰搥都回切舊本皆從手擲也漢書云以博局提吳太子吾焉開明哉咸曰言搥仁義滅禮學則吾道瞽矣惟聖人為可以開明它則苓開發咸曰苓當為䝉字之誤也言開吾道之瞽以為之明者惟聖人爾他則愈蒙闇矣指莊列之類祕曰吾道何以開明哉惟間聖人之言為可開明若諸子它道無所聞焉苓苓耳也苓耳徒有其名而無聆聞之實郭璞云苓耳形似耳業生如盤光曰開啓明白言通逹可行苓音聆闕大哉聖人言之至也開之廓然見四海日月齊明視其文者不下堂知四方祕曰聖人言之極至吾道無所昬曀開之廓然見四海光曰無所不通閉之閛然不覩牆之裏不開聖卷諭無所見祕曰自背其道不見數仭之内光曰宋吴本閛作閔今從李本音義曰閛匹庚切閉門也光謂不學牆靣聖人之言似於水火或問水火曰水測之而益深窮之而益逺火用之而彌明宿之而彌壯祕口宿安也安而久之則彌壮左氏傳曰官宿其業光曰宿蓄火也以諭藏之於身允治天下不待禮文與五教則吾以黄帝堯舜為疣贅咸曰五禮五教始於黄帝而備於堯舜信冶天下而捨是雖黄帝堯舜之聖亦外物爾疣贅體之外物者也祕口黄帝堯舜俱以禮文五常之教為治若信治天下不俟禮敎則黄帝堯舜以為外物邪光曰疣羽求切贅之瑞切疣贅言冗長無用也或曰太上無法而治法非所以為治也咸曰或以太古無法陶然自化疑今之制無益於道祕曰伏羲以前無聞焉疑其無法制而自治曰鴻荒之世聖人惡之咸曰惡其與禽獸同祕曰近禽獸而無别是以法始乎伏羲而成乎堯伏羲畫八卦以敘上下至於堯舜君臣大成也祕曰伏羲大明天地之撰畢天下之能事而唐堯順考古道以天下讓是法制始於伏羲而成乎堯光曰伏羲始畫八卦造書契至於唐堯而煥乎其有文章匪伏匪堯禮義哨哨聖人不取也咸曰哨哨多言貌禮所謂猩猩鸚鵡能言夫羲堯之上道若鳥獸徒然多言爾故聖人獨取羲而下祕曰哨哨不正貌由伏由堯者正道也非伏非堯者它道也禮曰枉矢哨壼光曰哨七笑反或問八荒之禮禮也樂也孰是祕曰八荒之禮曰蠻曰流禮樂孰是光曰言八方之俗各有禮樂人人是其所習果誰為是曰殷之以中國殷正也中國之制五百里甸服五百里侯服五百里綏服五百里要服五百里荒服或曰孰為中國正直北辰為天之齊也俱偏僻未知誰為居中國曰五政之所加七賦之所養中於天地者為中國五政五常之政也七賦五榖桑麻也中於天地者土圭測影晷度均也咸曰古者言天體者有三其一曰周髀言天地各中髙外下北極之下為天地之中今上注引是義此注引土圭測影夫土圭者周公之法也冝為是祕曰五常之政之所加五榖桑麻之政之所養以土圭之法測土深正日影以求天地之中則為中國矣過此而往人也哉譬八荒之於中國如彼諸子之於聖人如是咸曰正文伹論華夷之禮樂爾註引諸子非其㫖焉祕曰八荒之外聖王以禽獸畜之光曰言夷狄無異禽獸其所謂禮樂者安足取哉聖人之治天下也礙諸以禮樂礙限祕曰礙止也止以為凖無則禽異則貉咸曰左衽兠離與諸夏殊祕曰無禮樂則禽異禮樂則貉吾見諸子之小禮樂也不見聖人之小禮樂也孰有書不由筆言不由舌吾見天常祕曰五常為帝王之筆舌也天常五常也帝王之所制奉也譬諸書言之於筆舌為人之由禮樂也祕曰帝王之道著于五常猶書言之意著于筆舌光曰天常即禮樂也言治天下而不用禮樂猶無筆而書無舌而言也智也者知也夫智用不用益不益則不贅虧矣咸曰用謂任用之益謂増益之夫智者無不知也用之益之則惟變所適出奇無窮故姜牙興於周而退於齊少伯覇於越而歸於陶皆有餘者也何虧之云哉弗用弗益之則囊括而祕退藏於密故顔守一瓢而道彌光孟著七篇而名愈彰皆有餘者也何虧之云哉所以用與不用益與不益不能虧其一贅多也祕曰智者見用不見用受益不受益於智無一贅之虧矣光曰不贅虧不蓋衍字有餘曰贅不足曰虧言天地之理人物之性皆生於自然不可强變智者能知其可以然則因而導之爾苟或恃其智巧欲用所不可用益所不可益譬如人之形體益之則贅損之則虧矣孟子曰所為惡夫智者為其鑿也深知器械舟車宫室之為則禮由己祕曰深知制度之所為則禮無不在己子曰制度在禮文為在禮行之其在人乎光曰器械舟車宫室皆聖人因物之性制而用之推而行之苟或識聖人之心則禮雖先王未之有可以義起也故曰由己或問大聲光曰問聲孰為大曰非雷非霆隠隠耾耾久而愈盈尸諸聖尸主也雷霆之聲聞當時聖人之言傳無窮光曰宋吳本肱作谹今從李本谹耾皆音宏大聲也或問道有因無因乎光曰黄老之道貴因循曰可則因否則革革與因雖異隨變而通理也故先王之事世相反而其道一也祕曰隨時制宜光曰前人所為是則因之否則變之無常道太𤣥曰夫道冇因有循有革有化因而循之與道神之革而化之與時冝之故因而能革天道乃得革而能因天下乃馴夫物不因不生不革不成故知因而不知革物失其則知革而不知因物失其均革之匪時物失其基因之匪理物䘮其紀因革乎因革國家之矩範也矩範之動成敗之効也或問無為曰奚為哉應化而已光曰所以有為者救時之失耳時不失道又何為哉在昔虞夏襲堯之爵行堯之道法度彰禮樂著垂拱而視天民之阜也咸曰阜盛也富也無為矣祕曰阜厚也垂衣拱手視天民之厚盛何為哉紹桀之後纂紂之餘法度廢禮樂虧安坐而視天民之死無為乎紹桀者成湯也纂紂者周武也當此之時湯武不可安坐視天下民之死而欲無為也所謂可則因否則革矣應變順時故迹不同致理而言皆非為也祕曰湯武革命應天順人自然有為之時光曰宋吴本皆作天民無下字李本作天下民或曰太古塗民耳目惟其見也聞也見則難蔽聞則難塞人以為太古不如絶禮樂以塗塞人之耳目令不見不聞使之純一祕曰太古未作禮樂是塗塞人之耳目使其純愚光曰老子曰古之治者非以明民将以愚之故欲搥提仁義絶滅禮學曰天之肇降生民使其目見耳聞是以視之禮聽之樂因其耳目而節之祕曰天之始生人即使其目能視耳能聞是以聖人配地作禮以養其視應天作樂以養其聽如視不禮聽不樂雖有民焉得而塗諸咸曰言使民視聽皆由禮樂則安用塗之如其視邪聽滛雖欲塗之末由也㔾祕曰視聽無禮樂則大亂雖有民焉得而塞之光曰聖人所以能使其民者以有禮樂也若皆去之則民将散亂而不可制雖欲取其耳目而塗之安可得哉或問新敝祕曰問政教之隆殺如衣之新敝曰新則襲之敝則損益之值其日新則襲而因之值其敝亂則損益随時咸曰新猶初革命之始也敝猶久守成之際也夫革命之始制度未立始仍舊貫故曰襲之守成之際觀可以變故曰損益之孔子曰殷因於夏禮所損益可知也周因於殷禮所損益可知也此之謂矣祕曰政教之隆則因而襲之敝則革而損益之或問太古徳懷不禮懷祕曰道家尚徳而薄禮故言太古之人未有禮惟懷徳爾嬰兒慕駒犢從焉以禮咸曰焉安也言太古之人歸於上也猶嬰兒之慕母駒犢之從乳安用禮祕曰二者俱懷母之徳也曰嬰犢乎難無禮也咸曰言今若亡禮人皆嬰犢矣可乎祕曰人殊禽獸豈皆嬰犢乎嬰犢母懷不父懷咸曰禽獸知有母而不知有父祕曰嬰之未有知犢之畜類乃母懷而已母懷愛也父懷敬也獨母而不父未若父母之懿也兼乎愛敬而後盡其美善咸曰言今或去禮則人獨知母而不知父皆如駒犢矣故兼知父母禮可備也祕曰懐父母乃愛敬之道豈直以德而不禮是與其嬰犢之懷曷若夫人父母之懷之美也懿美也狙詐之家咸曰狙猿也宋有狙公者愛狙養之成羣有朝三暮四朝四暮三之言以欺籠之故荘子曰聖人以智籠羣愚亦猶狙公以智籠衆狙也狙詐之家猶言巧詐之家揚子惡世尚詐欲排斥之故為之言祕曰狙詐兵法權謀家流也狙善詐故以為名猶狐疑猶豫之類光曰狙七余切又干預切曰狙詐之計不戰而屈人兵堯舜也咸曰言我用巧詐之計可以不戰而使人兵屈敗雖堯舜亦然矜之之辭也光曰言狙詐之術雖不用仁義亦能不戰而服人與堯舜之道何異曰不戰而屈人兵堯舜也霑項漸襟堯舜乎咸曰言屈人之兵則或血霑染其項漸漬其襟此亦堯舜之為乎祕曰權謀之家不戰而屈人兵謂之堯舜至于汙血之霑項漸襟亦可謂堯舜乎漸漬也光曰漸子亷切衒玉而賈石者其狙詐乎或曰衒言其玉而賈售以石此巧詐之為也可乎祕曰言堯舜而實以詐者也光曰衒音縣賈音古或問狙詐與亡孰愈亡無咸曰言有詐與無詐誰優愈猶優也光曰言不用狙詐則亡國如陳餘曰亡愈祕曰無愈於有光曰言與其用狙詐不若亡國猶勝也深疾狙詐之辭或曰子將六師則誰使咸曰子指揚子也言無詐為愈則子将六軍無狙詐之人將使誰也以軍師必尚竒勝祕曰或者疑其無權謀則武備闕光曰将子亮切下可以意求曰御得其道則天下狙詐咸作使咸曰得其道猶言全七徳合軍志之類光曰若漢髙祖用韓信彭越陳平之徒御失其道則天下狙詐咸作敵失其御則反間背叛光曰若曹操為治世之能臣亂世之姦雄故有天下者審其御而已矣咸曰修徳任賢則舞于兩階而三苗格故仁者無敵於天下何狙詐之有祕曰駕御權謀亦須有道光曰當以識度恩威為本或問威震諸侯須於征歟徂詐之力也如其亡咸曰言将征伐諸候以為威必資狙詐其可亡乎光曰言立威必須征伐征伐必須狙詐奈何云寧亡國而不為狙詐乎曰威震諸侯須於狙詐可也未足多也祕曰如五霸未若威震諸侯而不須狙詐也咸曰當以徳威之祕曰若三王或曰無狙詐将何以征乎咸曰言征伐必須此乃可祕曰若三王者亦皆有征伐曰縱不得不征不有司馬法乎何必狙詐乎咸曰言不得已須征之自有周禮司馬之法何必詐哉祕曰周官司馬以九伐之法正邦國若不得不征當用是法何必狙詐哉光曰司馬法齊人所述古兵法近正道者申韓之術不仁之至矣祕曰申不害韓非之術不先教化専任刑法至於殘害至親傷恩薄厚不仁之至若何牛羊之用人也峻刑戮之術制民如牛羊臨之以刀俎故曰不仁之至也祕曰不教而殺視人如牛羊若牛羊用人則狐狸螻螾不膢臘也歟膢八月旦也今河東俗奉以為大節祭祀先人也臘蜡也見禮記咸曰臘獵也冬則獵取百獸故狐狸至是死矣螻天螻也螾應劭云蚯蚓也吕氏春秋曰南吕之月蟄虫入冘故螻螾至是絶矣夫以申韓刑名如牛羊之用人則人之生也何可久乎其趍死猶狐狸螻螾不過乎膢臘之候矣光曰螻膢皆落侯切螾餘忍切或曰刀不利筆不銛而獨加諸砥咸曰砥磨石也精曰砥麄曰礪不亦可乎刀鈍礪之以砥筆秃銛之以刀申韓行法以救亂如刀砥亦所以利之也秘曰民不遵禮教而加之刑名不亦可乎銛當為鉆砥所以礪鋒者也筆之有鋒故喻云光曰宋本銛作鉆敕淹巨淹二切今從李吴本銛息亷切古以木為筆或者亦可砥乎曰人砥則秦尚矣嚴刑裁民亦猶刀之割肉以人為砥酷之甚也秦之嚴刑難復尚矣祕曰秦尚刑法而加諸人光曰言用法以礪人如用砥以礪刀則莫若秦為尚矣其如不仁何或曰刑名非道邪何自然矣咸曰言若以刑名為不道則其令民也何亦化之自然祕曰刑名非正道邪何舉世自然有之不可推也光曰若以刑名為非道則何以能禁民使自然而止曰何必刑名圍碁撃劒反自眩刑亦皆自然也咸曰言雖鄙技皆可自然而非正道之為君子耻之光曰李本自作目今從宋呉本若自然者皆謂之道則圍碁欲以智巧惑人有時而自惑擊劒欲以害人有時而自害刑名欲以制人有時而自制是亦自然也由其大者作正道由其小者作姦道大者聖人之言小者諸子之言咸曰非也言刑名猶圍碁撃劒雖亦自然然非正道之法故此文以王道示之大者大道也謂仁徳之化小者小道也謂刑名之姦註乃别為一叚以聖人諸子釋之非矣祕曰大者禮樂也小者刑名也夫刑者所以助治者也禮之所去刑之所取未有捨禮樂而専刑名臻乎至治者也光曰禮樂可以安固萬世所用者大刑名可以輸刧一時所用者小其自然之道則同其為姦正則異矣或曰申韓之法非法歟光曰以上言太上無法而治揚子以為不可曰法者謂唐虞成周之法也咸曰唐虞及周之道徳仁義詩書禮樂之法如申韓如申韓咸曰再言者疾之甚也祕曰法者謂唐虞成周仁義禮樂之法豈如申韓之法光曰如申韓者何足為法荘周申韓不乖寡聖人而漸諸篇則顔氏之子閔氏之孫其如台言以數子之才苟不乖少聖人之術漸染其心於篇籍之中以訓學徒則顔閔不能勝之咸曰台我也光曰漸子亷切台音貽或曰荘周有取乎曰少欲有簡質之益焉咸曰言荘周當戰國之間獨能不應楚威王之命而終身不仕故有寡欲之心此可取耳祕曰周之書十餘萬言其要本歸於老子之言而老子以無欲觀妙為理至周不顧厚幣之迎是少欲可取耳鄒衍有取乎曰自持有凝跱之風焉咸曰言鄒衍之術觀隂陽消息而作怪迂之言然其本以有國者滛侈不能尚徳如大雅整之於身以施及黎庶故有自持之意此可取耳祕曰衍之書十餘萬言然要其歸必正乎仁義節儉禮與其奢也寜儉是能以節儉自持可取乎至周罔君臣之義衍無知於天地之間雖隣不覿也祕曰罔無也夫君臣上下父子兄弟非禮不定而周本乎老子滅絶禮學之意而曰情性不離安用禮樂以天地為一指萬物為一馬是無君臣之義也衍謂中國者於天下乃八十一分居其一分作怪迂之變是無知於天地之間也雖與親鄰亦不欲見之矣光曰罔誣也揚子法言卷三
