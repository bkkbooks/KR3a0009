  - {type: variant, offset: 0, length: 211, content: 欽定四庫全書揚子法言卷一晋李軌唐栁宗元註宋宋咸呉祕司馬光重添註雄見諸子各以其知舛馳顔師古曰舛相背大氐詆訾聖人即為怪迂析辯詭辭以撓世事顔曰大氐大歸也詆訾毁也迂逺也析分也詭異也言諸子之書大歸皆非毁周孔之敎為巧辯異辭以攪亂時政也訾音紫迂音于撓火髙反其字從手光曰光謂氐下脱不字雖小辯終破大道而或衆使溺於所聞而不自知其非也及太史公記六國歴楚漢訖麟止不與聖人同是非頗謬於經故人時有問雄者常用法應之譔以為十三卷顔曰譔與撰同象論語號曰法言, SBCK: ''}
