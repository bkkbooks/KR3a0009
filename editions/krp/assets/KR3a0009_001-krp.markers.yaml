  - {type: variant, offset: 207, length: 261, content: 篇咸曰自誠而明聖人而已明誠以降何嘗不由乎學故此所以首衆篇光曰行讀如字凡書中好惡長少難易相将使令說樂焉邪之類兩音易辯者惟於始見音之後可以意求不復再出或可疑則更音之天降生民倥侗顓蒙倥侗無知也顓䝉頑愚也祕曰倥侗未有所成顓固而䝉昧也尤曰倥音空侗音同又音通顓與專同恣于情性觸意用事聰明不開闇塞之謂祕曰不能性其情則聰明有所蔽訓諸理訓導咸曰理猶道也言天民蠢闇故敎諸道以開明之也祕曰於是聖人貴學乃訓以仁義禮智信之正理譔學行祕曰譔撰述也古或通用夫人自有聰明天命非學則不能啓發故謀道常以學為先學行之上也祕曰夫學者所以為道者也率性行道表則後世學, SBCK: ''}
