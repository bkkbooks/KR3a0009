  - {type: variant, offset: 6709, length: 0, content: '', SBCK: 三揚子法言音義學行卷第一李軌注軌字􅀪範東晉尚書郎都亭侯撰周易音尚書音春秋公羊音小爾雅音各一卷泰始泰寧咸和起居注共六十七卷又撰齊都賦一卷集八卷見隋書經籍志好學呼報切下同復駕扶又切諸儒金口而木舌柳宗元曰金口木舌鐸也使諸儒駕孔子之􅀃如木鐸也礲諸盧紅切焉攸於䖍切下焉知同螟􅘾上音冥下音靈殪於計切蜾蠃上音果下郎果切祝之之又切羿五計切逄蒙薄江切般音班不能踰也俗本脫不字諸本皆有鑄與音余下同五石俗本作玉石誤踧爾子六切桐子音通與侗同亦音同未成人也漢書曰母桐好逸一閧下降切不勝音􅂛之平皮命切鄭司農云質劑月平價也於戲上音烏下音呼又虚冝切爲其于僞切下爲道爲利同楶音節之乗繩證切易乎以豉切啞爾於革切相比毗志切徒與音余下皆同疑者別出􅢟斯羊茹切鸒雅烏如其富俗本下句作如其義非猗頓於離切其粗于胡切紆朱邕俱切其樂音洛下同瞿然音句祇其音支適也有敎立道無心仲尼有學術業無心顔淵天復本並作無止吾子卷第二少而詩照切好賦呼報切組麗音祖狴犴狴邊兮切犴音岸獄也太􅀇曰蹛于狴獄家語曰獄犴不治景差􅀄佳切舊本作景􅜚枚乗繩證切多哇烏􅀲切確乎苦角反俗本作榷非惡烏路切淈古忽切屈原九勿切如瑩烏定切又音榮石次玉者一曰玉色逸論語曰如玉之瑩伉口浪切徤也何休曰有辯護伉正者爲里正陸德明一音苦杏切稱則尺證切足言將住切又如字下同詭辭九委切斷木都管切梡革音緩又音款斷木也爲鞠居六切峛崺上力紙切下移爾切惡沱上哀都切下徒何切舍書也切下同惡覩音烏下同好乎呼報切下好書好􅀃同山􅠌戸經切又口耕切孟子曰山徑之蹊蒼頡胡結切羊質而虎皮見草而􅀃音恱天復本作見羊而恱虎别彼列切下同不要一遥切則辟芳辟反述正道而稍邪哆者有矣未有述邪哆而稍正哆昌者切又尺氏切天復本作稍正道其較音角且易以䜴切下並同帡幪李善曰帡莫經切幪莫公切覆也帡又音并又音萍脩身卷第三矯思斯恣切必中丁仲切樂天音洛聖人之辭可爲也使人信之所不可爲也天復本作不可爲也使人敬之可以有爲俗本作可以爲友非是好大呼報切卑也如字又音婢田圃田上田音佃下田如字圃音甫莠羊乆切喬喬音驕詩作驕必矇音蒙瞽也熒魂戸扃切糟莩李軌讀糟如字莩音浮熟也柳宗元曰熒明也熒魂司見之用者也糟當爲精莩如葮莩之莩目精之表也言魂之熒明曠乆則枯精之輕浮曠乆則沈不面日月則目之用廢矣以至於索塗冥行而巳舊本亦作精莩擿埴他歴切下宫職切索塗山責切重行下孟切下行重行輕同重好呼報切下好重好輕好問並同有觀古玩切則賈音古俗本作史後人改之爾舊本皆作賈謂賈人衒鬻過實下篇云衒玉賈石是也臞如其俱切瘠也捽茹上音在忽切下音人恕切菜也之樂音洛鞹苦郭切騂息營切刲羊苦圭切罷賔音疲勞也犒考告切惡在音烏鮮德息淺切引諸門乎門本或作問夷貉莫白切肄乎羊至切三好呼報切下並同人門俗本人作仁誤禔身是支切又音支又音題元憞徒對切問道卷第四則渾戸昆切請問禮莫知天復本作請問莫知或曰焉得直道而由諸天復本無或曰二字焉於䖍切下以意求之或曰事雖曲而通諸聖天復本無或曰二字天與音余搥提搥都回切舊本皆從手擲也提徒計切亦擲也漢書云以愽局提吴太子則苓音聆閛然匹庚切閉門也俗本作闇然誤諸本皆作閛疣贅羽求切下之瑞切而治直吏切下爲治同哨哨音消又七􅀏切則貉莫自切則禮由已一本作由也耾耾戸萌切俗本作肱誤宋玉風賦曰耾耾雷聲裨蒼曰耾聲皃狙詐千預切又七余切不戰而屈人兵堯舜也天復本無堯舜也三字漸襟子廉切衒音縣賈石音古子將子亮切螻螾上落侯切下餘忍切膢臘上音力朱切又落侯切銛息廉切本或作鈷誤砥音紙反目􅅭形一本作反自􅅭刑􅅭音縣漸諸子廉切如台音貽問神卷第五請問之天復本作請聞之舍則書也切索至山責切無閒閒廁之閒蚖音元惡覩音烏食其不妄俗本作不忘字之誤也非義不妄食故不可得而制楚辭曰鳯亦不貪餧而妄食羑里羊九切不手不制於人之手惷書容切又丑江切又丑用切俄空苦貢切缺也渾渾戸昆切又胡本切灝灝胡老切噩五各切譙乎俗本作誰舊本皆作譙詩傳云譙殺也殺所戒切故注云酷烈易知以䜴切下艱易同覆物敷又切訔訔語巾切爭訟也喊呼覽切又呼嫌下斬切之解胡買切曉也面相息亮切捈他胡切又同盧切引也嚍嚍音即刃切俗本作㗲㗲誤㖧㖧呼昆切忞忞武巾切見矣賢遍切與我音預者鮮悉淺切君子病没丗而無名盍勢諸名卿可幾也漢書曰或問君子疾没丗而名不稱盍勢諸名卿可幾師古注曰以身而無名爲病孟康曰盍何不也云何不因名卿之埶以求名幾音機下同君子德名爲幾韋昭曰言有􅀔之名卿庶幾可不朽揚子以爲不然唯有德者可以有名師古曰或人以事有權力之卿用自表顯則其名可庶幾而立揚雄以爲自蓄其德則有名也梁齊趙楚之君非不富且貴也惡乎成名漢書曰梁齊楚趙之君非不富且貴也惡虖成其名師古曰謂當時諸侯王也惡於何也音烏谷口鄭子眞不屈其志而耕乎巖石之下名振于京師豈其卿豈其卿漢書曰谷口鄭子眞不詘其志耕於巖石之下名震于京師與今文不同螘垤上魚綺切下徒結切能別似者彼列切俗本作能參以似非是問明卷第六誖布内切􅅭􅅭胡㳙切幽逺皃大知如字孟子疾過我門而不入我室過古禾切不入室者孟子疾之不食實者揚子疾之近人注法言誤以孟子疾爲句絶摭我音􅃗樂天音洛下同庸行下孟切下庸行同去諸丘莒切抏也五官切漢書云海内抏􅁦下抏秦同舊本皆作抏臯陶音遥􅘱女耕切譻􅘱天復本作謣謣音于又音糽妄言也敗俗必邁切下同又如字􅘱好呼報切下於好好文同亟於紀力切聵五怪切在治直吏切下同則見賢遍切弋人何慕後漢書逸民傳序引揚子作弋者何篡宋􅂨注云篡取也鴻髙飛冥冥薄天雖有弋人執増繳何所施巧而取焉喻賢者深居亦不罹暴亂之害今篡或爲慕誤也鷦明上音焦􅀃文曰東方發明南方焦明西方鷫鷞北方幽昌中央鳯皇又司馬相如傳云鷦鵬巳翔乎寥廓之宇又樂緯曰鷦鵬狀如鳯皇遴集鄰振切蹌七羊切翳路烏計切蜀莊沈冥蜀莊之才之珍也不作苟見不治苟得乆幽而不改其操雖隨和何以加諸舉兹以旃不亦珍乎漢書孟康注曰湛深淵黙無欲也師古曰湛讀曰沈不爲苟顯之行不事苟得之業隨隨侯珠也和和氏璧也諸之也旃亦之也言舉此人而用之不亦國之寳乎三輔決録曰子眞名樸君平名尊毚欲士銜切貪也俗本作利欲儃舜蟬戰切累克俗本誤作刻灑耳音洗翾翾許緣切飛㹸歸其肆矣注非也朱爲往來以時不累其身放肆自遂􅀃難劉伯莊史記音義曰􅀃難上式拙切下如字司馬正史記索隱曰􅀃音稅難音如干切言游􅀃之道爲難故􅀃難書其辭甚髙故特載之然此篇亦與韓子微異煩省少不同劉伯莊亦申其意粗釋其微文幽旨故有劉􅀃確苦角切問行下孟切寡見卷第七好徦音遐本或作遐下同偭焉彌兖切好盡呼報切援我音􅀽鶉兮音純譊譊女交切皆􅀃一本􅀃作訟曼是莫半切曼衍無極也􅈱音􅀌璵璠上以諸切下附􅀽切鞶􅍤上音盤下音稅惡在音烏拂乎符勿切而樂音洛焉事於䖍切窒珍栗切六翮下革切其累力僞切奠枕章袵切樓航或作斻亦作杭榷利音角貂音彫陶同衣人於旣切不抎于粉切天復本作眃音雲耳中聲也屬其音燭肉辟婢亦切實予音與惡在音烏下惡得同於乎上音烏政核下革切不離力智切下同􅖁徒玩切卵壞不剡以冉切甄陶居延切甈五計切破瓦也坏芳盃切未燒瓦也俗本作怌字之誤也注甈燥也俗本誤作躁坏濕也誤作怌懼也衆田音佃田侯田上田同上音下如字重黎卷第十南正重直龍切姒音似扁鵲薄􅁌切渾天胡昆切又胡本切度之徒洛切幾乎音機下同俗本作幾幾乎尚書舜典正義引揚子云幾乎幾乎藉館慈夜切䇿種絶句種章勇切髙山本或作商山西采注云食稅倉代切或如字雍梁於用切鹵音魯􅎼奴板切西畤音止鄜芳無切天王不匡俗本作天下誤爲嬴工僞切下無爲同置守手又切屏營上音并守失其微本或作徽垓下古哀切楚憞徒對切彊䦧許激切震撲上如字又音眞下音普􅁲切胎藉胎當作跆徒來切跆蹋也藉慈夜切德行下孟切龕音堪與戡同焉攸於虔切下焉用同虎挒音列梟磔陟格切越與音預俗本作興字誤橈辭女敎切下同井幹胡安切之乗繩證切蔡生史記作蔡生漢書作韓生亨之普庚切下同其者未辯者衍字木侯漢書作沐猴逆訐居竭切劘音摩辟彊必益切酈音歴食其異基二音􅀃陳失贅切下􅀃齊同幾矣音機蒯通苦怪切抵巇上都禮切下許羇切拊鍵上音撫下其輦切作相息亮切從浮才用切始六世之詔天復本作始元之􅀄廉頗滂禾切信亞音伸鑿穆顔師古漢書注曰鑿謂所穿冡藏音在到切或如字焉可於䖍切下同黔婁其廉切又音琴韋􅀇天復本作四皓韋􅀇成欒布之不塗天復本作不倍通使色吏切扼音厄欹器倮葬郎果切淵騫卷第十一惡乎音烏曰寢俗本作曰在寢在衍字扛鼎音江魯仲連而不制藺相如制而不與蕩同忼辭苦兩切免罿音􅓘幾矣音機之知音智下知國如字周之順赧諸本皆作順赧順靚王及赧王也俗本作周之傾字之誤也史記作愼靚王索隱作順靚王或是愼轉爲順赧奴板切東并音併壍山七􅃩切臨洮音叨相也息亮切窬音踰擔石都濫切又都甘切秦將子亮切下同牙欸烏開切又許介切要離一遥切求反俗本脫求字蛛蝥俗本作蛛螫誤賈􅁩新書曰蛛蝥作網蝥音矛焉可於䖍切下皆同爲嚴于僞切下爲姊爲丹同刺相息亮切下董相同曼面謨官切塗面督亢音剛惡諸烏路切秦行下孟切美行同鷙翰胡安切又侯盰切􅀃而失贅切任人音任難之乃旦切園公史記留侯丗家作東園公角里上音鹿漢書作甪里執正俗本作政誤折節之設切葘異葘與災同樊酈音歴槧人七􅃩切盎烏浪切晁錯曰愚天復本作由忠捋踈上音郎活切俗本作將誤没齒無愁也俗本誤作没齒然也雋京徂兖切將子亮切下同冠軍古亂切奉使色吏切膚使同行不下孟切下其行聖行賢行談行並同詼逹上音恢舊本皆作詼逹漢書曰朔詼逹多端不名一行本或作談逹又作名字逹皆誤惡比音烏滑稽音骨朝隱直遥切妄譽音餘不累良爲切絀臣與黜同愀如親小切舊本皆作俶如昌六切動色皃鄲聞鄲音丹猶但也或古鄲但通用亦音但本或作但育賁音奔君子卷第十二弸中蒲萌切又普耕切般音班有中丁仲切其知音智侻也他括切可也牛􅀇騂白俗本作􅀇牛騂白誤騂息營切睟而睟與粹同隊乎直􅀋切鮮取悉踐切下鮮儷同人以巫鼔天復本作又以巫鼔其行下孟切下以行言行同好人呼報切下同勌與倦同儷音麗囂囂五刀切虙音伏偟音皇孝至卷第十三有齊側皆切下同屬荒音燭含菽本亦作唅音同爲名于僞切庳音婢下也螘與蟻同之綸古頑切又音倫扛音江揭渠列切若禔是支切又音支又音題諸傳直戀切與有終而無始與如字孰寧天復本作孰愈知哲上音智之長丁丈切群行下孟切德行同東鞮都奚切丗鮮息淺切芒芒謨郎切下同璜璜音黃螭丑知切䎒䎒財千切又側板切訩訩許容切又詡拱切􅂢之與專切周公以來未有漢公之懿也勤勞則過於阿衡柳宗元曰阿衡之事不可過也過則反矣漢興二百一十載而中天其庶矣乎柳宗元曰揚子極隂陽之數此言知漢祚之方半耳法言序倥侗顓蒙漢書􅀭雄傳鄭氏注曰童蒙無知也師古曰倥音空侗音同顓與專同侗又音通􅀃文大貌詩神罔時侗一曰侗未成器之人訓諸理師古曰訓告也迄孔許訖切師古曰周周公旦也迄至也孔孔子也言自周公以降至於孔子設敎垂法皆帝王之道終後誕章乖離諸子圖徽漢書揚雄傳作諸子圖微師古曰言其後澆末虚誕益章乖於七十子所謀㣲妙之言事有本眞陳施于意漢書揚雄傳作陳施於億李竒曰布陳於億萬事也動不克咸李竒曰不能皆善也芒芒天道昔在聖考李竒曰聖人能成天道過則失中不及則不至不可姦罔蘇林曰罔誣也言不可作姦誣於聖道明􅈒煌煌旁燭無疆漢書揚雄傳作旁燭亡疆師古曰煌煌盛貌也燭照也無疆猶無極也遜于不虞以保天命李竒曰常行遜順備不虞遐言周于天地漢書揚雄傳作假言周于天地師古曰假至也幽􅀪橫廣絶于邇言李竒曰理過近丗人之言也經諸範漢書揚雄傳作經諸范師古曰經常也范法也立政鼓衆動化天下莫尚於中和漢書揚雄傳尚作上鄧展曰鼓亦動也參差不齊師古曰言志業不同也參初林切一槩諸聖師古曰一以聖人大道槩平槩工代切譔淵騫柳宗元曰按漢書淵騫自有序文語俗近不􅀋蓋後人増之或班固所作君子純終領聞音問李竒曰領理所聞也師古曰純善領令也聞名也言君子之道能善其終而不失令名蠢迪檢柙師古曰蠢動也迪道也由也檢柙猶隱括也言動由檢柙也音狎寧親莫大於寧神師古曰寧安也言大孝之在於尊嚴祖考安其神靈所以得然者以得四方之外驩心}
