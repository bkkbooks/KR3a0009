  - {type: variant, offset: 6248, length: 248, content: 宗元曰揚子極隂陽之數此言知漢祚之方半耳咸曰子雲雖學極隂陽然亦不當逆知漢祚方半也夫中天者猶中興也盖子雲觀莽之強簒而立復暴磔如是天下思漢徳未已知赤氏之運未去必有中興而王者言庶㡬乎近也故後十餘年光武果定豈非驗乎祕曰子雲上稱漢徳之允懐中言王莽之不正下言漢載之中天是覩民思漢徳莾為不道必有中興之義且明徳之不可已也如是孔子曰其或繼周者雖百世可知也以禮明之也子雲曰漢二百一十載而中天以徳明之也是知子雲其聖人之徒歟漢髙祖元年至孺子嬰二年凡二百一十四年自王莾稱建國元年至獻帝延康元年凡二百一十二年光曰庶者庶㡬於治也, SBCK: ''}
