  - {type: variant, offset: 5538, length: 688, content: 宗元曰阿衡之事不可過也過則反咸曰成王㓜太甲昏勢亦殆矣然周公居叔父之尊伊尹當阿衡之重二公可取而不取卒以忠勤復辟而正之夫舉其可取不取之因明其不可取而取之事則子雲之罪莾亦大矣祕曰自周公以來未有如王莽而謂之美也惟是折節力行勒勞之事則欲不止於阿衡明其簒也伊周聖人之居師保者漢公王莽也懿美也過謂不止也班固曰莽知漢中外殫微本末俱弱亡所忌憚生其姦心因母后之權假伊周之稱子雲因其假也故以伊周為言光曰法言之成蓋當平帝之世莽專漢政自比伊周欲興禮樂致太平上以惑太后下以欺臣民附已者進異已者誅何武鮑宣以名髙及禍故揚子不得不遜辭以避害也亦猶薛方云堯舜在上下有巢由也當是之時莽猶未簒人臣之盛者無若伊周故揚子勸以伊周之美欲其終于北面者也或曰揚子為漢臣漢亡不能死何也曰國之大臣任社稷之重者社稷亡而死之義也向使揚子據将相之任處平勃之地莾簒國而不死良可責也今位不過郎官朝廷之事無所與聞柰何責之以必死乎夫死者士之所難凡責人者當先恕已則可以知其難矣或曰揚子不死可也何為仕莽而不去曰知莽将簒而去者龔勝是也莾聘以為太子師友卒不食而死揚子名已重於世苟去而隠處如揭日月潜于蒿萊庸得免乎或曰揚子不去則已何必譽莽以求媚豈厭貧賤思富貴乎曰昔晉袁宏作東征賦不序桓彛陶侃猶為桓温陶胡奴所刼僅以敏㨗自免况揚子作法言品藻漢興以來將相名臣而獨不及莽莽能無耻且忿乎此杜預所謂吾但恐為害不求益也且揚子自謂不汲汲於富貴不戚戚於貧賤始為郎給事黄門與王莾劉歆並哀帝之初又與董賢同官當成哀平間莽賢皆為三公權傾人主所薦莫不㧞擢而雄三世不徙官此豈非言行相副之明驗乎古今之人能安恬如此者㡬希而子乃疑其求媚而思富貴不亦過乎使揚子果好富貴則必為莽佐命不在劉甄之下矣, SBCK: ''}
