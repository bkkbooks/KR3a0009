  - {type: variant, offset: 71, length: 396, content: 以混茫之初釋之可乎光曰漢書及李本大作天今從宋吴本昔在聖考聖人作萬物覩伏羲肇畫八卦六位成章咸曰昔在聖考者言此大道並古先聖人考制之猶周公作禮樂仲尼刪詩書之義故篇中皆統論堯舜文王仲尼之事復有非老荘之說注獨指伏羲畫卦以解之不亦謬乎過則失中不及則不至二五得中然後利見咸曰言履聖人之道罕有得諸正者如門人之衆其殆庶㡬者惟顔子而已今言失中不及者猶師也過商也不及之義爾故禮尊中庸書貴皇極此之謂也注以二五解之甚非類矣彼二五者言一時居位安危之象此統講中庸之理相去異焉學者辨之祕曰大道芒芒然惟聖人考之遂明大中之制是以河出圖也大易明二五之中洛出書也洪範貴皇極之義舜執其兩端用其中於民回之為人也擇乎中庸孔子曰道之不行也我知之矣知者過之愚者不及也不可姦罔咸曰中而正者非姦罔所及光曰姦謂侵壊罔謂誣罔言聖人大中之道天下莫能易也譔問道祕曰世以虚無湛寂為道之本而求乎洪荒夷曠之理不知天地聖人貴乎大中自然之道光曰尊道徳禮樂黜老荘申韓, SBCK: ''}
