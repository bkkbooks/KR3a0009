  - {type: variant, offset: 9, length: 232, content: 唐柳宗元註宋宋咸呉祕司馬光重添註五百篇咸曰矜其未至而誘之自非聖人則孰能與於世故五百之義次之寡見聖人聰明淵懿繼天測靈咸曰靈萬靈也言天有泰否聖有出没皆不常然故聖人之岀没繼天道之否泰所以測濟萬靈者也祕曰神靈冠乎羣倫經諸範範模咸曰倫品也範猶制度也言聖人之生冠於羣品經緯以制度而為天下利祕曰至聖之著存乎軌範光曰聖人以聰明深美之徳繼成上天之功測知神靈之理首出羣類立之法度以為萬世之常道譔五百祕曰麟鳯不常出聖人不常生或如三辰之並照或如一天之獨乆能存其道則墻奥可量哉光曰明聖人之道, SBCK: 注}
