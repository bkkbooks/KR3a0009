  - {type: variant, offset: 491, length: 240, content: 咸曰夫天地之道或㤗而通或否而塞㤗則萬物阜否則萬化閼弗一而常也夫聖人之道或生而出或亡而絶出則萬物遂絶則萬化滅亦弗一而常也是故天地不常秦亦不常否聖人不常出亦不常絶楊子因上論聖人之生有以合天地之化遂為之言爾註以别為一義且云首擬天腹擬地以形體解之甚失揚㫖矣夫人之冇血氣形體首圓象天足方象地至於肢藏各有所法雖庸愚者皆然豈獨聖人哉學者宜辨之祕曰聖人有以擬法天地而叅乎言行也管子曰聖人若天然無私覆也若地然無私載也禮曰譬如天地之無不持載無不覆燾皆言聖人之道也光曰言德與天地叅者則為聖人無疏數之期也, SBCK: ''}
