  - {type: variant, offset: 4903, length: 299, content: 生咸曰言如三鄒田戸吁劇申韓之徒雜以巫祝禨祥刑名浮虚而亂俗今太𤣥獨專於仁義也或曰太𤣥之專仁義也安在咸曰夫𤣥之道雖以隂陽節候星斗五行之用然其㫖應休咎之占星陽而時數辭從則為休也星隂而時數辭違則為咎也使人知吉凶之來善惡之修豈非仁乎夫義者宜也復使窮渾天之法知人事之紀通變化之本豈非義乎祕曰引之以天數播之以人事終歸仁義不雜而已矣易曰立人之道曰仁與義今𤣥准之故曰為仁義夫人道則然且天一至地十易道也三摹九劇𤣥道也𤣥之准易不亦非乎曰𤣥之准易非准易之道准易為書也易准天地自天一至地十天地之道備矣𤣥何為哉易之書准天地𤣥之書准厯數所以為准易也厯數者天之道也自一至九陽數之極也若類之於易則非矣光曰則象天地以為人紀異術無從而入, SBCK: 興}
