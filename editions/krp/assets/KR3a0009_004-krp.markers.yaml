  - {type: variant, offset: 4415, length: 341, content: 言昔老彭好述古事孔子比之但述而不作今太𤣥非古事乃自成一家之書故作之也或曰孔子述事者有矣然何嘗作書乎咸曰當孔子之世周室下衰詩書淆亂禮樂崩壊先王之制無一而正者故孔子區區於道以述古事刪詩書定禮樂約史記而修春秋復與諸侯門人更議典制然後各得其所故明道立教盡在是矣何須更作書哉故所以述而不作者盖此也非不當作之也當子雲之時則不然六經皆更聖人之所定漢興已久稍為諸儒討正故無古事可述而屈身莽朝自非作書著成一家則何以明其道哉祕曰以為經莫大於易故作太𤣥自子辰申子冠之以甲分二十七章為一會八十一章為一統從子至辰自辰至申自申至子凡四千六百一十七嵗為一元與泰初厯相應亦有顓頊厯焉此其事則述也作二百四十三表七百二十九贊十一篇此其書則作也光曰仁義先王之事也方州部家揚子所作也言揚子所作太𤣥之書其所述者亦先聖人之道耳, SBCK: ''}
