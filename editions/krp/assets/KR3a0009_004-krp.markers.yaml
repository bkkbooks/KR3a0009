  - {type: page-break, offset: 5375, content: '', id: KR3a0009_SBCK_005-5a}
  - {type: variant, offset: 5376, length: 469, content: 能知也如周之禮樂庶事之備也每可以為不難矣祕曰魯得用天子禮樂盡在魯光曰監於二代曲為之制事為之防學者習之固無難矣如秦之禮樂庶事之不備也每可以為難矣祕曰秦燔滅文章以愚黔首禮樂弛廢雖季子何由知之光曰秦訕笑三代之禮樂屏而去之自為苟簡之制後之學者求先王之禮樂於散亡之餘誠亦難矣衣而不裳未知其可也有上無下猶有君而無臣祕曰君在位而無輔光曰秦收諸侯之禮籍獨取其尊君抑臣者存之是衣而不裳也裳而不衣未知其可也祕曰權在臣下不知有君衣裳其順矣乎三桓專魯陳恒滅齊王莽簒漢三姦之興皆是物也祕曰上衣下裳大順之道光曰先王之禮其於君臣之際雖不失尊嚴而和樂存焉或問文曰訓訓順也咸曰言如五經可垂訓者問武曰克克能咸曰言克定禍亂者光曰克勝也未逹不諭曰事得其序之謂訓順其理也祕曰五常得其倫萬物得其序文之訓也光曰經緯天地綱紀四方勝已之私之謂克惟公亮也祕曰弔民伐罪與天下公共武之克也光曰勝人易勝已難勝已之私以從於道則人無不勝矣為之而行動之而光者其德乎咸曰所為無敢禦者故曰行所動無敢辱者故曰光或曰知德者鮮何其光祕曰知德者盖寡安得有光光曰鮮悉淺切曰我知為之不我知亦為之厥光大矣所謂大人用之不為, SBCK: 爲}
