  - {type: variant, offset: 0, length: 495, content: 御製書揚雄法言偶觀法言用智之句喜其有卓識可謂明哲矣夫奔壘之車沉流之航迫不及待安用其智然不有未奔沉之先乎是誠明哲者所宜思也既而笑雄之能為比言而不能行夫劉棻為車航之小而莽為車航之大劇秦美新為在奔沉之先乎抑在奔沉之後乎雄何不思於奔沉之先以致生而有投閣之驚死而蒙莽大夫之諡則是雄之為言仍虗飾之車有繫之航耳吾於是知言顧行行顧言之為難也且以知立言之不可不慎也欽定四庫全書子部一揚子法言儒家類提要臣等謹案揚子法言十卷漢揚雄撰宋司馬光集注考漢書藝文志儒家揚雄所序三十八篇注曰法言十三雄本傳具列其目曰學行第一吾子第二脩身第三問道第四問神第五問明第六寡見第七五百第八先知第九重離第十淵騫第十一君子第十二孝至第十三凡所列漢人著述未有若是之詳者葢當時甚重雄書也自程子始謂其蔓衍而無斷優柔而不决蘇軾始謂其以艱深之詞文淺易之説至朱子作通鑑綱目始書莽大夫揚雄死雄之人品著作遂皆為儒者所輕若北宋之前則大抵以為孟荀之亞故光作潛虛以擬太元而又採諸儒之説以注此書考自漢以來有侯芭注六卷宋衷注十三卷李軌解一卷辛徳源注二十三卷又有栁宗元注宋咸廣注呉祕注至光之時惟李軌栁宗元宋咸呉祕之注存故光裒合四家増以已意原序稱各以其姓别之然今本獨, SBCK: ''}
