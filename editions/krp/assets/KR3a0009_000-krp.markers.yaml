  - {type: variant, offset: 498, length: 1727, content: 不著名餘則以宗元曰咸曰祕曰光曰為辨葢傳刻者所改題也舊本十三篇之序列於書後葢自書序詩序以來體例如是宋咸不知書序為偽孔傳所移詩序為毛公所移乃謂子雲親㫖反列卷末甚非聖賢之㫖今升之章首取合經義其説殊謬然光本因而不改今亦仍之焉乾隆四十五年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀宋咸重廣注揚子法言原序太儀之體渾淪無窮者也非夫周服諸家之論則度舎之紀兹或罔焉欲明緯象不可得也羣經之文支離寡要者也非夫孔傳衆氏之解則章趣之㑹無乃隠焉欲辨綱常不可得也故先儒於聖人之書所以亹亹而為已任者蓋此爾惟西京博士毛萇傳詩頗號太略鄭康成大懼夫泯之弗行思覺於後故増之箋言而三百廓如也自鳳徳云衰諸子繼作亞聖之譔獨揚孟而已七篇有趙臺卿為之題頗詳真經有范叔明為之解甚悉惟法言者蓋時有請問子雲用聖人之法以應荅之也凡有十三篇東晋李軌雖為之註然愈略於毛公之為唐栁宗元刪定雖釋二三而不能盡補其亡誤故中有義易决者反疏之如五聲十二律面友戰悸之類甚顯而反釋之理尚秘者則虛焉如猗頓之孝書與經同雉噫秦縊狐螾不膢臘褐博没齒之類甚秘而反闕之闕文者弗能正如衆人所不能踰脫不字之類譌字者乃無辯如聖人不干作不手之類至於言不詁如殪傷剬之類而事不屬如遷善隔㫁參辰之類議失㫖如風不再實録多愛周人行秦人行有病曼之類而舉失類如擊劒北賊莽篡擬㤗之類已什其手是使揚氏之意尚有所晦學子不能無冗豫也故康成之志咸敢竊而取焉凡禆其闕糾其失五百餘條且署咸曰以别舊貫觀夫詩書小序並冠諸篇之前蓋所以見作者之意也法言毎篇之序皆子雲親㫖反列於卷末甚非聖賢之法今升之於章首取合經義第次之由隨篇具析其有艱字音切來理盡譜于後仍條其舊以為十卷雖不能廣翼賢業庶充巾笥為詒謀之具云景祐三年二月日著作佐郎知尤溪縣事宋咸序宋咸進重廣註揚子法言原表臣咸言臣聞魯堂諸子皆宗聖以宣猷漢室羣儒多註書而顯氏矧遘㑹昌之旦敢忘釋詁之勤願塵典學之明庶補傳疑之闕臣誠惶誠恐頓首頓首臣竊以前聖既没微言即淪並行者非先王之流横議者皆處士之輩儒綱盡弛民極都棼惟鄒國孟軻蘭陵荀況下及劉世復生揚雄咸能著書更相樹道闢王基於絶代振天爵於羣倫若趙岐之釋孟篇如楊倞之箋荀㫖大決宧奥靡留洞疑惟彼法言凖夫論語文髙而絶義祕而淵雖李郁亭解之於前栁宗元裁之於後然多疏略猶或誤遺凡坦然易别之條則五行俱下而詮釋洎卓爾難明之意則一辭不措而闕亡遂使十三篇之㫖趣未融數百年之駕說猶昧唐陸徳明云註既釋經經由註顯若讀註不曉則經義難明誠此之謂也臣爰自効官未嘗廢學因念子雲之業蓋紹仲尼之綱比縁從政之餘輙恣討論之究増加剖理庶所詳明然聖人之門誠難言而是戒況愚夫之慮或有得而可收恭惟景祐體天法道欽文聰武聖神孝徳皇帝陛下道冠先天業恢長世若唐虞之稽古監商周而右文雖祕藏之多俾加於采正在小説之異罔忽於棄遺臣是敢前冐邦刑仰干天聽終篇稱善儻垂衡石之觀以文化成願廣鴻都之教臣所重廣註揚子法言一十卷謹繕冩成三䇿隨表昧死詣東上閤門投進以聞臣黷犯宸嚴無任屛營激切之至臣誠惶誠恐頓首頓首謹言景祐四年十月十六日給事郎守祕書著作佐郎宋咸表司馬光註揚子法言序韓文公稱荀子以為在軻雄之間又曰孟子醇乎醇者也荀與揚大醇而小疵三子皆大賢祖六藝而師孔子孟子好詩書荀子好禮揚子好易古今之人共所宗仰如光之愚固不敢議其等差然揚子之生最後監於二子而折衷於聖人潛心以求道之極致至于白首然後著書故其所得為多後之立言者莫能加也雖未能無小疵然其所潛最深矣恐文公所云亦未可以為定論也孟子之文直而顯苟子之文富而麗掦子之文簡而奥唯其簡而奥也故難知學者多以為諸子而忽之晋祠部郎中李軌始為之註唐栁州刺史栁宗元頗補其闕景祐四年詔國子監校揚子法言嘉祐二年七月始校畢上之又詔直祕閣吕夏卿校定治平元年上之又詔内外制㸔詳二年上之然後命國子監鏤版印行故著作佐郎宋咸司封貟外郎吳祕皆嘗註法言光少好此書研精竭慮歴年已多今老矣計智識所及無以復進竊不自揆輙采諸家所長附以已意名曰集註凡觀書者當先正其文辨其音然後可以求其義故相宋公庠家有李祠部註本及音義最為精詳音義多引天復本未知天復何謂也諸公校法言者皆據以為正宋著作吴司封亦據李本而其文多異同音義皆非之以為俗本今獨以國子監所行者為李本宋著作吳司封本各以其姓别之或參以漢書從其通者以為定本先審其音乃解其義然此特愚心所安未必皆是兾來者擇焉元豐四年十一月己丑涑水司馬光序, SBCK: ''}
