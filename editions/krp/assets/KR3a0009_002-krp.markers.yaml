  - {type: variant, offset: 9, length: 315, content: 唐桞宗元註宋宋咸吳祕司馬光重添註吾子篇咸曰人既裕乎學也則吾道有歸焉故次之學行降周迄孔成于王道禮樂備也光曰宋本迄作訖今從李吳本迄許訖切顔曰周周公也迄至也然後誕章諸子應時而作詭世之言矣祕曰迄至也一本作訖誕大也章明也周孔之後禮樂大明光曰漢書及李本然作終今從宋吳本乖離咸曰然後誕章乖離當為一句言自仲尼之後詭誕之章作而乖離於道今註於誕章文下釋之隔乖離二字於下句甚失其義諸子祕曰異端起乃乖離於諸子矣圖徽貴此聖人坦蕩之夷路賤彼百家雜穢諸之邪徑咸曰徽善也諸子謂吾道之子也言詭誕之章乖離於道諸子當圖其善而學之戒夫習者也祕曰圖謀也徽美也辨其異端而謀其徽美光曰漢書作圖徽今從諸家譔吾子祕曰綺靡荒唐雕刻詭誕俱謂之文人各矜尚而不知其正者正之光曰貴道徳抑浮辭, SBCK: 注}
