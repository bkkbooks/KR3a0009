  - {type: variant, offset: 5206, length: 889, content: 咸曰孔子云中人以上可以語上中人以下不可以語上也又曰上智與下愚不移考聖人之言則是人有上中下三品矣上焉者善下焉者惡中焉者可上可下善惡混也故賈誼新書亦於人主分三等曰有上主有中主有下主夫上主者可以引之而上不可以引之而下下主者可以引之而下不可以引之而上中主者可以引之而上亦可以引之而下也故上主者堯舜是也夏禹后稷與之為善則行鯀驩兠欲引而為惡則誅故可與為善而不可與為惡也下主者桀紂是也飛㢘惡来與之為惡則行比干龍逢欲引而為善則誅故可與為惡而不可與為善也中主者齊桓公是也得管仲隰朋則覇用竪貂子牙則亂今楊子之意謂孟子已言人性善是論上品矣荀子已言人性惡是論下品矣而未及中品故於此謂人之性善惡混又曰脩其善則為善人脩其惡則為惡人觀其文是止言中品之性明矣非謂人皆然也得非夫子所謂中人以上可以語上中人以下不可以語上者邪得非賈誼所謂可以引之而上亦可以引之而下者邪故三子言性各舉其品教亦備矣祕曰習與性成光曰孟子以為人性善其不善者外物誘之也荀子以為人性惡其善者聖人教之也是皆得其一偏而遺其本實夫性者人之所受於天以生者也善與惡必兼有之猶陰之與陽也是故雖聖人不能無惡雖愚人不能無善其所受多少之間則殊矣善至多而惡至少則為聖人惡至多而善至少則為愚人善惡相半則為中人聖人之惡不能勝其善愚人之善不能勝其惡不勝則從而亡矣故曰惟上智與下愚不移雖然不學則善日消而惡日滋學焉則惡日消而善日滋故曰惟聖罔念作狂惟狂克念作聖必曰聖人無惡則安用學矣必曰愚人無善則安用教矣譬之於田稻粱藜莠相與並生善治田者薅其藜莠而養其稻粱不善治田者反之善治性者長其善而去其惡不善治性者反之孟子以為仁義禮智皆出乎性者也是豈可謂之不然乎然殊不知暴慢貪惑亦出乎性也是信稻粱之生於田而不信藜莠之亦生於田也荀子以為爭奪殘賊之心人之所生而有也不以師法禮義正之則悖亂而不治是豈可謂之不然乎然殊不知慈愛羞惡之心亦生而有也是信藜莠之生於田而不信稻粱之亦生於田也故揚子以人之性善惡混混者善惡雜處於心之謂也顧人所擇而脩之何如耳脩其善則為善人脩其惡則為惡人斯理也豈不曉然明白矣哉如孟子之言所謂長善者也如荀子之言所謂去惡者也揚子則兼之矣韓文公解揚子之言以為始也混而今也善惡亦非知揚子者也, SBCK: ''}
