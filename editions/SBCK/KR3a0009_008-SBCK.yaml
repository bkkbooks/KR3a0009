seq: 8
front:
  text: 李軌注或問淵騫之徒惡乎在曰寢或曰淵騫曷不寢曰攀龍鱗附鳯翼巽以􅀭之勃勃乎其不可及也如其寢如其寢七十子之於仲尼也日聞所不聞見所不見文章亦不足爲矣君子絶德小人絶力或問絶德曰舜以孝禹以功皐陶以謨非絶德邪是皆德之殊絶力絶力者何秦悼武烏獲任鄙扛鼎抃牛非絶力邪此等皆以多力舉重崩中而死所謂不得其死然或問勇曰軻也曰何軻也曰軻也者謂孟軻也若荆軻君子盜諸請孟軻之勇曰勇於義而果於德不以貧富貴賤死生動其心於勇也其庶乎或人之問勇猶衞􅂕公之問陳也仲尼荅以俎豆子雲應之以德義魯仲連而不制髙談以救時難功成而不受禄賞藺相如制而不好義崇理屈身伸節輔佐本國繫時之務也或問鄒陽曰未信而分疑忼辭免罿幾矣哉鳥罟謂之罿猶人之縲紲幾危也獄中出慷􅁣之辭得以自免亦巳危矣或問信陵平原孟甞春申益乎曰上失其政姦臣竊國命何其益乎當此四君之時實皆有益於其國而􅀭子譏之者蓋論上失其政故辯明之樗里子之知也使知國如葬則吾以疾爲蓍􅀛疾者樗里子之名死葬豫言後當有兩天子宫夾我果如其言使其䇿筭國事如之則吾以疾爲蓍􅀛者有爲有行動而問焉周之順赧以成周而西傾秦之惠文昭襄以西山而東并孰愈曰周也羊秦也狼然則狼愈與曰羊狼一也過猶不及兩不與也或問蒙恬忠而􅀍誅忠奚可爲也曰壍山堙谷起臨洮擊遼水力不足而死有餘忠不足相也相助也雖盡一身之節而殘百姓之命非所以務民之義或問吕不韋其智矣乎以人易貨吕不韋陽翟賈人也出千金以助子楚子楚旣立不韋相之曰誰謂不韋智者與以國易宗雖開列封先􅀏後愁身旣鴆死宗族竄流不韋之盜穿窬之雄乎不以其道非盜何如穿窬也者吾見擔石矣未見雒陽也雒陽不韋所國地也揭雒陽而行天下豈徒擔石乎秦將白起不仁奚用爲也長平之戰四十萬人死􅃖尤之亂不過於此矣原野猒人之肉川谷流人之血將不仁奚用爲奚何翦問王翦何將也曰始皇方獵六國而翦牙欸咀噬用牙言其酷也欸者絶語歎聲或問要離非義者與不以家辭國曰離也火妻灰子以求反於慶忌實蛛蝥之劘也焉可謂之義也義者臣子死節乎君親之難也離由平人而焚燒妻子詐爲呉讎求信於慶忌反而刺之若蜘蛛之䖝小巧耳政問聶政爲嚴氏犯韓刺相俠累曼面爲姊實壯士之靡也焉可謂之義也俠累韓相名也軻問荆軻爲丹奉於期之首燕督亢之圖入不測之秦實刺客之靡也焉可謂之義也三士所死皆非君親之難也非義之義君子不爲也或問儀秦學乎􅀑谷術而習乎縱橫言安中國者各十餘年是夫曰詐人也聖人惡諸曰孔子讀而儀秦行何如也欲讀仲尼之書而行􅂫張之辯曰甚矣鳯鳴而鷙翰也然則子貢不爲與言子貢亦行游􅀃抑齊破吴以救魯曰亂而不解子貢恥諸􅀃而不富貴儀秦恥諸恥國亂而不解於義髙恥游􅀃而不富貴其情下或曰儀秦其才矣乎跡不蹈巳儀不迹秦曰昔在任人帝曰難之亦才矣任佞才乎才非吾徒之才也美行園公綺里季夏黃公角里先生避秦之亂隱居商山不朝髙祖而從太子帝客禮之言辭婁敬陸賈婁敬􅀃髙祖都􅀜中陸賈􅀃尉佗爲漢臣又作新語髙祖善之執正王陵申屠嘉吕后欲王諸吕陵執意不從免陵乃得封文帝佞幸鄧通至使慢禮嘉収通晁錯犯憲奏誅錯折節周昌汲黯折節謂直諫守儒轅固申公轅固守正以得辠於竇太后后使入圏擊彘申公守正以事楚王卒爲所亨此二人終不屈其道菑異董相夏侯勝京房董仲舒夏侯勝京房皆善推隂陽知災異或問蕭曹曰蕭也規曹也隨蕭何規剏於前如一曹參奉隨於後不失滕灌樊酈曰俠介四人前後俠輔髙帝叔孫通曰槧人也見事敏疾爰盎曰忠不足而談有餘挾私斬錯晁錯曰愚削諸侯以危身酷吏曰虎哉虎哉角而翼者也郅都寗成張湯杜周之徒貨殖曰蚊曰血國三千使捋踈飲水褐博没齒無愁也或問循吏曰吏也鄭子産公儀休孫叔敖之徒游俠曰竊國靈也靈命也朱家田仲郭解劇孟原涉之徒佞幸曰不料而巳籍孺鄧通周仁韓王孫李延年之徒或問近丗社稷之臣曰若張子房之智用行舎藏功成身退陳平之無悟内明竒畫外無違悟絳侯勃之果誅諸吕立文帝霍將軍之勇處廢興無所懼終之以禮樂則可謂社稷之臣矣此數公遭漢初定倉卒之制權應當時苟以救丗不能與稷契伊周同風未終先王禮樂或問公孫􅀪董仲舒孰邇欲知此二人用心誰近聖人之道曰仲舒欲爲而不可得者也􅀪容而巳矣利在安身或問近丗名卿曰若張廷尉之平張釋之惟存公平不阿於意雋京兆之見雋不疑當昭帝時有人自稱亡衞太子百官莫知其所不疑後至収而治之乃明巫成方遂也尹扶風之絜尹翁歸清廉有節不􅀍滋垢王子貢之介王子貢名尊成帝時人治任公正誅鉏豪強不避貴戚斯近丗名卿矣將旣聞名卿次問名將曰若條侯之守長平冠軍之征伐愽陸之持重可謂近丗名將矣請問古欲知古之良將曰鼓之以道德征之以仁義輿尸血刃皆所不爲也張騫蘇武之奉使也執節没身不屈王命雖古之膚使其猶劣諸膚美丗稱東方生之盛也言不純師行不純表其流風遺書蔑如也或曰隱者也曰昔之隱者吾聞其語矣又聞其行矣昔之隱者文王拘於羑里而重易六爻箕子隱於殷朝而爲周陳洪範接輿之在楚而歌鳯􅀆或曰隱道多端曰固也聖言聖行不逢其時聖人隱也賢言賢行不逢其時賢者隱也談言談行而不逢其時談者隱也昔者箕子之漆其身也狂接輿之􅀍其髮也欲去而恐罹害者也箕子之洪範接輿之歌鳯也哉或問東方生名過實者何也曰應諧不窮正諫穢德由此四事得名應諧似優似倡優不窮似哲正諫似直穢德似隱請問名曰詼達惡比欲知誰比曰非夷齊而是柳下惠戒其子以尚容首陽爲拙柱下爲工飽食安坐以仕易農依隱玩丗詭時不逢其滑稽之雄乎非夷齊是柳下惠戒其子以尚同依隱玩丗飽食安坐以仕易農此滑稽之雄者也或問柳下惠非朝隱者與此問發於東方朔也曰君子謂之不恭古者髙餓顯下禄隱孟子曰伯夷隘柳下惠不恭隘與不恭君子不由也然則餓顯不獨髙禄隱未爲下今發髙下之談蓋有厲乎素飱也妄譽仁之賊也妄毀義之賊也賊仁近郷原賊義近郷訕同乎流俗合乎汙丗衆皆􅀃之以爲是而不可與入堯舜之道者德之賊也孔子惡似而非者孟軻論之備矣或問子蜀人也請人曰有李仲元者人也蜀有嚴君平豈伊仲元君平巳顯仲元未聞其爲人也柰何曰不屈其意不累其身曰是夷惠之徒與曰不夷不惠可否之間也隨時之義治亂若鳯如是則奚名之不彰也曰無仲尼則西山之餓夫與東國之絀臣惡乎聞餓夫夷齊絀臣柳下惠也曰王陽貢禹遇仲尼乎曰明星皓皓華藻之力也與星雖皓皓有華藻然非能自顯耀也要須著天而後天下見之曰若是則奚爲不自髙曰皓皓者己也引而髙之者天也星著天而後天下見王陽貢禹時主所揚而後名顯也仲元雖有賢德而時不髙之故不彰子欲自髙邪君子行德俟命而巳仲元丗之師也見其貌者肅如也聞其言者愀如也觀其行者穆如也鄲聞以德詘人矣未聞以德詘於人也仲元畏人也言可畏敬或曰育賁言夏育孟賁亦使人畏也曰育賁也人畏其力而侮其德請條問其目也曰非正不視非正不聽非正不言非正不行夫能正其視聽言行者昔吾先師之所畏也所畏謂言不慙行不恥孔子憚焉如視不視聽不聽言不言行不行雖有育賁其猶侮諸揚子法言卷第十一􅀭子法言君子卷第十二夫君子之所以爲美布護蔓延在乎衆篇豈惟於此而表其篇目者絶筆在乎孝至無以加之而巳
