body:
  text: 李軌注或問君子言則成文動則成德何以也曰以其弸中而彪外也弸滿也彪文也積行内滿文辭外發般之揮斤羿之激矢君子不言言必有中也不行行必有稱也或問君子之柔剛曰君子於仁也柔於義也剛仁愛大德故柔屈其心節義大業故剛厲其志或問航不漿衝不薺有諸樓航不挹漿衝車不載薺曰有之或曰大器固不周於小乎曰斯械也君子不械械器也航衝之器充大則不能小矣君子不器無所不施或問孟子知言之要知德之奥曰非苟知之亦允蹈之允信也蹈履也或曰子小諸子孟子非諸子乎曰諸子者以其知異於孔子者也孟子異乎不異道同於仲尼也或曰孫卿非數家之書侻也彈駮數家侻合於敎至于子思孟軻詭哉譏此則謬曰吾於孫卿與見同門而異戸也同出一門而戸異同述一聖而乖詭惟聖人爲不異前聖後聖法制􅀇合大同仁義牛􅀇騂白睟而角其􅂛諸廟乎是以君子全其德色純曰睟或問君子似玉曰純淪温潤柔而堅玩而廉隊乎其不可形也君子於玉比德焉禮記論之備矣或曰仲尼之術周而不泰大而不小用之猶牛䑕也使牛捕䑕雖大無施曰仲尼之道猶四瀆也經營中國終入大海他人之道者西北之流也綱紀夷貉或入于沱或淪于漢淮南􅀃之用不如太史公之用也太史公聖人將有取焉實録不隱故可采擇淮南鮮取焉爾浮辯虚妄不可承信必也儒乎乍出乍入淮南也或出經或入經文麗用寡長卿也多愛不忍子長也史記叙事但美其長不貶其短故曰多愛仲尼多愛愛義也子長多愛愛竒也或曰甚矣傳書之不果也曰不果則不果矣苟非所能自可爾人以巫鼓巫鼓猶妄􅀃也妄􅀃傷義甚於不言一曰巫鼓之儔奚徒不果而巳乃復􅀉詼誕以自大假不學爲髙通故揚子旣吐觸情之談又發巫鼓之義或問聖人之言炳若丹青有諸曰吁是何言與吁者駭歎之聲丹青初則炳乆則渝渝乎哉丹青􅀄則炳然乆則渝變聖人之書乆而益明或曰聖人之道若天天則有常矣奚聖人之多變也曰聖人固多變天縱之也子游子夏得其書矣未得其所以書也宰我子貢得其言矣未得其所以言也顔淵閔子騫得其行矣未得其所以行也聖人以妙外往諸賢以方中來聖人之書言行天也天其少變乎所以應無方也或曰聖人自恣與何言之多端也曰子未覩禹之行水與一東一北行之無礙也君子之行獨無礙乎如何直往也水避礙則通于海君子避礙則通于理君子好人之好嘉其善也而忘己之好若不足也小人好己之惡我惡而不自知而忘人之好物好而不識彼或曰子於天下則誰與曰與夫進者乎或曰貪夫位也慕夫禄也何其與曰此貪也非進也夫進也者進於道慕於德殷之以仁義進而進退而退日孳孳而不自知勌者也或曰進進則聞命矣請問退進曰昔乎顔淵以退爲進後名而名先也天下鮮儷焉言少􅀟也或曰若此則何少於必退也曰必進易儷必退易儷也必苟也苟進則貪禄利苟退則慕僞名也進以禮退以義難儷也進退不失其正者君子也或曰人有齊死生同貧富等貴賤何如齊死生者莊生所謂齊物者非好死惡生之謂也而或者不諭故問曰作此者其有懼乎懼者畏義也此章有似駮莊子莊子之言逺有其旨不統其逺旨者逐往而不反所以辯之也各統其所言之㫖而兩忘其言則得其意也信死生齊貧富同貴賤等則吾以聖人爲囂囂通天地人曰儒道術深奥通天地而不通人曰伎伎藝偏能人必先作然後人名之先求然後人與之人理云云萬物動静無不由我以名彼者人必其自愛也而後人愛諸人必其自敬也而後人敬諸自愛仁之至也自敬禮之至也未有不自愛敬而人愛敬之者也或問龍􅀛鴻鵠不亦壽乎曰壽曰人可壽乎曰物以其性人以其仁物性之壽其質生存延年長也仁者之壽死而不亡名無窮也或問人言仙者有諸乎吁吾聞宓羲神農殁黃帝堯舜殂落而死文王畢孔子魯城之北獨子愛其死乎非人之所及也仙亦無益子之彚矣彚􅀋或曰聖人不師仙厥術異也聖人之於天下恥一物之不知仙人之於天下恥一日之不生曰生乎生乎名生而實死也或曰世無仙則焉得斯語曰語乎者非囂囂也與惟囂囂能使無爲有或問仙之實曰無以爲也有與無非問也問也者忠孝之問也言惟問忠與孝之事耳忠臣孝子偟乎不偟偟暇或問壽可益乎曰德曰回牛之行德矣曷壽之不益也曰德故爾如回之殘牛之賊也焉得爾言復甚也曰殘賊或壽曰彼妄也君子不妄論語曰人之生也直罔之生也幸而免􅀭子之談亦猶此義有生者必有死有始者必有終自然之道也因論神仙之事遂至原始要终以盡死生之􅀃也君子忠人況己乎小人欺己況人乎夫至人其猶先存諸己而後存諸人者言乎有其眞然後可以訓物況乃其身之不諭又安能諭諸人哉􅀭子法言卷第十二
