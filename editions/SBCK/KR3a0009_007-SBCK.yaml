seq: 7
front:
  text: 􅀭子法言重黎卷第十眞僞美惡成敗存亡人君之所以御乎其下人臣之所以事乎其上不可以不察也明此以南面堯之爲君也明此以北面舜之爲臣地
  hash: sha256:3620ed85cc6ceaaf1ea4dcb8ab59327d949124c9b7f81dae8a512188aeeb2e14
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3a0009_SBCK_010-1a}
body:
  text: 李軌注或問南正重司天北正黎司地今何僚也司主也僚官也少皥氏衰九黎亂德帝顓頊命重黎主天地也曰近羲近和堯有羲和之官王莽時亦復立焉聖王之立重黎羲和考其所以重黎羲和耳非莽所立也孰重孰黎曰羲近重和近黎羲主陽和主隂故云耳或問黃帝終始丗有黃帝之書論終始之運當孝文之時三千五百歳天地一周也曰託也假黄帝也昔者姒氏治水土而巫歩多禹姒氏禹也治水土渉山川病足故行跛也禹自聖人是以􅀑神猛獸蜂蠆蛇虺莫之螫耳而俗巫多效禹歩扁鵲盧人也而醫多盧太山盧人夫欲讎僞者必假眞讎􅀋禹乎盧乎終始乎言皆非也於是捨書而歎曰深矣揚子之談也王莽置羲和之官故上章􅀉微言以發重黎之問而此句明言眞僞之分也或問渾天曰落下閎營之鮮于妄人度之耿中丞象之幾乎幾乎莫之能違也幾近也落下閎爲武帝經營之鮮于妄人又爲武帝筭度之耿中丞名壽昌爲宣帝考象之言近近其理矣談天者無能違逺也請問蓋天欲知蓋天圖也曰蓋哉蓋哉應難未幾也再言蓋哉者應難以事未有近其理者或問趙丗多神何也如簡子之事非一故問之曰神怪茫茫若存若亡聖人曼云子不語怪力亂神或問子胥種蠡孰賢曰胥也俾吴作亂破楚入郢郢楚都也鞭尸掘平王墓而鞭其尸藉館君舎君之室大夫舎大夫之室皆不由德報父兄之恥於斯則無禮謀越諫齊不式式用不能去三諫不從於禮可去卒眼之夫差伐越越棲㑹稽請委國爲臣子胥諌曰吴不取越越必取吴又曰有吴無越有越無吴不改是矣吴將伐齊又諌日兵疲於外越必襲吴不聽遂伐齊反役夫差殺之將死曰吴其亡矣乎以吾眼置吴東門以􅀚越之滅吴種蠡不強諫而山棲俾其君詘社稷之靈而童僕又終弊吴賢皆不足邵也邵美至蠡䇿種而遁肥矣哉美蠡功成身退於此一舉最爲善或問陳勝吴廣曰亂此􅁀亂之人也曰不若是則秦不亡曰亡秦乎恐秦未亡而先亡矣夫有干越之劒者匣而藏之不敢用是寳之之至也況乃輕用其身而要乎非命之運不足爲福先適足以爲禍始或問六國並其巳乆矣一病一瘳迄始皇三載而咸皆屬秦也時激地保人事乎曰具請問事曰孝公以下強兵力農以􅁞食六國事也是人事也保問保何等曰東溝大河南阻髙山西采雍梁北鹵涇垠便則申否則蟠保也采食稅也涇涇水也激問激者何曰始皇方斧將相方刀六國方木將相方肉激也方比或問秦伯列爲侯衞在外候望羅衞天子卒吞天下而􅎼曽無以制乎曰天子制公侯伯子男也庸節庸用也節節度也節莫差於􅆫􅆫莫重於􅀕􅀕莫重於地地莫重於天旣盜土地又盜􅀕天則襄文宣靈其兆也始於四公以來者言周之衰非一朝一夕矣昔者襄公始􅆫西畤以祭白帝文宣靈宗興鄜密上下用事四帝而天王不匡反致文武胙宗尊也文公起鄜畤宣公起密畤靈公起上下畤是以四疆之内各以其力來侵攘肌及骨而􅎼獨何以制秦乎人之迷也其日固巳乆矣數丗之壞非一人之所支也或問嬴政二十六載天下擅秦嬴秦姓政始皇名秦十五載而楚楚項羽楚五載而漢五十載之際而天下三擅天邪人邪曰具備有之也周建子弟列名城班五爵流之十二當時雖欲漢得乎六國􅃖􅃖爲嬴弱􅁎卒之屏營嬴擅其政故天下擅秦卒終也之至也秦失其猷罷侯置守守失其微天下􅀌睽睽猶乖離也項氏暴強改宰侯王故天下擅楚擅楚之月有漢創業山南發迹三秦追項山東故天下擅漢天也山南漢中也三秦雍翟塞也人問人事者何也曰兼才尚㩲右計左數動謹於時人也天不人不因人不天不成天人合應功業乃隆或問楚敗垓下方死曰天也項羽爲髙祖所敗於垓下臨死歎曰非我用兵之罪乃天亡我諒乎信如羽之言否邪曰漢屈羣䇿羣䇿屈羣力屈盡楚憞羣䇿而自屈其力憞惡屈人者克克勝自屈者負負敗天􅂚故焉言無私親惟應善人或問秦楚旣爲天典命矣秦縊灞上楚分江西興廢何速乎典主曰天胙光德而隕明忒天之所福光顯有德而今隕之者明乎秦楚忒惡之所致昔在有熊髙陽髙辛唐虞三代咸有顯懿故天胙之爲神明主且著在天庭是生民之願也厥饗國乆長神明主主郊祀若秦楚強䦧震撲胎藉三正播其虐於黎苗子弟且欲喪之況於民乎況於􅀑神乎廢未速也不道早亡或問仲尼大聖則天􅂚不胙胙主曰無土言無土地可因然則舜禹有土乎曰舜以堯作土禹以舜作土道貴順理動無常因也因土以行化湯文也因聖以登禪舜禹也上無舜禹之時下無湯文之土故不胙耳若秦楚之胙非所以爲胙也或問聖人表裏表裏内外曰威儀文辭表也德行忠信裏也明乎得一而巳或問義帝初矯矯立劉龕南陽劉髙祖龕取也項救河北項羽二方分崩一離一合設秦得人如何設假曰人無爲秦也喪其靈乆矣非一朝一夕也韓信黥布皆劒立南面稱􅀌卒窮時戮無乃勿乎窮極或曰勿則無名如何曰名者謂令名也忠不終而躬逆焉攸令或問淳于越曰伎曲請問曰始皇方虎挒而梟磔噬士猶腊肉也越與亢眉終無橈辭可謂伎矣有才伎也仕无妄之國易有无妄卦此亦依義取譬食无妄之粟分无妄之橈自令之閒而不違可謂曲矣橈橈時䇿也自令與始皇併心爲無道或問茅焦厯井幹之死使始皇奉虚左之乗始皇以嫪毒事幽母咸陽宫諫者輙殺於井幹闕下茅焦厯井幹之死而諌始皇即駕輿執轡虚左親迎其母蔡生欲安項咸陽不能移又亨之其者未辯與項羽欲東還下邳蔡生􅀃使都咸陽旣不能移又爲所亨案漢書云韓生􅀭子云蔡生未詳韓蔡孰爲是曰生捨其木侯而謂人木侯亨不亦冝乎語在漢書焦逆訐而順守之雖辯劘虎牙矣逆意而諌順義而守可謂辯􅀃矣然劘近虎牙言其殆也或問甘羅之悟吕不韋張辟強之覺平勃皆以十二齡戊良乎甘羅戊之孫也以張唐之相燕割趙事發悟吕不韋也辟強張良之子也以孝惠崩吕太后哭不哀事􅁴悟陳平周勃也言此之時各年十二欲知自出其意爲復戊良敎之乎曰才也戊良不必父祖天才自然發其神心無假其父祖也或問酈食其􅀃陳留下敖倉􅀃齊罷厯下軍何辯也韓信襲齊以身脂鼎何訥也曰夫辯也者自辯也如辯人幾矣幾危也小有才未聞君子之大道也斯足以殺其軀而巳非長生乆視之道或問蒯通抵韓信不能下又狂之蒯通􅀃韓信令左漢右楚鼎足而立不能下之佯狂弃走曰方遭信閉如其抵信盡忠髙祖若門戸之閉無有巇􅂩也曰巇可抵乎曰賢者司禮小人司巇況拊鍵乎或問李斯盡忠胡亥極刑忠乎曰斯以留客秦甞欲逐諸侯之客斯上書以爲不可秦聽之是一事忠也至作相用狂人之言從浮大海立趙髙之邪􅀃廢沙丘之正阿意督責焉用忠始皇信妖言東浮滄海斯爲宰相不能諌止而從行及始皇崩於沙丘斯納趙髙之計矯廢扶蘇而立胡亥胡亥旣立縱暴斯諫之而見怒恐誅作督責之書以阿二丗之意此諸事皆非忠直也霍漢大將軍霍光曰始六之詔擁少帝之微摧燕上官之鋒處廢興之分堂堂乎忠難矣哉至顯不終矣顯光之夫人名也毒殺許皇后後光心知之而不討賊或問馮唐面文帝得廉頗李牧不能用也諒乎曰彼將有激也親屈帝尊信亞夫之軍至頗牧􅂚不用哉馮唐所知魏尚者爲雲中守擊匈奴有坐欲諌之故激文帝耳非平談也德用士則聞之矣於德又何如曰罪不孥止罪其身不收入妻孥宫不女出宫人嫁之令無怨曠館不新仍舊制也陵不墳葬於霸陽因山不起墳或問交曰仁問餘耳陣餘張耳曰光初有始無終竇灌曰凶終竇嬰灌夫甚相親友不勝相助犯觸田蚡並皆罹禍或問信曰不食其言食僞請人曰􅀳荀息趙程嬰公孫杵臼秦大夫鑿穆公之側此章全論不食言之德問義旣聞諸賢之信又問於義誰得曰事得其冝之謂義義者得死生之冝也不得死生之冝者非義也若程嬰杵臼兼乎信義也秦􅀳大夫可謂重食言之信蹈義則未也或問季布忍焉可爲也季布爲項羽將甞困髙祖髙祖旣立購之千金困迫乃爲奴賣與魯朱家曰能者爲之明哲不爲也言能忍辱貪生者乃爲之或曰當布之急雖明哲如之何曰明哲不終項仕如終項仕焉攸避苟患失之無所不至或問賢曰爲人所不能請人曰顔淵黔婁四皓韋􅀇顔淵簞瓢不改其操黔婁守正不邪死而益彰四皓白首髙尚其事韋􅀇漢丞相賢之少子也賢薨􅀇當襲封􅀍髪佯狂欲以讓兄或曰擬人必於其倫顔子至賢其殆庶幾黔婁四皓旣非其儔況以韋􅀇不亦甚哉釋曰顔淵之賢備體之賢韋􅀇之賢一至之賢王莾篡天下而韋􅀇讓一家於是乎賢耳亦猶論德行稱顔淵閔子騫冉伯牛仲弓凡此數子豈必皆與顔淵俱盡至賢之道哉問長者曰藺相如申秦而屈廉頗欒布之不塗朱家之不德直不疑之不校韓安國之通使相如申理於秦王屈意於廉頗義在史記欒布爲梁大夫奉使行髙祖誅梁王彭越布使還報命首下哭而祠歛之也朱家以季布有阨見滕公得解其急也而不使布知又終身不復見布直不疑常爲郎三人同室一人有金一人急歸誤持金去主意不疑不疑買金償之其後歸者持金還乃明之又人謗其淫嫂而乃無兄亦不自明也韓安國梁孝王内史時景帝疑梁王梁王大懼安國稱病去官隂往長安因長公主以解王事或問臣自得曰石太僕之對金將軍之謹張衞將軍之愼丙大夫之不伐善丞相石慶甞爲太僕時御上問輿中馬幾匹太僕以䇿數之畢對曰六匹金將軍名日磾爲人謹愼目不忤視數十年張衞將軍名安丗爲人周密重愼丞相丙吉宣帝少時以巫蠱事甞在獄中吉常救護又養視有恩紀而終不言官至御史大夫乳母述之然後乃知封博陽侯請問臣自失曰李貳師之執貳田祁連之濫帥韓馮翊之愬蕭趙京兆之犯魏貳師將軍李廣利􅀃劉屈􅈊立昌邑王爲太子二心不端武帝疑之遂降匈奴祁連將軍田廣明爲宣帝擊匈奴不到質淫婦人也韓馮翊名延壽愬御史大夫蕭望之與廩犠爲姦而焚其廩也趙京兆名廣漢疑魏丞相夫人殺傅婢圍捕之而皆無實反獲其罪也或問持滿曰扼扼欹器在魯桓公廟者欲人推心當如此器戒之揚王孫倮葬以矯丗悼厚葬也事見漢書曰矯丗以禮倮乎如矯世則葛溝尚矣古者未知葬送之禮死則裹之以􅁑投諸溝壑若王孫之矯丗此事復尚爲之矣言不可行也孝子仁人必有道以掩其親賢人君子必率禮以正其俗也或問周官曰􅀭子法言淵騫卷第十一
