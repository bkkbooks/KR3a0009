body:
  text: 學行之上也言之次也敎人又其次也咸無焉爲衆人此三者敎之大倫也皆無此三者民斯爲下矣或曰人羡乆生將以學也可謂好學巳乎曰未之好也學不羡仲尼志道朝聞夕死揚子好學不羡久生天之道不在仲尼乎不在在也言在仲尼也仲尼駕􅀃者也不在兹儒乎駕傳也兹此也如將復駕其所􅀃則莫若使諸儒金口而木舌金寶其口木質其舌傳言如此則是仲尼常在矣或曰學無益也如質何曰未之思矣夫有刀者礲諸有玉者錯諸不礲不錯焉攸用礲錯治之名礲而錯諸質在其中矣否則輟否不也輟止也此章各盡其性分而巳螟􅘾之子殪而逢蜾蠃祝之曰􅀋我􅀋我久則肖之矣速哉七十子之肖仲尼也肖􅀋也蜾蠃遇螟􅘾而受化久乃變成蜂爾七十子之􅀋仲尼又速於是學以治之思以精之朋友以磨之切磋琢磨名譽以崇之不倦以终之可謂好學也巳矣上士聞此五者勤而行之不可謂不好也孔子習周公者也顔淵習孔子者也羿逢蒙分其弓良捨其䇿般投其斧而習諸孰曰非也或曰此名也彼名也處一焉而巳矣曰川有瀆山有嶽髙而且大者衆人所不能踰也言諸賢之有妙藝猶百川之有四瀆衆山之有五嶽而川可度嶽可登髙而且大者惟聖人之道如天不可􅂛也或問丗言鑄金金可鑄與方術之家言能銷五石化爲黃金故有此問曰吾聞覿君子者問鑄人不問鑄金或曰人可鑄與曰孔子鑄顔淵矣鑄之令殆庶幾或人踧爾曰㫖哉問鑄金得鑄人踧爾驚貌㫖美也喜於問財而得爲人富莫大焉利莫重焉學者所以修性也視聽言貌思性所有也學則正否則邪師哉師哉桐子之命也桐洞也桐子洞然未有所知之時制命於師也再言之者歎爲人師制人善惡之命不可不明愼也務學不如務求師求師者就有道而正焉師者人之模範也模不模範不範爲不少矣傷夫欲爲而不得其道者多矣一閧之市不勝異意焉賣者欲貴買者欲賤非異如何一卷之書不勝異􅀃焉一閧之市必立之平一卷之書必立之師市無平必失貴賤之正書無師必謬典謨之旨習乎習歎所玩也以習非之勝是況習是之勝非乎於戲學者審其是而巳矣或曰焉知是而習之曰視日月而知衆星之蔑也仰聖人而知衆􅀃之小也大小之相形髙下之相傾學之爲王者事其巳久矣堯舜禹湯文武汲汲仲尼皇皇其巳久矣或問進曰水或曰爲其不捨晝夜與曰有是哉滿而後漸者其水乎水滿坎而後進人學博而後仕或問鴻漸曰非其往不往非其居不居漸猶水乎鴻之不失寒暑亦猶水之因地制行請問木漸曰止於下而漸於上者其木也哉亦猶水而巳矣止於下者根本也漸於上者枝條也士人操道義爲根本業貴無虧進禮學如枝條德貴日新吾未見好斧藻其德若斧藻其楶者也斧藻猶刻桷丹楹之飾楶櫨也鳥獸觸其情者也衆人則異乎人由禮義閑其邪情故異於鳥獸也賢人則異衆人矣奉宣訓誨聖人則異賢人矣制立禮敎禮義之作有以矣夫言訓物者其豈徒哉人而不學雖無憂如禽何是以聖人作爲禮以敎人使人以有禮知自别於禽獸學者所以求爲君子也求而不得者有矣夫未有不求而得之者也有其具猶或不能成其事無其志必不能立其業睎􅂹之馬亦􅂹之乗也睎顔之人亦顔之徒也或曰顔徒易乎曰睎之則是曰昔顔甞睎夫子矣正考甫甞睎尹吉甫矣正考甫宋襄公之臣也尹吉甫周宣王之臣也吉甫作周頌正考甫慕之而作商頌公子奚斯甞睎正考甫矣奚斯魯僖公之臣也慕正考甫作魯頌不欲睎則巳矣如欲睎孰禦焉或曰書與經同而世不尚治之可乎曰可或人啞爾􅀏曰湏以發䇿決科射以決科經以䇿試今徒治同經之書而不見䇿用故􅀏之曰大人之學也爲道小人之學也爲利子爲道乎爲利乎或曰耕不穫獵不饗耕獵乎曰耕道而得道獵德而得德是穫饗巳耕獵如此利莫大焉吾不覩參辰之相比也是以君子貴遷善遷善者聖人之徒與去惡遷善兼揔仁義也徒猶弟子也百川學海而至于海行之不息歸之不巳丘陵學山不至于山是故惡夫畫也畫止頻頻之黨甚於􅢟斯亦賊夫糧食而巳矣􅢟斯羣行啄􅂖諭人黨比游宴賊害糧食有損無益也朋而不心面朋也友而不心面友也匿怨仲尼之所恥面朋揚子之所譏或謂子之治産不如丹圭之富曰吾聞先生相與言則以仁與義市井相與言則以財與利如其富如其富或曰先生生無以養也死無以葬也如之何曰以其所以養養之至也以其所葬葬之至也養不必豐葬不必厚各順其冝惟義所在或曰猗頓之富以爲孝不亦至乎顔其餧矣曰彼以其粗顔以其精彼以其回顔以其貞回邪也貞正也顔其劣乎顔其劣乎至足者外物不能累其内或曰使我紆朱懷金其樂不可量巳曰紆朱懷金者之樂不如顔氏子之樂顔氏子之樂也内至樂内足不待於外紆朱懷金者之樂也外内樂不足是故假於金朱外物爾乃􅀃樂也或曰請問屢空之内欲以此義嘲揚子也曰顔不孔雖得天下不足以爲樂然亦有苦乎曰顔苦孔之卓之至也或人瞿然曰兹苦也祇其所以爲樂也與曰有敎立道無心仲尼有學術業無心顔淵或曰立道仲尼不可爲思矣術業顔淵不可爲力矣曰未之思也孰禦焉孔子習周公顔回習孔子無止之者揚子法言卷第一
