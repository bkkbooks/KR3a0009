seq: 5
front:
  text: 李軌注或問明曰微或曰微何如其明也曰微而見之明其誖乎聦明其至矣乎在於至妙之人不聦實無耳也不明實無目也敢問大聦明曰􅅭􅅭乎惟天爲聦惟天爲明夫能髙其目而下其耳者匪天也夫目髙則無所不照耳下則無所不聞言人髙其目則覩德義之經聖人之道下其耳則聞芻蕘之言負薪之語或問小每知之可謂師乎曰是何師與是何師與天下小事爲不少矣巧厯所不能筭每知之是謂師乎師之貴也知大知也大知者聖道小知之師亦賤矣致逺恐泥是以君子不爲故不貴也孟子疾過我門而不入我室或曰亦有疾乎曰摭我華而不食我實華者美麗之賦實者法言太􅀇或謂仲尼事彌其年蓋天勞諸病矣夫曰天非獨勞仲尼亦自勞也天病乎哉天樂天聖樂聖或問鳥有鳯獸有麟鳥獸皆可鳯麟乎言凡鳥獸之不可得及鳯麟亦猶凡人不可彊通聖人之道曰羣鳥之於鳯也羣獸之於麟也形性豈羣人之於聖乎鳥獸大小形性各異人之於聖腑藏正同或曰甚矣聖道無益於庸也聖讀而庸行盍去諸曰甚矣子之不達也聖讀而庸行猶有聞焉去之抏也抏秦者非斯乎投諸火斯李斯或問人何尚曰尚智曰多以智殺身者何其尚曰昔乎臯陶以其智爲帝謨殺身者逺矣箕子以其智爲武王陳洪範殺身者逺矣仲尼聖人也或者劣諸子貢子貢辭而精之然後廓如也精明於戲觀書者違子貢雖多亦何以爲盛哉成湯丕承也文王淵懿也或問丕承曰由小致大不亦丕乎革夏以天不亦承乎淵懿曰重易六爻不亦淵乎浸以光大不亦懿乎或問命曰命者天之命也非人爲也人爲不爲命請問人爲曰可以存亡可以死生非命也是人爲者命不可避也大理然者也或曰顔氏之子冉氏之孫曰以其無避也若立巖牆之下動而徴病行而招死命乎命乎自貽伊戚吉人凶其吉居安思危存不忘亡凶人吉其凶以小惡爲無傷而不去也惡積而罪彰滅身之凶至也辰乎辰歎時逝也􅂚來之遲去之速也君子競諸進德脩業欲及時也􅘱言敗俗􅘱好敗則姑息敗德則法君子謹於言愼於好亟於時亟急吾不見震風之能動聾聵也雷風非不猛不能動聾聵聖敎非不明不能化頑嚚之人或問君子在治曰若鳯在亂曰若鳯或人不諭曰未之思矣曰治則見亂則隱隨時之義美之大者治見亂隱鳯之德也鴻飛􅁳􅁳弋人何慕焉君子濳神重􅀇之域丗網不能制禦之鷦明遴集食其絜者矣遴集者􅀋聚羣游得其所也鷦眀非竹實之絜不食君子非道德之禄不居鳯鳥蹌蹌匪堯之庭蹌蹌者歩趾之威儀也言其降歩于堯之庭非堯之庭則不降歩也亨龍濳􅂛其貞利乎貞正也利者義之和美龍潛􅂛得正之利或曰龍何如可以貞利而亨曰時未可而濳不亦貞乎得濳之正時可而􅂛不亦利乎得義之和濳􅂛在己用之以時不亦亨乎行止不失其所得嘉之㑹或問活身曰明哲旣明且哲以保其身或曰童蒙則活何乃明哲乎曰君子所貴亦越用明保愼其身也越於如庸行翳路衝衝而活君子不貴也楚兩龔之絜其淸矣乎楚人龔君賔龔長倩也當成哀之丗並爲諌大夫俱著令聞號曰兩龔王莽篡位之後崇顯名賢復欲用之稱疾遂終身不仕絜清其志者也蜀莊沈􅁳蜀人姓莊名遵字君平沈􅁳猶􅀇寂泯然無迹之貌是故成哀不得而利之王莽不得而害也蜀莊之才之珍也不作苟見不治苟得所謂沈冥也乆幽而不改其操雖隋和何以加諸乆幽謂賣卜於成都舉兹以旃不亦寶乎吾珍莊也居難爲也人所不能非難如何不慕由即夷矣何毚欲之有許由伯夷無欲之至旣不可害亦不可利或問堯將讓天下於許由由恥有諸曰好大者爲之也顧由無求於丗而巳矣允喆堯儃舜之重則不輕於由矣允信也喆知也好大累克巢父洗耳不亦冝乎累積克勝也積大言以相勝也巢父洗耳河濵河主逐之皆非通理之談靈􅂣之威冝夜矣乎靈場􅀑神之壇祠也靈壇所以爲威可􅄀夜不可經白日偏謬之談可獨􅀃不可校諸實朱鳥翾翾歸其肆矣朱鳥燕别名也肆海肆也或曰奚取於朱鳥哉曰時來則來時往則往取其春來秋往隨時冝也能來能往者朱鳥之謂與不愆寒暑之冝能知去就之分或問韓非作􅀃難之書而卒死乎􅀃難敢問何反也韓非作書言􅀃難是也而西入關干秦王伏劒死雲陽故曰何反曰􅀃難蓋其所以死乎曰何也曰君子以禮動以義止合則進否則退確乎不憂其不合也夫􅀃人而憂其不合則亦無所不至矣或曰􅀃之不合非憂耶曰􅀃不由道憂也由道而不合非憂也譏其本自挾詭情以􅀃秦或問哲曰旁明厥思問行曰旁通厥德動靜不能由一塗由一塗不可以應萬變應萬變而不失其正者惟旁通乎揚子法言卷第六揚子法言寡見卷第七大道甚夷而民好徑此其所以發􅀭德音
