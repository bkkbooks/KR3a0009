body:
  text: 李軌注吾寡見人之好假者也邇文之視邇言之聽假則偭焉歎人皆好視聽諸子近言近􅀃至於聖人逺言逺義則偭然而不視聽或曰曷若兹之甚也先王之道滿門言此談過也學先王之道者亦滿門耳曰不得巳也得巳則巳矣不得巳者官有䇿試者也得巳而不巳者寡哉夫以䇿試而後學者爲官也得不䇿試而好學者爲己也爲己之學也内爲官之學也外外之與内由南之與北相去甚逺是以􅁣其少也好盡其心於聖人之道者君子也人亦有好盡其心矣未必聖人之道也多聞見而識乎正道者至識也多聞見而識乎邪道者迷識也君子多聞見而心愈真也小人多聞見而心愈僞也如賢人謀之美也詘人而從道如小人謀之不美也詘道而從人或問五經有辯乎曰惟五經爲辯􅀃天者莫辯乎易惟變所適應四時之宜􅀃事者莫辯乎書尚書論政事也􅀃體者莫辯乎禮正百事之體也􅀃志者莫辯乎詩在心爲志發言爲詩􅀃理者莫辯乎春秋屬辭比事之義捨斯辯亦小矣春木之芚兮援我手之鶉􅀆春木芒然而生譬若孔氏啓導人心有似援手而進言其純美也去之五百歳其人若存􅀆或曰譊譊者天下皆􅀃也奚其存曰曼是爲也天下之亡聖也乆矣其義雖存言天下無復能尊用聖道者乆故也􅈱􅈱之子各識其親譊譊之學各習其師精而精之是在其中矣或曰良玉不彫美言不文何謂也曰玉不彫璵璠不作器言不文典謨不作經或問司馬子長有言曰五經不如老子之約也當年不能極其變終身不能究其業言其要妙曰若是則周公惑孔子賊古者之學耕且養三年通一無訓解故今之學也非獨爲之華藻也又從而繡其其鞶􅍤惡在老不老也鞶大帶也􅍤佩巾也衣有華藻文繡書有經傳訓解也文繡之衣分明易察訓解之書灼然易曉或曰學者之􅀃可約邪疾夫􅀃學繁多故欲約省之也曰可約解科言自可令約省耳但當使得其義㫖不失其科條或曰君子聽聲乎曰君子惟正之聽亦聽耳但不邪荒乎淫拂乎正沈而樂者君子不聽也或問侍君子以愽乎曰侍坐則聽言有酒則觀禮焉事愽乎或曰不有愽弈者乎曰爲之猶賢於巳耳今之所論自謂侍於君子也侍君子者賢於巳乎君子不可得而侍也人師難遭也侍君子晦斯光窒斯通亡斯有辱斯榮敗斯成如之何賢於巳也窒塞鷦明沖天不在六翮乎拔而傅尸鳩其累矣夫拔鷦明之翼以傅尸鳩不能沖天適足爲累耳諭授小人以大位而不能成大功也又言學小􅀃不能成大儒雷震乎天風薄乎山雲徂乎方雨流乎淵徂往也方四方其事矣乎言此皆天之事矣人不得無事也天事雷風雲雨人事詩書禮樂也魏武侯與吴起浮於西河寶河山之固起曰在德不在固辭在史記曰美哉言乎使起之固兵每如斯則太公何以加諸或問周寶九鼎寶乎曰器寶也器寶待人而後寶道存則器不亡道亡則器不存齊桓晉文以下至於秦兼其無觀巳或曰秦無觀奚其兼曰所謂觀觀德也如觀兵開闢以來未有秦也秦以兵兼而不以德莽以詐篡而不以道言秦兵之無可觀則莽之篡不言可知或問魯用儒而削何也􅀭子貴儒學而賤兵彊魯國甞爲齊楚所侵所以譏問曰魯不用儒也昔在􅁎公用於周而四海皇皇奠枕于京皇皇歸美安枕而卧以聽於京師孔子用於魯齊人章章歸其侵疆章章悚懼也一時暫用猶至於是况能終之乎魯不用眞儒故也如用眞儒無敵於天下安得削萬物將自賔灝灝之海濟樓航之力也濟度也言度大海在舟船興大治在禮樂航人無楫如航何雖有舟航而無楫櫂不能濟難雖有民人而無禮樂不能熈化或曰奔壘之車沈流之航可乎言治國及修身者如車奔舟覆故欲救之曰否否不也或曰焉用智失智者貴能解患救難也今有患難不能解救故曰焉用智曰用智於未奔沈言奔沈吾猶人也必也使無奔沈大寒而後索衣裘不亦晚乎禦災在於未發思患在乎預防乗國者其如乗航乎航安則人斯安矣航傾則人危法亂則國亡惠以厚下民忘其死忠以衞上君念其賞自後者人先之自下者人髙之欲上必以其言下之欲先必以其身後之處上而民不重在前而民不害誠哉是言也誠信也或曰􅀪羊榷利而國用足盍榷諸盍何不也曰譬諸父子爲其父而榷其子縱利如子何有若譏十二之稅揚子貶榷利之權􅁲式之云不亦匡乎匡正也桑􅀪羊榷利之時天下大旱􅁲式曰獨烹􅀪羊天乃􅀨式之所言大匡正矣或曰因秦之法淸而行之亦可以致平乎曰譬諸琴瑟鄭衞調俾夔因之亦不可以致簫韶矣俾使也譬諸琴瑟調正則合雅鄭衞則爲淫秦法酷暴雖欲使聖人因之不可以致康哉鄭衞本淫雖使夔拊之而不可致簫韶或問處秦之世抱周之書益乎曰舉世寒貂狐不亦燠乎貂狐之裘於體温燠或曰炎之以火沃之以湯燠亦燠矣言秦焚書坑儒於湯火之中但苦大熱耳此謂或人戲嘲􅀭子之辭曰燠哉燠哉時亦有寒者矣歎秦之無道也時亦有寒者謂四皓隱居尸子避地斯皆清涼其身不燠秦之湯火非其時而望之非其道而行之亦不可以至矣天由其時人由其道非時之有望之不可得見非道而行之不可得至秦之有司負秦之法度秦法巳酷吏又毒之秦之法度負聖人之法度秦􅀪違天地之道而天地違秦亦􅀪矣失德之報何其驗哉揚子法言卷第七揚子法言五百卷第八夫言者所以通理也五百歳一聖非經通之言故辨其惑罔之迷也
