seq: 2
front:
  text: 􅀭子法言吾子卷第二崇本在乎抑末學大道絶乎小辯也
  hash: sha256:dd1ba8a7b3780ab4a3c76d0a468c78343dc945f6cdda19b39601ce0f399621d2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3a0009_SBCK_001-5b}
body:
  text: 李軌注或問吾子少而好賦曰然童子彫蟲􅂐刻少年之事俄而曰壯夫不爲也悔作之也或曰賦可以諷乎曰諷乎駭歎之聲也諷則巳不巳吾恐不免於勸也相如作大人賦武帝覽之乃飄飄然有陵雲之志或曰霧縠之組麗言可好也曰女工之蠹矣霧縠雖麗蠹害女工辭賦雖巧惑亂聖典劒客論曰劒可以愛身言撃劒可以衞護愛身辭賦可以諷諭勸人也曰狴犴使人多禮乎言狴犴使人多禮辭賦使人放蕩惑亂也或問景差唐勒宋玉枚乗之賦也益乎曰必也淫言無益於正也淫則柰何曰詩人之賦麗以則陳威儀布法則辭人之賦麗以淫奢侈相勝靡麗相越不歸於正也如孔氏之門用賦也則賈誼升堂相如入室矣如其不用何或問蒼蠅紅紫蒼蠅間于白黒紅紫似朱而非朱也曰明視問鄭衞之似曰聦聽或曰朱曠不丗如之何曰亦精之而巳矣或問交五聲十二律也或雅或鄭何也交猶和也五聲宫商角徴羽也十二律者十二月之律吕也曰中正則雅多哇則鄭中正者宫商温雅也多哇者淫聲繁越也請問本曰黃鍾以生之中正以平之確乎鄭衞不能入也聲平和則鄭衞不能入也學業常正則雜􅀃不能傾也事得本則邪佞不能謬也或曰女有色書亦有色乎曰有女惡華丹之亂窈窕也書惡淫辭之淈法度也或問屈原智乎曰如玉如瑩爰變丹靑如其智如其智夫智者逹天命審行廢如玉如瑩磨而不磷今屈原放逐感激爰變雖有文彩丹青之倫爾或問君子尚辭乎曰君子事之爲尚貴事實賤虚辭事勝辭則伉辭勝事則賦事事辭稱則經夫事功多而辭美少則聽聲者伉其動也事功省而辭美多則賦頌者虚過也事辭相稱乃合經典足言足容德之藻矣足言夸毗之辭足容戚施之面言皆藻飾之僞非篤實之真或問公孫龍詭辭數萬以爲法法與曰斷木爲棊梡革爲鞠亦皆有法焉不合乎先王之法者君子不法也大匠之誨人也必以規矩君子之訓物也必以仁義觀書者譬諸觀山及水􅂛東岳而知衆山之峛崺也況介丘乎浮滄海而知江河之惡沱也況枯澤乎舍舟航而濟乎瀆者末矣舍五經而濟乎道者末矣末無弃常珍而嗜乎異饌者惡覩其識味也委大聖而好乎諸子者惡覩其識道也山􅠌之蹊不可勝由矣向牆之戸不可勝入矣曰惡由入曰孔氏孔氏者戸也曰子戸乎曰戸哉戸哉吾獨有不戸者矣惡夫不由聖人之道者也或欲學蒼頡史篇多知竒難之字故欲學之曰史乎史乎愈於妄闕也再言史乎者善之也言勝於不學而妄名不知而闕廢或曰有人焉曰云姓孔而字仲尼入其門􅂛其堂伏其几襲其裳則可謂仲尼乎曰其文是也其質非也敢問質曰羊質而虎皮見草而􅀃見豺而戰戰悸忘其皮之虎矣羊假虎皮見豺則戰人假僞名考實則窮聖人虎別其文炳也如虎之别百獸炳然殊異君子豹別其文蔚也蔚然有文章而次虎也辯人貍別其文萃也萃然有文采異於貒貉貍變則豹豹變則虎好書而不要諸仲尼書肆也賣書市肆不能釋義好􅀃而不要諸仲尼􅀃鈴也鈴以諭小聲猶小􅀃不合大雅君子言也無擇非法不言何所擇乎聽也無淫非正不聽何有淫乎擇則亂淫則辟言有可擇則穢亂聽有淫侈則邪辟述正道而稍邪哆者有矣未有述邪哆而稍正也習實生常孔子之道其較且易也言較然易知或曰童而習之白紛如也言皓首而亂何其較且易曰謂其不姦姦不詐詐也不姦姦者以虚受人也不詐詐者以正敎人也如姦姦而詐詐雖有耳目焉得而正諸姦姦者以姦欺姦詐詐者以詐欺詐多聞則守之以約所守簡要多見則守之以卓所覩廣逺寡聞則無約也寡見則無卓也少聞無要約之守少見無卓絶之照緑衣三百色如之何矣紵絮三千寒如之何矣緑衣雖有三百領色􅄂不可人宗廟紵絮雖有三千􅁓單薄不可以禦冬寒文賦􅄂子不可以經聖典君子之道有四易簡而易用也要而易守也炳而易見也法而易言也震風陵雨陵􅁀然後知夏屋之爲帡幪也帡幪蓋覆虐政虐丗然後知聖人之爲郛郭也郛郭限内外禦姦宄聖人崇仁義正愆違古者􅀭墨塞路孟子辭而闢之廓如也後之塞路者有矣􅀼自比於孟子或曰人各是其所是而非其所非將誰使正之曰萬物紛錯則懸諸天衆言淆亂則折諸聖或曰惡覩乎聖而折諸曰在則人亡則書其綂一也揚子法言卷第二揚子法言修身卷第三求己以反本守母以存子此其大要李軌注修身以爲弓矯思以爲矢立義以爲的奠而後發發必中矣無敵於天下也人之性也善惡混混雜也荀子以爲人性惡孟子以爲人性善而􅀭子以爲人性雜三子取譬雖異然大同儒敎立言㝷統厥義兼通耳惟聖罔念作狂惟狂克念作聖揚子之言備極兩家反覆之喻於是俱暢修其善則爲善人修其惡則爲惡人所謂混也氣也者所以適善惡之馬也與御氣爲人若御馬渉道由通衢則迅利適惡路則駑蹇或曰孔子之事多矣不用則亦勤且憂乎曰聖人樂天知命樂天則不勤知命則不憂或問銘曰銘哉銘哉有意於愼也歎美戒愼之至聖人之辭可爲也使人信之所不可爲也是以君子彊學而力行貴令信敬素著珍其貨而後市貨珍價必貴修其身而後交身修交必固善其謀而後動成道也無所不通君子之所愼言禮書愼言無口過愼禮無失儀言禮是愼兼之於書上交不諂下交不驕則可以有爲矣或曰君子自守奚其交曰天地交萬物生人道交功勲成奚其守天地之交以道人道之交以理俱當順天人之道理而無所迕逆也好大而不爲大不大矣好髙而不爲髙不髙矣仰天庭而知天下之居卑也哉覩聖道然後知諸子之淺小公儀子董仲舒之才之邵也公儀子爲魯相婦織於室遣去之園有葵拔弃之不與民爭利也董仲舒爲江都相下帷三年不闚園此二子才德髙美使見善不明用心不剛儔克爾儔誰或問仁義禮智信之用曰仁宅也義路也禮服也智燭也信符也仁如居宅可以安身義如道路可以安行禮如衣服可以表儀智如燈燭可以照察信如符契可以致誠處宅由路正服明燭執符君子不動動斯得矣有意哉孟子曰夫有意而不至者有矣未有無意而至者也或問治已曰治己以仲尼或曰治已以仲尼仲尼奚寡也曰率馬以􅂹不亦可乎或曰田圃田者莠喬喬思逺人者心忉忉雖有喬喬之莠其􅂖不可得雖懷忉忉之思逺人不可見言仲尼之道深逺不可以治學曰日有光月有明三年不目日視必盲三年不目月精必矇不見日月而盲矇以諭不學爲闇人熒魂曠枯糟莩曠沈莩熟也擿埴索塗冥行而巳矣埴土也盲人以杖擿地而求道雖用白日無異夜行夜行之義面墻之諭也或問何如斯謂之人曰取四重去四輕則可謂之人曰何謂四重曰重言重行重貌重好言重則有法行重則有德貌重則有威好重則有觀可觀望也敢問四輕曰言輕則招憂行輕則招辜貌輕則招辱好輕則招淫禮多儀美其多威儀也或曰日􅉴不食􅁏􅁏必乾日􅉴不飲酒酒必酸賔主百拜而酒三行不巳華乎曰實無華則野華無實則賈華實副則禮華實相副然後合禮文質彬彬然後君子山雌之肥其意得乎或曰回之簞瓢臞如之何曰明明在上百官牛羊亦山雌也闇闇在上簞瓢捽茹亦山雌也何其臞千鈞之輕烏獲力也簞瓢之樂顔氏德也千鈞之重烏獲舉之而輕多力耳簞食瓢飲顔氏處之而樂德盛也或問犂牛之鞹與􅀇騂之鞹有以異乎曰同然則何以不犂也曰將致孝乎􅀑神不敢以其犂也宗廟貴純色君子貴純德如刲羊刺豕罷賔犒師惡在犂不犂也刲羊義見易有德者好問聖人或曰魯人鮮德奚其好問仲尼也言魯定哀公孟仲季孫皆問仲尼曰魯未能好問仲尼故也如好問仲尼則魯作東周矣或問人有􅀝孔子之牆􅁌鄭衞之聲誦韓莊之書則引諸門乎曰在夷貉則引之􅀝門牆則麾之莊周與韓非同貫不亦甚乎惑者甚衆敢問何謂也曰莊雖借諭以爲通妙而丗多不解韓誠觸情以言治而險薄傷化然則周之益也其利迂緩非之損也其害交急仁旣失中兩不與耳亦不以齊其優劣比量多少也統斯以往何嫌乎哉又問曰自此以下凡論諸子莫不連言乎莊生者何也荅曰妙指非見形而不及道者之言所能統故每遺其妙􅀉而去其麤迹一以貫之應近而巳惜乎衣未成而轉爲裳也衣上也裳下也聖典本也諸子末也轉上爲下捨木而逐末者是可惜聖人耳不順乎非惟正之聽口不肄乎善性與天道發言成章不肄習賢者耳擇口擇耳擇所聽口擇所言衆人無擇焉觸情任意或問衆人曰富貴生苟貪冨貴不義而生賢者曰義行義以逹其道聖人曰神神德行也觀乎賢人則見衆人觀乎聖人則見賢人觀乎天地則見聖人天下有三好衆人好己從賢人好己正聖人好己師天下有三檢衆人用家檢家人自其爲法賢人用國檢聖人用天下檢天下有三門由於情欲入自禽門所謂觸情由於禮義入自人門由於獨智入自聖門或問士何如斯可以禔身禔安曰其爲中也􅀪深中者心志也􅀪深猶敦重也其爲外也肅括則可以禔身矣外者威儀也肅敬也括法也君子微愼厥德悔吝不至何元憞之有微纎也悔吝小疵也元憞大惡上士之耳訓乎德訓順下士之耳順乎己苟欲令人順己言不慙行不恥者孔子憚焉言不違理故形不慙行不邪僻故心不恥言行能如此仲尼所敬憚難也揚子法言卷第三
