seq: 4
front:
  text: 揚子法言問神卷第五測于天地之情者濳之乎心也心能則乎天地之情則入乎神矣
  hash: sha256:ffb94d2f2abce1b2eacf7fa61ec38ba3c1afab02c152e2caf422fb4cc903b66b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3a0009_SBCK_004-5b}
body:
  text: 李軌注或問神曰心請問之曰濳天而天濳地而地唯其所濳天地神明而不測者也心之濳也猶將測之況於人乎況於事倫乎敢問濳心于聖曰昔乎仲尼濳心於文王矣逹之逹通顔淵亦濳心於仲尼矣未逹一間耳其殆庶幾神在所濳而巳矣神道不逺濳心則是天神天明照知四方天以神明光燭幽􅁳照曜四方人以濳心鉤深致逺探􅄨索隱天精天粹萬物作􅀋天以精粹覆萬物各成其􅀋人以濳心考校同異披􅀭精義人心其神矣乎操則存舎則亡人心如神變化無方操而持之則義存舎而廢之則道亡操而不舎則道義光大能常操而存者其惟聖人乎聖人存神索至存其精神探幽索至成天下之大順致天下之大利順事而無逆利物而無害和同天人之際使之無間也至化混然歸於一也龍蟠于泥蚖其肆矣惟聖知聖惟龍知龍愚不知聖蚖不知龍聖道未彰羣愚玩矣龍蟠未􅂛蚖其肆矣蚖哉蚖哉惡覩龍之志也與歎之甚也或曰龍必欲飛天乎曰時飛則飛時濳則濳時可而􅂛未可而濳旣飛且潛義兼出處食其不妄形其不可得而制也與飲食則不妄有形而不可制也曰聖人不制則何爲乎羑里曰龍以不制爲龍聖人以不手爲聖人手者桎梏之屬或曰經可損益與曰易始八卦而文王六十四其益可知也詩書禮春秋或因或作而成於仲尼其益可知也或因者引而伸之或作者又加春秋故夫道非天然應時而造者損益可知也或曰易損其一也雖惷知闕焉至書之不備過半矣而習者不知本百篇今五十九故曰過半惜乎書序之不如易也歎恨書序雖存獨不如易之可推㝷曰彼數也可數焉故也如書序雖孔子亦末如之何矣數存則雖愚有所不失數亡則雖聖有所不得昔之􅀃書者序以百叙以百篇而酒誥之篇俄空焉今亡夫秦焚書漢興求集之酒誥又亡一簡中者先師猶俄而空之今漸亡虞夏之書渾渾爾深大啇書灝灝爾夷曠周書噩噩爾不阿借也下周者其書譙乎下周者秦言酷烈也或問聖人之經不可使易知與嫌五經之難解也曰不可天俄而可度則其覆物也淺矣地俄而可測則其載物也薄矣大哉天地之爲萬物郭五經之爲衆􅀃郛莫有不存其内而能岀乎其外者也或問聖人之作事不能昭若日月乎何後丗之訔訔也曰瞽曠能黙瞽曠不能齊不齊之耳狄牙能喊狄牙不能齊不齊之口君子之言幽必有驗乎明逺必有驗乎近大必有驗乎小微必有驗乎著無驗而言之謂妄君子妄乎不妄言必有中言不能逹其心書不能逹其言難矣哉惟聖人得言之解得書之體白日以照之江河以滌之灝灝乎其莫之禦也有所發明如白日所照有所蕩除如江河所滌灝顥洪盛無能當之者面相之辭相適捈中心之所欲通諸人之嚍嚍者莫如言嚍嚍猶憤憤也彌綸天下之事記久明逺著古昔之㖧㖧傳千里之忞忞者莫如書㖧㖧目所不見忞忞心所不了故言心聲也書心畫也聲發成言畫紙成書書有文質言有史野二者之來皆由於心聲畫形君子小人見矣察言觀書斷可識也聲畫者君子小人之所以動情乎聖人之辭渾渾若川渾渾洪流也順則便逆則否者其惟川乎或曰仲尼聖者與何不能居丗也曽范蔡之不若曰聖人者范蔡乎若范蔡其如聖何或曰淮南太史公者其多知與曷其雜也曰雜乎雜歎不純也人病以多知爲雜惟聖人爲不雜書不經非書也言不經非言也言書不經多多贅矣動而愈僞或曰述而不作􅀇何以作曰其事則述其書則作育而不苗者吾家之童烏乎童烏子雲之子也仲尼悼顔淵苗而不秀子雲傷童烏育而不苗九齡而與我􅀇文顔淵弱冠與仲尼言易童烏九齡而與揚子論􅀇或曰􅀇何爲曰爲仁義曰孰不爲仁孰不爲義曰勿雜也而巳矣純則巧僞息雜則姦邪興或問經之艱易曰存亡或人不諭曰其人存則易亡則艱不爲善惡改常日月用之不爲賢愚易光必我知而爲之光亦小矣或曰君子病没丗而無名盍勢諸名卿可幾也盍何不也勢親也名卿親執政者也言何不與之合勢以近名也此義猶王孫賈勸仲尼媚於竈也曰君子德名爲幾積德然後近名梁齊趙楚之君非不富且貴也惡乎成名四國漢時諸侯王谷口鄭子眞不屈其志而耕乎巖石之下名震于京師豈其卿豈其卿審乎自得而巳矣􅁣夫逐物以喪眞而不能求己以絶僞或問人曰艱知也艱難也人之難知乆矣堯舜之聖而難任人莊周亦云厚貌深情曰焉難未諭其難所以又問曰太山之與螘垤江河之與行潦非難也形彰於外視之易見大聖之與大佞難也物形外顯人神内藏外顯易察内藏難明烏呼能別似者爲無難或問鄒莊有取乎曰德則取愆則否愆過也否不也何謂德愆曰言天地人經德也否愆也論天地人經是德也不爲過愆可采取也愆欲問其義語君子不出諸口揚子法言卷第五揚子法言問明卷第六防姦必有其統揆物必以其度察見至微之理探射幽隱之情
