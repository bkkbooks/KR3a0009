body:
  text: 李軌注或問五百歳而聖人出有諸孟軻史遷皆有此言曰堯舜禹君臣也而並文武周公父子也而處湯孔子數百歳而生因往以推來雖千一不可知也千歳一人一歳千人不可知也聖人有以擬天地而參諸身乎稟天地精靈合德齊明是以首擬天腹擬地四支合四時五藏合五行動如風雷言成文章也或問聖人有詘乎曰有曰焉詘乎曰仲尼於南子所不欲見也陽虎所不欲敬也見所不見敬所不敬不詘如何曰衛靈公問陳則何以不詘曰詘身將以信道也如詘道而信身雖天下不爲也仲尼之敬陽虎􅀭子之臣王莽所詘者形也於神何時撓哉諸如此例學者冝識其旨聖人重其道而輕其禄衆人重其禄而輕其道聖人曰於道行與衆人曰於禄殖與聖人以行道爲務凡人以禄食爲先昔者齊魯有大臣史失其名以道事君不可則止爲大臣也史失其名者不書其名也曰何如其大也曰叔孫通欲制君臣之儀徴先生於齊魯所不能致者二人髙帝時叔孫通爲奉常欲制君臣之禮乗亂之餘權時之制不合聖典雖盡其美未盡其善故不能致之曰若是則仲尼之開跡諸侯也非邪曰仲尼開迹將以自用也欲行其道制素法也如委己而從人雖有規矩準繩焉得而用之或問孔子之時諸侯有知其聖者與曰知之知之則􅂚爲不用曰不能曰知聖而不能用也可得聞乎曰用之則冝從之從之則弃其所習逆其所順強其所劣􅂢其所能衝衝如也非天下之至孰能用之􅂢棄或問孔子知其道之不用也則載而惡乎之欲知載送道術何所之詣曰之後丗君子許來哲曰賈如是不亦鈍乎言畜貨以遺後畜道俟將來是遲鈍曰衆人愈利而後鈍聖人愈鈍而後利關百聖而不慙蔽天地而不恥能言之􅀋莫能加也貴無敵富無倫倫匹利孰大焉或曰孔子之道不可小與嫌孔子大其道故當其時不能見用曰小則敗聖如何曰若是則何爲去乎曰愛日曰愛日而去何也曰由羣謀之故也不聽正諫而不用噫者吾於觀庸邪無爲飽食安坐而厭觀也齊人歸女樂季桓子受之三日不聽朝正諌而不用於是遂行由此觀之夫子之日亦愛矣惜寸隂或曰君子愛日乎曰君子仕則欲行其義居則欲彰其道事不厭教不倦焉得日日不暇給或問其有繼周者雖百丗可知也秦巳繼周矣不待夏禮而治者其不驗乎曰聖人之言天也天妄乎繼周者未欲太平也如欲太平也捨之而用他道亦無由至矣􅁀秦之繼周王莽之篡漢臧獲猶將悼之賢者能無􅁣歎乎赫赫乎日之光羣目之用也渾渾乎聖人之道羣心之用也或問天地簡易而聖人法之何五經之支離嫌難了曰支離蓋其所以爲簡易也支離分別之而後朗然事得簡易巳簡巳易焉支焉離旣簡旣易乃是混茫之初焉支焉離言不可了也或曰聖人無益於庸也曰丗人之益者倉􅅒也取之如單有時而盡仲尼神明也小以成小大以成大雖山川丘陵草木鳥獸裕如也學其道者大小各隨其本量而取足如不用也神明亦末如之何矣神明有所不及聖人有所不訓或問聖人占天乎曰占天地言皆占之若此則史也何異曰史以天占人聖人以人占天聖人以人占天者先乎天也史以天占人者後乎天也大聖先天而天不違良史後天而奉天時知其所先後則天人之情得矣或問星有甘石何如甘公石申夫善觀天文者也曰在德不在星德隆則晷星星隆則晷德也或問大人曰無事於小爲大人賢者志大之謂請問小曰事非禮義爲小尚志在乎禮義大人之事備矣聖人之言逺如天天懸􅁚著明而人不能察聖人設教施令而人不能究賢人之言近如地山川澤田之形可得而鍳瓏􅌑其聲者其質玉乎玉之瓏􅌑其聲亦猶君子清泠其德音聖人矢口而成言肆筆而成書矢正也肆操也言可聞而不可殫書可觀而不可盡性與天道周之人多行貴尚德義人人得行其道秦之人多病道屈沈也行有之也病曼之也行有之者周有德也病曼之者秦無道也周之士也貴道泰業隆故尊貴秦之士也賤道否人卑故窮賤周之士也肆肆放任意而道義行秦之士也拘拘制曲從不肆王道月未望則載魄于西載始也魄光也載魄于西者光始生於西面以漸東滿旣望則終魄于東光稍虧於西面以漸東盡其遡於日乎遡迎也言爲人臣終始盛衰向迎其君如月迎日天理然彤弓盧矢不爲有矣以諭有君而無臣聆聽前丗清視在下鑑莫近於斯矣執古以御今御今以古則殷鑑不逺或問何如動而見畏曰畏人何如動而見侮曰侮人禍福無門惟人所召夫見畏之與見侮無不由已我欲仁斯仁至或問禮難以強丗言禮事至難難可以強丗使行曰難故強丗如夷俟倨肆羈角之哺果而啗之奚其強或性或強及其名一也性者天然生知也強者習學以至也雖爲小異功業旣成其名一也見弓之張􅀆弛而不失其良兮弛舎或曰何謂也曰㯳之而巳矣弓良在擏格人良在禮樂川有防器有範見禮教之至也川防禁溢器範檢形以諭禮教人之防範也以舊防爲無所用而壞之者必有水敗以舊禮爲無所用而去之者必有亂患也經營然後知幹楨之克立也幹楨築牆版之屬也言經營宫室立城郭然後知幹楨之能有所立也建宗廟立社稷然後知禮樂之能有所成也莊􅀭蕩而不法墨晏儉而廢禮申韓險而無化險克所以無德化鄒衍迃而不信迃迴不可承信聖人之材天地也覆載與天地合其德次山陵川泉也次聖者大賢也髙顯如山陵通潤如川泉次鳥獸草木也區别各有所長揚子法言卷第八􅀭子法言先知卷第九圖難於其易求大於其細爲之乎其未有治之乎其未亂如斯而巳矣李軌注先知其幾於神乎幾近也神以知來探未兆也逆識先知近於神也敢問先知曰不知荅以不知者神悟則先知非問之所及也知其道者其如視舉目便見忽眇緜作昞眇緜逺視先甲一日易後甲一日難甲者一旬之始巳有之初也先之一日未兆也後之一日巳形也夫求福於未兆之前易救禍於巳形之後難或問何以治國曰立政曰何以立政曰政之本身也身立則政立矣子帥以正孰敢不正或問爲政有幾幾要也欲知爲政善惡之要曰思斁斁猒或問思斁曰昔在周公征于東方四國是王王正召伯述職蔽芾甘棠其思矣夫齊桓欲徑陳陳不果内執轅濤塗其斁矣夫伐楚雖美而御師不整故不欲令徑於戲從政者審其思斁而巳矣或問何思何斁曰老人老􅀌人􅀌病者養死者葬男子畒婦人桑之謂思爲政如此民所思也若汚人老汚慢屈人􅀌屈窮病者獨死者逋田畒荒杼軸空之謂斁民猒苦也爲政日新或人敢問日新曰使之利其仁樂其義厲之以名引之以美使之陶陶然之謂日新或問民所勤勤苦曰民有三勤曰何哉所謂三勤曰政善而吏惡一勤也吏善而政惡二勤也政吏駢惡三勤也政君也駢並也禽獸食人之食土木衣人之帛穀人不足於晝絲人不足於夜之謂惡政人君苑囿禽獸故穀人竭力於晝也土木衣綈錦故絲人竭力於夜也晝夜竭力而猶不足是故爲惡政聖人文質者也因人才質刻而畫之文而藻之車服以彰之車服等差辨彰貴賤藻色以明之藻色輕重顯明尊卑聲音以􅀭之歌於管􅃶詠其德美詩書以光之載其功德光照後丗籩豆不陳玉帛不分琴瑟不鏗鍾鼓不抎則吾無以見聖人矣言此諸禮存故得覩聖人或曰以往聖人之法治將來譬猶膠柱而調瑟有諸曰有之曰聖君少而庸君多如獨守仲尼之道是漆也漆甚於膠曰聖人之法未甞不􅀜盛衰焉昔者堯有天下舉大綱命舜禹夏殷周屬其子不膠者卓矣卓逺唐虞􅁚刑惟明法度彰也夏后肉辟三千不膠者卓矣二帝三王期於存公不恤私也堯親九族恊和萬國湯武桓桓征伐四克由是言之不膠者卓矣五君之跡雖異隨時順冝其道一也禮樂征伐自天子所出春秋之時齊􅀳實予不膠者卓矣禮樂征伐當由天子所出而春秋之時天子微弱齊桓􅀳文專命征討然而所爲皆尊王室故春秋公羊傳文雖不予而實予之存於公正也或曰人君不可不學律令曰君子爲國張其綱紀議其教化網之有綱紀猶君之有股肱也綱紀張則網目正股肱良則庶事康導之以仁則下不相賊莅之以廉則下不相盜臨之以正則下不相詐修之以禮義則下多德讓此君子所當學也如有犯法則司獄在執契而巳或苦亂苦患曰綱紀綱紀然後網目正曰惡在於綱紀曰大作綱小作紀網頼綱紀君任輔佐如綱不綱紀不紀謂失綱紀之任雖有羅網惡得一目而正諸網無綱紀目不正君無股肱國不治或曰齊得夷吾而霸仲尼曰小器請問大器曰大器其猶規矩準繩乎先自治而後治人之謂大器夫以規矩準䋲而能使上下無猜者大器也大器者必籠沓羣疑之表莫得與之爭量也管子相桓公不能以之自固三歸反坫然後獲安或曰正國何先曰躬工人績躬身也工官也言先正身以臨百官次乃覽察其人考其勲績也或曰爲政先殺後敎曰於乎於乎者駭歎之聲天先秋而後春乎將先春而後秋乎天道先春後秋以成歳爲政先令後誅以成治吾見􅀇駒之歩􅀇駒蚍蜉子也雉之晨雊也雊鳴化其可以巳矣哉感陽應節自然之化化之所感有自來矣民可使覿德是以堯舜之民可比屋而封不可使覿刑是以桀紂之民可比屋而誅覿德則純覿刑則亂象龍之致雨也難矣哉象似也言畫繒刻木以爲龍而求致雨則不可得也曰龍乎龍乎歎非眞龍眞龍而後能致雲􅀨明君而後道化行也或問政核曰眞僞用眞人逺佞僞眞僞則政核善善明則眞人顯惡惡著則佞僞息眞僞審則政事核也如眞不眞僞不僞則政不核北面之禍南面之賊也鼓舞萬物者雷風乎鼓舞萬民者號令乎天以雷風鼓舞萬物君以號令制御萬民雷不一三令五申風不再制無二也聖人樂陶成天下之化使人有士君子之器者也故不遁于丗不離于羣遁離者是聖人乎言遁離者非聖人也雌之不才其卵􅖁矣毈敗君之不才其民野矣民之陶化猶泥之在鈞或問曰載使子草律載設也草剏也曰吾不如􅀪恭草奏曰吾不如陳湯曰何爲曰必也律不犯奏不剡論語云聽訟吾猶人也必也使無訟乎此亦言當以純德化之使不犯律不剡奏也甄陶天下者其在和乎剛則甈柔則坏甈燥也坏濕也言失和也夫陶者失剛柔之和則不成器爲政失寛猛之中則不成治龍之潛亢不獲其中矣初九濳龍勿用上九亢龍有悔是以過中則惕九三居下卦之上過其中則夕惕也不及中則躍九四居上卦之下不及中故躍淵其近於中乎二五得中故有利見之吉聖人之道譬猶日之中矣光􅀍四表不及則未不及中未盛明過則具日􅉴明盡言昏昧也什一天下之正也什一稅民天下之中賦正法也多則桀寡則貉公羊􅀓曰多乎十一大桀小桀寡乎十一大貉小貉井田之田田也謂古八家是治田也肉刑之刑刑也三千之屬是正法也田也者與衆田之刑也者與衆弃之法無限則庶人田侯田處侯宅食侯食服侯服法制無限則興奢侈長􅆫亂人亦多不足矣􅆫亂旣興民多匱竭爲國不迪其法迪蹈而望其效效功譬諸筭乎夫筭者不運籌䇿不能定其數治國者不蹈法度不能致其治揚子法言卷第九
