front:
  text: 揚子法言問道卷第四夫道者􅀪乎至化通乎至理也
  hash: sha256:00da39ec429877d5393e459a9ee21620de7ae4b32e93cc67b24f411193d28ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3a0009_SBCK_004-1a}
body:
  text: 李軌注或問道曰道也者通也無不通也萬物由之以通或曰可以適它與言道旣可以通中國而適夷狄學亦可以統正典而兼諸子也曰適堯舜文王者爲正道非堯舜文王者爲它道君子正而不它或問道曰道若塗若川車航混混不捨晝夜車之由塗航之由川混混往來交通或曰焉得直道而由諸塗川皆形曲也此亦因形以取譬曰塗雖曲而通諸夏則由諸川雖曲而通諸海則由諸以諭經學通於聖道或曰事雖曲而通諸聖則由諸乎大解曲通歸正之義道德仁義禮譬諸身乎不可無之於一夫道以導之德以得之仁以人之義以冝之禮以體之天也五者人之天性合則渾離則散一人而兼統四體者其身全乎四體合則渾成人五美備則混爲聖一人兼統者德備如身全或問德表曰莫知作上作下作爲也莫知爲上之樂爲下之苦請問禮莫知言巳有禮制則有尊卑曰行禮於彼而民得於此奚其知君自行禮於上而民承化於下或曰孰若無禮而德曰禮體也人而無禮焉以爲德禮如體無體何得爲人無禮何能立德或問天曰吾於天與見無爲之爲矣或問彫刻衆形者匪天與曰以其不彫刻也如物刻而彫之焉得力而給諸老子之言道德吾有取焉耳可以止奔競訓饕冒之人及搥提仁義絶滅禮學吾無取焉耳老子之絶學蓋言至理之極以明無爲之本斯乃聖人所同子雲豈其異哉夫能統逺旨然後可與論道悠悠之徒旣非所逮方崇經丗之訓是故無取焉耳無取焉何者不得以之爲敎也吾焉開明哉惟聖人爲可以開明他則苓焉安也開發也大哉聖人言之至也開之廓然見四海日月齊明視其文者不下堂知四方閉之閛然不覩牆之裏不開聖卷諭無所見聖人之言似於水火或問水火曰水測之而益深窮之而益逺火用之而彌明宿之而彌壯允治天下不待禮文與五敎則吾以黃帝堯舜爲疣贅允信或曰太上無法而治法非所以爲治也曰鴻荒之丗聖人惡之是以法始乎伏犧而成乎堯伏犠畫八卦以叙上下至於堯舜君臣大成也匪伏匪堯禮義哨哨聖人不取也或問八荒之禮禮也樂也孰是曰殷之以中國殷正或曰孰爲中國正直北辰爲天之齊今俱偏僻未知誰爲居中國曰五政之所加七賦之所養中於天地者爲中國五政五常之政也七賦五穀桑麻也中於天地者土圭測景晷度均也過此而往者人也哉譬八荒之於中國如彼諸子之於聖人如是聖人之治天下也礙諸以禮樂礙限無則禽異則貉吾見諸子之小禮樂也不見聖人之小禮樂也孰有書不由筆言不由舌吾見天常爲帝王之筆舌也天常五常也帝王之所制奉也譬諸書言之於筆舌爲人之由禮樂也智也者知也夫智用不用益不益則不贅虧矣深知器械舟車宫室之爲則禮由己或問大聲曰非雷非霆隱隱耾耾久而愈盈尸諸聖尸主也雷霆之聲聞當時聖人之言傳無窮或問道有因無因乎曰可則因否則革革之與因雖異隨變而通理也故先王之事丗相反而其道一也或問無爲曰奚爲哉應化而巳在昔虞夏襲堯之爵行堯之道法度彰禮樂著垂拱而視天下民之阜也無爲矣紹桀之後纂紂之餘法度廢禮樂虧安坐而視天下民之死無爲乎紹桀者成湯也纂紂者周武也當此之時湯武不可得安坐視天下民之死而欲無爲也所謂可則因否則革矣應變順時故迹不同致理而言皆非爲也或問太古塗民耳目惟其見也聞也見則難蔽聞則難塞人以爲太古不如絶禮樂以塗塞人之耳目令不見不聞使之純一曰天之肈降生民使其目見耳聞是以視之禮聽之樂因其耳目而節之如視不禮聽不樂雖有民焉得而塗諸或問新敝曰新則襲之敝則益損之值其日新則襲而因之值其敝亂則損益隨時或問太古德懷不禮懷嬰兒慕駒犢從焉以禮曰嬰犢乎歎無禮也嬰犢母懷不父懷母懷愛也父懷敬也獨母而不父未若父母之懿也兼乎愛敬然後盛其美善狙詐之家曰狙詐之計不戰而屈人兵堯舜也曰不戰而屈人兵堯舜也沾項漸􅁭堯舜乎衒玉而賈石者其狙詐乎或問狙詐與亡孰愈亡無曰亡愈或曰子將六師則誰使曰御得其道則天下狙詐咸作使御失其道則天下狙詐咸作敵失其御則反閒背叛故有天下者審其御而巳矣或問威震諸矦須於征與狙詐之力也如其亡曰威震諸矦須於狙詐可也未足多也未若威震諸矦而不須狙詐也或曰無狙詐將何以征乎曰縱不得不征不有司馬法乎何必狙詐乎申韓之術不仁之至矣若何牛羊之用人也峻刑戰之術制民如牛羊臨之以刀爼故曰不仁之至也若牛羊用人則狐貍螻螾不膢臘也與膢八月旦也今河東俗奉之以爲大節祭祀先人也臘䄍也見禮記或曰刀不利筆不銛而獨加諸砥不亦可乎刀鈍礪之砥筆秃挺削以刀申韓行法欲以救亂如加刀砥亦所以利也曰人砥則秦尚矣嚴刑裁民亦猶刀之割􅁏以人爲砥酷之甚也秦之嚴刑難復尚矣或曰刑名非道邪何自然也曰何必刑名圍棊擊劒反目􅅭形亦皆自然也由其大者作正道由其小者作姦道大者聖人之言小者諸子之言或曰申韓之法非法與曰法者謂唐虞成周之法也如申韓如申韓莊周申韓不乖寡聖人而漸諸篇則顔氏之子閔氏之孫其如台言此數子之才苟不乖少聖人之術漸染其心於篇籍之中以訓學徒則顔閔不能勝之或曰莊周有取乎曰少欲有簡貴之益焉鄒衍有取乎曰自持有凝跱之風焉至周罔君臣之義衍無知於天地之閒雖鄰不覿也揚子法言卷第四
