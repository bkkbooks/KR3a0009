body:
  text: 揚子法言卷四晉李軌唐柳宗元註宋宋咸吳祕司馬光重添註問神篇咸曰既哲乎道可窮之神故次之問道神心惚怳經緯萬方光曰惚怳無形方道也事繫諸道德仁義禮祕曰神也心也惚怳乎無端以經緯於萬方而並有歸趣事繫諸聖人之道聖人之道兼德仁義禮而言之也光曰君子之心主此五者譔問神祕曰天有至神為造化之主聖人之神為道之宗其神一也或問神曰心咸曰神謂精義知幾之神言存乎心而已祕曰神者不疾而速不行而至心主於神光曰物之神者莫如心請聞之咸曰未諭心之義故請之光曰李宋吳本作請問之音義曰天復本作請聞之今從之曰潛天而天光曰潛深也潛心於天而知天潛地而地惟其所潛咸曰心潛於天則知天心潛於地則知地光曰潛心於地而知地天地神明而不測者也心之潛也猶將測之况於人乎况於事倫乎咸曰言世所難窮測者惟天地之道神明之義耳然一潛其心可盡見之况人道之近事理之淺安能藏哉倫理也敢問潛心于聖咸曰問何以潛心于聖人之道曰昔仲尼潛心於文王矣逹之逹通也咸曰文王演易仲尼盡得其道而讃之又曰文王既殁文不在兹乎是逹也祕曰文王作易繫辭以盡天人之幾孔子五十以學易而作十翼無不通也逹通也顔淵亦潛心於仲尼矣未逹一聞耳其殆庶幾咸曰聞當作間字之誤也孟子謂顔淵具聖人之體而微此稱未逹一間間際也言去聖人不逺惟一際之地爾今諸本皆作一聞非也孟子曰賢不肖其間不能寸謂其際相去不能及寸言近之也易繫辭仲尼舉顔子其殆庶幾以明易義今註以庶幾為顔子近聖人之意非謂矣祕曰顔子具體庶幾所未通者一間耳子貢曰夫子之言性與天道不可得而聞也神在所潛而已矣神道不逺潛心則是祕曰潛則速至天神天明照知四方天以神明光燭幽明照曜四方人以潛心鈎深致逺探􅄨索隠祕曰至神運日月天精天粹萬物作類天以精粹覆萬物各成其類人以潛心考校同異搜暢精義祕曰天之精粹流形萬物而各從其類易曰剛健中正純粹精也光曰人亦以神明精粹經緯萬方人心其神矣乎操則存捨則亡人心如神變化無常操而持之則義存捨而廢之則道亡操而不捨則道義光大祕曰在天地為神在人為心潛與不潛操捨而已能常操而存者其惟聖人乎光曰聖人操心有常不離於道聖人存神索至存其精神探幽索微祕曰聖人如天常存其神也所以存神道無不至光曰索山責切至者事之極致成天下之大順致天下之大利順事而無逆利物而無害和同天人之際使之而無間者也至化混然歸於一也祕曰惟神也成天下之大順致天下之大利和同天人而無間者也光曰大順謂上下各安其分大利謂萬物各得其所天者不為而自成人者為之然後成而同其際使之無間隙皆聖人神心之所為也龍蟠于泥蚖其肆矣惟聖知聖惟龍知龍愚不知聖蚖不知龍聖道未彰羣愚玩矣龍蟠未升蚖其肆矣咸曰蚖蜥蜴也似龍而無角如蛇而有足一云毒蛇也肆區也言龍未飛天則與蚖同區也祕曰與蚖蛇同肆光曰蚖音元肆者肆志以凌之也或曰肆當作肄肄習也曰習見而狎玩之也蚖哉蚖哉惡覩龍之志也歟歎之甚也祕曰聖人在䝉與衆人同列衆人豈知聖人之志歟光曰惡音烏君子之志髙深逺大小人固不得而知也或曰龍必欲飛天乎咸曰疑其長為蚖同肆不能飛天光曰言君子必欲居大位乎曰時飛則飛時潛則潛時可而升未可而潛既飛且潛義兼出處食其不妄形其不可得而制也歟飲食則不妄有形而不可制也咸曰言龍之且潛雖飲食之間不敢忘於形思所以飛于天也聖人尚䝉雖飲食之間不敢忘於形思所以行其道也故暫為蚖所肆愚所侮然猶不能制之矣祕曰既飛且潛惟時所適雖一食之間不忘隠見之形安得而制哉言聖人亦然光曰宋吳本妄作忘今從李本音義曰非義不妄食故不可得而制曰聖人不制則何為乎羑里祕曰文王聖人也何以制乎羑里紂囚文王於羑里曰龍以不制為龍聖人以不手為聖人手者桎梏之屬咸曰手當為干字之誤也言龍雖為蚖同肆然終不制於泥故能謂之龍聖人雖為紂所囚然終不干其刑故能謂之聖人今注文稱手者桎梏之屬意謂文王雖囚而不被於桎梏也按賈誼新書云紂作梏數千睨諸侯之不諂已者杖而梏之文王桎梏囚于羑里七年而後得免是文王常被其桎梏矣安可謂之不手哉祕曰手持也執也文王事不道之紂雖以非禮見囚終不能執而戮之所以為聖人也公羊傳曰手劒而叱之光曰音義曰不手不制於人之手光謂手謂為人所提攜指使枉己之道而隨人左右也或曰經可損益歟曰易始八卦而文王六十四其益可知也祕曰伏羲始畫八卦因而重之六十四卦備矣黄帝正名百物而名顯文王繫辭而義彰可謂益矣今云文王六十四據司馬遷而言也詩書禮春秋或因或作而成於仲尼乎其益可知也或因者引而伸之或作者又如春秋祕曰因舊文作序例刪定筆削皆成於仲尼光曰宋吳本或作下更有因字今從李本故夫道非天然應時而造者損益可知也咸曰天然者聖人也言仲尼之後或道非聖人而有應時造書以救世而明治道者其益亦可知也如孔伋孟軻之流祕曰故道非若易象之天然雖損益不可増減於乾坤六子也應時而造若三代之禮樂者損益可知也光曰天然謂道德仁義應時而造謂禮樂刑政也或曰易損其一雖憃知闕焉咸曰易損其一者謂大衍之數虚其一此雖憃愚之人皆知闕之也光曰憃書容丑江刄用三切至書之不備過半矣而習者不知本百篇今有四十九故曰過半祕曰言易之六十四若損其一雖愚人可以知其闕者至書百篇漢存者二十九篇得古文又多十六篇其亡過半而習者莫知其義光曰漢世儒者不知書本有百篇故孔臧與從弟安國書曰今學者唯聞尚書二十八篇取象二十八宿謂至然也惜乎書序之不如易也歎恨書序雖存獨不如易之可推㝷咸曰易之虚一者非損失之盖蓍法然也書失過半者經秦火遺墜之也或人不知其義以為易損一而尚可推書失多而不能知故揚子答之以下文祕曰孔子序書存百篇之義而其篇亡不可復知序易存六十四之次設或亡一即可推而知之是序書不如序易光曰序謂篇之次序曰彼數也可數焉故也咸曰言彼損一者盖蓍數之法可揲數而用故也光曰八卦重之成六十四自然之數如書序雖孔子亦末如之何矣數存則雖愚有所不失數亡則雖聖有所不得咸曰如書者實失墜之與易不同雖孔子無如之何言不敢虚詐而補之祕曰彼易卦皆有數亦可以䇿數而知焉故也如書序之存而篇亡皆當時訓誥之事不可以虚補故孔子亦末如之何也昔之説書者序以百叙以百篇而酒誥之篇俄空焉今亡夫秦焚書漢興采集之酒誥又亡一簡中者先師猶俄而空之今漸亡祕曰秦皇燔書漢興劉向以中古文校歐陽大小夏侯三家經文酒誥脱簡一空而亡之也據酒誥今無亡脱盖古文獨存光曰空苦貢切音義曰空缺也虞夏之書渾渾爾深大咸曰渾渾猶淳淳也言虞夏尚有唐風去道未逺淳淳然祕曰渾渾猶言混混也謂其淳雅也商書灝灝爾夷曠咸曰灝灝猶漫漫也言忠質之化制尚䟽濶漫漫然祕曰灝灝猶言浩浩也謂其逺大也周書噩噩爾不阿附也咸曰噩噩猶察察也言尚文而相檢以禮樂察察然祕曰噩噩猶言諤諤也謂其明正也下周者其書誰乎下周者秦言酷烈也袐曰秦書誰乎不合典訓光曰李本誰作譙今從宋吳本渾胡本切灝胡老切噩五各切渾渾朴略難知之貎灝灝富大之貎噩噩明直之貌其書誰乎言不足以為書也或問聖人之經不可使易知歟嫌五經之難解也祕曰五經大而奥曰不可天俄而可度則其覆物也淺矣光曰覆敷又切地俄而可測則其載物也薄矣祕曰俄猶俄頃大哉天地之為萬物郭五經之為衆説郛莫有不在其内而能出乎其外者祕曰不能出其域或問聖人之作事不能昭若日月乎何後世之訔訔也咸曰誾誾當作狺傳之誤也誾誾中正也狺狺犬聲也言聖人由為後世非其道者之所吠也若謂誾誾中正之義則理不通焉祕曰聖人之作事豈不能使明白如日月乎何使後世之學者徒誾誾貌悦之而不能逹其心也誾誾和也和悦之貌光曰宋吳本訔作誾今從李本訔語巾切訔訔爭辨之貌謂學者爭論是非曰瞽曠能黙瞽曠不能齊不齊之耳狄牙能喊狄牙不能齊不齊之口咸曰曠師曠黙黙審於樂喊咂物聲也祕曰喊聲也瞽曠之和雅能使黙而識之者必有瞽曠之耳不能齊聽者不齊之耳狄牙之甘美能使喊而稱之者必待狄牙之口不能齊食者不齊之口猶聖人立言能使服而行者必須賢哲之人不能齊學者不齊之心也瞽曠師曠也知樂者也晉杜蒯云曠也大師也狄牙易牙也知味者也大戴禮曰失管仲任竪刁狄牙韓非子曰易牙為君主味光曰喊呼覽呼􅰟下漸三切狄儀狄造酒者牙易牙瞽曠能審正聲而人之耳清濁髙下各有所好瞽曠不能齊也狄牙能嘗和味而人之口酸辛鹹苦各有所好狄牙不能齊也聖人能行正道而愚闇邪僻之人相與非之聖人不能止也君子之言幽必有驗乎明咸曰猶易極之精義而見于行事祕曰猶言百神受職驗在禮樂逺必有驗乎近咸曰猶大雅之德及黎庶而本之於已祕曰猶言百世可知驗在損益大必有驗乎小咸曰猶二南獲瑞而由之室家祕曰猶言天地之動驗在璿璣微必有驗乎著咸曰猶春秋之推至隠而顯成法祕曰猶言履霜堅氷至而驗在弑父無驗而言之謂妄君子妄乎不妄言必有中光曰言雖幽深逺大而不可考驗於今者所謂無稽之言也言不能逹其心書不能逹其言難矣哉祕曰難乎為君子光曰難以明道惟聖人得言之解得書之體祕曰發言成教肆筆成典光曰解胡買切白日以照之江河以滌之浩浩乎其莫之禦也咸曰有所發明如白日所照有所蕩除如江河所滌浩浩洪盛無能當之者祕曰照之如白日滌之如江河浩浩洪流誰能禦之面相之辭相適咸曰面相猶面對適往也言面對之時以辭相反也光曰之亦適也捈中心之所欲咸曰捈引也光曰捈同盧佗胡二切通諸人之嚍嚍者莫如言嚍嚍猶憤憤也祕曰㗲㗲猶聲聞也通衆人善惡之聲光曰宋吳本嚍作㗲呼陌切呌呼也今從李本嚍音晉彌綸天下之事記久明逺著古昔之㖧㖧傳千里之忞忞者莫如書㖧㖧目所不見忞忞心所不了咸曰書謂書畫之書㖧㖧猶喋喋忞忞猶勉勉言書畫者所以著古人喋喋之言傳千里勉勉之懐也祕曰㗃㗃不可知也忞忞自彊勉也古昔難知之迹書以著焉所以記乆也千里自勉之行書以傳焉所以明道也自勉者君子勉為君子小人勉為小人也光曰㗃呼昆切忞武巾切故言心聲也書心畫也聲發成言畫紙成書書有文質言有史野二者之來皆由於心祕曰心有之言焉書焉是以似之光曰畫猶圖畫聲畫形君子小人見矣察言觀書斷可識也光曰見賢遍切聲畫者君子小人之所以動情乎咸曰君子所動情者道小人所動情者利各見其言書矣祕曰情動於中而形于聲畫聖人之辭渾渾若川渾渾洪流也祕曰渾渾若大川之流順則便逆則否者其惟川乎祕曰聖人之教順則安逆則危光曰順之則便易逆之則不行或曰仲尼聖者歟何不能居世也曾范蔡之不若咸曰言不能曲傳以圖用如范叔蔡澤之為祕曰范睢魏人也説秦昭王而為相蔡澤燕人也説范睢而代睢為相言孔子不如光曰不如范睢蔡澤能偶合世俗以求富貴曰聖人者范蔡乎咸曰言聖人肯為范蔡之術乎若范蔡其如聖何咸曰范叔魏人干王稽得事秦為相號應侯蔡澤燕人説應侯卒代其位為剛成君二子皆以詭術居位其如聖人之道何光曰仲尼肯為范蔡之行則亦為小人安得為聖或曰淮南太史公者其多知歟曷其雜也祕曰淮南王安著書二十餘萬言太史公司馬談遷之父也著書五十餘萬言其多知哉何其不純而雜也雜謂安作内書外書又作中篇言神仙黄白之術遷序九流百家雜語曰雜乎雜祕曰唯其不純所以為雜光曰言二書誠雜也人病以多知為雜惟聖人為不雜祕曰聖人雖多知皆歸于正書不經非書也言不經非言也言書不經多多贅矣動而愈偽咸曰贅疾乃身之蠧者也夫書畫與言不由乎經典為道之蠧亦多多矣光曰言書不合於經知之愈多則愈為害而無用若身之有贅然贅附肉也或曰述而不作𤣥何以作咸曰揚子著太𤣥經所謂𤣥者一也天地隂陽叅比一生三取其三數故有三方三生九故有九州九生二十七故有二十七部二十七生八十一故有八十一家遂為八十一首故有二百四十三表七百二十九贊每二贊一日七百二十九贊而當周天之度一嵗之紀節候鍾律星斗五行咸著焉今或人以為孔子述而不作疑太𤣥不當作故問之祕曰孔子述而不作太𤣥何以作曰其事則述其書則作言昔老彭好述古事孔子比之但述而不作今太𤣥非古事乃自成一家之書故作之也或曰孔子述事者有矣然何嘗作書乎咸曰當孔子之世周室下衰詩書淆亂禮樂崩壊先王之制無一而正者故孔子區區於道以述古事刪詩書定禮樂約史記而修春秋復與諸侯門人更議典制然後各得其所故明道立教盡在是矣何須更作書哉故所以述而不作者盖此也非不當作之也當子雲之時則不然六經皆更聖人之所定漢興已久稍為諸儒討正故無古事可述而屈身莽朝自非作書著成一家則何以明其道哉祕曰以為經莫大於易故作太𤣥自子辰申子冠之以甲分二十七章為一會八十一章為一統從子至辰自辰至申自申至子凡四千六百一十七嵗為一元與泰初厯相應亦有顓頊厯焉此其事則述也作二百四十三表七百二十九贊十一篇此其書則作也光曰仁義先王之事也方州部家揚子所作也言揚子所作太𤣥之書其所述者亦先聖人之道耳育而不苗者吾家之童烏乎童烏子雲之子也仲尼悼顔淵苗而不秀子雲傷童烏育而不苗九齡而與我𤣥文顔淵弱冠而與仲尼言易童烏九齡而與揚子論𤣥光曰與余茹切與知之或曰𤣥何為祕曰㫖何歸光曰為于僞切言為何事而作曰為仁義咸曰𤣥言者為仁義而作曰孰不為仁孰不為義祕曰賢者而言誰不為仁義何必𤣥曰勿雜也而已矣純則巧僞息雜則姦邪生咸曰言如三鄒田戸吁劇申韓之徒雜以巫祝禨祥刑名浮虚而亂俗今太𤣥獨專於仁義也或曰太𤣥之專仁義也安在咸曰夫𤣥之道雖以隂陽節候星斗五行之用然其㫖應休咎之占星陽而時數辭從則為休也星隂而時數辭違則為咎也使人知吉凶之來善惡之修豈非仁乎夫義者宜也復使窮渾天之法知人事之紀通變化之本豈非義乎祕曰引之以天數播之以人事終歸仁義不雜而已矣易曰立人之道曰仁與義今𤣥准之故曰為仁義夫人道則然且天一至地十易道也三摹九劇𤣥道也𤣥之准易不亦非乎曰𤣥之准易非准易之道准易為書也易准天地自天一至地十天地之道備矣𤣥何為哉易之書准天地𤣥之書准厯數所以為准易也厯數者天之道也自一至九陽數之極也若類之於易則非矣光曰則象天地以為人紀異術無從而入或問經之艱易光曰易移豉切曰存亡或人不諭曰其人存則易咸曰請益可了故易祕曰若孔子在三千之徒並授其義亡則艱咸曰思益各異故艱祕曰若七十子䘮而大義乖光曰人當作文字之誤也秦火之餘六經殘缺雖聖賢治之亦未易悉通延陵季子之於樂也其庶矣乎祕曰春秋襄二十九年吳公子札來聘請觀周樂光曰聞其聲詩知其國之興衰庶幾可謂知樂矣如樂弛雖札末如之何矣光曰末無也若其聲詩家已廢亡雖札亦不能知也如周之禮樂庶事之備也每可以為不難矣祕曰魯得用天子禮樂盡在魯光曰監於二代曲為之制事為之防學者習之固無難矣如秦之禮樂庶事之不備也每可以為難矣祕曰秦燔滅文章以愚黔首禮樂弛廢雖季子何由知之光曰秦訕笑三代之禮樂屏而去之自為苟簡之制後之學者求先王之禮樂於散亡之餘誠亦難矣衣而不裳未知其可也有上無下猶有君而無臣祕曰君在位而無輔光曰秦收諸侯之禮籍獨取其尊君抑臣者存之是衣而不裳也裳而不衣未知其可也祕曰權在臣下不知有君衣裳其順矣乎三桓專魯陳恒滅齊王莽簒漢三姦之興皆是物也祕曰上衣下裳大順之道光曰先王之禮其於君臣之際雖不失尊嚴而和樂存焉或問文曰訓訓順也咸曰言如五經可垂訓者問武曰克克能咸曰言克定禍亂者光曰克勝也未逹不諭曰事得其序之謂訓順其理也祕曰五常得其倫萬物得其序文之訓也光曰經緯天地綱紀四方勝已之私之謂克惟公亮也祕曰弔民伐罪與天下公共武之克也光曰勝人易勝已難勝已之私以從於道則人無不勝矣為之而行動之而光者其德乎咸曰所為無敢禦者故曰行所動無敢辱者故曰光或曰知德者鮮何其光祕曰知德者盖寡安得有光光曰鮮悉淺切曰我知為之不我知亦為之厥光大矣所謂大人用之不為善惡改常日月用之不為賢愚易光咸曰所以顔淵不改其樂也祕曰為而不息其光愈大必我知而為之光亦小矣咸曰君子之不欺闇室而慎其獨何必知之或曰君子病没世而無名盍勢諸名卿可幾也盍何不也勢親也名卿親執政者也言何不與之合勢以近名也此義猶王孫賈勸仲尼媚於竈也祕曰幾近也言何不附勢於有名之卿可以近名也光曰幾音機下同幾冀也曰君子德名為幾祕曰以德近名光曰君子所冀者德成而名顯耳梁齊趙楚之君非不富且貴也惡乎成名祕曰梁孝王武齊懷王閎趙敬肅王彭祖楚孝王囂非不富且貴也咸不修德而何有成名光曰惡音烏言四王者非無勢也死之日民無德而稱焉谷口鄭子真不屈其志而耕乎巖石之下名震于京師豈其卿豈其卿審乎自得而已矣慨夫逐物以䘮真而不能求己以絶偽祕曰子真隠居以德有名豈其附勢於名卿哉河平二年王鳳聘子真嚴君平皆不屈雲陽宫記漢鄭朴字子真光曰李宋吳本震作振今從漢書或問人曰難知也人之難知久矣堯舜之聖而難任人莊周亦曰厚貌深情光曰李本難作艱今從宋吳本曰焉難未諭其難所以又問曰太山之與螘垤江河之與行潦非難也形彰於外視之易見光曰螘魚綺切垤徒結切垤蟻壤也言才德之大小著明者易知大聖之與大佞難也物形外顯人神内藏外顯易察内藏難明咸曰夫大聖之道廣若天地世莫詳辨故周公未免於流言仲尼猶號於東家者也夫大佞之巧變若形響人罕察識故胡亥也終昧趙髙之姦德宗也不悟盧杞之邪人主宜慎之祕曰若周公忠勤而被流言王莽折節以鼓虚譽嗚呼能參以似者為無難咸曰夫似者道小機淺故易知祕曰嗚呼人之難知也若能參之以其似者則無難矣若周公伊尹之聖也豈為不利哉王莽寒浞之偽也豈能歸政哉故曰無難孟子曰伊尹聖人之任者也光曰李本作能别似今從宋吳本見玉參以珉見珉參以玉則真偽易知矣或問鄒莊有取乎曰德則取愆則否何謂德愆曰言天地人經德也否愆也論天地人經是德也不為過愆可采取也祕曰衍引天地剖判以來五德轉移止乎仁義節儉君臣上下六親之施是德也莊則否是愆也光曰鄒衍抑淫侈以歸節儉莊周矯浮躁以返真靜其言合於天地人之常道者所謂德也否則皆過言也愆欲聞其義祕曰問莊何以愆語君子不出諸口咸曰耻言之也祕曰未嘗言君子之道光曰鄒莊淫誕之語君子所不道也揚子法言卷四
