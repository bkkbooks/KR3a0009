body:
  text: 揚子法言卷五晉李軌唐柳宗元註宋宋咸吳祕司馬光重添註問明篇窮神知化是謂明矣故次之問神明哲煌煌旁燭無疆咸曰明哲之人逆見微隠故施照無窮遜于不虞祕曰遜遜順虞度也遜順乎不虞之非理以保天命咸曰不虞猶不度也遜順也大雅云既明且哲以保其身故不度之辰遜可捨乎揚子之屈身莽庭亦有謂矣故曰邦無道危行言遜光曰李竒曰常行遜順以備不虞光謂雖有明智旁照無極不能思不虞之患而預防之使墜失上天福禄之命猶未足以為明也譔問明祕曰君子見幾而作不俟終日而逺憂患之虞光曰論聖賢之明哲或問明曰微咸曰夫微研幾極深規於未兆者也祕曰見之於著何足為明或曰微何如其明也咸曰未諭微義疑不為明光曰嫌其明小曰微而見之明其誖乎祕曰微已察之明豈亂哉誖亂也光曰誖布内反聰明其至矣乎在於至妙之人咸曰言窮微乃聰明至極之美也祕曰堯曰聰明文思舜曰聞之聰明光曰聰者聞言察其是非明者見事知其可否人君得之為堯為舜匹夫得之窮神知命才之至美莫尚於此不聰實無耳也不明實無目也咸曰言不聰不明雖有耳目與無同也光曰愚者顛倒是非反易忠邪雖有耳目何異聾瞽敢問大聰明咸曰既知微義復問大者曰眩眩乎惟天為聰惟天為明夫能髙其目而下其耳者匪天也夫目髙則無所不照耳下則無所不聞言人髙其目則覩德義之經聖人之道下其耳則聽芻蕘之言負薪之説咸曰眩眩猶杳而冥也書曰天聰明自我民聰明夫天聽之卑而及於民則耳可謂下矣故明王之所以不棄市井商賈之言者盖此也闇主則不然光曰音義曰眩胡涓切眩眩幽逺貌光謂物之視聽局於形聲天則聽於無聲視於無形發於心者天必知之故無若天之聰明也目髙所以見逺耳下所以聽卑或曰小每知之可謂師乎曰是何師歟是何師歟天下小事為不少矣巧厯所不能算每知之是謂師乎祕曰小事甚多每人知之豈皆師乎師之貴也知大知也祕曰賢者志其大者大知聖人之教光曰知天地人之大道小知之師亦賤矣致逺恐泥是以君子不為故不貴也光曰相雞狗奕棊蹋鞠雖妙何足師乎孟子疾過我門而不入我室光曰過古禾切或曰亦有疾乎光曰問揚子亦有所惡乎曰摭我華而不食我實華者美麗之賦實者法言太𤣥咸曰門與華謂法言室與實謂太𤣥言孟子七篇與法言為教一也但無太𤣥爾註以華為賦實亦為法言恐非其意祕曰孟子與子雲俱遊於聖人之門而不與同入室孟子不言易而子雲准易是以謂之夫易者禮法之所宗仁義之所本孟子言其教故曰摭我華不言其易故曰不食我實孟之時力言仁義時君猶謂迂闊何暇言易乎今揚譏之示人之宗本耳光曰摭音隻拾也皆謂小知浮淺之人不能窮微探木或謂仲尼事彌其年盖天勞諸病矣夫祕曰仲尼彌年行教盖天勞之其病夫光曰彌終也言仲尼終身栖栖汲汲未嘗無事盖天勞苦之亦困病矣莊列之論如此曰天非獨勞仲尼亦自勞也天病乎哉咸曰易云天行健君子以自彊不息法夫天者也如是則天亦勞何病之有光曰天日行一周踰一度未嘗休息何病乎天樂天咸曰所以運行無窮聖樂聖咸曰所以歴聘不暇祕曰天聖非所病則自然樂其道矣光曰言天聖各得其道行之自樂或問鳥有鳳獸有麟鳥獸皆可鳳麟乎言凡鳥獸之不可得而鳳麟亦猶凡夫不可强通聖人之道祕曰疑夫晞驥之馬亦驥之乘也光曰言鳥獸不可為鳳麟猶庸人不可為聖曰羣鳥之於鳳也羣獸之於麟也形性祕曰形殊性别豈羣人之於聖乎鳥獸大小形性各異人之於聖腑藏並同祕曰肖天地之貌懐五常之性豈有異乎所不同者惟道耳光曰聖人與人皆人也形性無殊何為不可跂及或曰甚矣聖道無益於庸也聖讀而庸行盍去諸祕曰聖道不益於庸愚之人讀其書而庸其行何不去之光曰去邱莒切言俗儒雖讀聖人之書而所行無以異於庸人盍去此俗儒乎曰甚矣子之不逹也聖讀而庸行猶有聞焉去之阬也咸曰言讀之尚有聞聖人之道者去之則雖無所行復無所聞矣阬猶陷也言聖人之道陷矣光曰李本阬作抏五官切今從宋吳本言俗儒雖不能行聖人之道猶得聞其道而傳諸人愈於亡也若惡其無實而遂去之則與秦之阬儒何異哉阬秦者非斯乎投諸火斯李斯咸曰陷聖人之道於秦者李斯也非惟陷之復投於火以滅之也此猶仲尼不去其羊以存告朔之禮祕曰阬秦使不有王道者非李斯乎以書籍投諸火光曰斯此也言諸儒之所以見阬於秦者亦以聖讀庸行好横議以非世故秦人深疾之并其書焚之若使秦之法遂行於世則聖人之道絶矣或問人何尚曰尚智祕曰仁義禮信非智不行易曰智崇禮卑曰多以智殺身者何其尚曰昔臯陶以其智為帝謨殺身者逺矣咸曰謨謀也臯陶為士與帝舜謀其治道何殺身之有光曰陶音遥箕子以其智為武王陳洪範殺身者逺矣咸曰洪大也範法也周武王既殺紂以箕子歸作洪範言天地之大法後封於朝鮮何殺身之有光曰飾智為邪貪利徇名則殺身用智明道時然後言何害之有仲尼聖人也或劣諸子貢祕曰叔孫武叔陳子禽皆有是言子貢辭而精之然後廓如也精明咸曰論語云叔孫武叔語大夫於朝曰子貢賢於仲尼子服景伯以告子貢子貢曰譬之宮牆賜之牆也及肩窺見室家之好夫子之牆數仞不得其門而入陳子禽謂子貢曰子為恭也仲尼豈賢於子乎子貢曰君子一言以為知一言以為不知言不可不慎也夫子之不可及猶天之不可階而升也此所以廓如於戲光曰宋吳本作烏呼今從李本於音烏戲火吳許宜二切觀書者違子貢雖多亦何以為慎哉咸曰言無慎於子貢之明師道也光曰李本慎作盛屬下章今從宋吳本違子貢謂若老莊之徒不知聖人之道難知而不可及遂從而非之此觀書者所宜慎也成湯丕承也文王淵懿也或問丕承曰由小致大不亦丕乎咸曰由七十里王天下祕曰由小國而成王業孟子曰湯以七十里丕大也革夏以天不亦承乎咸曰順天應人祕曰革夏命以順乎天書曰天命殛之承奉也淵懿祕曰問文王曰重易六爻不亦淵乎咸曰淵深也夫易極深研幾寖以光大不亦懿乎咸曰浸漸也懿美也言三分天下有其二漸也决虞芮訟至武王卒成大勲光大也或問命祕曰世稱修短之命曰命者天之命也非人為也祕曰天命壽天非人所為人為不為命咸曰夫可為者非謂之命請問人為咸曰問何以謂之人為曰可以存亡可以死生非命也是人為也咸曰因善而生存因惡而死亡暴虎慿河之類非命也人為之祕曰育之則存棄之則亡殘之則死釋之則生豈命也哉命不可避也祕曰天之降年有永有不永不可避也世以祈禳之術修煉之要徼望延永盖溺於貪生者為之也光曰人事可以生存而自取死亡非天命也或曰顔氏之子冉氏之孫祕曰顔回冉耕皆早亡何也語曰冉伯牛有疾光曰言顔淵冉伯牛非不知修人事而顔淵早天伯牛惡疾何也曰以其無避也咸曰言顔淵冉牛皆早亡者非其為之盖降年不永所謂天命不可以避也若立巖牆之下動而徵病行而招死命乎命乎自詒伊慼咸曰言若立夫巖牆之下以徵病招死此自為之豈所謂命乎故禮不登髙不臨深者也祕曰處乎危嶮動為病之徵行為死之招豈曰命乎孟子曰知命者不立乎巖牆之下光曰巖牆欹危欲崩之牆也吉人凶其吉祕曰吉人以吉為凶故能常吉誡慎之至也光曰楚莊王以無災為懼曰天豈棄忘寡人乎是得吉猶以為凶也凶人吉其凶祕曰凶人以凶為吉故至大凶不懲不勸之至也光曰紂淫虐將亡災異並臻而曰我生不有命在天是廢人事而任天命得凶而以為吉也辰乎辰歎時逝也咸曰日月所會謂之辰曷來之遲去之速也祕曰言時之難會也郭璞云辰亦時也君子競諸進德修業欲及時也祕曰君子無所競必也為道亟於時也謣言敗俗光曰李宋吳本謣皆作􅘱女耕切字書譻􅘱小聲也咸曰􅘱邪也音義曰天復本作謣音于妄言也今從之光謂妄言者不知而作惑亂後生故敗俗也謣好敗則光曰妄好非聖之書敗先王之法姑息敗德祕曰􅘱言小言也小言之敗風俗小好之敗法則苟安之敗德本傳曰雖小辯終破大道管子曰凡民之從上也不從口之所言從情之所好者檀弓曰細人之愛人也以姑息姑息苟容取安也光曰姑且息休也宴安鴆毒故敗德君子謹於言祕曰非法不言慎於好祕曰上好之則民為之亟於時祕曰亟急也不可苟安易曰君子進德修業欲及時也光曰亟紀力切吾不見震風之能動聾聵也雷風非不烈不能動聾聵聖教非不服不能化頑嚚祕曰帝堯在上不能化四凶光曰聵五怪反言忘怠之人天所不能福或問君子在治曰若鳳在亂曰若鳳或人不諭曰未之思矣曰治則見亂則隠隨時之義美之大者治見亂隠鳳之德也光曰見賢遍切舊本未之思矣曰治則見光謂曰衍字鴻飛㝠㝠弋人何簒焉君子潛神重𤣥之域世網不能制禦之祕曰樂聖髙邁小人安能制之光曰故書簒作慕音義曰後漢書逸民傳序引揚子作弋者何簒宋衷註云簒取也鴻髙飛㝠㝠雖弋人執繒繳何所施巧而取焉今簒或為慕誤也光謂逆取曰簒鷦明遴集食其潔者矣遴集者類聚羣遊得其所也鷦明非竹實之潔不食君子非道德之禄不居咸曰遴行難也猶憚也明當為鸚鷦鵬南方神鳥似鳳也言鷦明冲天而去憚集於世盖其食潔而然也此因上文稱鳳之在亂則隠故舉鴻冥鷦潔以為之擬爾夫鳳非竹實不食非梧桐不棲註以鷦明非竹實不食又以遴集為類聚羣遊皆非矣夫鷦明為神禽當冲天逺去故下篇亦云鷦明冲天不在六翮乎此之謂也類聚羣遊而集者常鳥爾安可謂食其潔哉祕曰鷦明似鳳南方神雀難於翔集盖非潔不食者也君子非其道不食其禄遴行難也光曰鷦音焦遴良刄切音義曰説文曰東方發明南方鷦明西方鷫鷞北方幽昌中央鳳凰又司馬相如傳云鷦鵬已翔乎寥廓之宇又樂緯曰鷦鵬狀如鳳凰光謂説文明及鵬皆古文鳳字也鳳鳥象形鳳飛羣鳥從以萬數故以為朋黨字鳳鳥蹌蹌匪堯之庭蹌蹌者步趾之威儀也言其降步于堯之庭非堯之庭則不降步也祕曰治則見非堯之庭乎光曰蹌七羊切亨龍潛升其貞利乎貞正也利者義之和美龍潛升得正之和光曰言龍之所以能亨者豈非以其有正利之德乎或曰龍何可以貞利而亨曰時未可而潛不亦貞乎得潛之正可而升不亦利乎得義之和潛升在已用之以時不亦亨乎行止不失其所得嘉之會祕曰隠以正升以義用以時龍德之通也或問活身咸曰問何以安生其身曰明哲祕曰明哲以保其身或曰童蒙則活何乃明哲乎咸曰言童䝉無知者亦能活何必明而哲光曰言愚者乃所以全生若莊周論櫟社支離䟽曰君子所貴亦越用明保慎其身也祕曰君子所以貴而異於童䝉者亦曰用明哲保慎其身也越曰也如庸行翳路衝衝而活君子不貴也咸曰庸愚也翳塞也衝衝多也言庸愚塞路多多而活者此所謂罔之生也幸而免君子不貴之祕曰翳路言多也楚兩龔之絜其清矣乎楚人龔君賔龔長倩祕曰龔勝龔舍皆楚人也並著名節世謂之楚兩龔漢哀市時俱為諫議大夫老焉不復仕莽以太子師友祭酒迎勝不食而卒言其絜中清矣蜀莊沉冥祕曰莊遵字君平蜀人也晦迹不仕故曰沉冥光曰三輔决録曰君平名遵光謂沉冥言道德深厚人不能測蜀莊之才之珍也不作苟見不治苟得所謂沉冥也光曰見賢遍切養諸内而晦諸外不苟徇名而求利乆幽而不改其操雖隋和何以加諸祕曰隱肆成都乆幽也雖隋侯之珠和氏之璧豈加於才珍哉舉兹以旃不亦寶乎咸曰旃之也言舉此諸德以議之莊亦寶也何隋和之有吾珍莊也居難為也人所不能非難如何咸曰言居莊之道為難也祕曰莊通厯數以才自居他人之所難光曰吾所以重莊以其居身之道人難能也不慕由即夷矣何毚欲之有許由伯夷無欲之至既不可害亦不可利咸曰言莊君平非慕許由即慕伯夷爾何利欲之能動光曰宋吳本毚作利今從李本毚士衘切貪也或問堯將讓天下於許由由恥有諸祕曰莊周列禦冦之徒皆有是言未知信否曰好大者為之也祕曰好大言者為此無其實顧由無求於世而已矣祕曰由隠者也無所求於世其行止此耳允哲堯儃舜之重則不輕於由矣咸曰孟子曰天子不能以天下與人然則舜有天下者天與也堯崩三年之䘮畢舜避堯之子於南河之南天下諸侯朝覲者不之堯之子而之舜訟獄者不之堯之子而之舜謳歌者不謳歌堯之子而謳歌舜由此言之堯豈先讓由而後舜哉故揚子謂堯以允哲之道禪舜豈輕之於許由也祕曰詢事考言三載乃命陟位是堯禪舜之重也光曰儃與禪同蟬戰切光謂信以堯禪舜之重為智則必不輕授天下於由矣好大累克巢父灑耳不亦宜乎累積也克勝也積大言以相勝祕曰累刻猶累日也好大言而累日滋乆以至相傳稱巢父洗耳莫辨其偽不亦宜乎逸士傳曰堯讓天下於許由由逃之巢父聞而洗耳於河濵光曰宋吳本克作刻灑作洗今從李本灑音洗靈場之威宜夜矣乎靈場鬼神之壇靈壇所以為威可宜夜不可經白日祕曰靈壇鬼神之威施於莫夜則見悚虚誕累乆之説施於庸常則見信靈場猶靈壇也光曰妄言可以欺愚不可以誣智朱鳥翾翾歸其肆矣朱鳥燕别名也肆海肆也咸曰周禮𤣥鳥氏司分盖燕也𤣥黒也周禮以黑鳥為燕此註以朱鳥為燕非謂矣朱鳥隨陽之鳥謂鴈也鴈以時來時往何獨燕哉肆非獨海盖其南北所止之區肆祕曰朱鳥鴈也翾翾飛貌肆其所止集之肆非歸其肆傷時之言也南方朱鳥羽蟲之長大戴禮云羽蟲三百六十鳳為之長是也光曰翾許縁切音義曰朱鳥往來以時不累其身放肆自遂或曰奚取於朱鳥哉曰時來則來時往則往取其春來秋往隨時宜也祕曰時之治可來則來時之亂可往則往能來能往者朱鳥之謂歟不愆寒暑之宜能審去就之分咸曰夫人知進而不知退知存而不知亡豈朱鳥之若哉祕曰君子在治在亂若鳳或問韓非作説難之書而卒死乎説難敢問何反也韓非作書説難是也而西入闗干秦王伏劒死雲陽故曰何反咸曰韓非時作孤憤五蠹説難之書十餘萬言人或傳其書於秦秦王見之曰寡人得見此人與之遊死不恨矣秦因急攻韓韓王始遣非使秦秦王方欲任用之而為李斯姚賈毁害之秦王以為然下吏治非李斯遺非藥自殺註謂入闗干秦王伏劒死未知其據也祕曰韓非韓之諸公子也作説難之篇本以知説之難而免於咎耳而竞下吏死於秦卒如其言何相反耶司馬遷曰余獨悲韓子為説難而不能自脱耳光曰説音税曰説難盖其所以死乎咸曰言非徒知説難而不能行説難故所以死也光曰宋吳本無其字今從李本探人心而求合則無所不至適足取死曰何也曰君子以禮動以義止合則進否則退確乎不憂其不合也咸曰猶孔孟方衲圎鑿豈所以憂不合哉祕曰用之行而舎之藏何憂之有光曰確乎守正不移貌夫説人而憂其不合則亦無所不至矣祕曰夫不以禮義而惟以談説伺主之顔色憂其不合則邪佞詭譎無所不至宜其死也或曰説之不合非憂邪咸曰言韓非憂説不合為非乎祕曰或曰非謂韓非光曰宋吳本作非憂説之不合非邪今從李本邪余遮切曰説不由道憂也咸曰言説人不以聖人之道此君子之所憂由道而不合非憂也譏本自挾詭憒以説秦咸曰言説人以道而不合則猶仲尼去魯孟軻舍梁何憂之有韓非則不然故所以卒死於説難也祕曰説以道而不見用繫乎時君已則何憂或問哲曰旁明厥思咸曰旁廣厥凡也言凡所思慮廣能明悟而歸諸正者之謂哲祕曰所思皆明也五行傳曰明作哲光曰欲知聖人之道宜廣厥思問行曰旁通厥德動情不能得由一塗由一塗不可以應萬變應萬變而不失其正者惟旁通乎咸曰言凡所立德廣能通逹而貫諸道者之謂行祕曰旁通其德而行之曰行易曰君子以成德為行日可見之行也光曰欲行聖人之道宜廣其德寡見篇咸曰聖人之道嘉善而矜不能故明哲極矣宜矜乎未至者所以寡見之誨次之問明假言周于天地遐逺周徧光曰李宋吳本假作遐今從漢書光謂假當作徧假贊于神明咸曰五經之㫖幽𢎞横度絶于邇言咸曰言幽深𢎞大之間縱横量度之制皆絶去近言始得諸正祕曰贊于神明以通其幽周于天地以範其𢎞縱横制度絶去邇言光曰横者言其廣度猶度絶言其髙絶于近言言去之遼邈也譔寡見祕曰述聖人遐逺之言以悟淺近之惑光曰疾世人蔽於近小而遺其逺大吾寡見人之好假者也邇文之視邇言之聽假則偭焉祕曰遐一本作假古字也我寡見人之好逺者惟邇文則視邇言則聽至於論遐逺之道則背焉所謂舛馳者也偭背也離騷曰偭規矩而改錯光曰偭邇箭彌兖二切或曰曷若兹之甚也先王之道滿門言此談過也學先王之道者亦滿門耳光曰言學先王之道者所在滿於師門不為少曰不得已也得已則已矣祕曰時有䇿試選補故學者不獲已也如得已則各至其所至矣所至邇文邇言光曰宋吳本作得已則至矣今從李本得已而不已者寡哉夫以䇿試而後學者為官也得不䇿試而好學者為己也為己之學也内為官之學也外外之與内由南之與北相去甚逺是以慨其少也祕曰不為補試而不已於聖人之道者寡哉好盡其心於聖人之道者君子也人亦有好盡其心矣未必聖人之道也咸曰盡心於異端揚子所疾也祕曰不入于韓莊則入于楊墨多聞見而識乎正道者至識也祕曰一槩諸聖多聞見而識乎邪道者迷識也君子多聞見而心愈真也小人多聞見而情愈偽也祕曰學非而博如賢人謀之美也詘人而從道咸曰美善也猶仲尼夾谷之㑹屈齊侯去裔夷之樂從盟好之會光曰詘與屈同如往也往就賢人謀之則彼將屈人之心以從正道如小人謀之不美也詘道以從人咸曰猶商鞅屈帝王之道從秦孝公以强國之術祕曰謀為國君謀也或問五經有辯乎曰惟五經為辯説天者莫辯乎易惟變所適應四時之宜祕曰天有五行六子十數三才備乎易説事者莫辯乎書尚書可論政事祕曰二帝之德三王之業政事隆殺備乎書説體者莫辯乎禮咸曰事之體也祕曰經三百儀三千各正其體者備乎禮光曰禮主上下之體説志者莫辯乎詩在心為志發言為詩祕曰四始六義發揚其志者備乎詩説理者莫辯乎春秋屬辭比事之義祕曰傳體有三例情有五不失其理者備乎春秋光曰明事理之是非捨斯辯亦小矣咸曰捨五經皆小説也光曰宋吳本辯皆作辨今從李本春木之芚兮援我手之鶉兮春木芚然而生譬若孔氏啓導人心有似援手而進咸曰芚猶盛也鶉猶美也祕曰天氣之春使羣木芚然而盛孔子之道使羣士翕然而興援我手相與游處之鶉乎而安之鶉猶言淳也莊子曰聖人鶉居而鷇食尸子曰堯鶉居光曰李本芚作芒今從宋吳本芚徒渾切援音爰去之五百嵗其人若存兮咸曰言去仲尼雖逺而其人如在祕曰去孔子已五百年服行其道常如存在按孔子以魯哀十六年卒至漢甘露元年子雲始生凡四百二十八嵗後天鳳五年子雲卒去孔子凡四百九十八嵗言五百嵗者舉其成數或曰譊譊者天下皆訟也奚其存祕曰今之學者譊譊然爭訟其道之是非也何謂若存譊譊爭聲也光曰李本訟作説今從宋吳本譊女交切曰曼是為也天下之亡聖也久矣其義雖存言天下無復能尊用聖道者乆矣咸曰曼猶不也亡猶去也久猶逺也不是為猶徒是為也言譊譊者徒是為天下雖去聖人逺然其道尚存安能亂哉祕曰曼無也今之學者無如是為之也以其去聖逾逺而不能自悟故也光曰音義曰曼莫半切曼是為者言無能求其是者而從之天下之無聖人已乆矣故衆説無所折衷相與爭訟呱呱之子各識其親祕曰無他知光曰呱音孤譊譊之學各習其師祕曰但然其師而已非師則爭班固曰安其所習毁所不見終以自蔽此學者之大患也精而精之是在其中矣咸曰赤子雖識親因其愛而不知禮之序末學雖習師溺其説而不明道之正然苟能精而益精之則聖與雜其道當各辨於其中矣若秦儀荀孟皎然自殊祕曰精是者是精之精非者非精之各在其中矣光曰宋吳本是作各今從李本聖人之道布在方䇿賢者得其大不賢者得其小各得其一端而不能粹美若有人精心以求其是不離其中矣或曰良玉不彫美言不文何謂也曰玉不彫璵璠不作器祕曰璵璠寳玉也器圭璧書曰如五器卒乃復周禮曰玉作六器以禮天地四方光曰璵以諸切璠符袁切言不文典謨不作經祕曰言之有文如天之有象易曰觀乎天文以察時變觀乎人文以化成天下仲尼祖述堯舜之文其典謨所以作經光曰言文之不可以已虎豹之鞹猶犬羊之鞹或問司馬子長有言曰五經不如老子之約也當年不能極其變終身不能究其業祕曰司馬遷以儒者以六藝為法六藝經傳以千萬數累世不能明其學當年不能究其理故曰博而寡要勞而少功言道家以㫖約而易操事小而功多是謂不如老子之約也班固曰論大道則先黄老而後六經此其所蔽也曰若是則周公惑孔子賊祕曰果如是言則周孔非惑則賊矣古者之學耕且養三年通一經無訓解故光曰李本無經字今從宋吳本今之學也非獨為之華藻也又從而繡其鞶帨惡在老不老也鞶大帶也帨佩巾也衣有華藻文繡書有經傳訓解也文繡之衣服分明易察訓解之書灼然易曉祕曰鞶大帶也帨佩巾也所以備物而為飾也言古之學者存其大體所以易也今之學者有經傳章句如華藻繡鞶帨其文彌繁所以難也安在老易而不老難哉班固曰古之學者耕且養三年而通一藝存其大體玩經文而已是故用日少而畜德多三十而五經立也後世經傳既已􅆾離博學者又不思多聞闕疑之義而務碎義逃難便辭巧説破壊形體説五字之文至於二三萬言桓譚新論云秦近君能記堯典篇目兩字之説至十萬言但説曰若稽古三萬言光曰鞶音盤帨音税惡音烏鞶帨已是外飾又從而繡之言章句華多實少或曰學者之説可約邪疾夫説學繁多故欲約省之也曰可約解科言自可令約省爾但當使得其義㫖不失其科條祕曰可以約解科之章句令不繁光曰解科闕或曰君子聽聲乎曰君子惟正之聽亦聽爾但不邪荒乎淫佛乎正沉而樂者君子弗聽也佛違也沉溺也學記曰其求之也佛子夏曰今君之所好者其溺音乎光曰樂音洛或問侍君子以博乎祕曰博弈曰侍坐則聽言有酒則觀禮焉事博乎咸曰言君子坐則有正言飲則有正禮侍之者得聽而觀焉何事於博弈光曰焉於䖍切或曰不有博弈者乎咸曰謂君子言禮之外豈無博弈之事乎祕曰據論語有之曰為之猶賢於已爾今之所論自謂侍君子也咸曰此文本連下句意未終不當於此註之兼註語大與正文不類頗失揚㫖弗敢削去解之於下侍君子者賢於已乎咸曰賢猶勝也言為博弈者但勝於無所用心而已爾夫侍君子亦止勝於無所用心而已乎言不然也祕曰孔子曰飽食終日無所用心難矣哉不有博弈者乎為之猶賢乎已盖為庸常不學之人以小道諭之耳今侍君子豈賢乎已於博弈者哉光曰已者止而不為君子不可得而侍也人師難逢也侍君子晦斯光窒斯通祕曰窒塞亡斯有辱斯榮敗斯成如之何賢於已也咸曰言但患君子不可得而侍如得侍之有此諸益豈特勝於無所用心而已哉光曰宋吳本有作存今從李本鷦明冲天不在六翮乎咸曰鷦明解見問明篇祕曰翮翼之勁羽光曰明亦當作朋拔而傅尸鳩其累矣夫拔鷦明之翼以傅尸鳩不能冲天適足以累耳諭授小人以大位而不能成大功也又言學小説不能成大儒祕曰尸鳩鴶鵴也言以聖人之道使小人行之適足増其累耳光曰累鄰墜切小人儒竊聖人之道以自售適足以為其身之累耳雷震乎天風薄乎山雲徂乎方雨流乎淵其事矣乎言此皆天之事矣人不得無事也天事雷風雲雨人事詩書禮樂也祕曰此皆天之行事者乎自然之理也道家流以無為無事為自然不知有為有事亦自然也徂往也方四方也光曰天猶不能無事况在於人安得飽食終日無所用心魏武侯與吳起浮於西河寶河山之固起曰在德不在固曰美哉言乎使起之兵每如斯則太公何以加諸祕曰史記魏武侯曰美哉山河之固此乃魏之寶也吳起曰在德不在險昔三苗氏左洞庭右彭蠡德義不修禹滅之夏桀之居左河濟右太華伊闕在其南羊腸在其北修政不仁湯放之殷紂之國左孟門右太行常山在其北大河經其南修政不德武王殺之由此觀之在德不在險武侯曰善固險固也美哉是言使起兵法常以德為主則太公吕望何以加之光曰李本作使起之用兵今從宋吳本惜起之用兵多尚狙詐不能充其言也或問周寶九鼎寶乎祕曰即禹貢金九牧所鑄之鼎成王定于郟鄏故為周寶曰器寶也器寶待人而後寶道存則器不亡道亡則器不存祕曰人君有德則鼎器為寶光曰人能以休明之德取之則信可寶矣苟以姦回强暴而取之雖得九鼎奚足寶哉齊桓晉文已下至於秦兼其無觀已咸曰孟子云仲尼之徒無道桓文之事者故此言其與秦皆無所可觀也祕曰二霸而後至于秦兼六國而有天下無所觀焉已辭也光曰言皆尚詐力不以其道而得之雖强大無足觀也或曰秦無觀奚其兼咸曰言秦無以可觀則何以能兼有天下曰所謂觀觀德也咸曰言所謂可觀者觀其德爾秦何德之有如觀兵開闢以來未有秦也秦以兵兼而不以德莽以詐篡而不以道言秦兵之無可觀則莽之篡不言可知咸曰此正文之意似止論秦兵之由而注兼王莽亦猶蛇足矣且云莽以詐篡不以道夫豈有以道篡人哉甚非謂焉祕曰賈誼曰秦有餘力而制其弊追亡逐北伏尸百萬流血漂櫓兵之盛也光曰自古未有能以兵力獨兼天下如秦者或問魯用儒而削何也揚子貴儒學而賤兵强魯國常為齊楚所侵故譏問之祕曰削土國弱也光曰儒必言益人之國何魯多儒而日削弱曰魯不用儒也昔在姬公用於周而四海皇皇奠枕于京皇皇歸美安枕而卧以聽於京師祕曰皇皇美也奠定也定枕猶言安枕也四海皇皇美盛安枕無虞歸仰于京師光曰四海既平則王者安枕于京師孔子用於魯齊人章章歸其侵疆祕曰章章宜為慞慞盖古通用也慞慞懼也魯定公十年與齊景公為夾谷之會孔子攝相事景公懼遂歸所侵魯鄆讙龜隂之田魯不用真儒故也祕曰齊人歸女樂季桓子使定公受之三日不朝孔子行言不聽用孔子故也如用真儒無敵於天下安得削萬物將自賔祕曰孔子使魯安行王道而諸侯强者霸業而已是無敵於天下浩浩之海濟樓航之力也濟渡也言渡大海在舟船興大治在禮樂光曰濟謂所以得濟航人無楫如航何祕曰濟巨航者大海也如無楫柁之利以翼之其如航何猶富大國者衆民也如無禮樂之其以治之其如國何光曰海以喻艱難航以喻國航人以喻儒楫以喻勢位或曰奔壘之車沉流之航可乎言治國及修身者如車奔舟覆故欲救之祕曰車之奔敗航之沉溺光曰奔壘謂馬驚逸抵敵壘者可謂可救乎曰否咸曰言用奔沉之車航則不可祕曰不可也或曰焉用智夫智者貴能解患救難也今有患難不能解救故曰焉用智曰用智於未奔沉言奔沉吾猶人也必也使無奔沉祕曰智者用於未然之前光曰制治於未亂保邦於未危大寒而後索衣裘不亦晚乎御災在於未發思患在乎預防光曰言不足以為智乘國者其如乘航乎航安則人斯安矣航傾則人危法亂則國亡祕曰航安則其流安矣國安則其人安矣惠以厚下民忘其死咸曰言君以恩惠厚養其下則民忘其死以報之忠以衞上君念其賞咸曰言臣以忠勞衞翼其上則君思行其賞以及之祕曰言速報之効也自後者人先之自下者人髙之欲上必以其言下之欲先必以其身後之處上而民不重在前而民不害誠哉是言也祕曰謙之尊也光曰言志不在於取而自得之乃可貴也或曰𢎞羊㩁利而國用足盍㩁諸祕曰漢武以桑𢎞羊領大農盡管天下鹽鐵盡籠天下貨物而均輸平准之一嵗之中帛五百萬匹人不益賦而天下用饒故曰國用足曰譬諸父子為人父而㩁其子縱利如子何有若譏十二之税揚子貶㩁利之例祕曰子足父孰與不足卜式之云不亦匡乎祕曰匡正也時大旱卜式曰獨請烹𢎞羊天乃大雨式之所云不亦大正之乎或曰因秦之法清而行之亦可以致平乎曰譬諸琴瑟鄭衞調俾䕫因之亦不可以致簫韶矣祕曰秦毁滅禮義專任刑法譬如琴瑟作鄭衞之調而使䕫因以鼔之不能致正聲矣言慘酷之法不可以致和平也韶舜樂也晁錯曰秦法令煩慘刑罰暴酷䕫曰簫韶九成鳳皇來儀光曰調徒弔切言必應更張或問處秦之世抱周之書益乎咸曰李斯上言請史官非秦記皆燒之所不去者醫藥卜筮種樹之書故時獨得存其周易而已此抱周書者盖易也言人有居秦之世獨抱周之易可益乎祕曰周之書若周禮周樂周書周頌周易春秋之類傳曰韓宣子適魯見易象與春秋曰周禮盡在魯矣曰舉世寒貂狐不亦燠乎貂狐之裘於體温燠咸曰言貂狐一裘於體雖燠不能救天下之寒周易一經於時雖存不能勝天下之暴祕曰舉世方寒服貂裘狐裘之衣亦可以禦寒而迴燠猶秦世之酷抱禮義之敎亦可以漸迴正治光曰天下無道而獨得先王之術可以自治矣或曰炎之以火沃之以湯燠亦燠矣言秦燒詩書坑儒士於湯火之中但苦太熱耳此謂或人戲嘲揚子辭祕曰何必貂狐之為燠若用湯火亦燠矣猶言何必周書之為治若用刑法亦可治矣光曰言用秦之法以治秦之民亦孰敢不從曰燠哉燠哉時亦有寒者矣歎其秦之無道也時亦有寒者謂四皓隠居尸子避地斯皆清涼其身不燠秦之湯火祕曰歎湯火之燠非所謂燠也天時自有大寒矣光曰言雖不得已一時暫從而中心不服終致乖亂非其時而望之非其道而行之亦不可以至矣天由其時人由其道非時之夏望之不可見非道之正行之不可至祕曰非其夏時而以湯火望其燠非其正道而以刑法行其政至治不可以至矣言秦法一時之利非素治也光曰用秦之法以求治猶冬而望生春而望穫之燕而南適楚而北終不能致秦之有司負秦之法度秦法酷矣吏又毒之祕曰秦之法度本以刑罰决斷為本而秦之有司乃以慘酷為能是負其法度矣刑法志曰秦專任刑罰躬操文墨晝斷獄夜理書自程决事曰縣石之一光曰秦法雖酷亦志在於求治而有司又為文巧以亂之秦之法度負聖人之法度祕曰聖人以禮義為法度是負之矣秦宏違天地之道而天地違秦亦宏矣咸曰言天地以生育為本秦以殺戮為本是違天地亦大矣秦欲以萬世君之天地止以二世滅之是違秦亦大矣祕曰天地生五行之性而仁義禮智信備矣秦毁滅之專任刑法是大違天地也秦自以為闗中之固金城千里子孫帝王萬世之業也止二世而亡是天地違秦亦大矣刑法志曰秦始皇兼吞戰國遂毁先王之法滅禮誼之官揚子法言卷五
