body:
  text: 揚子法言卷六晉李軌唐柳宗元註宋宋咸呉祕司馬光重添註五百篇咸曰矜其未至而誘之自非聖人則孰能與於世故五百之義次之寡見聖人聰明淵懿繼天測靈咸曰靈萬靈也言天有泰否聖有出没皆不常然故聖人之岀没繼天道之否泰所以測濟萬靈者也祕曰神靈冠乎羣倫經諸範範模咸曰倫品也範猶制度也言聖人之生冠於羣品經緯以制度而為天下利祕曰至聖之著存乎軌範光曰聖人以聰明深美之徳繼成上天之功測知神靈之理首出羣類立之法度以為萬世之常道譔五百祕曰麟鳯不常出聖人不常生或如三辰之並照或如一天之獨乆能存其道則墻奥可量哉光曰明聖人之道或問五百嵗而聖人出有諸孟軻史遷皆有此言祕曰趙岐言五百嵗聖人一出天道之常也曰堯舜禹君臣也而並光曰並世文武周公父子也而處光曰同處湯孔子數百嵗而生光曰湯上距禹下距文王孔子上距周公皆數百嵗因往以推來雖千一不可知也千嵗一人一嵗千人不可知也祕曰堯舜禹三聖相並後數百年始生湯文武周公三聖同處後數百年始生孔子先則比年而三聖後則逺年而一聖因往以推來雖千年一聖亦未可知也夏后氏有國四百三十二嵗而湯興周有國五百七十二嵗而孔子生聖人有以擬天地而叅諸身乎禀天地精靈合德齊明是以首擬天腹擬地四肢合四時五藏合五行動如風雷言成文章也咸曰夫天地之道或㤗而通或否而塞㤗則萬物阜否則萬化閼弗一而常也夫聖人之道或生而出或亡而絶出則萬物遂絶則萬化滅亦弗一而常也是故天地不常秦亦不常否聖人不常出亦不常絶楊子因上論聖人之生有以合天地之化遂為之言爾註以别為一義且云首擬天腹擬地以形體解之甚失揚㫖矣夫人之冇血氣形體首圓象天足方象地至於肢藏各有所法雖庸愚者皆然豈獨聖人哉學者宜辨之祕曰聖人有以擬法天地而叅乎言行也管子曰聖人若天然無私覆也若地然無私載也禮曰譬如天地之無不持載無不覆燾皆言聖人之道也光曰言德與天地叅者則為聖人無疏數之期也或問聖人有詘乎咸曰問有所詘身之事光曰詘與屈同曰有曰焉詘乎咸曰焉安也言安所詘曰仲尼於南子所不欲見也祕曰南子衛靈公夫人也孔子本不欲見也於陽虎所不欲敬也祕曰陽虎陽貨為季氏家臣專魯之政孔子本不欲敬也見所不見敬所不敬不詘如何祕曰孔子見其本不欲見者欲使靈公行治道也敬其本不欲敬者如有用我者吾其為東周乎是欲詘身以行道語曰子見南子又曰時其亡也而往拜之或曰衛靈公問陳則何以不詘祕曰不詘謂不順從靈公而對以爼豆之事光曰陳直刄切曰詘身將以信道也如詘道而信身雖天下不可為也仲尼之敬陽虎楊子之臣王莽所詘形也於神何時撓哉諸如此例學者宜識其㫖咸曰信讀如屈伸之伸言見南子陽虎是身也雖詘之可矣於道何損對靈公是道也將詘之可乎雖得天下不當為矣故孔子曰君子之行已可以詘則詘可以伸則伸楊子之於事莽亦斯之謂乎光曰信與伸同雖利之以天下猶不可為詘道伸身之事聖人重其道而輕其禄衆人輕其道而重其禄聖人曰於道行歟衆人曰於禄殖歟聖人以行道為務凡人以禄殖為先光曰殖豐多也昔者齊魯有大臣史失其名以道事君不可則止為大臣也史失其名者不書其名也曰如何其大也曰叔孫通欲制君臣之儀徴先生於齊魯所不能致者二人髙帝時叔孫通為奉常欲制君臣之禮乘亂之餘權時之制不合聖典雖盡其美未盡其善故不能致之祕曰叔孫通為漢髙起朝儀召魯諸生三十餘人魯有兩生不肯行曰又欲起禮樂禮樂所由起積德百年而後可興也吾不忍為公所為不合古吾不行公往矣毋汙我通笑曰若真鄙儒也不知時變遷固二史皆曰魯有兩生而楊謂齊魯豈其接近而言哉光曰先生謂宿儒曰若是則仲尼之開跡諸侯也非邪咸曰開謂開布其跡於諸侯之國祕曰若以二生為是則仲尼欲行教於諸侯非歟開開説其君臣之義跡跡述其禮儀之制光曰或難楊子以齊魯二生知道不行而不起為是則仲尼之歴聘為非邪曰仲尼開跡將以自用也欲行其道制素法也祕曰欲行已之道合於聖人之法如委已而從人雖有規矩凖繩焉得而用之咸曰規矩凖繩猶制度也言委已而從人則雖有制度不得專而用之故二人所以不至也如孔子則不然祕曰通制漢儀得墮時之義而楊獨許此二生者盖善其惡叔孫之面諛而雜用秦儀且欲自明揚之志不隨莽改作也光曰二生所守三王之禮而叔孫通阿諛希世雜用秦儀若起則當委已而從之安得自用其道也或問孔子之時諸侯有知其聖者歟曰知之曰知之則曷為不用曰不能曰知聖而不能用也可得聞乎曰用之則宜從之祕曰用其人當從其道從之則棄其所習光曰習謂故常所安逆其所順光曰順謂情志所欲彊其所劣光曰彊其亮切劣謂彼所難能捐其所能咸曰夫子所習者正彼所習者不正故當棄之夫子所順者道彼所順者非道故當逆之夫子所劣者非彼所劣者是故當彊之夫子所能者德彼所能者不德故當捐之祕曰既從聖人之道則諸侯習其異聞者棄之順非而澤者逆之劣於仁義者彊之以攻戰聚歛為能者捐之是之謂能用之光曰捐與專切能謂心所素有衝衝如也光曰心相逆鬭之貎非天下之至德孰能用之咸曰衝衝猶多也言諸侯如是者多矣安能用之祕曰當時諸侯衝衝然非有天下之至德至道誰能用之哉光曰李宋呉本皆無德字音義稱天復本有之今從之至德謂至明之德也或問孔子知其道之不用也則載而惡乎之欲知載道術何所之詣祕曰何所之乎光曰惡音烏曰之後世君子許來哲祕曰與諸後世之王者禮運曰禹湯文武成王周公由此其選也此六君子者未有不謹於禮者也光曰俟後之聖賢必有能用其道者曰賈如是不亦鈍乎言畜貨以遺後畜道俟將來是遲鈍祕曰譬如賈之不售光曰賈音古言行道者貴於及身乃載以遺後世譬諸為賈求利者如此不亦鈍乎曰衆人愈利而後鈍咸曰邪道苟合久而益非祕曰行一切之利不可經世聖人愈鈍而後利咸曰正德不偶乆而益光祕曰初不苟合乆而利博光曰言利愈近則愈小愈逺則愈大闗百聖而不慙祕曰闗猶言管也荀子曰天下之道管是矣百王之法一是矣楊倞曰管樞要也光曰孔子之道雖經百聖不可易蔽天地而不耻咸曰蔽猶塞也言道塞於天地而無所愧光曰蔽當作弊終也能言之類莫能加也祕曰自生民以來未有如夫子也光曰為衆説郛貴無敵富無倫光曰堯舜所不能踰利孰大焉祕曰他貴以位而富以財聖人貴以道而富以教無倫敵矣利及萬世非大而何光曰範圍天地曲成萬物或曰孔子之道不可小歟嫌孔子大其道故當其時不能見用曰小則敗聖如何祕曰小道害聖如之何可小光曰音義曰天復本無如何字今從李宋吳本曰若是則何為去乎咸曰言不見用則已何去魯去衞之為乎光曰道既不可小則所如不合何必去父母之邦曰愛日祕曰欲及時急於行道曰愛日而去何也咸曰言欲及時施道則止魯可矣何去之祕曰去魯光曰留魯而化之則收効彌逺曰由羣婢之故也不聽正諫而不用噫者吾於觀庸邪無為飽食安坐而懕觀也齊人歸女樂季桓子受之三日不聽朝政諫而不用於是遂行咸曰孔子相魯齊人懼而欲敗其政選齊國中女子好者八十人皆衣文衣而舞容璣文馬三十駟以遺魯君季桓子語魯君為周道游觀終日怠於政事子路曰夫子可行矣孔子曰魯今且郊如致膰乎大夫則吾猶可以止桓子卒受之三日不聽政郊又不致膰爼於大夫遂行而師已送之曰夫子則非罪也孔子曰吾歌可乎歌曰彼婦之口可以出走彼婦之謁可以死敗優哉游哉聊以卒嵗師已反歌桓子曰孔子亦何言師已以實告桓子曰夫子罪我以羣婢故也不聽正當作不聽政字之誤也雉噫猶歌歎之聲梁鴻五噫之類也庸邪謂女樂也言仲尼所以雉噫然歌之而去者盖不能飽食安坐懕觀庸邪之樂欲愛日汲汲於施道也光曰宋吳本作不用雉噫者今從李本無雉字正與政同懕一塩反季桓子受齊女樂不聽政孔子諫不用乃嘆曰吾為大夫豈可坐觀其政亂民困邪故去之佗國觀庸闕由此觀之夫子之日亦愛矣惜寸隂光曰知已道必不行於魯故汲汲去之他國或曰君子愛日乎祕曰君子必如夫子愛日乎曰君子仕則欲行其義居則欲彰其道祕曰仕則欲道之行居則欲道之著光曰居處不仕事不懕教不倦焉得日日不暇給咸曰言不廢一晷安得餘日而愛之或問其有繼周者雖百世可知也秦已繼周矣不待夏禮而治者其不驗乎祕曰孔子言殷因於夏禮周因於殷禮三代損益相因若循環而繼周者宜復用夏禮矣秦不用而治是聖人之言無驗乎曰聖人之言天也咸曰聖人之所言者天命也如五運正統者爾故能相因而損益天妄乎祕曰聖人之言天意也聖言不驗豈天或妄乎無妄也言暴亂者非天意也光曰聖人之言譬如天天運行有常豈妄動乎繼周者未欲泰平也咸曰妄忘也天似未欲天下之平而忘乎命聖人以繼周故秦非正統偶因暴而得之也祕曰秦不用三代之禮是未欲太平也如欲泰平也捨之而用佗道亦無由至矣暴秦之繼周王莽之簒漢臧獲猶將悼之賢者能無慨歎乎咸曰佗道謂邪道指秦政也言天如欲天下之平則捨秦而立用聖人矣用聖人則秦之邪道亦無由至矣今註辭殊不據文釋之但引王莽比秦似非正文之意夫王莽簒也而秦并天下其可謂簒邪秦與王莽暴則同矣而其所取異焉祕曰如秦之意亦欲泰平也捨禮而用刑法亦無由至也赫赫乎日出之光羣目之用也渾渾乎聖人之道羣心之用也祕曰羣目非日光無以辨色羣心非聖道無以表正光曰渾户昆胡本二切目因日光然後能有見心因聖道然後能有知渾渾廣大疏通之貎或問天地簡易而聖人法之何五經之支離嫌難了咸曰支離猶委曲也祕曰支離猶言分散也各有科條分散而難通光曰支離猶扶疎繁多之貎曰支離葢其所以為簡易也支離分别之而後朗然事得簡易祕曰五經分散各有科條使人㳂波討源然後知聖人之道法天地之簡易也已簡已易焉支焉離既簡既易乃是混茫之初焉支焉離言不可了也咸曰言天地之道闢闔舒􅃤是亦先委曲經營而後至於無為五經之文浩博祕奥亦先委曲分别而後至於易了如其已自簡已自易則安用支安用離祕曰已逹聖人之道何支離之有光曰道之未明故支離以明之道之既明則坦然簡易安用支離也言經者所以明道既明則經不繁矣或曰聖人無益於庸也祕曰庸用也老子有絶聖棄智之言故曰無益於用據漢尚黄老而司馬談班固之徒各稱老嚴之妙而詆訾聖人是以或人問難多此類也曰世人之益者倉廪也取之如單有時而盡光曰倉廪雖於人有近益而所藏不多仲尼神明也小以成小大以成大雖山川邱陵草木鳥獸裕如也學其道者大小各隨其本量而取足祕曰神者所以用乾坤六子而生萬物者也聖人之道神明之道也得其小大各有所成而無所窮盡裕如也光曰神明造化也生物無窮裕如有餘貎如不用也神明亦末如之何矣神明有所不及聖人有所不訓祕曰如有固背之而不用亦猶草木鳥獸斸之齧之使不得遂其生雖神明亦無如之何也光曰頑石朽木造化所不能移昬君愚人聖人所不能益或問聖人占天乎曰占天地言能占之祕曰孔安國曰無事不通謂之聖光曰仰觀象俯觀法若此則史也何異曰史以天占人聖人以人占天聖人以人占天者先乎天也史以天占人者後乎天也大聖先天而天不違良史後天而奉天時知其所先後則天人之情得矣祕曰以天占人者觀天以見人事也以人占天者因人以知天意也光曰史考察象數知人事之吉凶聖人修人事知天道不能違或問星有甘石何如祕曰或人復問史之尤著者善於占星晉志曰諸侯之史齊有甘德魏有石申夫皆掌著天文各論圖驗其巫咸甘石之説後代所宗曰在德不在星德隆則晷星星隆則晷德也咸曰晷影也猶影蔽之也隆尚也言隆尚於德則影蔽星晷隆尚於星則影蔽德業祕曰晷規也星之妖瑞不虚發應有德無德之隆盛亦規德而已光曰晷影也影從形者也德崇則星從而祥星崇則德從而壊或問大人曰無事於小為大人賢者志大之謂祕曰小小道請問小曰事非禮義為小尚志在乎禮義大人之事備矣光曰治禮義則餘無不治者所以為大聖人之言逺如天天懸象著明而人不能察聖人設教施令而人不能究賢人之言近如地山川澤田之形可得而鑒光曰天髙逺不可及地雖近亦承天而時行瓏􅌑其聲者其質玉乎玉之瓏􅌑其聲亦猶君子清玲其德音祕曰諭逺近之美孟子曰玉振也者終條理也光曰瓏􅌑宋吳本作􅌑瓏今從李本瓏盧紅切􅌑音靈質美則聲清德充則言善聖人矢口而成言肆筆而成書矢正也肆操也祕曰矢放也肆恣也放口恣筆動成典訓爾雅曰矢弛也郭云弛放言可聞而不可殫書可觀而不可盡性與天道祕曰所以逺如天光曰聖人縱心所欲皆合於道不可殫盡言深逺也周之人多行貴尚德義仁人得行其道咸曰正文但云周之人是統言衆人矣而注為仁人得行其道况衆人者非能行道若以為仁人則又與正文相反非揚㫖也此盖言周盛王道禁網疏闊商賈之人皆得謗議於市故衆人略無諱忌所行皆可爾秦之人多病道屈沉也咸曰以道屈沉為病又非為衆人安有道可沉哉此言秦法刻密偶語者棄市所忌甚多衆庶之人無措手足動則見病爾行有之也病曼之也行有之者周有德也病曼之者秦無道也咸曰注殊不解行有之病曼之之義但云周有德秦無道即未知行有之病曼之果何語邪甚非謂矣夫行有之者謂他人所敢行天下或有之或無之惟周之人所敢行者天下皆有之言多也病曼之者曼長也言他人所病者或作之或愈之惟秦之人所有病者天下長然言無愈時也祕曰曼無也多行樂於事業而不壅也多病困於刑罰而不蘇也周人所以多行者由君存而有之也秦人所以多病者由君視之如無也刑法志曰秦用商鞅連相坐之法造參夷之誅光曰行下孟切曼莫半切周人多賢行者有聖人之道以教之也秦則無無之故多疵病周之士也貴道泰業隆故尊貴咸曰言周棄邪用賢為貴閑祕曰周之士以德行道藝而升之所以貴光曰於禮樂故可貴秦之士也賤道否人卑故窮賤咸曰言秦棄賢用邪故賤祕曰秦之士以刑法而責成之所以賤光曰習於刑名故可賤周之士也肆肆放任意而道義行咸曰古者天子聽政公卿至於列士皆得獻詩以諫言周無所忌故臣下皆得肆縱直言祕曰肆猶縱恣也縱行公道光曰優游仁義之間秦之士也拘拘制曲從不肆正道咸曰此謂秦以忠諫為妖言或皆族之故臣下無敢議事而拘忌祕曰拘拘束於法光曰動為文罔所制月未望則載魄于西載始也魄光也載魄于西者光始出於西而漸東滿光曰魄當作朏明也明始於西以漸變魄既望則終魄于東光稍虧於西而漸東盡咸曰按周書召誥曰惟丙午朏傳云朏明也月三日明生之名康誥曰惟三月載生魄傳云三月始生魄月十六日明消而魄生是則朏為明魄為晦矣夫月未望者即始生明之時也正文宜曰月未望則載朏于西夫月既望者即始生魄之時也正文故曰既望則終魄于東今未望亦言魄盖字之誤也而註文隨誤强解以魄為光恐失其義光曰明在於東成魄之終其遡於日乎遡迎也言為人臣終始盛衰向迎其君如月迎日天理然也咸曰遡向也夫日行遲一嵗而周天月行速一月而周天故月之行終始皆向日也非有迎日之義其上下弦之時行度近日所以光損而未盛及夫月十五日其行度逺而與日相對望所以光滿而明也猶臣之近君則威損逺君則勢盛揚子上言周秦之士故因論日月之分以明君臣之道當然而秦不然也光曰遡音素月迎日而有光猶臣賴君而有功彤弓黸矢不為有矣以諭有君而無臣咸曰周之制諸侯得賜弓矢然後專征伐故平王東遷晉文侯有安定之功遂賜彤弓一彤矢百玈弓百玈矢千也此言秦之士賤而拘頗失君臣之道則安所用忠而得賜於彤玈弓矢哉故曰不為有矣注謂以諭有君兼臣不連上文失之也光曰黸落胡切與玈同彤弓玈矢人臣之上賞也人臣不得君之任使安能有功故雖受彤弓玈矢之賜未可自謂已功恬而有之也晉平公問齊桓之霸君之力乎臣之力乎師曠曰管仲善斷割隰朋善煎熬賔胥無善齊和羮已熟矣奉而進之而君不食誰能彊之亦其君之力也樂羊㧞中山返而論功魏文侯示之謗書一篋樂羊再拜稽首曰此非臣之功君之力也聆德前世清視在下鑑莫近於斯矣執古以御今御今以古則殷鑒不逺咸曰聆聽也前世謂周秦也下謂士庶也言後之為君者辨聽周秦之䟽闊刻密明視臣庶之行病拘肆則為鑑之道無近於此矣光曰李本聆德作聆聽今從宋吳本前世不可見故云聽臣民今在下故云視或問何如動而見畏曰畏人何如動而見侮曰侮人禍福無門惟人所召咸曰鄭康成云心服曰畏此言畏猶心服而畏敬之也故畏敬於人則人亦畏敬之慢侮於人則人亦慢侮之夫見畏與見侮無不由己我欲仁斯仁至矣或問禮難以彊世言禮事至難難以彊世使行光曰彊其兩切下同世人皆苦禮之拘難以彊之曰難故彊世祕曰禮者君子之所好而世俗之所難也以其難故彊之使過者俯而就之不及者跂而及之光曰以其難故彊使遵之如夷俟倨肆羈角之哺果而㗖之奚其彊咸曰夷俟倨肆皆驕倨之謂也羈角猶總角也傳曰貴不期驕而驕自至是夷俟倨肆不學而能人所易也總角之童哺㗖其果亦易之也設于禮道不難如驕㗖之易則安用彊教於世哉光曰夷俟若原壤者凡剪髮男角女羈謂㓜子也人之箕倨驕慢及㓜子㗖果皆其情所欲何必彊也或性或彊及其名一也性者天然生知之彊者習學以至也雖為小異功業既成其名一也咸曰性者言人之性自然而好禮也彊者言人之所難用使而為禮也性與彊既皆由禮是其為名於行禮同也盖因上文彊禮之論故於此誘之爾註以生知習學之義别為一叚解之非謂矣光曰人或性安於禮或自彊以從禮及其成名一也見弓之張兮弛而不失其良兮弛合或曰何謂也曰擏之而已矣弓良在擏格人良在禮樂咸曰周禮謂擏為正弓之器也言弓之一弛一張而不失其良者以有擏正之也人之一動一靜而不失其善者以有禮制之也此亦因上文而為之言光曰擏居影切川有防器有範見禮教之至也川防禁溢器範檢形以喻禮教人之防範也以舊防為無所用而壊之者必有水敗以舊禮為無所用而去之者必有亂患也祕曰川無防則水為害器無範則人廢業禮教失則禍亂生王制曰用器不中度不鬻於市經營然後知幹楨之克立也幹楨築牆版之屬也言經營宫室立城郭然後知幹楨之能有所立也建宗廟立社稷然後知禮樂之能有所成也莊揚蕩而不法咸曰莊周揚朱之道放蕩而非法墨晏儉而廢禮咸曰墨謂墨家也司馬遷曰墨者儉而難遵晏謂晏嬰也禮曰晏子祀其先人豚肩不掩豆澣衣濯冠以祭是皆不中禮也申韓險而無化祕曰申不害韓非之法傷於險而無教化鄒衍迂而不信迂逥不可承信咸曰鄒衍之術推天地未生及海外山川之事迂誕而不可信也聖人之材天地也覆載與天地合其德祕曰不可逾也光曰無不覆載次山陵川泉也次聖者大賢也髙顯如山陵通潤如川泉光曰得天地之一端佐天地以育物次鳥獸草木也區别各有所長咸曰班固分人為三等演而成九品揚亦以人分較為三等矣上聖人如天地也中賢人如山陵川泉也下庶人如鳥獸草木也夫人之不學以勉為賢則鳥獸草木之流矣有㫖哉揚子之言祕曰衆人也語曰譬諸草木區以别矣馬融曰言大道與小道殊異譬如草木異類區别言學當以次光曰依於山陵川泉以自生所得彌小先知篇咸曰聖人之哲動則先知故次之五百立政鼓衆動化天下莫尚於中和光曰鼔謂鼔舞中和之發在哲民情哲智祕曰五行傳曰哲知也中和之發則民之情偽無不先知中庸曰喜怒哀樂之未發謂之中發而皆中節謂之和中也者天下之大本也和也者天下之逹道也致中和天地位焉萬物育焉光曰哲當作晢晢明也言將發中和之政在先明民情譔先知祕曰聖人逹于事幾吉之先見故能成天下之化光曰論為政之道先知其幾於神乎幾近也神以知來探未兆也逆識先知近於神也光曰幾音機下同敢問先知曰不知答以不知者神悟則先知非問之所及祕曰知之其神乎知其道者其如視舉目便見忽眇緜作昞眇緜逺視咸曰忽輕也眇細也緜逺也昞謂炳然光明也此言先知之道臨事則悟如明目之視忽輕眇細緜逺之物皆炳然而見也注從其如視隔為一句復以眇緜為一事釋之頗失其義光曰宋吳本昞作炳今從李本音丙闕先甲一日易後甲一日難甲者一旬之始已有之祕也先之一日未兆也後之一日已形也夫求福於未兆之前易救禍於已形之後難咸曰甲者教令之始也夫明王之道先令後刑故先甲一日以昭而示之也示之而雖犯猶宥之故曰先一日易也後甲一日以廣而諭之也諭之而尚犯則犯之故曰後一日難也祕曰周禮縣治象之法于象魏使萬民觀治象挾日而歛之鄭司農云從甲至癸謂之挾日凡十日是以易稱先甲三日先庚三日皆為申命令之義夫干有十日自甲至癸皆挾日之義而易獨取甲庚者以甲木主仁而示其寛令也庚金主義而示其嚴令也今夫先見者察民未犯之前先一日申其令則其為治易也如當已犯之後後一日申其令則其為治難也光曰並闕或問何以治國曰立政曰何以立政曰政之本身也身立則政立矣子帥以正孰敢不正或問為政有幾幾要也欲知為政善惡之要祕曰請問其目曰思斁斁厭咸曰言政善則人思慕之政惡則人厭苦之祕曰斁厭也思斁二義而已光曰斁音亦或問思斁曰昔在周公征于東方四國是王王匡咸曰詩云周公東征四國是皇光曰王當為匡詩傳云皇匡也召伯述職蔽芾甘棠其思矣夫祕曰周公旦攝政三監管蔡商及奄之四國叛周公東征三年而歸四國於是從王命也故東山二章言其思也詩云亦可畏也伊可懐也召公奭聽訟於甘棠之下國人思其人美其樹詩云蔽芾甘棠勿翦勿伐皆其思矣光曰召實詔切芾非貴切夫音扶下同齊桓公欲徑陳陳不果内執袁濤塗其斁矣夫伐楚雖美而御師不整故不敢令徑祕曰齊桓公既伐楚而欲徑從陳陳不欲内之故執袁濤塗僖公四年左氏無斁之之文揚據公羊而言也公羊傳曰濤塗謂桓公曰君既服南夷矣何不還師濵海而東服東夷且歸桓公曰諾於是還師濵海而東大䧟于沛澤之中顧而執濤塗古者周公東征則西國怨西征則東國怨桓公假塗于陳而伐楚則陳不欲其反由己者師不正也不脩其師而執濤塗古之人討則不然也光曰内音納嗚呼從政者審其思斁而已矣或問何思何斁光曰何以致之曰老人老孤人孤病者養死者葬男子畝婦人桑之謂思為政如此人所思也祕曰使人各得其所則見思矣若汙人老汙慢祕曰汙辱也光曰汙哀都切屈人孤屈窮祕曰屈抑之病者獨祕曰無所養死者逋祕曰見死者逋逃而不葬光曰逃棄不葬田畝荒杼軸空之謂斁民厭苦也祕曰使人各失其所則見厭矣為政日新或人敢問日新咸曰欲知其㫖曰使之利其仁樂其義咸曰使民以仁為利以義為樂則勤於進矣祕曰博愛為仁則其利彌廣合宜為義則其樂無窮光曰仁義者顯榮故利而樂之厲之以名引之以美咸曰以名譽而勵勸之以美善而引導之則喜於行矣使之陶陶然之謂日新咸曰如是則民欣欣然無怠非日新而何祕曰日日新光曰陶陶喜為善之貎或問民所勤勤苦曰民有三勤曰何哉所謂三勤曰政善而吏惡一勤也光曰不能宣布稱上志吏善而政惡二勤也光曰掣肘不得行其志政吏駢惡三勤也政君也駢並也祕曰駢并也禽獸食人之食土木衣人之帛光曰衣於既切榖人不足於晝絲人不足於夜之謂惡政人君苑囿禽獸故榖人竭力於晝也土木衣綈錦故絲人竭力於夜也晝夜竭力而猶不足是故為惡政聖人文質者也因人才質刻而畫之文而藻之咸曰質者言世之質野如鳥獸草木然聖人因為禮樂制度以文飾之故有别也註謂因人才質刻而畫之無乃不可乎祕曰因其質而文之光曰質者為政之大體也質既美矣又須禮樂以文之周書曰若作梓材既勤樸斵惟其塗丹雘車服以彰之車服等差辨彰貴賤祕曰五車十二衣以彰之藻色以明之藻色輕重顯明尊卑祕曰文藻五色以明之光曰藻色謂文物也彰明上下之體聲音以揚之歌於管絃詠其德美祕曰和鸞玉佩五音六律以揚之詩書以光之載其功德光照後世祕曰頌載其德光顯後世皆所謂文質者也籩豆不陳玉帛不分琴瑟不鏗鐘鼓不耺吾則無以見聖人矣言此諸禮存故得觀聖人祕曰耺鐘鼓之聲也耺與隠聲相近隠訇皆聲也此皆謂質野無文而已光曰李本吳本耺皆作耺于粉切説文云耺有所失也音義曰天復本作耺音云耳中聲也今從之言聖人事業皆在制禮作樂之中也或曰以往聖人之法治將來譬猶膠柱而調瑟有諸曰有之光曰言當隨時制宜曰聖君少而庸君多如獨守仲尼之道是漆也漆甚於膠祕曰漆膠類曰聖人之法未嘗不闗盛衰焉咸曰觀其盛衰以為之㳂革祕曰隨時制宜昔者堯有天下舉大綱命舜禹咸曰大綱猶大道也禪位於舜禹孟子所謂天與賢則與賢也祕曰大綱皇綱也堯命舜舜命禹光曰大綱謂天下之政夏殷周屬其子不膠者卓矣卓逺咸曰夏殷周屬其子孟子所謂天與子則與子也祕曰卓然可見光曰屬音燭唐虞象刑惟明法度彰矣祕曰畫象也何休曰孔子曰三皇設言民不違五帝畫象世順機三王肉刑揆象加漢文令曰盖聞有虞之時畫衣冠異章服以為戮而民不犯光曰揚子以象刑為畫衣冠異章服也夏后肉辟三千不膠者卓矣二帝三王期於存公不恤私也祕曰五刑之屬三千光曰辟步役切堯親九族恊和萬國湯武􅁊􅁊征伐四克由是言之不膠者卓矣人君之跡雖異隨時順宜其道一也祕曰仲尼之道亦二帝三王之道也禮樂征伐自天子所出祕曰道之常也春秋之時齊晉實予不膠者卓矣禮樂征伐當由天子所出而春秋之時天子㣲弱齊桓晉文專命征討然其所為皆尊王室故春秋公羊傳文雖不予而實予之存於公正也祕曰予與與同春秋之時齊晉得專征伐者盖前王與之爾僖四年傳管仲曰昔召康公命我先君太公曰五侯九伯女實征之以夾輔周室周制諸侯有大功賜弓矢然後專征平王賜晉文侯彤弓一彤矢百黸弓一黸矢百實與者謂孔子刪書而序文侯之命無所黜去則齊亦宜然也自湯武以上稱由是言之明二霸之迹不可繼也或曰人君不可不學律令曰君子為國張其綱紀謹其教化網之有綱紀猶君之有股肱也綱紀張則綱目正股肱良則庶事康導之以仁則下不相賊莅之以㢘則下不相盜臨之以正則下不相詐修之以禮義則下多德讓此君子所當學也如有犯法則司獄在執契而已祕曰各有司存或苦亂苦患祕曰或人以任有司苦患其紊亂曰綱紀綱紀然後綱目正祕曰提其綱正其紀則有條而不紊光曰自天子至於庶人上下相承如身使臂臂使指曰惡在於綱紀光曰惡音烏下同曰大作綱小作紀網賴綱紀君任輔佐光曰天子為四方之綱諸侯為一國之綱卿大夫士各紀其職亂何自生如綱不綱紀不紀謂失綱紀之任雖有羅網惡得一目而正諸網無綱紀目不正君無股肱國不治祕曰王者之教化也仁㢘禮義為其綱以紏之則百辟自正或曰齊得夷吾而霸仲尼曰小器祕曰管仲之器小哉請問大器曰大器其猶規矩凖繩乎先自治而後治人之謂大器夫以規矩凖繩而能使上下無猜者大器也大器者必籠沓羣疑之表莫得與之爭量也管子相桓公不能以之自固三歸反坫然後獲安祕曰規矩先自圓方凖繩先自平直然後能為器器出於是大器者也管子不知禮安能以禮正國哉或曰正國何先曰躬工人績躬身也工官也言先正身以臨百官次乃覺察其人考其勲績也光曰工巧則績善工拙則績惡言當先正其身然後正人或曰為政先殺後教光曰言當先使民畏威然後可教曰嗚呼嗚呼駭歎之聲天先秋而後春乎將先春而後秋乎天道先春後秋以成嵗為政先令後誅以成治吾見𤣥駒之步𤣥駒蚍蜉子也雉之晨雊也雊鳴化其可以已矣哉感陽應節自然之化化之所感有自來矣祕曰聖人之教化亦非强為之盖順春秋自然之道先教不從而後刑焉聖王奉若天道牧之而已譬如螘之能行雉之晨雊蟲之㣲者非教化之所及所以然者天道自然先化之耳斯為政所以先教也步行也崔豹古今註云螘曰𤣥駒光曰宋吳本已作成今從李本螘出蟄而行雉之朝雊皆春候也天以陽氣薫蒸萬物而成春聖人以道德陶染百姓而成化故見春物而知教化安可以已哉民可使覿德是以堯舜之民比屋可封不可使覿刑是以桀紂之民比屋可誅祕曰王者可以德示民而不可以刑示民亦先德後刑之義也在易坎險為刑而象曰王公設險以守其國隠刑言險是不可顯示於人此聖人深㫖也爾雅曰坎律銓也郭云易坎卦主法法律皆所以銓量輕重覿德則純覿刑則亂祕曰觀德則民歸厚故純觀刑則民生偽故亂象龍之致雨也難矣哉象似也言畫繒刻木以為龍而求致雨則不可得也曰龍乎龍乎難非真龍真龍而後能致雲雨明君而後道化行也祕曰言龍非其然乎真龍然後雲行雨施若大旱非有傅説賢明之實者豈能為霖雨哉光曰言非龍也為政者當務實不可以文飾致治或問政核咸曰核實也問為政之實光曰核下革切謂精確得其實曰真偽用真人逺佞偽真偽則政核善善明則真人顯惡惡著則佞偽息真偽審則政事核也祕曰真真而偽偽則政得其實光曰真偽真偽當作真真偽偽古書多然如真不真偽不偽則政事不核北面之禍南面之賊也祕曰真偽而偽真則政事不實鼓舞萬物者其雷風乎鼓舞萬民者其號令乎天以雷風鼓舞萬物君以號令制御萬民雷不一三令五申風不再制無二也祕曰雷發則羣蟄皆起雷收則羣蟄坯户不主於一者也春風至則萬物皆生秋風至則萬物皆落不俟乎再者也猶王者號令一出天下大同大同則何一之有一出則何再之有光曰一再言其少洊雷隨風乃能動物三令五申乃能齊衆聖人樂天咸曰聖人知天命遇與否皆樂焉陶成天下之化使人有士君子之器者也咸曰言明道立教使天下皆成其器猶陶甄者隨小大而制之祕曰陶者無模範則泥不成器聖人無禮制則人不成君子光曰宋吳本樂下有天字今從李本故不遁于世不離于羣咸曰故仲尼惶惶于宋鄭之郊孟子區區於齊梁之間者盖此也祕曰所謂樂天光曰離力智切遁離者是聖人乎祕曰傃隠行怪非聖人歟光曰長沮桀溺之徒君子所不與雌之不才其􅆑􅖁矣􅖁敗光曰􅖁音段君之不才其民野矣民之陶化猶泥之在鈞祕曰􅖁謂壊而不化野謂朴而無禮或曰載使子草律載設也草創也祕曰載則也曰吾不如𢎞恭咸曰𢎞恭與石顯皆少坐法腐刑為中尚書漢宣元朝專律令時詭辨以中傷人光曰恭習律令草奏曰吾不如陳湯咸曰陳湯字子山漢成帝朝王鳳奏以為從事中郎幕府事一皆决於湯湯明法令常受人金錢作章奏卒以此敗光曰湯善草奏曰何為曰必也律不犯奏不剡論語云聽訟吾猶人也必也使無訟乎此亦言當以純德化之使不犯律不剡奏也光曰剡以冉切甄陶天下者其在和乎咸曰和謂剛柔得所剛則甈柔則坯甈燥也坯慢也言失和也夫陶者失剛柔之和則不成器為政失寛猛之中則不成治咸曰甈破瓦又破甖也坯怌恐也言陶法太剛則破裂太柔則恐弱而不能成光曰宋吳本坯作怌今從李木甄居延切甈五計切坯鋪回切坯土踈慢不黏也言甄者和土剛柔之齊太剛則破裂太柔則踈慢治天下亦猶是也龍之􅅗亢不獲其中矣初九􅅗龍勿用上九亢龍有悔祕曰天地以中為用是以過中則惕九三居下卦之上過其中則夕惕也不及中則躍九四居上卦之下不及中故躍淵其近於中乎二五得中故有利見之吉光曰以其惕躍故近中愈於􅅗亢聖人之道譬猶日之中矣光被四表祕曰聖人之道中道也故於乾於日無不在中不及則未不及則未盛明過則呉日呉明盡言昬昧也什一天下之正也什一税民天下之中賦正法也多則桀寡則貉公羊傳曰多乎什一大桀小桀寡乎什一大貉小貉光曰貉莫白反井田之田田也謂古八家是治宜也肉刑之刑刑也三千之屬是正法也田也者與衆田之咸曰示均而無并兼刑也者與衆棄之咸曰示公而無枉濫法無限則庶人田侯田處侯宅食侯食服侯服法制無限則興奢侈長僣亂光曰衆田庶人田皆音甸人亦多不足矣僣亂既興民多匱竭為國不迪其法迪蹈而望其效效功譬諸算乎夫算者不運籌䇿不能定其數治國者不蹈法度不能致康哉光曰算西管切欲治而不用先王之治譬如無財而運算終無益於富也揚子法言卷六
