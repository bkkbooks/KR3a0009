body:
  text: 法言序天降生民倥侗顓蒙恣乎情性聰明不開訓諸理譔學行降周迄孔成于王道終後誕章乖離諸子圖徽譔吾子事有本真陳施於意咸動不克本諸身譔修身芒芒天道昔在聖考過則失中不及則不至不可姦罔譔問道神心忽恍經緯萬方事繫諸道德仁義禮譔問神明哲煌煌旁燭無疆遜于不虞以保天命譔問明遐言周于天地贊于神明幽弘橫廣絕于邇言譔寡見聖人聰明淵懿繼天測靈冠乎群倫經諸範譔五百立政鼓眾動化天下莫尚於中和中和之發在於哲民情譔先知仲尼以來國君將相卿士名臣參差不齊一概諸聖譔重黎仲尼之後訖于漢道德行顏閔曹股肱蕭爰及名將尊卑之條稱述品藻譔淵騫君子純終領聞蠢迪撿押旁開聖則譔君子孝莫大於寧親寧親莫大於寧神寧神莫大於四表之歡心譔孝至
