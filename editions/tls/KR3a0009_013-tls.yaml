body:
  text: 孝至卷第十三孝至矣乎一言而該聖人不加焉父母子之天地與無天何生無地何形天地裕於萬物乎萬物裕於天地乎裕父母之裕不裕矣事父母自知不足者其舜乎不可得而久者事親之謂也孝子愛日孝子有祭乎有齊乎夫能存亡形屬荒絕者惟齊也故孝子之於齊見父母之存也是以齊不賓人而不祭豺獺乎或問子曰死生盡禮可謂能子乎曰石奮石建父子之美也無是父無是子無是子無是父或曰必也兩乎曰與堯無子舜無父不如堯父舜子也子有含菽縕絮而致滋美其親將以求孝也人曰偽如之何曰書假儒衣服而讀之三月不歸孰曰非儒也或曰何以處偽曰有人則作無人則輟之謂偽觀人者審其作輟而已矣不為名之名其至矣乎為名之名其次也或問忠言嘉謀曰言合稷契謂之忠謀合皋陶謂之嘉或曰邵如之何曰亦勗之而已庳則秦儀鞅斯亦忠嘉矣堯舜之道皇兮夏殷周之道將兮而以延其光兮或曰何謂也曰堯舜以其讓夏以其功殷周以其伐或曰食如螘衣如華朱輪駟馬金朱煌煌無已泰乎曰由其德舜禹受天下不為泰不由其德五兩之綸半通之銅亦泰矣天下通道五所以行之一曰勉或曰力有扛洪鼎揭華旗智德亦有之乎曰百人矣德諧頑嚚讓萬國知情天地形不測百人乎或問君曰光問明臣曰禔若敢問何謂也曰君子在上則明而光其下在下則順而安其上或曰聖人事異乎曰聖人德之為事異亞之故常修德者本也見異而修德者末也本末不修而存者未之有也天地之得斯民也斯民之得一人也一人之得心矣吾聞諸傳老則戒之在得年彌高而德彌邵者是孔子之徒與或問德有始而無終與有終而無始也孰寧曰寧先病而後瘳乎寧先瘳而後病乎或問大曰小問遠曰邇未達曰天下為大治之在道不亦小乎四海為遠治之在心不亦邇乎或問俊哲洪秀曰知哲聖人之謂俊秀穎德行之謂洪君子動則擬諸事事則擬諸禮或問群言之長群行之宗曰群言之長德言也群行之宗德行也或問泰和曰其在唐虞成周乎觀書及詩溫溫乎其和可知也周康之時頌聲作乎下關雎作乎上習治也齊桓之時縕而春秋美邵陵習亂也故習治則傷始亂也習亂則好始治也漢德其可謂允懷矣黃支之南大夏之西東鞮北女來貢其珍漢德其可謂允懷矣世鮮焉荒荒聖德遠人咸慕上也武義璜璜兵征四方次也宗夷猾夏蠢迪王人屈國喪師無次也麟之儀儀鳳之師師其至矣乎螭虎桓桓鷹隼䎒䎒未至也或曰訩訩北夷被我純繢帶我金犀珍膳寧餬不亦享乎曰昔在高文武實為兵主今稽首來臣稱為北蕃是為宗廟之神社稷之靈也可不享龍堆以西大漠以北鳥夷獸夷郡勞王師漢家不為也朱崖之絕捐之之力也否則介鱗易我衣裳君人者務在殷民阜財明道信義致帝者之用成天地之化使粒食之民粲也晏也享于鬼神不亦饗乎天道勞功或問功曰勞日一曰勞考載曰功或曰君逸臣勞何天之勞曰於事則逸於道則勞周公以來未有漢公之懿也勤勞則過於阿衡漢興二百一十載而中天其庶矣乎辟廱以本之校學以教之禮樂以容之輿服以表之復其井刑勉人役唐矣夫
