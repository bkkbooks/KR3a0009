body:
  text: 君子卷第十二或問君子言則成文動則成德何以也曰以其弸中而彪外也般之揮斤羿之激矢君子不言言必有中也不行行必有稱也或問君子之柔剛曰君子於仁也柔於義也剛或問航不漿衝不薺有諸曰有之或曰大器固不周於小乎曰斯械也君子不械或問孟子知言之要知德之奧曰非苟知之亦允蹈之或曰子小諸子孟子非諸子乎曰諸子者以其知異於孔子者也孟子異乎不異或曰孫卿非數家之書侻也至于子思孟軻詭哉曰吾於孫卿與見同門而異戶也惟聖人為不異牛玄騂白睟而角其升諸廟乎是以君子全其德或問君子似玉曰純淪溫潤柔而堅玩而廉隊乎其不可形也或曰仲尼之術周而不泰大而不小用之猶牛鼠也曰仲尼之道猶四瀆也經營中國終入大海他人之道者西北之流也綱紀夷貉或入于沱或淪于漢淮南說之用不如太史公之用也太史公聖人將有取焉淮南鮮取焉爾必也儒乎乍出乍入淮南也文麗用寡長卿也多愛不忍子長也仲尼多愛愛義也子長多愛愛奇也或曰甚矣傳書之不果也曰不果則不果矣又以巫鼓或問聖人之言炳若丹青有諸曰吁是何言與丹青初則炳久則渝渝乎哉或曰聖人之道若天天則有常矣奚聖人之多變也曰聖人固多變子游子夏得其書矣未得其所以書也宰我子貢得其言矣未得其所以言也顏淵閔子騫得其行矣未得其所以行也聖人之書言行天也天其少變乎或曰聖人自恣與何言之多端也曰子未覩禹之行水與一東一北行之無礙也君子之行獨無礙乎如何直往也水避礙則通于海君子避礙則通于理君子好人之好而忘己之好小人好己之惡而忘人之好或曰子於天下則誰與曰與夫進者乎或曰貪夫位也慕夫祿也何其與曰此貪也非進也夫進也者進於道慕於德殷之以仁義進而進退而退日孳孳而不自知勌者也或曰進進則聞命矣請問退進曰昔乎顏淵以退為進天下鮮儷焉或曰若此則何少於必退也曰必進易儷必退易儷也進以禮退以義難儷也或曰人有齊死生同貧富等貴賤何如曰作此者其有懼乎信死生齊貧富同貴賤等則吾以聖人為囂囂通天地人曰儒通天地而不通人曰伎人必先作然後人名之先求然後人與之人必其自愛也而後人愛諸人必其自敬也而後人敬諸自愛仁之至也自敬禮之至也未有不自愛敬而人愛敬之者也或問龍龜鴻鵠不亦壽乎曰壽曰人可壽乎曰物以其性人以其仁或問人言仙者有諸乎吁吾聞宓羲神農歿黃帝堯舜殂落而死文王畢孔子魯城之北獨子愛其死乎非人之所及也仙亦無益子之彙矣或曰聖人不師仙厥術異也聖人之於天下恥一物之不知仙人之於天下恥一日之不生曰生乎生乎名生而實死也或曰世無仙則焉得斯語曰語乎者非囂囂也與惟囂囂能使無為有或問仙之實曰無以為也有與無非問也問也者忠孝之問也忠臣孝子偟乎不偟或問壽可益乎曰德曰回牛之行德矣曷壽之不益也曰德故爾如回之殘牛之賊也焉得爾曰殘賊或壽曰彼妄也君子不妄有生者必有死有始者必有終自然之道也君子忠人況己乎小人欺己況人乎
