body:
  text: 問神卷第五或問神曰心請問之曰潛天而天潛地而地天地神明而不測者也心之潛也猶將測之況於人乎況於事倫乎敢問潛心于聖曰昔乎仲尼潛心於文王矣達之顏淵亦潛心於仲尼矣未達一間耳神在所潛而已矣天神天明照知四方天精天粹萬物作類人心其神矣乎操則存舍則亡能常操而存者其惟聖人乎聖人存神索至成天下之大順致天下之大利和同天人之際使之無間也龍蟠于泥蚖其肆矣蚖哉蚖哉惡覩龍之志也與或曰龍必欲飛天乎曰時飛則飛時潛則潛既飛且潛食其不妄形其不可得而制也與曰聖人不制則何為乎羑里曰龍以不制為龍聖人以不手為聖人或曰經可損益與曰易始八卦而文王六十四其益可知也詩書禮春秋或因或作而成於仲尼其益可知也故夫道非天然應時而造者損益可知也或曰易損其一也雖憃知闕焉至書之不備過半矣而習者不知惜乎書序之不如易也曰彼數也可數焉故也如書序雖孔子亦末如之何矣昔之説書者序以百而酒誥之篇俄空焉今亡夫虞夏之書渾渾爾商書灝灝爾周書噩噩爾下周者其書譙乎或問聖人之經不可使易知與曰不可天俄而可度則其覆物也淺矣地俄而可測則其載物也薄矣大哉天地之為萬物郭五經之為衆説郛或問聖人之作事不能昭若日月乎何後世之訔訔也曰瞽曠能默瞽曠不能齊不齊之耳狄牙能喊狄牙不能齊不齊之口君子之言幽必有驗乎明遠必有驗乎近大必有驗乎小微必有驗乎著無驗而言之謂妄君子妄乎不妄言不能達其心書不能達其言難矣哉惟聖人得言之解得書之體白日以照之江河以滌之灝灝乎其莫之禦也面相之辭相適捈中心之所欲通諸人之嚍嚍者莫如言彌綸天下之事記久明遠著古昔之吻吻傳千里之忞忞者莫如書故言心聲也書心畫也聲畫形君子小人見矣聲畫者君子小人之所以動情乎聖人之辭渾渾若川順則便逆則否者其惟川乎或曰仲尼聖者與何不能居世也曾范蔡之不若曰聖人者范蔡乎蔡若范其如聖何或曰淮南太史公者其多知與曷其雜也曰雜乎雜人病以多知為雜惟聖人為不雜書不經非書也言不經非言也言書不經多多贅矣或曰述而不作玄何以作曰其事則述其書則作育而不苗者吾家之童烏乎九齡而與我玄文或曰玄何為曰為仁義曰孰不為仁孰不為義曰勿雜也而已矣或問經之艱易曰存亡或人不諭曰其人存則易亡則艱延陵季子之於樂也其庶矣乎如樂弛雖札末如之何矣如周之禮樂庶事之備也每可以為不難矣如秦之禮樂庶事之不備也每可以為難矣衣而不裳未知其可也裳而不衣未知其可也衣裳其順矣乎或問文曰訓問武曰克未達曰事得其序之謂訓勝己之私之謂克為之而行動之而光者其德乎或曰知德者鮮何其光曰我知為之不我知亦為之厥光大矣必我知而為之光亦小矣或曰君子病沒世而無名盍勢諸名卿可幾也曰君子德名為幾梁齊趙楚之君非不富且貴也惡乎成名谷口鄭子真不屈其志而耕乎巖石之下名震于京師豈其卿豈其卿或問人曰艱知也曰焉難曰太山之與蟻垤江河之與行潦非難也大聖之與大佞難也烏呼能別似者為無難或問鄒莊有取乎曰德則取愆則否何謂德愆曰言天地人經德也否愆也愆語君子不出諸口
