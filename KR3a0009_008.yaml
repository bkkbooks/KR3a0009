body:
  text: 五百卷第八或問五百歲而聖人出有諸曰堯舜禹君臣也而竝文武周公父子也而處湯孔子數百歲而生因往以推來雖千一不可知也聖人有以擬天地而參諸身乎或問聖人有詘乎曰有曰焉詘乎曰仲尼於南子所不欲見也陽虎所不欲敬也見所不見敬所不敬不詘如何曰衛靈公問陳則何以不詘曰詘身將以信道也如詘道而信身雖天下不為也聖人重其道而輕其祿眾人重其祿而輕其道聖人曰於道行與眾人曰於祿殖與昔者齊魯有大臣史失其名曰何如其大也曰叔孫通欲制君臣之儀魯徵先生於齊所不能致者二人曰若是則仲尼之開跡諸侯也非邪曰仲尼開迹將以自用也如委己而從人雖有規矩準繩焉得而用之或問孔子之時諸侯有知其聖者與曰知之知之則曷為不用曰不能曰知聖而不能用也可得聞乎曰用之則宜從之從之則棄其所習逆其所順強其所劣捐其所能衝衝如也非天下之至孰能用之或問孔子知其道之不用也則載而惡乎之曰之後世君子曰賈如是不亦鈍乎曰眾人愈利而後鈍聖人愈鈍而後利關百聖而不慚蔽天地而不恥能言之類莫能加也貴無敵富無倫利孰大焉或曰孔子之道不可小與曰小則敗聖如何曰若是則何為去乎曰愛日曰愛日而去何也曰由群婢之故也不聽正諫而不用噫者吾於觀庸邪無為飽食安坐而厭觀也由此觀之夫子之日亦愛矣或曰君子愛日乎曰君子仕則欲行其義居則欲彰其道事不厭教不倦焉得日或問其有繼周者雖百世可知也秦已繼周矣不待夏禮而治者其不驗乎曰聖人之言天也天妄乎繼周者未欲太平也如欲太平也捨之而用他道亦無由至矣赫赫乎日之光群目之用也渾渾乎聖人之道群心之用也或問天地簡易而聖人法之何五經之支離曰支離蓋其所以為簡易也已簡已易焉支焉離或曰聖人無益於庸也曰世人之益者倉廩也取之如單仲尼神明也小以成小大以成大雖山川丘陵草木鳥獸裕如也如不用也神明亦末如之何矣或問聖人占天乎曰占天地若此則史也何異曰史以天占人聖人以人占天或問星有甘石何如曰在德不在星德隆則晷星星隆則晷德也或問大人曰無事於小為大人請問小曰事非禮義為小聖人之言遠如天賢人之言近如地瓏𤫩其聲者其質玉乎聖人矢口而成言肆筆而成書言可聞而不可殫書可觀而不可盡周之人多行秦之人多病行有之也病曼之也周之士也貴秦之士也賤周之士也肆秦之士也拘月未望則載魄于西既望則終魄于東其遡於日乎彤弓盧矢不為有矣聆聽前世清視在下鑑莫近於斯矣或問何如動而見畏曰畏人何如動而見侮曰侮人夫見畏之與見侮無不由己或問禮難以強世曰難故強世如夷俟倨肆羈角之哺果而啗之奚其強或性或強及其名一也見弓之張兮弛而不失其良兮或曰何謂也曰檠之而已矣川有防器有範見禮教之至也經營然後知幹楨之克立也莊揚蕩而不法墨晏儉而廢禮申韓險而無化鄒衍迂而不信聖人之材天地也次山陵川泉也次鳥獸草木也
