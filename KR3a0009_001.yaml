body:
  text: 學行卷第一學行之上也言之次也教人又其次也咸無焉為衆人或曰人羡久生將以學也可謂好學已乎曰未之好也學不羡天之道不在仲尼乎仲尼駕說者也不在茲儒乎如將復駕其所說則莫若使諸儒金口而木舌或曰學無益也如質何曰未之思矣夫有刀者礲諸有玉者錯諸不礲不錯焉攸用礲而錯諸質在其中矣否則輟螟𧕅之子殪而逢蜾螺祝之曰類我類我久則肖之矣速哉七十子之肖仲尼也學以治之思以精之朋友以磨之名譽以崇之不倦以終之可謂好學也已矣孔子習周公者也顏淵習孔子者也羿逢蒙分其弓良捨其策般投其斧而習諸孰曰非也或曰此名也彼名也處一焉而已矣曰川有瀆山有嶽高而且大者衆人所不能踰也或問世言鑄金金可鑄與曰吾聞覿君子者問鑄人不問鑄金或曰人可鑄與曰孔子鑄顏淵矣或人踧爾曰旨哉問鑄金得鑄人學者所以修性也視聽言貌思性所有也學則正否則邪師哉師哉桐子之命也務學不如務求師師者人之模範也模不模範不範為不少矣一閧之市不勝異意焉一卷之書不勝異說焉一閧之市必立之平一卷之書必立之師習乎習以習非之勝是況習是之勝非乎於戲學者審其是而已矣或曰焉知是而習之曰視日月而知衆星之蔑也仰聖人而知衆說之小也學之為王者事其已久矣堯舜禹湯文武汲汲仲尼皇皇其已久矣或問進曰水或曰為其不捨晝夜與曰有是哉滿而後漸者其水乎或問鴻漸曰非其往不往非其居不居漸猶水乎請問木漸曰止於下而漸於上者其木也哉亦猶水而已矣吾未見斧藻其德若斧藻其楶者也鳥獸觸其情者也衆人則異乎賢人則異衆人矣聖人則異賢人矣禮義之作有以矣夫人而不學雖無憂如禽何學者所以求為君子也求而不得者有矣夫未有不求而得之者也睎驥之馬亦驥之乘也睎顏之人亦顏之徒也或曰顏徒易乎曰睎之則是曰昔顏嘗睎夫子矣正考甫嘗睎尹吉甫矣公子奚斯嘗睎正考甫矣不欲睎則已矣如欲睎孰禦焉或曰書與經同而世不尚治之可乎曰可或人啞爾笑曰須以發策決科曰大人之學也為道小人之學也為利子為道乎為利乎或曰耕不穫獵不饗耕獵乎曰耕道而得道獵德而得德是穫饗已吾不覩參辰之相比也是以君子貴遷善遷善者聖人之徒與百川學海而至于海丘陵學山而不至于山是故惡夫畫也頻頻之黨甚於鸒斯亦賊夫糧食而已矣朋而不心面朋也友而不心面友也或謂子之治産不如丹圭之富曰吾聞先生相與言則以仁與義市井相與言則以財與利如其富如其富或曰先生生無以養也死無以葬也如之何曰以其所以養養之至也以其所以葬葬之至也或曰猗頓之富以為孝不亦至乎顏其餧矣曰彼以其粗顏以其精彼以其回顏以其貞顏其劣乎顏其劣乎或曰使我紆朱懷金其樂不可量已曰紆朱懷金者之樂不如顏氏子之樂顏氏子之樂也內紆朱懷金者之樂也外或曰請問屢空之內曰顏不孔雖得天下不足以為樂然亦有苦乎曰顏苦孔之卓之至也或人瞿然曰茲苦也祇其所以為樂也與曰有教立道無止仲尼有學術業無止顏淵或曰立道仲尼不可為思矣術業顏淵不可為力矣曰未之思也思孰禦焉
