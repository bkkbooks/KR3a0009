body:
  text: 重黎卷第十或問南正重司天北正黎司地今何僚也曰近羲近和孰重孰黎曰羲近重和近黎或問黃帝終始曰託也昔者姒氏治水土而巫步多禹扁鵲盧人也而醫多盧夫欲讎僞者必假真禹乎盧乎終始乎或問渾天曰落下閎營之鮮于妄人度之耿中丞象之幾乎幾乎莫之能違也請問蓋天曰蓋哉蓋哉應難未幾也或問趙世多神何也曰神怪茫茫若存若亡聖人曼云或問子胥種蠡孰賢曰胥也俾吳作亂破楚入郢鞭尸藉館皆不由德謀越諫齊不式不能去卒眼之種蠡不強諫而山棲俾其君詘社稷之靈而童僕又終弊吳賢皆不足邵也至蠡策種而遁肥矣哉或問陳勝吳廣曰亂曰不若是則秦不亡曰亡秦乎恐秦未亡而先亡矣或問六國並其已久矣一病一瘳迄始皇三載而咸時激地保人事乎曰具請問事曰孝公以下強兵力農以蠶食六國事也保曰東溝大河南阻高山西采雍梁北鹵涇垠便則申否則蟠保也激曰始皇方斧將相方刀六國方木將相方肉激也或問秦伯列為侯衛卒吞天下而赧曾無以制乎曰天子制公侯伯子男也庸節節莫差於僭僭莫重於祭祭莫重於地地莫重於天則襄靈文宣其兆也西昔者襄公始僭畤以祭白帝文宣靈宗興鄜下密上用事四帝而天王不匡反致文武胙是以四疆之內各以其力來侵攘肌及骨而赧獨何以制秦乎或問嬴政二十六載天下擅秦秦十五載而楚楚五載而漢五十載之際而天下三擅天邪人邪曰具周建子弟列名城班五爵流之十二當時雖欲漢得乎六國蚩蚩為嬴弱姬卒之屏營嬴擅其政故天下擅秦秦失其猷罷侯置守守失其徽天下孤睽項氏暴強改宰侯王故天下擅楚擅楚之月有漢創業山南發迹三秦追項山東故天下擅漢天也人曰兼才尚拳右計左數動謹於時人也天不人不因人不天不成或問楚敗垓下方死曰天也諒乎曰漢屈群策群策屈群力楚憞群策而自屈其力屈人者克自屈者負天曷故焉或問秦楚既為天典命矣秦縊灞上楚分江西興廢何速乎曰天胙光德而隕明忒昔在有熊高陽高辛唐虞三代咸有顯懿故天因而胙之為神明主且著在天庭是生民之願也厥饗國久長若秦楚強鬩震撲胎藉三正播其虐於黎苗子弟且欲喪之況於民乎況於鬼神乎廢未速也或問仲尼大聖則天曷不胙曰無土然則舜禹有土乎曰舜以堯作土禹以舜作土或問聖人表裏曰威儀文辭表也德行忠信裏也或問義帝初矯劉龕南陽項救河北二方分崩一離一合設秦得人如何曰人無為秦也喪其靈久矣韓信黥布皆劍立南面稱孤卒窮時戮無乃勿乎或曰勿則無名如何曰名者謂令名也忠不終而躬逆焉攸令或問淳于越曰曲伎請問曰始皇方虎挒而梟磔噬士猶臘肉也越與亢眉終無橈辭可謂伎矣仕無妄之國食無妄之粟分無妄之橈自令之閒而不違可謂曲矣或問茅焦歷井幹之死使始皇奉虛左之乘蔡生欲安項咸陽不能移又亨之其者未辨與曰生捨其木侯而謂人木侯亨不亦宜乎焦逆訐而順守之雖辨劘虎牙矣或問甘羅之悟呂不韋勃張辟強之覺平皆以十二齡戊良乎曰才也戊良不必父祖或問酈食其說陳留下敖倉說齊罷歷下軍何辨也韓信襲齊以身脂鼎何訥也曰夫辨也者自辨也如辨人幾矣或問蒯通抵韓信不能下又狂之曰方遭信閉如其抵曰巇可抵乎曰賢者司禮小人司巇況拊鍵乎或問李斯盡忠胡亥極刑忠乎曰斯以留客至作相用狂人之言從浮大海立趙高之邪說廢沙丘之正阿意督責焉用忠霍曰始六世之詔擁少帝之微摧燕上官之鋒處廢興之分堂堂乎忠難矣哉至顯不終矣或問馮唐面文帝得廉頗李牧不能用也諒乎曰彼將有激也親屈帝尊信亞夫之軍牧至頗曷不用哉德曰罪不孥宮不女館不新陵不墳或問交曰仁問餘耳曰光初竇灌曰凶終或問信曰不食其言請人曰晉荀息趙程嬰公孫杵臼秦大夫鑿穆公之側問義曰事得其宜之謂義或問季布忍焉可為也曰能者為之明哲不為也或曰當布之急雖明哲如之何曰明哲不終項仕如終項仕焉攸避或問賢曰為人所不能請人曰顏淵黔婁四皓韋玄問長者曰藺相如申秦而屈廉頗欒布之不塗朱家之不德直不疑之不校韓安國之通使或問臣自得曰石太僕之對金將軍之謹張衛將軍之慎丙大夫之不伐善請問臣自失曰李二師之執二田祁連之濫帥韓馮翊之訴蕭趙京兆之犯魏或問持滿曰扼揚王孫倮葬以矯世曰矯世以禮倮乎如矯世則葛溝尚矣或問周官曰立事左氏曰品藻太史遷曰實録
